{title:"Polimorfizm przez interfejsy",text:"Interface definiuje kontrakt (listę metod). Wiele klas może implementować ten sam interfejs. Kod używa interfejsu — nie zna konkretnej klasy.",example:"Interface Payable { void pay(amount); }. Implementacje: CreditCard, BankTransfer, Crypto. Kod checkout używa tylko Payable — nie wie jakiej metody płatności używa klient. Nowa metoda = nowa klasa, bez zmiany checkout."},
{title:"Praktyczne zastosowania",text:"ORM (Hibernate, SQLAlchemy): ten sam kod działa z PostgreSQL i MySQL przez interfejs. Strategia wzorca projektowego: różne algorytmy, jeden interfejs. Testy: mock objects implementują interfejsy produkcyjne.",example:"Spring @Service z interfejsem PaymentService: w tests używasz MockPaymentService, w produkcji RealPaymentService — ten sam kod testowy, różna implementacja. Dependency injection injektuje właściwą implementację."}
]},
analogy:{pl:"Polimorfizm to jak pilot telewizora: pilot (kod) wysyła sygnał 'włącz'. Telewizor Samsung reaguje inaczej niż LG i Sony — ale pilot nie musi wiedzieć który producent. Każdy TV implementuje 'interfejs' zdalnego sterowania po swojemu.",en:"Polymorphism is like a TV remote: the remote (code) sends 'turn on'. Samsung responds differently than LG or Sony — but the remote doesn't need to know the manufacturer. Each TV implements the 'remote control interface' in its own way."},
answer:"Polymorphism allows objects of different classes to be treated as instances of a common base class or interface, enabling code that works generically across diverse implementations. Through method overriding, a Shape reference can invoke Circle.area() or Triangle.area() at runtime — the correct implementation is selected by dynamic dispatch. This enables the Open/Closed Principle: add new shape types without modifying existing code. Interface-based polymorphism is even more powerful: a checkout system using a Payable interface works with CreditCard, BankTransfer, or Cryptocurrency implementations interchangeably. In testing, this enables mock objects that implement production interfaces, enabling isolated unit testing of business logic.",
keywords:["dynamic dispatch","method overriding","interface","Open/Closed Principle","mock objects","dependency injection","runtime polymorphism","v-table"]},

{num:"Q52",original:"Describe the concept of inheritance and its implementation in a selected object-oriented programming language.",
lecture:{intro:"Dziedziczenie umożliwia tworzeniu nowych klas opartych na istniejących, przejmując ich atrybuty i metody. Wyraża relację 'is-a' między klasami. Cel: reużywalność kodu i hierarchia klas.",
points:[
{title:"Podstawy dziedziczenia — is-a relationship",text:"Klasa pochodna (child) dziedziczy po klasie bazowej (parent). Child ma wszystkie pola i metody parenta plus może dodawać własne i nadpisywać odziedziczone.",example:"C#: class ElectricPlane : Airplane { public int batteryLevel; public override void refuel() { recharge(); } } — ElectricPlane jest Airplane (is-a), dziedziczy takeOff() i land(), nadpisuje refuel()."},
{title:"Access modifiers w dziedziczeniu",text:"public: dostępne wszędzie. private: tylko w definiującej klasie — child NIE dziedziczy dostępu. protected: dostępne w klasie i pochodnych.",example:"Airplane.registrationNumber jest private — ElectricPlane nie ma do niego bezpośredniego dostępu, musi używać publicznego getter getRegistration(). Airplane.engineCount jest protected — ElectricPlane może go używać bezpośrednio."},
{title:"Pojedyncze vs wielokrotne dziedziczenie",text:"Java i C# pozwalają tylko na single inheritance (jeden parent), ale wiele interfejsów. C++ i Python pozwalają na multiple inheritance — ale Diamond Problem: która implementacja metody gdy oba parenty ją mają?",example:"Python MRO (Method Resolution Order): klasa C3 linearization określa kolejność szukania metody. C++ virtual inheritance rozwiązuje diamond problem. Java/C# unikają go przez zakaz multiple inheritance."}
]},
analogy:{pl:"Dziedziczenie to jak rodzina: dziecko (klasa pochodna) dziedziczy cechy rodziców (metody i pola). Może te cechy zmodyfikować (override) lub dodać własne. Protected geny dostępne tylko w rodzinie, private tajemnice rodzinne — dzieci nie mają do nich wglądu.",en:"Inheritance is like family traits: the child (derived class) inherits characteristics from parents (methods and fields). It can modify them (override) or add its own. Protected traits are family-accessible only; private secrets are the parent's alone — children can't access them directly."},
answer:"Inheritance allows a derived class to acquire fields and methods from a base class, expressing an is-a relationship and promoting code reuse. In C#, a derived class uses the colon syntax: class ElectricPlane : Airplane { }. The derived class inherits all non-private members, can add new fields and methods, and override inherited methods using the override keyword. Access modifiers control inheritance scope: private members are not accessible in derived classes, protected members are accessible throughout the hierarchy, and public members are universally accessible. Java and C# restrict to single inheritance for simplicity, using interfaces for multiple-inheritance-like flexibility — avoiding the diamond problem that arises in C++ and Python when multiple parents define the same method.",
keywords:["inheritance","base class","derived class","override","protected","single inheritance","multiple inheritance","diamond problem","is-a relationship","MRO"]},

{num:"Q54",original:"How does the notion of an interface differ from the class implementation in the context of object-oriented programming? What are the main advantages of using interfaces in software development?",
lecture:{intro:"Interface i klasa to dwa fundamentalnie różne byty w OOP. Interface definiuje kontrakt — co obiekt robi. Klasa definiuje implementację — jak to robi. To rozróżnienie jest kluczem do loose coupling i SOLID principles.",
points:[
{title:"Interface — kontrakt bez implementacji",text:"Interface deklaruje sygnatury metod (nazwy, parametry, typy zwracane) bez żadnej implementacji. Klasa implementująca musi dostarczyć ciała wszystkich metod.",example:"Java: interface Flyable { void takeOff(Airport from); void land(Airport at); double getCurrentAltitude(); } — zero implementacji, tylko kontrakt. Implementują: Airplane, Drone, SpaceShuttle — każda po swojemu."},
{title:"Loose coupling i Dependency Inversion",text:"Kod zależy od interfejsu, nie od konkretnej klasy. Możesz podmienić implementację bez zmiany kodu klienta. To fundament testowalności i modularności.",example:"FlightController zależy od Flyable, nie od Airplane. W testach: MockFlyable implementujące interfejs. W produkcji: RealAirplane. FlightController nie zmienia się — zmieniają się implementacje."},
{title:"Interfejsy vs Abstract Classes",text:"Abstract class może mieć częściową implementację i stan. Interface (tradycyjnie) tylko sygnatury. Użyj abstract class gdy klasy pochodne dzielą część implementacji. Użyj interface dla niezwiązanych klas łączonych kontraktem.",example:"AbstractVehicle z implemented metodą getSpeed() (wspólna implementacja) jest abstract class. Flyable, Swimmable, Drivable to interfejsy — Drone może implementować Flyable i Swimmable bez relacji dziedziczenia."}
]},
analogy:{pl:"Interface to jak umowa o pracę — określa co pracownik musi robić (metody). Klasa to konkretny pracownik — decyduje jak to robi. Firma (kod klienta) podpisuje umowę z pracownikiem, nie obchodzi jej jak konkretnie zadanie jest wykonywane.",en:"An interface is like an employment contract — it specifies what the employee must do (methods). The class is the concrete employee — deciding how to do it. The company (client code) signs a contract with an employee; it doesn't care exactly how the task is accomplished."},
answer:"An interface defines a contract — a set of method signatures that implementing classes must provide — without any implementation code or state. A class provides the actual implementation logic for those methods. This distinction enables loose coupling: client code depends on the interface rather than a specific class, allowing implementations to be swapped without modifying the client. This is the Dependency Inversion Principle. Interfaces also enable classes that have no inheritance relationship to share a common contract — a Drone and an Airplane can both implement Flyable without being related. Compared to abstract classes, interfaces are preferred when unrelated classes need to share a behavioral contract, while abstract classes suit hierarchies sharing partial implementation.",
keywords:["interface","abstract class","loose coupling","Dependency Inversion","contract","SOLID","mock objects","Flyable","implementation swap"]},

{num:"Q60",original:"Discuss the principles of defining function and class templates (also referred to as generics).",
lecture:{intro:"Generics (szablony) to mechanizm pisania kodu który działa z różnymi typami danych bez duplikowania. Zamiast pisać osobno ListOfInts, ListOfStrings, ListOfUsers — piszesz List<T> raz.",
points:[
{title:"Czym są Generics",text:"Placeholder T reprezentuje typ, który będzie określony przy użyciu. Kompilator sprawdza poprawność typów w czasie kompilacji (type safety) — bez rzutowania i runtime ClassCastException.",example:"C#: List<int> numbers = new List<int>() — kompilator wie że to lista intów. Próba dodania stringa: błąd kompilacji, nie runtime. Przed generics: ArrayList przechowywał Object — rzutowania wszędzie, błędy w runtime."},
{title:"Generic Methods i ograniczenia (Constraints)",text:"Metoda generyczna działa z każdym typem. Constraints ograniczają jakie typy T są dozwolone: where T : IComparable (musi implementować interfejs), where T : class (musi być reference type).",example:"Java: <T extends Comparable<T>> T findMax(List<T> list) — znajdź maximum. Działa dla List<Integer>, List<String>, List<Date> — każdy typ implementujący Comparable. Nie działa dla List<Object> — object nie jest Comparable."},
{title:"Generic Classes",text:"Cała klasa parametryzowana typem. Repository pattern z Generics: jedno Repository<T> obsługuje wszystkie encje zamiast UserRepository, ProductRepository itp.",example:"C#: class Repository<T> where T : Entity { public T FindById(int id); public void Save(T entity); } — Repository<User> i Repository<Product> to ta sama klasa z różnymi typami. Zero duplikacji kodu."}
]},
analogy:{pl:"Generics to jak pojemnik z regulowaną wkładką: ten sam pojemnik przechowuje monety, guziki albo cukierki — kształt wkładki (typ) zmieniasz przed użyciem, ale pojemnik (logika) jest ten sam. Bez generics musiałbyś mieć osobny pojemnik dla każdego rodzaju przedmiotu.",en:"Generics are like a container with an adjustable insert: the same container stores coins, buttons, or candy — you change the insert shape (type) before use, but the container (logic) is the same. Without generics you'd need a separate container for every type of item."},
answer:"Generics allow writing classes and methods with type placeholders — typically T — that are specified at usage time, enabling code reuse across different data types while maintaining compile-time type safety. A List<T> in C# or Java works for integers, strings, or custom objects without code duplication, and the compiler catches type mismatches at compile time rather than causing ClassCastException at runtime. Constraints like where T : IComparable restrict which types can be used, enabling generic algorithms that require specific capabilities. The Repository<T> pattern exemplifies practical use: one generic repository class provides data access logic for all entity types, eliminating the need for separate UserRepository, ProductRepository implementations.",
keywords:["generics","type parameter","type safety","constraints","Repository pattern","List<T>","compile-time","IComparable","templates","code reuse"]},

{num:"Q97",original:"Discuss the notion of abstraction and indicate its significance in terms of multiple reuse.",
lecture:{intro:"Abstrakcja to jeden z filarów OOP i szerzej — programowania. Polega na ukrywaniu złożoności implementacji za prostym, czystym interfejsem. Użytkownik wie CO robi, nie JAK.",
points:[
{title:"Abstrakcja przez abstract classes i interfaces",text:"Abstract class może definiować częściową implementację z metodami abstrakcyjnymi (bez ciała) które podklasy muszą zaimplementować.",example:"abstract class DatabaseConnection { abstract void connect(String url); void executeQuery(String sql) { connect(url); /* wspólna logika */ } } — executeQuery jest zaimplementowane (reużycie!), connect jest abstrakcyjne — każdy driver implementuje po swojemu."},
{title:"Abstrakcja a reużywalność",text:"Wysokopoziomowa abstrakcja umożliwia reużycie kodu bo kod nie zależy od szczegółów implementacji. Zmiana implementacji nie łamie kodu który używa abstrakcji.",example:"Java JDBC: kod SQL działa identycznie z MySQL, PostgreSQL i Oracle. Abstrakcja (JDBC interface) ukrywa szczegóły komunikacji z każdą bazą danych. Jeden zestaw kodu, wiele baz."},
{title:"Levels of Abstraction",text:"Dobre oprogramowanie ma wiele poziomów abstrakcji: OS → JVM → Spring Framework → Application Layer. Każdy poziom ukrywa złożoność niższego i prezentuje prostszy interfejs wyżej.",example:"Spring JPA: jedną linią userRepository.findByEmail(email) — za kulisami: JPQL → SQL → JDBC → TCP → PostgreSQL. Deweloper widzi tylko findByEmail, abstrahując każdy poziom szczegółów."}
]},
analogy:{pl:"Abstrakcja to kierownica samochodu — prowadzisz auto wiedząc tylko że obracasz kierownicę w lewo żeby skręcić w lewo. Nie musisz wiedzieć o przekładni zębatkowej, wspomaganiu kierownicy ani hydraulice. Abstrakcja skomplikowanego mechanizmu za prostym interfejsem.",en:"Abstraction is like a car's steering wheel — you drive knowing only that turning left makes the car go left. You don't need to know about rack and pinion gears, power steering fluid, or hydraulics. Complex mechanism hidden behind a simple interface."},
answer:"Abstraction hides complex implementation details while exposing a simple, clean interface, allowing users to interact with components without understanding their internals. In OOP, abstract classes define partial implementations with abstract methods that subclasses must implement — enabling shared logic in the base class while requiring specific implementations in subclasses. This directly enables reuse: the JDBC abstraction allows database interaction code to work identically with MySQL, PostgreSQL, or Oracle by hiding vendor-specific communication behind a universal interface. Spring JPA takes this further — a single repository method call abstracts multiple layers from JPQL to SQL to TCP network communication. Each abstraction layer hides the complexity of layers below it, enabling code written at one level to work across many underlying implementations.",
keywords:["abstract class","abstract method","JDBC","Spring JPA","levels of abstraction","interface","information hiding","SOLID","reuse"]},

{num:"Q99",original:"Discuss the principles of MVC template operation. In what projects would you use this type of architecture?",
lecture:{intro:"MVC (Model-View-Controller) to wzorzec architektoniczny separujący trzy odpowiedzialności aplikacji. Główny cel: niezależne rozwijanie UI i logiki biznesowej, testowalność, utrzymywalność.",
points:[
{title:"Model — dane i logika biznesowa",text:"Model reprezentuje dane aplikacji, logikę biznesową i reguły domenowe. Nie wie nic o tym jak dane są wyświetlane. Niezależny od UI.",example:"W aplikacji bankowej: BankAccount z metodami deposit(), withdraw(), getBalance() — to Model. Wie o regułach biznesowych (nie możesz wypłacić więcej niż masz), nie wie o HTML ani o tym czy dane są wyświetlane w aplikacji web czy mobile."},
{title:"View — prezentacja",text:"View odpowiada za wyświetlanie danych (HTML, JSON, XML). Nie zawiera logiki biznesowej — tylko renderowanie. Obserwuje Model (lub dostaje dane od Controllera).",example:"AccountView renderuje saldo i historię transakcji w HTML. Osobna MobileAccountView renderuje te same dane w innym formacie dla aplikacji mobilnej. Ten sam Model, różne View."},
{title:"Controller — koordynacja",text:"Controller przyjmuje żądania użytkownika (HTTP requests), wywołuje odpowiednie metody Modelu, i wybiera View do wyświetlenia. To 'mediator' między Model i View.",example:"POST /transfer: TransferController.handleTransfer(request) → waliduje dane → BankAccount.transfer(amount, targetAccount) → zwraca sukces/błąd → wybiera odpowiedni View (success page lub error page)."},
{title:"Kiedy używać MVC",text:"Webowe aplikacje z complex UI, projekty gdzie UI zmienia się niezależnie od logiki biznesowej, gdy potrzebujesz testować logikę bez UI. Nie najlepszy dla: prostych CRUD, microservices (tutaj lepiej hex/CQRS).",example:"Django, Ruby on Rails, Spring MVC, ASP.NET Core MVC — wszystkie to MVC frameworks. Każdy routing request do odpowiedniego Controllera, który orchestruje Model i View."}
]},
analogy:{pl:"MVC to jak restauracja: kelner (Controller) przyjmuje zamówienie od klienta (żądanie HTTP), przekazuje do kuchni (Model) gdzie przygotowywane jest danie (dane i logika), kelner przynosi gotowe danie (View) klientowi. Kuchnia nie musi wiedzieć jak kelner podaje, kelner nie gotuje.",en:"MVC is like a restaurant: the waiter (Controller) takes orders from customers (HTTP requests), passes them to the kitchen (Model) where food is prepared (data and logic), then brings the finished dish (View) to the customer. The kitchen doesn't know how the waiter serves; the waiter doesn't cook."},
answer:"MVC separates an application into three interconnected components. The Model contains data and business logic — it knows the rules (a bank account can't be overdrawn) but knows nothing about how data is displayed. The View renders data to the user as HTML, JSON, or XML — it contains no business logic, only presentation. The Controller receives user requests, invokes the appropriate Model methods, and selects which View to render. This separation enables independent development of UI and backend logic, multiple Views for the same Model data (web and mobile), and easy unit testing of Model logic without UI. MVC is most appropriate for web applications with complex, data-driven UIs — frameworks like Django, Ruby on Rails, Spring MVC, and ASP.NET Core all implement this pattern.",
keywords:["Model","View","Controller","separation of concerns","Django","Spring MVC","ASP.NET","routing","HTTP request","testability"]}
]},

{id:"E",label:"E",color:"#BA7517",title:"Algorytmy & Złożoność",questions:[
{num:"Q20",original:"How does the analysis of computational (time and memory) complexity affect the choice of an algorithm for a particular task?",
lecture:{intro:"Analiza złożoności to narzędzie inżynierskie — pozwala przewidzieć jak algorytm zachowa się przy dużych danych zanim zostanie zaimplementowany. Notacja Big O opisuje wzrost czasu/pamięci w funkcji rozmiaru wejścia.",
points:[
{title:"Time Complexity — jak rośnie czas",text:"O(1) stały, O(log n) logarytmiczny, O(n) liniowy, O(n log n) linearytmiczny, O(n²) kwadratowy, O(2ⁿ) wykładniczy. Różnica między O(n²) a O(n log n) dla n=1,000,000 to miliony vs tysiące operacji.",example:"Sortowanie 1 miliona elementów: Bubble Sort O(n²) = 10¹² operacji (tygodnie). Merge Sort O(n log n) = 20 milionów operacji (sekundy). Ten sam komputer, ta sama lista, dramatycznie różny czas."},
{title:"Space Complexity — zużycie pamięci",text:"Nie tylko czas jest ograniczonym zasobem. Algorytm rekurencyjny bez tail optimization używa O(n) pamięci na call stack. Dla embedded systems z 256KB RAM — algorytm O(n) space może być niemożliwy.",example:"DFS na głębokim grafie: call stack głębokości n = O(n) space. Na embedded systemie z głębokością 10,000 — stack overflow. Iteracyjna wersja z explicit stack = O(n) space też, ale na heap, nie stack — co jest lepsze."},
{title:"Praktyczny wybór algorytmu",text:"Dla real-time systemów: czas jest kluczowy, unikaj O(n²) dla dużych n. Dla embedded: space jest kluczowy. Dla skalowalnych systemów: algorytm O(n log n) vs O(n²) może być różnicą między sukcesem a klęską przy wzroście.",example:"LinkedIn recommendations: algorytm O(n²) porównujący każdego użytkownika z każdym = przy 900M użytkownikach niemożliwe. Algorytm graph-based O(n log n) = wykonalne. Wybór algorytmu jest strategiczną decyzją."}
]},
analogy:{pl:"Złożoność algorytmu to jak wybór transportu dla dostawy: O(1) to teleport (zawsze tak samo szybko), O(log n) to helikopter (skaluje się dobrze), O(n) to samochód (rośnie liniowo), O(n²) to pieszo przez każdą ulicę miasta (katastrofa przy dużym mieście).",en:"Algorithm complexity is like choosing transport for delivery: O(1) is teleportation (always same speed), O(log n) is a helicopter (scales well), O(n) is a car (grows linearly), O(n²) is walking every street in the city (catastrophic for large cities)."},
answer:"Computational complexity analysis determines algorithmic feasibility under real-world constraints. Time complexity using Big O notation predicts how execution time scales with input size — the difference between O(n log n) and O(n²) for sorting a million elements is seconds versus hours. This directly informs algorithm selection: real-time systems reject high time complexity algorithms, while embedded systems prioritize memory efficiency. Space complexity determines RAM requirements — recursive algorithms with O(n) stack depth may cause stack overflow in memory-constrained environments, requiring iterative alternatives. At scale, complexity becomes the critical architectural decision: O(n²) social graph algorithms that work in development become completely infeasible at production scale with millions of users.",
keywords:["Big O notation","time complexity","space complexity","O(n log n)","O(n²)","scalability","real-time","embedded systems","trade-off"]},

{num:"Q21",original:"What are the most frequent techniques applied for optimisation of algorithms and in what situations are they most efficient?",
lecture:{intro:"Optymalizacja algorytmów to balansowanie między czasem, pamięcią i złożonością kodu. Nie optymalizuj przedwcześnie — najpierw zmierz bottleneck, potem optymalizuj to co jest wolne.",
points:[
{title:"Memoization i Dynamic Programming",text:"Cachowanie wyników pośrednich żeby nie liczyć ponownie. DP = memoization bottom-up. Najefektywniejsze gdy problem ma overlapping subproblems.",example:"Fibonacci bez memoization: O(2ⁿ) — obliczanie fib(50) zajmuje wieczność. Z memoization: O(n) — każda wartość liczona raz. Problem koligacji: obliczanie tej samej wartości miliard razy zamiast raz."},
{title:"Wybór odpowiedniej struktury danych",text:"Algorytm jest tak szybki jak jego struktury danych. Wyszukiwanie w liście = O(n). Wyszukiwanie w hash table = O(1). Zamiana struktury może zmienić złożoność bez zmiany algorytmu.",example:"Sprawdzanie czy element istnieje w zbiorze: Array → O(n) scan. HashSet → O(1) lookup. Przy milionach sprawdzeń: Array = minuty, HashSet = milisekundy. Zero zmiany algorytmu — tylko struktura danych."},
{title:"Przetwarzanie równoległe (Parallel Processing)",text:"Podział problemu na niezależne podzadania wykonywane równolegle. Prawo Amdahla: przyspieszenie limitowane przez sekwencyjną część algorytmu.",example:"Training neural network na CPU: O(n) sekwencyjnie. Na GPU z 10,000 rdzeniami: równoległe operacje macierzowe — efektywnie O(n/10000). Speedup ~10,000x dla parallelizable operacji."}
]},
analogy:{pl:"Optymalizacja algorytmów to jak optymalizacja fabryki: memoization to magazynowanie półproduktów zamiast ich ponownej produkcji, dobra struktura danych to właściwe narzędzie do zadania (kluczem do zamka, nie wkrętakiem), równoległość to praca na wielu stanowiskach jednocześnie.",en:"Algorithm optimization is like optimizing a factory: memoization is storing semi-finished products instead of re-manufacturing, good data structures are the right tool for the job (key for a lock, not a screwdriver), parallelism is running multiple workstations simultaneously."},
answer:"Common optimization techniques serve different scenarios. Memoization and Dynamic Programming cache intermediate results to avoid redundant computations — transforming exponential recursive algorithms into polynomial ones; Fibonacci's O(2ⁿ) becomes O(n) with memoization. Selecting efficient data structures changes algorithmic complexity without changing the algorithm itself: replacing array membership checks O(n) with hash set lookups O(1) transforms minutes of computation into milliseconds at scale. Parallel processing distributes independent sub-problems across multiple cores or machines — neural network training achieves thousands-fold speedups by running matrix operations in parallel on GPU cores. The key principle: measure before optimizing; most programs spend 90% of time in 10% of code.",
keywords:["memoization","dynamic programming","hash table","parallel processing","Amdahl's law","data structures","overlapping subproblems","GPU","profiling"]},

{num:"Q25",original:"What are the key differences between algorithmic and heuristic approaches in solving problems related to IT systems?",
lecture:{intro:"To fundamentalne rozróżnienie w computer science: czy potrzebujesz gwarantowanego optymalnego rozwiązania (algorytmiczne), czy akceptowalnego rozwiązania szybko (heurystyczne). Wybór determinuje strategie dla całych systemów.",
points:[
{title:"Algorytmiczne — gwarancja optymalności",text:"Algorytm deterministycznie (lub probabilistycznie z gwarancją) znajduje optymalne rozwiązanie w zdefiniowanym czasie. Dla problemów klasy P — wykonalne. Dla NP-hard — niewykonalne dla dużych danych.",example:"Dijkstra — gwarantuje najkrótszą ścieżkę w grafie. Dla mapy GPS z tysiącami skrzyżowań — wykonalny w milisekundy. Dla TSP (komiwojażer) z 50 miastami — optymalny algorytm: 50! kombinacji = lata obliczeń."},
{title:"Heurystyczne — szybkie dobre-wystarczające rozwiązanie",text:"Heurystyki nie gwarantują optymalności — ale dają akceptowalne rozwiązanie w praktycznym czasie. Greedy, simulated annealing, genetic algorithms, beam search.",example:"TSP z heurystyką nearest-neighbor: nie optymalne, ale rozwiązanie w sekundy, często 95% jakości optymalnego. Dla dostawcy kurierskiego z 200 przystankami — wystarczające: nie potrzeba absolutnego optimum, tylko wystarczająco dobre."},
{title:"Kiedy używać którego",text:"Algorytmiczne: gdy poprawność jest krytyczna (kryptografia, sortowanie, shortest path w małym grafie). Heurystyczne: gdy problem jest NP-hard, dane są duże, czas jest ograniczony, lub 'dobre wystarczające' spełnia wymagania biznesowe.",example:"Przydział operatorów w call center (NP-hard scheduling): heurystyki w sekundy dają 95% optymalnego rozwiązania. Algorytm optymalny wymagałby godzin — harmonogram na jutro byłby gotowy za tydzień."}
]},
analogy:{pl:"Algorytmiczne to jak przepis który zawsze daje idealny wynik — gwarantowany, ale może zajmować 8 godzin. Heurystyczne to jak doświadczony kucharz gotujący na oko — gotowy w 30 minut, 95% jakości ideału. Dla restauracji fast food heurystyka; dla konkursu kulinarnego algorytm.",en:"Algorithmic is like a recipe that always gives perfect results — guaranteed, but may take 8 hours. Heuristic is like an experienced chef cooking by feel — done in 30 minutes, 95% of perfect quality. For a fast food restaurant: heuristic; for a culinary competition: algorithmic."},
answer:"The key difference is the guarantee of optimality versus practical speed. Algorithmic approaches guarantee finding the optimal solution within defined computational bounds — Dijkstra's algorithm always finds the shortest path. However, for NP-hard problems like the Travelling Salesman Problem, optimal algorithms require factorial time — infeasible for real inputs. Heuristic approaches sacrifice the optimality guarantee for practical speed: a nearest-neighbor heuristic for TSP finds solutions in seconds that are typically within 5% of optimal — sufficient for real delivery scheduling. The choice depends on problem class: if correctness is critical and data is small, use algorithms; if the problem is NP-hard, data is large, or 'good enough' meets business needs, heuristics are the practical choice.",
keywords:["NP-hard","TSP","Dijkstra","greedy","simulated annealing","genetic algorithm","optimality","heuristic","P vs NP","nearest-neighbor"]}
]},

{id:"F",label:"F",color:"#888780",title:"Infrastruktura & Systemy Operacyjne",questions:[
{num:"Q37",original:"What is virtualization in the context of operating systems and what benefits does it bring?",
lecture:{intro:"Wirtualizacja tworzy abstrakcyjną warstwę między sprzętem a oprogramowaniem, umożliwiając uruchomienie wielu izolowanych środowisk na jednym fizycznym sprzęcie. To fundamentalna technologia datacenter i cloud computing.",
points:[
{title:"Jak działa wirtualizacja",text:"Hypervisor tworzy Virtual Machines (VM), każda z własnym wirtualnym CPU, pamięcią, dyskiem i siecią. VM 'myśli' że ma dedykowany sprzęt — hypervisor zarządza faktycznym podziałem zasobów.",example:"Serwer fizyczny z 32 rdzeniami i 256GB RAM może hostować: 8 × VM produkcyjne (4 rdzenie, 32GB każda), 4 × VM test/dev (2 rdzenie, 16GB każda). Fizycznie 1 serwer, logicznie 12 izolowanych środowisk."},
{title:"Izolacja i bezpieczeństwo",text:"VM są izolowane od siebie. Awaria jednej VM nie wpływa na inne. Malware w jednej VM nie może zainfekować innej bez eskapowania z hypervisora.",example:"Firma z aplikacjami dla różnych klientów: każdy klient dostaje własną VM. Awaria serwera klienta A nie dotyka klienta B. Dane są izolowane — GDPR compliance jest łatwiejsze."},
{title:"Korzyści dla datacenter",text:"Konsolidacja serwerów (mniej fizycznego sprzętu), łatwe backupy (snapshot VM), disaster recovery (przenieś VM na inny host), szybkie provisioning nowych środowisk.",example:"Przed wirtualizacją: 100 aplikacji = 100 fizycznych serwerów, 15% average utilization. Po wirtualizacji: 10 serwerów hostujących 100 VM, 80% utilization. 90% mniej sprzętu, 70% mniej energii."}
]},
analogy:{pl:"Wirtualizacja to jak apartamentowiec zamiast osobnych domów: jeden budynek (fizyczny serwer) z wieloma mieszkaniami (VM), każde izolowane i niezależne. Właściciel budynku (hypervisor) zarządza wspólnymi zasobami. Efektywniejsze niż osobne domy dla każdego.",en:"Virtualization is like an apartment building instead of separate houses: one building (physical server) with many apartments (VMs), each isolated and independent. The building manager (hypervisor) manages shared resources. Far more efficient than separate houses for everyone."},
answer:"Virtualization creates an abstraction layer between physical hardware and operating systems, allowing multiple isolated virtual machines to run on a single physical host. A hypervisor manages resource allocation and ensures isolation between VMs. Benefits include server consolidation — reducing physical hardware needs from 100 servers to 10 by increasing utilization from 15% to 80%. Isolation provides security and stability: VM failures don't affect others, and malware containment is improved. Operational benefits include VM snapshots for instant backups, easy disaster recovery by migrating VM images to other hosts, and rapid provisioning of new environments in minutes rather than the days required for physical hardware procurement.",
keywords:["hypervisor","VM","virtualization","isolation","consolidation","snapshot","utilization","disaster recovery","provisioning"]},

{num:"Q38",original:"What is a hypervisor in virtualization, what role does it perform and how is it organised?",
lecture:{intro:"Hypervisor to software (lub firmware) umożliwiający wirtualizację. Zarządza fizycznym sprzętem i rozdziela go między maszyny wirtualne. Dwa typy: Type 1 (bare metal) i Type 2 (hosted) — z fundamentalnymi różnicami w wydajności.",
points:[
{title:"Type 1 — Bare Metal Hypervisor",text:"Uruchamia się bezpośrednio na sprzęcie (bez host OS). Zarządza sprzętem bezpośrednio. Najwyższa wydajność i bezpieczeństwo. Używany w produkcji datacenter.",example:"VMware ESXi, Microsoft Hyper-V Server, Xen — bookujesz je jak OS z bootloadera. Brak host OS = mniej overhead. AWS EC2 używa Xen/Nitro (własny Type 1) — każda instancja EC2 to VM na bare metal hypervisorze."},
{title:"Type 2 — Hosted Hypervisor",text:"Uruchamia się jako aplikacja na host OS (Windows/Linux/macOS). Host OS zarządza sprzętem. Łatwy w instalacji i użyciu. Niższa wydajność przez dodatkową warstwę host OS.",example:"VirtualBox, VMware Workstation, Parallels — instalujesz jak każdy program. Developer na macOS może uruchomić Linux VM dla development. Dodatkowa warstwa host OS dodaje ~5-15% overhead."},
{title:"CPU Virtualization Extensions",text:"Nowoczesne procesory mają sprzętowe rozszerzenia wirtualizacji (Intel VT-x, AMD-V) które hypervisor może używać żeby zredukować overhead. Hardware-assisted virtualization znacznie poprawia wydajność.",example:"Bez VT-x: hypervisor musi trapować i emulować każdą instrukcję uprzywilejowaną = duży overhead. Z VT-x: VM może wykonywać większość instrukcji bezpośrednio na CPU, hypervisor interweniuje tylko gdy potrzeba = mały overhead."}
]},
analogy:{pl:"Type 1 to como hotel własny — właściciel (hypervisor) zarządza budynkiem bezpośrednio. Type 2 to podnajmowanie pokoju u kogoś (host OS jest właścicielem, ty podnajmujesz) — mniej wydajne, ale łatwiejsze do uruchomienia. Dla dużej firmy hotelowej (datacenter): Type 1. Dla turysty (developer): Type 2.",en:"Type 1 is like owning your hotel building — the hypervisor manages everything directly. Type 2 is subletting a room from someone (host OS owns the building) — less efficient but easier to set up. For large hotel chains (datacenters): Type 1. For a traveler (developer): Type 2."},
answer:"A hypervisor is software that creates and manages virtual machines by abstracting physical hardware resources — CPU, memory, storage, and networking — and allocating them to VMs while ensuring isolation between them. Type 1 (bare metal) hypervisors run directly on hardware without a host operating system, providing maximum performance and security — used in production datacenters with VMware ESXi, Microsoft Hyper-V, and cloud providers like AWS using Xen. Type 2 (hosted) hypervisors run as applications on a host OS like Windows or macOS — easier to set up but with higher performance overhead, suitable for developer workstations with VirtualBox or VMware Workstation. Modern processors provide hardware virtualization extensions (Intel VT-x, AMD-V) that hypervisors leverage to reduce overhead significantly.",
keywords:["Type 1","Type 2","bare metal","hosted","VMware ESXi","Hyper-V","VT-x","AMD-V","hardware virtualization","overhead"]},

{num:"Q40",original:"Explain what 32 bit and 64 bit operating systems are and why we refer to them.",
lecture:{intro:"Termin '32-bit' i '64-bit' odnosi się do szerokości magistrali danych i adresowej procesora — to ile bitów CPU przetwarza jednocześnie i ile pamięci może adresować. Różnica ma praktyczne konsekwencje.",
points:[
{title:"Co oznacza szerokość bitowa",text:"Szerokość rejestru CPU i magistrali adresowej. 32-bit: przestrzeń adresowa 2³² = 4 GB. 64-bit: przestrzeń adresowa 2⁶⁴ = 18 eksabajtów (w praktyce terabajty). To fundamentalne ograniczenie.",example:"Windows XP 32-bit: max 4GB RAM, praktycznie dostępne ~3.2GB (reszta zajęta przez device mappings). W 2006 gdy RAM kosztował mniej i serwery miały 16GB RAM — 32-bit OS był poważnym bottleneckiem dla serwerów."},
{title:"Wpływ na wydajność obliczeń",text:"64-bit CPU przetwarza 64-bit liczby w jednej instrukcji. 32-bit musi używać wielu instrukcji dla 64-bit operacji. Dla obliczeń naukowych i baz danych — 64-bit jest znacznie szybsze.",example:"Baza danych z 64-bit integer IDs: na 32-bit CPU obliczenia na tych liczbach wymagają wielu instrukcji. Na 64-bit: jedna instrukcja. Przy miliardach operacji na sekundę — różnica jest mierzalna."},
{title:"Kompatybilność wsteczna",text:"64-bit OS może uruchamiać 32-bit aplikacje (przez WoW64 w Windows). 32-bit OS nie może uruchamiać 64-bit aplikacji. Dziś 32-bit OS to legacy — żaden nowoczesny system nie jest 32-bit.",example:"WoW64 (Windows on Windows 64): warstwa emulacji pozwalająca starym 32-bit programom działać na 64-bit Windows. C:\\Windows\\SysWOW64 zawiera 32-bit DLLs. 64-bit programy używają C:\\Windows\\System32 (historycznie mylące nazwy)."}
]},
analogy:{pl:"Szerokość bitowa to jak szerokość drogi: 32-bit to 2-pasmówka (max 4GB ruchu, cokolwiek więcej nie wejdzie). 64-bit to autostrada 8-pasmowa (praktycznie nieograniczona przepustowość). Nowoczesne aplikacje potrzebują autostrady.",en:"Bit width is like road width: 32-bit is a 2-lane road (max 4GB traffic, nothing more fits). 64-bit is an 8-lane highway (practically unlimited throughput). Modern applications need the highway."},
answer:"The 32-bit and 64-bit distinction refers to the width of CPU registers and memory address buses. A 32-bit system can address 2³² bytes — a maximum of 4GB of RAM — which became a critical bottleneck when RAM prices fell and applications grew. A 64-bit system can address 2⁶⁴ bytes — theoretically 18 exabytes, practically terabytes — enabling modern workloads. 64-bit CPUs also process 64-bit integers natively in single instructions, while 32-bit CPUs require multiple instructions, providing performance benefits for databases and scientific computing. Modern 64-bit operating systems maintain backward compatibility by running 32-bit applications through emulation layers like WoW64 on Windows. Today, 32-bit operating systems are legacy — all modern consumer and server systems are 64-bit.",
keywords:["32-bit","64-bit","memory addressing","4GB limit","WoW64","register width","address space","backward compatibility","exabyte"]}
]},

{id:"G",label:"G",color:"#1D9E75",title:"Bazy Danych",questions:[
{num:"Q58",original:"Discuss and compare relational and non-relational database models.",
lecture:{intro:"Wybór między relacyjną a nierelacyjną bazą danych to jedna z najważniejszych decyzji architektonicznych. Nie ma 'lepszej' opcji — wybór zależy od charakteru danych, wymagań spójności i skali.",
points:[
{title:"Relational (SQL) — struktura i spójność",text:"Dane w tabelach z predefiniowanym schematem. ACID transactions (Atomicity, Consistency, Isolation, Durability). Silne relacje przez foreign keys. JOIN operacje. Idealne dla transakcyjnych systemów wymagających spójności.",example:"System bankowy: tabele Account, Transaction, Customer. Transfer wymaga ACID: odjęcie z jednego konta I dodanie do drugiego musi być atomowe. Jeśli cokolwiek padnie w środku — rollback. Bez ACID: pieniądze znikają w eterze."},
{title:"Non-Relational (NoSQL) — elastyczność i skala",text:"Różne modele: Document (MongoDB), Key-Value (Redis), Column-family (Cassandra), Graph (Neo4j). Brak stałego schematu. Horizontal scaling. Eventual consistency. Idealne dla dużych wolumenów nieustrukturalizowanych danych.",example:"Twitter/X: każdy tweet to JSON document w MongoDB — różne tweety mogą mieć różne pola (media, poll, quoted tweet). Cassandra przechowuje timeline — zoptymalizowana do szybkiego odczytu chronologicznego przy miliardach wpisów."},
{title:"Kiedy co wybrać",text:"SQL: systemy finansowe, ERP, systemy wymagające silnej spójności i złożonych relacji. NoSQL: high-write applications, nieustrukturalizowane dane, potrzeba horizontal scale, real-time applications.",example:"E-commerce: katalog produktów → MongoDB (różne atrybuty dla różnych kategorii produktów, frequent schema changes). Zamówienia i płatności → PostgreSQL (ACID, relacje Order-OrderItem-Payment są krytyczne). Sesje użytkowników → Redis (key-value, szybki dostęp, TTL)."}
]},
analogy:{pl:"Relational DB to jak biblioteka z katalogiem — każda książka ma ściśle określone miejsce i kategorię, możesz łatwo znaleźć wszystkie książki autora (JOIN). NoSQL to jak nowoczesna księgarnia — możesz szybko dodać nowy dział bez przebudowy całej biblioteki, ale znajdowanie relacji jest trudniejsze.",en:"Relational DB is like a library with a catalog — every book has a strict place and category, you can easily find all books by an author (JOIN). NoSQL is like a modern bookstore — you can quickly add a new section without rebuilding the whole library, but finding cross-references is harder."},
answer:"Relational databases store data in structured tables with predefined schemas and enforce ACID transactions — Atomicity, Consistency, Isolation, Durability — making them ideal for financial systems where a bank transfer must atomically debit one account and credit another or roll back completely. They excel at complex relational queries with JOINs across multiple tables. Non-relational databases sacrifice strict consistency for flexibility and scale: document stores like MongoDB allow schema-less JSON documents where different records can have different fields; column-family stores like Cassandra optimize for massive write throughput and horizontal scaling across hundreds of nodes; key-value stores like Redis provide sub-millisecond latency for caching and session storage. Modern architectures often use both — polyglot persistence — selecting the appropriate model for each data type and access pattern.",
keywords:["ACID","SQL","NoSQL","MongoDB","Cassandra","Redis","horizontal scaling","eventual consistency","JOIN","polyglot persistence","schema"]}
]},

{id:"H",label:"H",color:"#D4537E",title:"Web & Mobile Development",questions:[
{num:"Q100",original:"Name and describe features of various types of mobile applications (native, hybrid, cross-platform, etc.).",
lecture:{intro:"Wybór między typami aplikacji mobilnych to trade-off między wydajnością, kosztami development i dostępem do platformowych funkcji. Decyzja ma konsekwencje na lata.",
points:[
{title:"Native Applications",text:"Pisane w języku natywnym platformy: Swift/Objective-C (iOS), Kotlin/Java (Android). Pełny dostęp do API platformy, najwyższa wydajność, najlepsze UX. Ale: dwa osobne codebases.",example:"Instagram iOS (Swift) i Instagram Android (Kotlin): osobne zespoły, osobny kod. Ale: aparat działa idealnie, Haptic Feedback jest płynny, animacje 120fps. Użytkownicy czują 'natywność'."},
{title:"Cross-Platform — Flutter i React Native",text:"Jeden codebase dla obu platform. Flutter: własny rendering engine (Skia/Impeller) — piksele rysowane przez Fluttera, nie przez platformę. React Native: bridge do natywnych komponentów. Prawie-natywna wydajność.",example:"Alibaba używa Flutter dla całego Xianyu app — spójny UI na iOS i Android, jeden zespół, jeden codebase. Facebook (Meta) stworzył React Native dla własnych apps — Marketplace, Ads Manager."},
{title:"PWA — Progressive Web Apps",text:"Strona WWW działająca jak aplikacja. Service Worker dla offline. Web App Manifest dla instalacji. Brak App Store — bezpośredni install. Aktualizacje natychmiastowe (bez recenzji sklepu). Brak dostępu do wszystkich natywnych API.",example:"Twitter Lite PWA: zainstalowana jak aplikacja, działa offline, push notifications. Rozmiar 600KB vs 23MB native app. Idealny dla rynków rozwijających się z wolnym internetem i drogimi pakietami danych."},
{title:"Hybrid Apps — WebView wrapper",text:"Aplikacja webowa (HTML/CSS/JS) zawinięta w natywny kontener WebView. Dostęp do natywnych API przez JavaScript bridge (Cordova, Ionic). Najniższe koszty development. Najgorsza wydajność.",example:"Wiele legacy enterprise apps to hybrid — Cordova/Ionic. Wyglądają jak native ale czuć 'webowość' przy szybkich scrollach. Dobry wybór gdy: masz istniejącą web app, budżet ograniczony, użytkownicy nie są wymagający."}
]},
analogy:{pl:"Typy aplikacji mobilnych to jak środki transportu: Native to własny samochód (najlepszy, najdroższy), Cross-platform to car-sharing (prawie tak dobry, tańszy), PWA to komunikacja miejska (dostępna dla wszystkich, nie potrzeba nic instalować), Hybrid to taksówka ze starym samochodem (dojeżdżasz, ale bez komfortu premium).",en:"Mobile app types are like transport options: Native is owning your own car (best, most expensive), Cross-platform is car-sharing (almost as good, cheaper), PWA is public transport (accessible to all, nothing to install), Hybrid is an old taxi (gets you there, but without premium comfort)."},
answer:"Mobile applications come in several types with distinct trade-offs. Native apps are written in platform-specific languages — Swift for iOS, Kotlin for Android — providing maximum performance, full platform API access, and the best user experience, but requiring separate codebases for each platform. Cross-platform frameworks like Flutter use a single codebase with their own rendering engine to achieve near-native performance across platforms, while React Native bridges to native components. Progressive Web Apps are web applications installable from a browser, bypassing app stores and enabling instant updates, but with limited access to native hardware APIs — ideal for reaching users on low-end devices or slow connections with smaller app sizes. Hybrid apps wrap web technology in a native shell using tools like Cordova, offering low development cost at the expense of performance.",
keywords:["native","cross-platform","Flutter","React Native","PWA","hybrid","WebView","Service Worker","Swift","Kotlin","Cordova"]},

{num:"S2-7",original:"Compare the role of progressive web apps (PWAs) and native mobile apps in cross-platform development using Java and .NET.",
lecture:{intro:"PWA vs Native to strategiczna decyzja: czy priorytetyzujesz reach i koszt (PWA) czy wydajność i integrację z platformą (native/cross-platform). Java (Android/MAUI) i .NET (MAUI) oferują tooling dla obu.",
points:[
{title:"PWA — sieć jako platforma",text:"PWA używa standardowych webowych technologii i działa w przeglądarce. Instalowalna, offline-capable (Service Worker), push notifications. Brak App Store review, natychmiastowe aktualizacje. Ograniczenia: brak Bluetooth, NFC, background processing na iOS.",example:"Starbucks PWA: zainstalowana na home screen, działa offline, obsługuje zamówienia. Rozmiar 233× mniejszy niż native app. Ideał dla klientów nie chcących instalować kolejnej 'dużej' aplikacji."},
{title:".NET MAUI — cross-platform native z .NET",text:".NET MAUI (Multi-platform App UI) pisze w C# jeden codebase, kompiluje do natywnych aplikacji iOS, Android, macOS i Windows. Pełny dostęp do natywnych API przez abstrakcję.",example:"Enterprise app dla serwisantów: dostęp do aparatu, GPS, Bluetooth (do połączenia z urządzeniami), background sync. PWA nie może tego zapewnić niezawodnie. .NET MAUI z jednym codebase obsługuje Android, iOS i Windows."},
{title:"Kiedy PWA a kiedy Native",text:"PWA: content-heavy apps, e-commerce bez hardware access, aplikacje na rynki z wolnym internetem. Native/MAUI: hardware access (kamera, BLE, NFC), gaming, finansowe (biometria), enterprise fieldwork.",example:"Gazeta online → PWA (czytanie artykułów, push notifications o newsy — wystarczy). Aplikacja dla lekarzy w szpitalu → .NET MAUI (dostęp do aparatu, BLE do medical devices, biometria do logowania, offline w obszarach bez WiFi)."}
]},
analogy:{pl:"PWA to jak sklep na ulicy: łatwy dostęp, nie potrzebujesz kluczy (brak instalacji), ale masz ograniczone możliwości. MAUI native to jak własny budynek z pełnym wyposażeniem: droższy, ale masz dostęp do wszystkiego.",en:"PWA is like a street kiosk: easy access, no key needed (no install), but limited capabilities. MAUI native is like owning a full building: more expensive to build, but access to everything."},
answer:"PWAs are cost-effective, installable web applications that bypass app stores, enabling instant updates and broad reach on any device with a browser. They excel at content delivery, e-commerce, and applications where cross-platform reach and low friction installation outweigh hardware access needs. However, they have significant limitations: restricted Bluetooth, NFC, and background processing access — particularly on iOS. .NET MAUI provides cross-platform native development in C# targeting iOS, Android, macOS, and Windows from a single codebase with full hardware API access. It is preferred for enterprise applications requiring camera, biometrics, BLE connectivity, or reliable offline operation. The choice is driven by the hardware and OS integration requirements of the specific use case.",
keywords:["PWA","Service Worker","MAUI",".NET","cross-platform","native","App Store","offline","BLE","biometrics","hardware access"]}
]},

{id:"I",label:"I",color:"#E24B4A",title:"DevOps & Zarządzanie Projektami",questions:[
{num:"Q16",original:"Present the key differences between traditional methods of project management (e.g.: Waterfall) and agile methods (e.g.: Scrum, Kanban) and discuss situations in which each of these methods can be most efficient, especially in the context of IT projects.",
lecture:{intro:"Waterfall i Agile to nie tylko metody zarządzania — to filozofie dotyczące jak zarządzać niepewnością. Waterfall zakłada że możemy zaplanować wszystko z góry. Agile zakłada że requirements ewoluują i należy się do tego dostosować.",
points:[
{title:"Waterfall — liniowy, sekwencyjny",text:"Etapy: Requirements → Design → Implementation → Testing → Deployment. Każdy etap musi być zakończony przed następnym. Pełna dokumentacja. Zmiany requirements są kosztowne i trudne.",example:"Projekt wdrożenia systemu ERP dla dużej korporacji z fixed regulatory requirements: requirements dobrze znane, zmiany są regulacyjnie ograniczone, kontrakt fixed-price. Waterfall działa — 2 lata wdrożenia z jasno zdefiniowanymi etapami."},
{title:"Scrum — iteracyjny, empiryczny",text:"Praca w Sprintach (1-4 tygodnie). Product Backlog, Sprint Planning, Daily Standup, Sprint Review, Retrospective. Każdy Sprint dostarcza working software. Requirements mogą się zmieniać między Sprintami.",example:"Startup budujący aplikację mobilną: requirements zmieniają się na podstawie user feedback. Sprint 1: MVP login/rejestracja. Sprint 2: core feature. Sprint 3: feedback od beta users → pivot w feature X. Waterfall byłby katastrofą."},
{title:"Kanban — ciągły flow",text:"Visualizacja pracy na tablicy. Limity WIP (Work In Progress) na każdej kolumnie. Continuous delivery. Brak Sprintów — praca płynie ciągłym strumieniem.",example:"DevOps team obsługujący support tickets i bugi: praca przychodzi ciągle, różnej wielkości i priorytetu. Kanban idealny — zespół bierze najwyższy priorytet ticket gdy jest wolny slot. Nie ma sensu planować 2-tygodniowych Sprintów dla tak zmiennego flow."}
]},
analogy:{pl:"Waterfall to budowa mostu — musisz zaplanować wszystko przed pierwszym wykopem, zmiany w połowie są astronomicznie drogie. Scrum to exploracja nieznanego terytorium — idziesz kawałek (Sprint), sprawdzasz co widzisz (review), adjustujesz plan (retrospective), idziesz dalej. Kanban to taśma produkcyjna — ciągły przepływ, brak etapów.",en:"Waterfall is building a bridge — plan everything before breaking ground, mid-construction changes are astronomically expensive. Scrum is exploring unknown territory — go a stretch (Sprint), check what you see (review), adjust the plan (retrospective), continue. Kanban is an assembly line — continuous flow, no stages."},
answer:"Waterfall is a sequential approach where each phase must complete before the next begins — suitable for projects with well-defined, stable requirements, regulatory constraints, or fixed-price contracts where changes are costly. Construction and large enterprise ERP implementations often use Waterfall. Agile methodologies like Scrum work in short iterative Sprints of 1-4 weeks, delivering working software each Sprint and adapting based on user feedback — ideal for software development where requirements evolve. Scrum provides ceremony structure (standups, reviews, retrospectives) for teams building products. Kanban suits continuous workflow scenarios like support teams or DevOps where work arrives continuously with varying priority — using visual boards and WIP limits to optimize flow without Sprint boundaries.",
keywords:["Waterfall","Scrum","Kanban","Sprint","backlog","WIP limits","iterative","sequential","empirical","Product Owner"]},

{num:"Q18",original:"Discuss the types of tests and benefits brought by test automation in the process of software development.",
lecture:{intro:"Testing pyramid: więcej unit testów (fast, cheap), mniej integration testów, jeszcze mniej E2E testów (slow, expensive). Automatyzacja testów to inwestycja która zwraca się wielokrotnie przy każdej nowej funkcji.",
points:[
{title:"Typy testów — testing pyramid",text:"Unit tests: testują izolowane funkcje/klasy, szybkie, tanie. Integration tests: testują współpracę komponentów. E2E tests: testują cały system od UI do bazy danych. Contract tests: testują interfejsy między serwisami.",example:"Klasa BankAccount.withdraw(): unit test sprawdza logikę odejmowania i walidacji. Integration test sprawdza czy poprawnie zapisuje do bazy danych. E2E test klikając w UI sprawdza cały flow wypłaty."},
{title:"Korzyści automatyzacji",text:"Szybkie wykrycie regresji (istniejące funkcje przestały działać po zmianach). Repeatable execution — testy działają identycznie za każdym razem. Confidence przy refactoringu — możesz zmieniać kod bez strachu.",example:"Bez testów: developer boi się dotknąć legacy kodu — nie wie co zepsuje. Z testami: developer zmienia algorytm sortowania, odpala testy, wszystkie zielone → pewność że nic nie zepsuł. To co zajęłoby tydzień manualnego testowania = 2 minuty CI."},
{title:"TDD — Test-Driven Development",text:"Red-Green-Refactor: najpierw napisz test (który nie przechodzi), potem minimalny kod żeby test przeszedł, potem refaktoruj. Design przez testy — wymusza testowalny, modularny kod.",example:"TDD dla BankAccount.transfer(): 1) napisz test który sprawdza że transfer zmniejsza balance source i zwiększa balance target, 2) zaimplementuj minimalny transfer() żeby test przeszedł, 3) refaktoruj dla czytelności. Test jest specyfikacją."}
]},
analogy:{pl:"Testy automatyczne to jak checkpoint system w grze video: możesz eksplorować nowe obszary (dodawać funkcje) bez strachu, bo zawsze możesz wrócić do ostatniego checkpointu (cofnąć do działającego stanu). Bez testów każda zmiana to skok na wiarę.",en:"Automated tests are like a video game checkpoint system: you can explore new areas (add features) without fear, because you can always return to the last checkpoint (working state). Without tests, every change is a leap of faith."},
answer:"Test automation covers multiple levels of the testing pyramid. Unit tests verify isolated functions or classes in milliseconds — fast and cheap to run thousands per commit. Integration tests verify component interactions including database and external services. End-to-end tests validate complete user workflows from UI to database, providing highest confidence but slowest execution. The primary benefits of automation are: rapid regression detection — catching when new code breaks existing features within minutes of commit rather than days of manual testing; repeatable, consistent execution eliminating human error; and confidence during refactoring — developers can restructure code knowing the test suite will immediately flag any behavioral changes. CI/CD integration runs the full test suite on every commit, making quality continuous rather than a final-phase gate.",
keywords:["unit test","integration test","E2E test","TDD","regression","CI/CD","testing pyramid","Red-Green-Refactor","coverage","mocking"]},

{num:"Q19",original:"What are the most popular version control systems and what are their main advantages and disadvantages while working in large teams?",
lecture:{intro:"Version Control Systems śledzą zmiany w kodzie, umożliwiają współpracę wielu developerów i są siatką bezpieczeństwa — możesz wrócić do każdego poprzedniego stanu. Git dominuje rynek absolutnie.",
points:[
{title:"Git — de facto standard",text:"Distributed VCS: każdy developer ma pełne repozytorium lokalnie. Branching i merging jako first-class citizens. GitHub, GitLab, Bitbucket jako hosting. Open source, darmowy.",example:"Google, Microsoft, Facebook, Linux kernel — wszyscy używają Git. 90%+ projektów open source na GitHub. Dla praktycznych celów: Git = VCS. Inne systemy (SVN, Mercurial) to legacy lub niszowe."},
{title:"Git workflows dla dużych teamów",text:"Git Flow: master/main (produkcja), develop, feature/*, release/*, hotfix/* branches. Trunk-based development: wszyscy commitują do main, feature flags ukrywają niegotowe funkcje. PR/MR review process.",example:"Google używa trunk-based development z monorepo dla miliardów linii kodu. Feature flags pozwalają na ciągłą integrację bez destabilizacji produkcji. Małe, częste commity zamiast long-lived feature branches."},
{title:"Wyzwania w dużych teamach",text:"Merge conflicts: wielu developerów zmienia te same pliki. Long-lived branches: im dłużej branch żyje, tym trudniejszy merge. Monorepo vs multirepo trade-offs przy skali.",example:"Twoja branch żyje 3 tygodnie bez integracji z main. W tym czasie 50 innych developerów commitowało do main. Merge staje się nightmare — setki konfliktów. Trunk-based development zapobiega: commituj do main codziennie lub częściej."}
]},
analogy:{pl:"Git to jak Google Docs dla kodu: wielu ludzi może edytować jednocześnie (branching), widzisz historię każdej zmiany (git log), możesz porównać wersje (diff), i cofnąć się do dowolnego momentu (git revert/checkout). Bez Git: wysyłasz sobie kod emailem i pytasz 'kto ma najnowszą wersję?'.",en:"Git is like Google Docs for code: multiple people edit simultaneously (branching), you see every change history (git log), you can compare versions (diff), and revert to any point in time. Without Git: emailing code back and forth and asking 'who has the latest version?'"},
answer:"Git is the dominant version control system, used by 90%+ of software projects. As a distributed VCS, every developer holds a complete repository locally, enabling offline work and fast local operations. Key advantages include powerful branching and merging, a complete history of every change with author and timestamp, and integration with code review workflows through Pull Requests on GitHub or GitLab. Challenges in large teams include merge conflicts when many developers modify the same files, and the integration burden of long-lived feature branches — solved by trunk-based development where developers commit small changes to main daily, using feature flags to hide incomplete work. Monorepo versus multirepo architecture presents additional trade-offs at very large scale, with companies like Google using monorepos to simplify cross-project dependencies.",
keywords:["Git","distributed VCS","branching","merge conflict","Pull Request","trunk-based development","feature flags","Git Flow","GitHub","monorepo"]}
]}
];

const s={view:"home",topicIdx:0,qIdx:0,mode:"quiz",rev:false,scores:{}};

function scoreKey(tid,qi){return tid+"-"+qi}
function getScore(tid,qi){return s.scores[scoreKey(tid,qi)]||null}
function setScore(tid,qi,v){s.scores[scoreKey(tid,qi)]=v;render()}
function allQ(){return TOPICS.flatMap(t=>t.questions.map(q=>({q,t})))}
function totalQ(){return allQ().length}
function knownTotal(){return Object.values(s.scores).filter(v=>v==="know").length}
function topicKnown(t){return t.questions.filter((_,i)=>s.scores[scoreKey(t.id,i)]==="know").length}

function render(){
  const a=document.getElementById("app");
  if(s.view==="home")renderHome(a);
  else renderStudy(a);
}

function renderHome(a){
  const total=totalQ(),known=knownTotal(),pct=total?Math.round(known/total*100):0;
  let h=`<div class="home-title">Egzamin IT — Wszystkie tematy</div>
  <div class="home-sub">9 klastrów · ${total} pytań · pełne wykłady z przykładami i analogiami</div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Pytań</div><div class="stat-num">${total}</div></div>
    <div class="stat-card"><div class="stat-label">Opanowanych</div><div class="stat-num">${known}</div></div>
    <div class="stat-card"><div class="stat-label">Postęp</div><div class="stat-num">${pct}%</div></div>
  </div>`;

  ["A","B","C","D","E","F","G","H","I"].forEach(lid=>{
    const group=TOPICS.filter(t=>t.label===lid);
    if(!group.length)return;
    h+=`<div class="section-label">KLASTER ${lid}</div><div class="topics-grid">`;
    group.forEach((t,ti)=>{
      const realIdx=TOPICS.indexOf(t);
      const k=topicKnown(t),n=t.questions.length,p=n?Math.round(k/n*100):0;
      h+=`<div class="topic-card" style="border-left-color:${t.color}" onclick="openTopic(${realIdx})">
        <div class="tc-head"><div class="tc-title">${t.title}</div><div class="tc-count">${k}/${n}</div></div>
        <div class="tc-qs">${t.questions.map(q=>q.num).join(" · ")}</div>
        <div class="mini-prog"><div class="mini-fill" style="width:${p}%"></div></div>
      </div>`;
    });
    h+=`</div>`;
  });
  a.innerHTML=h;
}

function renderStudy(a){
  const t=TOPICS[s.topicIdx],q=t.questions[s.qIdx],score=getScore(t.id,s.qIdx);
  const total=t.questions.length,pct=Math.round((s.qIdx+1)/total*100);
  let h=`<div class="top-bar">
    <button class="back-btn" onclick="goHome()">← Tematy</button>
    <span class="topic-badge" style="border-left:2px solid ${t.color};padding-left:10px">${t.title}</span>
    <div class="prog-wrap"><span class="prog-text">${s.qIdx+1}/${total}</span>
    <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div></div>
  </div>
  <div class="mode-tabs">
    <button class="mode-tab ${s.mode==="quiz"?"active":""}" onclick="setMode('quiz')">Tryb Quiz</button>
    <button class="mode-tab ${s.mode==="study"?"active":""}" onclick="setMode('study')">Tryb Nauki</button>
  </div>
  <div class="study-layout">
    <div class="sidebar"><div class="sb-label">PYTANIA</div>`;
  t.questions.forEach((qq,qi)=>{
    const sc=getScore(t.id,qi);
    const icon=sc==="know"?"✓":sc==="dontknow"?"✗":"·";
    h+=`<div class="sb-item ${qi===s.qIdx?"active":""}" onclick="goQ(${qi})">
      <span style="font-size:11px;line-height:1.3">${qq.num}</span><span class="sb-icon">${icon}</span></div>`;
  });
  h+=`</div><div>`;
  h+=`<div class="q-num">${q.num} · ${t.title}</div>`;
  h+=`<div class="q-text">${q.original}</div>`;

  if(s.mode==="study"){
    h+=renderLec(q);
    h+=`<div class="sec-div">WZORCOWA ODPOWIEDŹ PO ANGIELSKU</div>`;
    h+=`<div class="lec-block"><div class="lec-text">${q.answer}</div></div>`;
    h+=renderKws(q);
  } else {
    if(!s.rev){
      h+=`<div class="ans-box" onclick="doReveal()"><div class="ans-hint">Odpowiedz w myślach po angielsku, potem kliknij żeby sprawdzić</div></div>`;
    } else {
      h+=`<div class="ans-box revealed"><div class="ans-label">WZORCOWA ODPOWIEDŹ</div><div class="ans-text">${q.answer}</div></div>`;
      h+=renderLec(q);
      h+=renderKws(q);
      h+=`<div class="score-row">
        <button class="btn-dontknow" onclick="doScore('dontknow')">✗ Nie znam — powtórzę</button>
        <button class="btn-know" onclick="doScore('know')">✓ Znam dobrze</button>
      </div>`;
      if(score)h+=`<div class="score-msg">${score==="know"?"Zaznaczono jako opanowane ✓":"Zaznaczono do powtórki"}</div>`;
    }
  }

  h+=`<div class="nav-row">
    <button class="nav-btn" onclick="prevQ()" ${s.qIdx===0?"disabled":""}>← Poprzednie</button>
    <span style="font-size:12px;color:var(--color-text-tertiary)">${s.qIdx+1} z ${total}</span>
    ${s.qIdx<total-1?`<button class="nav-btn" onclick="nextQ()">Następne →</button>`:`<button class="nav-btn" onclick="goHome()">Zakończ ✓</button>`}
  </div>`;
  h+=`</div></div>`;
  a.innerHTML=h;
}

function renderLec(q){
  const l=q.lecture;
  let h=`<div class="sec-div">WYKŁAD</div>`;
  h+=`<div class="lec-block"><div class="lec-label">WPROWADZENIE</div><div class="lec-text">${l.intro}</div></div>`;
  l.points.forEach(p=>{
    h+=`<div class="lec-block"><div class="lec-label">${p.title.toUpperCase()}</div><div class="lec-text">${p.text}</div>
    <div class="ex-block"><div class="ex-label">PRZYKŁAD</div><div class="ex-text">${p.example}</div></div></div>`;
  });
  h+=`<div class="analogy-block"><div class="analogy-label">ANALOGIA</div>
    <div class="analogy-pl">${q.analogy.pl}</div>
    <div class="analogy-en">${q.analogy.en}</div></div>`;
  return h;
}
function renderKws(q){
  return`<div class="kw-row">${q.keywords.map(k=>`<span class="kw">${k}</span>`).join("")}</div>`;
}

function openTopic(ti){s.topicIdx=ti;s.qIdx=0;s.rev=false;s.view="study";render()}
function goHome(){s.view="home";render()}
function goQ(qi){s.qIdx=qi;s.rev=false;render()}
function setMode(m){s.mode=m;s.rev=false;render()}
function doReveal(){s.rev=true;render()}
function doScore(v){setScore(TOPICS[s.topicIdx].id,s.qIdx,v)}
function nextQ(){s.qIdx++;s.rev=false;render()}
