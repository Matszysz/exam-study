<script>
const TOPICS=[
{id:"A",label:"A",color:"#5DCAA5",title:"AI & Machine Learning",questions:[
{num:"Q1",original:"How can AI agents be integrated with the AI methods, such as neural networks and expert systems?",
lecture:{intro:"AI agent to autonomiczny byt percypujący środowisko i podejmujący działania. Integruje dwie uzupełniające się metody: sieci neuronowe (elastyczne, uczące się) i systemy eksperckie (deterministyczne, regułowe).",
points:[
{title:"Neural Networks — percepcja i adaptacja",text:"NN doskonale przetwarzają niestrukturalne dane: obrazy, dźwięk, tekst. Agent z NN potrafi 'widzieć' środowisko i uczyć się z doświadczenia.",example:"Robot magazynowy: CNN identyfikuje obiekty na kamerze — agent 'widzi' kartony i wolną przestrzeń w czasie rzeczywistym."},
{title:"Expert Systems — logika i compliance",text:"Enkodują wiedzę domenową jako reguły IF-THEN. Działają deterministycznie, są audytowalne. Idealne dla twardych reguł biznesowych i regulacyjnych.",example:"System finansowy: reguła 'IF transakcja > 50k PLN AND kraj = high-risk THEN blokuj' — zawsze egzekwowana bez wyjątku."},
{title:"Integracja hybrydowa",text:"NN dostarcza elastycznej percepcji, expert system egzekwuje twarde ograniczenia. Razem: adaptacja + niezawodność.",example:"Autonomiczny samochód: NN rozpoznaje obiekty, expert system zawsze zatrzymuje się na czerwonym świetle — niezależnie od 'opinii' sieci."}
]},
analogy:{pl:"AI agent to pracownik z dwoma doradcami: intuicyjny ekspert (NN) ocenia sytuacje na oko, prawnik z kodeksem (expert system) pilnuje zgodności z regułami. Razem są elastyczni i niezawodni.",en:"An AI agent has two advisors: an intuitive expert (NN) who reads situations quickly, and a strict compliance officer with a rulebook (expert system). Together: adaptive and rule-compliant."},
answer:"AI agents integrate neural networks for perception and learning from unstructured data — enabling agents to see, hear, and adapt to new scenarios. Expert systems handle rule-based reasoning in structured domains, ensuring deterministic, auditable decisions compliant with business rules. The hybrid combination makes agents both adaptive and reliable: the neural network learns from experience while the expert system enforces hard constraints that must never be violated, such as regulatory compliance in finance or traffic laws in autonomous vehicles.",
keywords:["neural networks","expert systems","hybrid agent","rule-based reasoning","perception","compliance","deterministic"]},

{num:"Q5",original:"What are the main threats to traditional encryption methods resulting from the development of generative AI?",
lecture:{intro:"Kluczowe rozróżnienie: GenAI zazwyczaj NIE łamie algorytmów kryptograficznych matematycznie (AES, RSA pozostają bezpieczne). Zagrożenia są pośrednie i dotyczą warstwy ludzkiej oraz implementacyjnej.",
points:[
{title:"Zaawansowany phishing i social engineering",text:"GenAI generuje wysoce spersonalizowane, przekonujące ataki phishingowe na masową skalę. Wcześniej ograniczeniem była jakość pisania — AI tworzy tysiące unikalnych, perfekcyjnych wiadomości.",example:"Klasyczny phishing: 'Dear Customer, your account suspended.' GenAI phishing: email w stylu komunikacji konkretnej firmy, nawiązujący do ostatnich eventów, z poprawną gramatyką i tonem CEO."},
{title:"Wykrywanie luk implementacyjnych",text:"Algorytmy mogą być bezpieczne matematycznie, ale ich implementacja — niekoniecznie. AI analizuje kod bibliotek kryptograficznych i systematycznie szuka błędów.",example:"Heartbleed w OpenSSL — nie był błędem algorytmu, lecz implementacji (buffer over-read). GenAI może systematycznie szukać podobnych błędów w popularnych bibliotekach."},
{title:"Optymalizacja łamania haseł",text:"AI trenowane na wyciekach haseł generuje bardziej prawdopodobne kombinacje zamiast brute-force. Celuje w wzorce ludzkie: Qwerty1!, ulubiona drużyna + rok urodzenia.",example:"Zamiast sprawdzać 200 mld kombinacji 8 znaków, AI skupia się na 10 mln najbardzej prawdopodobnych wzorców — wystarczające dla większości użytkowników."}
]},
analogy:{pl:"Kłódka (algorytm) jest nadal nie do złamania. Ale AI pomaga złodziejom: podszywa się pod właściciela kluczem phishingowym, szuka zardzewiałych miejsc na kłódce (luki implementacyjne), i próbuje najczęstszych kombinacji błyskawicznie.",en:"The padlock (algorithm) is still unbreakable. But AI helps thieves: it creates convincing fake keys via phishing, finds rusty spots on the lock (implementation bugs), and tries the most common combinations faster than ever."},
answer:"Generative AI generally does not break encryption algorithms directly — AES and RSA remain mathematically secure. The threats are indirect. First, AI enables sophisticated, highly personalized phishing attacks at massive scale, targeting the human layer to steal credentials rather than breaking encryption. Second, AI can analyze cryptographic library source code to identify implementation vulnerabilities — bugs in how algorithms are implemented, like the Heartbleed flaw in OpenSSL. Third, AI trained on leaked password datasets optimizes cracking by targeting statistically likely human patterns, dramatically reducing attack time compared to brute force.",
keywords:["phishing","social engineering","implementation vulnerability","password cracking","Heartbleed","OpenSSL","brute force"]},

{num:"Q6",original:"What benefits can be brought to business processes by the application of generative AI?",
lecture:{intro:"GenAI to technologia ogólnego zastosowania — jak elektryczność. Transformuje wszystko, co wymaga tworzenia treści, analizy tekstu lub generowania kodu. Korzyści są horyzontalne, nie sektorowe.",
points:[
{title:"Automatyzacja tworzenia treści",text:"Raporty, opisy produktów, dokumentacja, emaile — GenAI generuje drafty w sekundy. Człowiek review'uje zamiast pisać od zera. Skala: od 1 do milionów bez liniowego wzrostu kosztów.",example:"E-commerce z 50k produktami: ręczne pisanie opisów to lata pracy. GenAI generuje unikalny opis każdego produktu ze specyfikacji — copywriter review'uje tylko te poniżej standardu."},
{title:"Intelligent agents w obsłudze klienta",text:"LLM-powered chatboty rozumieją intencję (nie tylko słowa kluczowe), utrzymują kontekst konwersacji, eskalują gdy potrzeba. 24/7, nieograniczona skala.",example:"Bank z 1 mln klientów: 80% pytań to standardowe sprawy (saldo, historia, dane). AI agent obsługuje je bez konsultanta — który skupia się tylko na złożonych przypadkach."},
{title:"Akceleracja development i kodowania",text:"Copilot i podobne generują kod, piszą testy, dokumentują. Badania GitHub: 55% szybsze ukończenie zadań kodowania.",example:"Developer pisze komentarz: 'walidacja polskiego PESEL'. Copilot generuje gotową implementację z algorytmem kontrolnym — developer weryfikuje zamiast implementować."},
{title:"Ekstrakcja wiedzy z dokumentów",text:"Przetwarzanie dużych wolumenów nieustrukturalizowanych dokumentów: umowy, raporty, badania. GenAI wydobywa kluczowe informacje i identyfikuje wzorce.",example:"Kancelaria prawna analizuje 5000 kontraktów szukając klauzul o karach umownych — GenAI robi to w minutach, klasyfikując każdą klauzulę."}
]},
analogy:{pl:"GenAI w biznesie to jak armia wysoko wykwalifikowanych stażystów: nigdy się nie nudzą, pracują 24/7, mogą robić wszystko naraz — ale zawsze potrzebują review od doświadczonego pracownika przed przekazaniem klientowi.",en:"GenAI in business is like hiring an army of qualified interns: never bored, work 24/7, can do everything simultaneously — but always need an experienced employee to review their work before it reaches the client."},
answer:"Generative AI brings transformative benefits across domains. It automates content creation — product descriptions, reports, and documentation are generated in seconds, with humans reviewing rather than writing from scratch, enabling scale without proportional cost increases. Intelligent AI agents handle up to 80% of customer service queries autonomously at 24/7 scale. In software development, AI coding assistants accelerate task completion by over 50%, generating implementations, tests, and documentation. Finally, AI dramatically accelerates knowledge extraction from large document collections — contracts, regulatory filings, research papers — that would take humans weeks to process manually.",
keywords:["content automation","intelligent agents","GitHub Copilot","knowledge extraction","operational efficiency","scale","cost reduction"]},

{num:"Q7",original:"What models and technologies enable implementation of AI in monitoring business processes?",
lecture:{intro:"Monitoring procesów z AI to przejście od reaktywnego do proaktywnego zarządzania. Trzy technologie tworzą kompletny obraz: co się stało (process mining), co się dzieje (anomaly detection), co się stanie (predictive analytics).",
points:[
{title:"Process Mining — odkrywanie jak procesy naprawdę działają",text:"Analizuje event logi z ERP/CRM i odkrywa rzeczywisty przebieg procesów — nie taki projektowany, ale faktyczny. Narzędzia: Celonis, ProM.",example:"Firma zakłada: zamówienie → weryfikacja → wysyłka = 2 dni. Process Mining odkrywa że w 30% przypadków jest pętla 'czekanie na akceptację menedżera' wydłużająca do 8 dni."},
{title:"Anomaly Detection — wykrywanie nieprawidłowości w czasie rzeczywistym",text:"Isolation Forest, Autoencoder, LSTM — uczą się normalnego zachowania procesu i alarmują gdy coś odbiega od normy.",example:"Linia produkcyjna: temperatura pieca zazwyczaj 850°C ±20°C. Model alarmuje przy odchyleniu powyżej progu — zanim dojdzie do kosztownej awarii."},
{title:"Predictive Analytics — przewidywanie problemów",text:"Modele (gradient boosting, time series) przewidują przyszłe zdarzenia na podstawie historycznych wzorców. Przejście od reaktywnego do proaktywnego zarządzania.",example:"Predictive maintenance: model przewiduje awarię maszyny 48h wcześniej na podstawie wzorców wibracji i temperatury — zamiast czekać na faktyczną awarię."}
]},
analogy:{pl:"Monitoring z AI to lekarz z trzema narzędziami: EKG (process mining) pokazuje rzeczywisty rytm serca procesu, alarm (anomaly detection) dzwoni gdy coś jest nie tak, prognoza (predictive analytics) ostrzega o możliwym zawale 2 dni wcześniej.",en:"AI process monitoring is like a doctor with three tools: an EKG showing the real heartbeat of your processes (process mining), an alarm ringing when something's wrong (anomaly detection), and a prognosis warning of failure two days before it happens (predictive analytics)."},
answer:"Three technologies enable AI in business process monitoring. Process Mining tools like Celonis analyze event logs from ERP and CRM systems to reveal the actual flow of processes, uncovering inefficiencies invisible in designed process maps. Anomaly detection algorithms — Isolation Forest, LSTM-based models, Autoencoders — learn normal process behavior and flag real-time deviations, enabling early warning before failures occur. Predictive analytics models use historical patterns to forecast future bottlenecks or failures, shifting organizations from reactive incident response to proactive process management.",
keywords:["process mining","anomaly detection","predictive analytics","Isolation Forest","LSTM","Celonis","event logs","predictive maintenance"]},

{num:"Q15",original:"What roles do AI algorithms perform in the development of brain-computer interfaces?",
lecture:{intro:"BCI umożliwiają bezpośrednią komunikację mózg-maszyna. Sygnały EEG są bardzo głośne — AI jest niezbędne do wyciągnięcia z nich sensu. Trzy role: oczyszczanie, dekodowanie, adaptacja.",
points:[
{title:"Signal Processing — filtrowanie szumu",text:"Surowy sygnał EEG to mix aktywności neuronalnej z artefaktami mięśniowymi i elektrycznymi. ICA (Independent Component Analysis) i filtry pasmowe wyodrębniają releventne składowe.",example:"Mrugnięcie oka generuje sygnał elektryczny silniejszy niż aktywność mózgowa. ICA oddziela ten artefakt od rzeczywistych wzorców neuronalnych — bez tego BCI byłoby sterowane mruganiem."},
{title:"Pattern Recognition — dekodowanie intencji",text:"Po oczyszczeniu sygnału, ML (SVM, deep learning) klasyfikuje wzorce aktywności mózgowej na konkretne komendy. Tłumaczenie języka mózgu na język maszyny.",example:"System BCI dla sparaliżowanych: model rozpoznaje wzorzec 'myślenia o ruchu prawą ręką' i przekształca go w sygnał sterujący kursorem — osoba komunikuje się bez ruchu mięśni."},
{title:"Indywidualna adaptacja",text:"Każdy mózg jest unikalny. Online learning adaptuje model do konkretnego użytkownika, poprawiając accuracy w miarę użytkowania.",example:"BCI dla chorych na ALS: model uczy się specyficznych wzorców danego pacjenta — z czasem wymaga coraz mniej świadomego wysiłku od użytkownika."}
]},
analogy:{pl:"BCI to jak odbiór słabego sygnału radiowego w mieście pełnym zakłóceń: najpierw filtrujesz szumy (signal processing), potem rozpoznajesz konkretną stację (pattern recognition), potem dostrajasz antenę pod konkretne miejsce (adaptacja).",en:"A BCI is like picking up a weak radio signal in a noisy city: first filter the interference (signal processing), then identify the specific station (pattern recognition), then fine-tune the antenna for your exact location (individual adaptation)."},
answer:"AI algorithms serve three critical roles in brain-computer interfaces. First, signal processing: raw EEG signals contain noise from muscle movement and electrical interference — Independent Component Analysis separates genuine neural signals from these artifacts. Second, pattern recognition: machine learning models like SVMs and deep neural networks decode cleaned brain signals into specific commands, enabling paralyzed patients to control devices by thought alone. Third, individual adaptation: because brain patterns are unique per person, online learning algorithms continuously adapt the BCI model to each specific user, improving accuracy over time with use.",
keywords:["EEG","signal processing","ICA","pattern recognition","SVM","online learning","ALS","neural decoding","BCI"]},

{num:"Q27",original:"How can linear algebra be used in image processing and data analysis in IT systems?",
lecture:{intro:"Algebra liniowa to natywny język AI. Gdy rozumiesz że obraz to macierz, a neural network to sekwencja operacji macierzowych — rozumiesz matematyczne fundamenty całego ML.",
points:[
{title:"Obraz jako macierz",text:"Obraz grayscale to 2D macierz pikseli (0-255). Obraz RGB to tensor [H × W × 3]. Każda operacja na obrazie to operacja macierzowa.",example:"Obraz 1080p: macierz 1920×1080 ≈ 2 mln liczb. Rozmycie (blur) = konwolucja z macierzą Gaussa. Wykrywanie krawędzi = konwolucja z kernelem Sobela."},
{title:"PCA — redukcja wymiarowości",text:"PCA używa eigenvectors macierzy kowariancji do znalezienia kierunków maksymalnej wariancji. Redukuje wymiarowość zachowując maksymalnie dużo informacji.",example:"Dataset z 1000 cechami: PCA odkrywa że 95% wariancji wyjaśniają 50 principal components. Redukujesz wymiarowość 20× bez istotnej utraty informacji — model trenuje szybciej."},
{title:"Neural Networks = sekwencja mnożeń macierzy",text:"Każda warstwa dense = mnożenie macierzy wag × wektor wejść + bias → funkcja aktywacji. GPU jest kluczowe bo jest zoptymalizowane do równoległych operacji macierzowych.",example:"Warstwa Dense 512→256: macierz wag 512×256. Forward pass = jedno mnożenie macierzy. GPU wykonuje to równolegle dla całego batcha tysięcy przykładów jednocześnie."}
]},
analogy:{pl:"Algebra liniowa w AI to jak alfabet dla pisarza — nie piszesz o alfabecie, ale bez niego nic nie napiszesz. Obraz to macierz, przetwarzanie to operacje macierzowe, neural network to maszyna do mnożenia macierzy.",en:"Linear algebra in AI is like the alphabet to a writer — you don't write about the alphabet, but without it nothing gets written. Images are matrices, processing is matrix operations, and a neural network is fundamentally a matrix multiplication machine."},
answer:"Linear algebra is fundamental to AI at multiple levels. Images are represented as matrices — grayscale as 2D pixel matrices, color as 3D tensors. Image transformations like rotation and scaling are matrix multiplications; convolution operations in CNNs are matrix operations sliding a kernel across the image for tasks like edge detection or blurring. For data analysis, PCA uses eigenvectors of the covariance matrix to identify directions of maximum variance, enabling dimensionality reduction — compressing thousands of features while retaining 95% of information. Neural networks themselves are sequences of matrix multiplications, which is why GPU hardware optimized for parallel matrix operations is essential for training.",
keywords:["matrix representation","convolution","PCA","eigenvectors","dimensionality reduction","tensor","GPU","kernel","covariance matrix"]},

{num:"Q28",original:"How can differential and integral calculus contribute to the optimisation of algorithms and predictive models?",
lecture:{intro:"Rachunek różniczkowy i całkowy to matematyczne fundamenty optymalizacji w ML. Pochodne napędzają gradient descent. Całki definiują kluczowe metryki. Bez tych narzędzi nie ma trenowania modeli.",
points:[
{title:"Gradient Descent — pochodna jako busola optymalizacji",text:"Trenowanie = minimalizowanie loss function. Pochodna dL/dw mówi: 'w którą stronę zmieniać wagi żeby strata malała'. Backpropagation stosuje chain rule przez całą sieć.",example:"dL/dw = +2 oznacza że wzrost w zwiększa stratę. Idziemy przeciwnie: w = w − lr × gradient. PyTorch: loss.backward() automatycznie liczy gradienty milionów parametrów."},
{title:"Adaptacyjne optymalizatory",text:"Adam, RMSProp, Adagrad modyfikują learning rate na podstawie historii gradientów. Efektywniejsze niż zwykły SGD.",example:"Adam śledzi średnią pierwszego i drugiego momentu gradientu — adaptuje lr osobno dla każdego parametru. Działa lepiej gdy gradienty są rzadkie lub zaszumione."},
{title:"Całkowanie — metryki i probabilistyka",text:"AUC (Area Under ROC Curve) to całka pod krzywą ROC — kluczowa metryka klasyfikacji. Rozkłady prawdopodobieństwa opisane przez funkcje gęstości wymagają całkowania.",example:"AUC = 0.5 to losowe zgadywanie. AUC = 0.95: jeśli weźmiesz losowy pozytywny i negatywny przykład, model z prawdopodobieństwem 0.95 poprawnie oceni który jest pozytywny."}
]},
analogy:{pl:"Gradient descent to schodzenie z góry w gęstej mgle: nie widzisz szczytu ani dna, ale czujesz nachylenie pod stopami (pochodna) i zawsze idziesz w dół. AUC to pole pod mapą — całka mówi ile miejsca zajmuje kształt krzywej.",en:"Gradient descent is descending a mountain in thick fog: you can't see the peak or valley, but you feel the slope under your feet (derivative) and always step downhill. AUC is the area under a map contour — the integral tells you how much space the curve encloses."},
answer:"Differential calculus powers optimization in machine learning. The gradient — partial derivatives of the loss function with respect to each model parameter — tells gradient descent which direction to update weights to minimize error. Backpropagation applies the chain rule to compute these gradients efficiently through entire networks. Modern frameworks like PyTorch automate this via automatic differentiation. Adaptive optimizers like Adam use gradient history to dynamically adjust learning rates per parameter. Integral calculus contributes through evaluation metrics: AUC is literally the integral under the ROC curve, and probability distributions defining probabilistic models are specified through density functions requiring integration.",
keywords:["gradient descent","loss function","backpropagation","chain rule","autograd","AUC","ROC","partial derivatives","Adam optimizer"]},

{num:"Q29",original:"What are the key stages in the process of developing a machine learning model and how do they affect the quality and efficiency of an AI system?",
lecture:{intro:"Tworzenie modelu ML to ustrukturyzowany pipeline, gdzie każdy etap determinuje jakość kolejnego. Pominięcie lub zaniedbanie jednego kaskadowo degraduje cały system — zasada garbage in, garbage out.",
points:[
{title:"1. Zbieranie danych",text:"Fundamentalny etap. Model jest tak dobry jak jego dane. Dane muszą być reprezentatywne dla wszystkich przypadków produkcyjnych.",example:"Model wykrywania oszustw bankowych trenowany tylko na danych z jednego kraju będzie miał słabą accuracy dla transakcji zagranicznych — brakuje reprezentacji."},
{title:"2. Pre-processing",text:"Normalizacja skaluje cechy do porównywalnego zakresu. Imputacja uzupełnia brakujące wartości. Usuwanie outlierów eliminuje szum.",example:"Kolumna 'wiek' (0-100) i 'dochód' (0-1,000,000): bez normalizacji model traktuje dochód jako ważniejszy tylko dlatego że liczby są większe — skala dominuje nad znaczeniem."},
{title:"3. Wybór i trenowanie modelu",text:"Architektura zależy od problemu: Random Forest dla tabel, CNN dla obrazów, Transformer dla tekstu. Trenowanie minimalizuje loss function przez gradient descent.",example:"Learning rate zbyt wysoki: model 'przeskakuje' przez optimum i nie konwerguje. Zbyt niski: trening trwa tygodniami. Scheduling lr pomaga — zaczynasz wysoko, stopniowo obniżasz."},
{title:"4. Ewaluacja i deployment + MLOps",text:"Ewaluacja na test set (nigdy treningowym). Deployment przez API. MLOps monitoruje drift modelu i automatyzuje retraining.",example:"Model rekomendacji filmów trenowany przed COVID-19 po pandemii staje się nieużyteczny — zmieniły się preferencje widzów. Monitoring driftu wykrywa to i triggeruje retraining."}
]},
analogy:{pl:"ML pipeline to projekt budowlany: zbierasz wymagania klienta (dane), rysujesz projekt i sprawdzasz normy (pre-processing), budujesz (training), przechodzisz inspekcję (evaluation), otwierasz i serwisujesz przez lata (deployment + MLOps).",en:"An ML pipeline is like a construction project: gather client requirements (data), draft and validate plans (pre-processing), build it (training), pass inspection (evaluation), then open it and maintain it long-term (deployment + MLOps)."},
answer:"The key stages are data collection, pre-processing, model selection, training, evaluation, and deployment with MLOps. Each critically impacts quality. Poor data quality causes inaccurate models — garbage in, garbage out. Pre-processing normalizes features and handles missing values, preventing scale bias. Training uses gradient descent to minimize the loss function, with learning rate scheduling critical for convergence. Rigorous evaluation on held-out test data using metrics like F1-score and AUC detects overfitting. Deployment involves MLOps practices — monitoring for model drift, automated retraining pipelines, and versioning — ensuring the system remains reliable as real-world data evolves.",
keywords:["MLOps","gradient descent","loss function","model drift","overfitting","normalization","pre-processing","cross-validation","pipeline"]},

{num:"Q30",original:"How do techniques of supervised and unsupervised learning differ in terms of their application and implementation in AI systems?",
lecture:{intro:"Fundamentalny podział w ML determinujący jakie problemy możemy rozwiązać i jakich danych potrzebujemy. Wybór nie jest kwestią preferencji — wynika z dostępności labeled data i charakteru problemu.",
points:[
{title:"Supervised Learning — uczenie z nauczycielem",text:"Każdy przykład treningowy ma etykietę (prawidłową odpowiedź). Dwa typy: klasyfikacja (dyskretny output) i regresja (ciągły output). Wymaga kosztownego procesu labelowania.",example:"Email spam filter: 10,000 maili oznaczonych ręcznie jako 'spam'/'nie spam'. Model uczy się cech charakterystycznych i przewiduje nowe maile. Labelowanie kosztuje czas eksperta."},
{title:"Unsupervised Learning — uczenie bez nauczyciela",text:"Brak etykiet — model samodzielnie odkrywa strukturę w danych. Clustering (K-Means, DBSCAN), redukcja wymiarowości (PCA, t-SNE), anomaly detection.",example:"Segmentacja klientów: 1 mln rekordów bez etykiet. K-Means odkrywa naturalne grupy: 'klienci impulsywni', 'okazjonalni', 'lojalni' — bez wcześniejszego definiowania tych kategorii."},
{title:"Wybór i podejścia hybrydowe",text:"Supervised gdy masz labeled data i jasny cel. Unsupervised gdy labelowanie jest niemożliwe lub zbyt kosztowne. Semi-supervised łączy małą ilość labeled z dużą unlabeled.",example:"Diagnoza radiologiczna: lekarz musi ręcznie opisać tysiące zdjęć rentgenowskich (drogo). Transfer learning: model pre-trenowany unsupervised na ogromnym datasecie, fine-tuned z małą ilością labeled danych medycznych."}
]},
analogy:{pl:"Supervised to nauka z podręcznikiem z odpowiedziami — masz zadania i rozwiązania. Unsupervised to jak układanie puzzli bez zdjęcia na pudełku: sam grupujesz elementy według odkrytych wzorców (tu są niebieskie, tu zielone, tu proste krawędzie).",en:"Supervised = studying with an answer key — questions and correct answers to learn from. Unsupervised = sorting puzzle pieces without seeing the box image: you discover your own categories purely from the patterns you observe."},
answer:"Supervised learning uses labeled datasets where each example has a correct output, training models to predict for new inputs — either classification for discrete outputs like spam detection, or regression for continuous outputs like price prediction. Implementation requires expensive labeling effort but yields targeted, measurable predictions. Unsupervised learning works on unlabeled data to discover hidden structure — clustering finds natural groupings like customer segments, while PCA reduces dimensionality. In practice, boundaries blur: semi-supervised learning combines small labeled sets with large unlabeled data, and transfer learning uses unsupervised pre-training on large datasets followed by supervised fine-tuning on task-specific labeled data.",
keywords:["labeled data","classification","regression","clustering","K-Means","PCA","dimensionality reduction","semi-supervised","transfer learning"]},

{num:"Q31",original:"What are the best practices in the field of training data management, including its collection, storage, processing and security, in the context of developing AI systems?",
lecture:{intro:"Zarządzanie danymi treningowymi to często niedoceniany aspekt AI. Najlepszy algorytm ze złymi danymi da gorsze wyniki niż prosty algorytm z dobrymi danymi. Praktyki działają na 4 poziomach.",
points:[
{title:"Zbieranie: różnorodność i reprezentatywność",text:"Dane muszą pokrywać cały zakres przypadków produkcyjnych. Bias w danych = bias w modelu. Jeden z największych problemów etycznych w AI.",example:"System rozpoznawania twarzy trenowany głównie na jasnych karnacjach miał dramatycznie niższą accuracy dla ciemnych — brakujące grupy demograficzne w danych = dyskryminacja algorytmiczna."},
{title:"Przechowywanie: Data Versioning (DVC)",text:"Dane zmieniają się w czasie. DVC działa jak Git dla danych: każda wersja datasetu jest śledzona. Kluczowe dla reprodukowalności wyników.",example:"Model nagle przestał działać po aktualizacji danych. Bez wersjonowania nie wiesz co się zmieniło. Z DVC możesz diff'ować datasety i wrócić do poprzedniej wersji."},
{title:"Przetwarzanie: anonimizacja i GDPR",text:"Dane wrażliwe (imiona, PESEL) muszą być zanonimizowane lub pseudonimizowane. GDPR narzuca konkretne wymagania prawne.",example:"Szpital trenuje model diagnostyczny — dane muszą przejść anonimizację (usunięcie identyfikatorów pacjentów) lub użycie synthetic data generation zamiast rzeczywistych danych pacjentów."},
{title:"Bezpieczeństwo: ochrona przed data poisoning",text:"Dataset treningowy to cenny zasób. Data poisoning: celowe dodanie fałszywych danych do treningu psuje model. Wymaga kontroli dostępu i szyfrowania.",example:"Atak data poisoning: konkurent dodaje do publicznego datasetu spreparowane przykłady — model uczy się błędnych wzorców. Ochrona: walidacja źródeł danych i monitoring rozkładu datasetu."}
]},
analogy:{pl:"Zarządzanie danymi treningowymi to praca kucharza w restauracji Michelin: surowce (dane) od różnych dostawców (różnorodność), przechowywane z datą ważności (wersjonowanie), odpowiednio przygotowane (pre-processing), kuchnia zabezpieczona przed intruizami (bezpieczeństwo).",en:"Managing training data is like running a Michelin-star kitchen: ingredients (data) from diverse suppliers, stored with expiry tracking (versioning), properly cleaned and prepared (pre-processing), and the kitchen secured from unwanted visitors (security)."},
answer:"Best practices span four areas. In collection: ensure data diversity across all demographic groups and edge cases to prevent algorithmic bias — underrepresented groups in training data lead to discriminatory model outputs. In storage: use Data Version Control (DVC) for reproducibility — every dataset change is tracked so you can audit model degradation and revert to previous versions. In processing: strictly anonymize sensitive personal information using data masking or synthetic data generation to comply with GDPR. In security: protect datasets from data poisoning attacks — where adversaries inject malicious examples to corrupt model behavior — using source validation, access controls, and distribution monitoring.",
keywords:["data diversity","algorithmic bias","DVC","data versioning","anonymization","GDPR","data poisoning","synthetic data","reproducibility"]},

{num:"Q32",original:"How can large language models (LLMs) be integrated with already existing IT systems and applications to improve their functionality and efficiency?",
lecture:{intro:"Integracja LLM z istniejącymi systemami to dodanie warstwy 'rozumienia języka naturalnego' do działającej infrastruktury. Nie zastępuje systemów — rozszerza je o natural language interface i generatywne możliwości.",
points:[
{title:"API Integration — najprostszy sposób",text:"LLM dostępne przez REST API (OpenAI, Anthropic, Google). Istniejąca aplikacja wywołuje endpoint, dostaje odpowiedź. Zero ML expertise wymagane.",example:"System CRM: zamiast pracownik ręcznie pisze raport z notatek — aplikacja wysyła transkrypt do LLM API, dostaje gotowy ustrukturyzowany raport w wybranym formacie."},
{title:"RAG — Retrieval-Augmented Generation",text:"Problem LLM: wiedza odcięta w czasie treningu, brak dostępu do firmowych danych. RAG dodaje krok wyszukiwania: system pobiera relevantne dokumenty z bazy i dołącza je jako kontekst do LLM przed generowaniem odpowiedzi.",example:"Chatbot banku: 'jakie są moje opcje kredytowe?' RAG pobiera aktualne produkty kredytowe z wewnętrznej bazy → podaje LLM jako kontekst → odpowiedź jest precyzyjna i aktualna, nie halucynacja."},
{title:"Vector Databases — serce RAG",text:"Dokumenty konwertowane do embeddings (wektorów numerycznych) przechowywanych w vector DB (Pinecone, Weaviate, pgvector). Wyszukiwanie semantyczne — nie po słowach kluczowych, lecz po znaczeniu.",example:"Pytanie 'jak złożyć reklamację' znajdzie dokument 'Procedura rozpatrywania skarg klientów' — nawet jeśli słowo 'reklamacja' nie pada w dokumencie. Wyszukiwanie po znaczeniu."}
]},
analogy:{pl:"LLM bez RAG to genialny konsultant bez wiedzy o Twojej firmie — bazuje tylko na ogólnym wykształceniu i może zmyślać szczegóły. LLM z RAG to ten sam konsultant, który przed spotkaniem przeczytał całą dokumentację Twojej firmy. Genialny i precyzyjny.",en:"LLM without RAG is a brilliant consultant who knows the world but not your company — they'll make up plausible-sounding but wrong details. LLM with RAG is that same consultant who read your entire company documentation before the meeting: both brilliant and accurate."},
answer:"LLMs are integrated via REST APIs — existing applications call the API endpoint without requiring ML expertise, immediately gaining natural language capabilities. The most powerful pattern is RAG (Retrieval-Augmented Generation): before generating a response, the system retrieves relevant documents from company databases using semantic vector search, then passes them as context to the LLM. This grounds responses in current, proprietary data and dramatically reduces hallucinations. The infrastructure relies on vector databases like Pinecone or pgvector, which store document embeddings enabling similarity search by meaning rather than exact keyword match — finding relevant documents even when terminology differs.",
keywords:["RAG","REST API","vector database","embeddings","semantic search","hallucinations","Pinecone","pgvector","context window"]},

{num:"Q33",original:"How can large language models (LLMs) be used for automation of tasks related to natural language processing, such as translation, text summarizing and sentiment analysis?",
lecture:{intro:"Tradycyjnie każde zadanie NLP wymagało osobnego, wyspecjalizowanego modelu. LLM zmienia paradygmat: jeden model z odpowiednim promptem obsługuje wszystkie zadania, rozumiejąc kontekst między nimi.",
points:[
{title:"Tłumaczenie — kontekst i styl",text:"LLM rozumieją kontekst, idiomy i styl — w przeciwieństwie do starszych systemów seq2seq. Zachowują ton (formalny/nieformalny) i specjalistyczne słownictwo.",example:"Prompt: 'Przetłumacz poniższy fragment prawny na angielski, zachowując formalny styl i terminologię.' LLM wie że 'pozew' to 'lawsuit' nie 'complaint' — rozumie domenę."},
{title:"Summaryzacja — różne formaty na żądanie",text:"LLM streszcza dokumenty w różnych formatach: bullet points, executive summary, streszczenie dla laika. Skaluje się do ogromnych wolumenów dokumentów.",example:"Firma prawnicza: 200-stronicowa umowa → LLM generuje 1-stronicowe summary z kluczowymi terminami, datami i ryzykami. Prawnik review'uje godzinę zamiast 3 dni czytania."},
{title:"Sentiment Analysis — nuanse i aspekty",text:"LLM wykraczają poza pozytywny/negatywny — identyfikują nuanse emocjonalne, sarkasm, kontekst kulturowy, aspect-level sentiment dla konkretnych cech produktu.",example:"Analiza 10,000 recenzji: LLM wyodrębnia nie tylko ogólny sentiment, ale 'bateria: negatywny 70%, aparat: pozytywny 85%, cena: mieszany 50%' — grupując opinie wg aspektów."}
]},
analogy:{pl:"Przed LLM NLP to osobne gabinety specjalistów: tłumacz, korektor, psycholog. Każdy robi jedno, musisz chodzić do każdego oddzielnie. LLM to poliglotyczny ekspert robiący wszystko — i rozumiejący powiązania między zadaniami.",en:"Before LLMs, NLP meant separate specialist offices: a translator, an editor, a psychologist — each doing one thing separately. LLMs are a polyglot expert doing everything — and understanding the connections between tasks."},
answer:"LLMs automate NLP tasks through task-specific prompting of a single model. For translation, they outperform traditional systems by preserving context, idioms, tone, and domain-specific terminology — understanding that 'pozew' means 'lawsuit' not 'complaint' in legal contexts. For summarization, they condense large documents into executive summaries, bullet points, or plain-language explanations on demand, enabling firms to process contracts in minutes instead of days. For sentiment analysis, LLMs go beyond binary positive/negative to identify emotional nuance, sarcasm, and aspect-level sentiment — extracting that customers love the camera but dislike the battery from thousands of reviews simultaneously.",
keywords:["NLP","prompting","summarization","sentiment analysis","aspect-level","translation","context preservation","domain terminology"]}
]},

{id:"B",label:"B",color:"#E24B4A",title:"Bezpieczeństwo IT",questions:[
{num:"Q4",original:"What Zero Trust mechanisms can be applied in order to protect data reliability in IT systems?",
lecture:{intro:"Zero Trust to architektura bezpieczeństwa oparta na zasadzie 'never trust, always verify'. W przeciwieństwie do tradycyjnego modelu perymeterowego (ufaj wszystkiemu wewnątrz sieci), Zero Trust zakłada że każdy użytkownik i każde urządzenie jest potencjalnym zagrożeniem.",
points:[
{title:"Multi-Factor Authentication (MFA)",text:"Weryfikacja tożsamości przez przynajmniej dwa niezależne czynniki: coś co wiesz (hasło), coś co masz (telefon/token), coś czym jesteś (biometria).",example:"Pracownik loguje się do systemu bankowego: hasło + kod SMS + skan twarzy. Nawet jeśli hasło zostanie skradzione, atakujący bez telefonu i biometrii nie uzyska dostępu."},
{title:"Mikrosegmentacja (Micro-segmentation)",text:"Podział sieci na małe izolowane segmenty. Nawet jeśli atakujący przebije się przez jeden segment, nie może automatycznie poruszać się lateralnie po całej sieci.",example:"Szpital: system ERP, system radiologiczny i sieć dla gości to oddzielne segmenty. Ransomware, który zarazi komputer na sieci dla gości, nie może automatycznie zainfekować systemu z danymi pacjentów."},
{title:"Least Privilege",text:"Każdy użytkownik i każdy serwis ma minimalny dostęp niezbędny do wykonania swojego zadania — nic więcej.",example:"Programista ma dostęp do repozytorium kodu i środowiska dev, ale nie do bazy danych produkcyjnej. Nawet jeśli jego konto zostanie przejęte, atakujący nie dotrze do wrażliwych danych produkcyjnych."},
{title:"Continuous Verification",text:"Weryfikacja nie jest jednorazowa przy logowaniu — trwa przez cały czas sesji. System monitoruje zachowanie i może wymagać re-autentykacji.",example:"Użytkownik zalogowany z Warszawy nagle wykonuje transakcję z Hongkongu — system automatycznie wymaga dodatkowej weryfikacji tożsamości, nawet jeśli sesja była aktywna."}
]},
analogy:{pl:"Zero Trust to jak lotnisko po 9/11: nawet jeśli masz bilet (jesteś pracownikiem), przy każdej bramce sprawdzają dowód, prześwietlają bagaż i weryfikują tożsamość. Nie ma 'zaufanego obszaru' — każdy jest weryfikowany przy każdej akcji.",en:"Zero Trust is like an airport after 9/11: even if you have a ticket (you're an employee), at every gate they check ID, scan bags, and verify identity. There's no 'trusted zone' — everyone is verified at every checkpoint."},
answer:"Zero Trust implements several complementary mechanisms. Multi-Factor Authentication requires at least two independent verification factors — something you know, have, and are — so stolen passwords alone are insufficient. Micro-segmentation divides the network into isolated zones, preventing lateral movement: ransomware in one segment cannot automatically spread to systems containing sensitive data. The principle of least privilege ensures every user and service has only the minimum access required for their role, limiting blast radius when credentials are compromised. Continuous verification extends authentication beyond login — monitoring behavior throughout sessions and triggering re-authentication when anomalies like impossible geographic travel are detected.",
keywords:["MFA","micro-segmentation","least privilege","continuous verification","lateral movement","Zero Trust","identity verification"]},

{num:"Q12",original:"What challenges related to data security can occur in hybrid environments?",
lecture:{intro:"Środowisko hybrydowe (on-premise + cloud) łączy dwa światy z różnymi modelami bezpieczeństwa, narzędziami i odpowiedzialnościami. Punkt styku między tymi światami to główne pole ataku.",
points:[
{title:"Bezpieczeństwo danych w tranzycie",text:"Dane przepływające między on-premise a chmurą mogą być przechwycone. Wymagane: szyfrowanie TLS/HTTPS w tranzycie i VPN lub private link dla wrażliwych połączeń.",example:"Firma synchronizuje bazę klientów między lokalnym serwerem a AWS. Bez TLS i private link (AWS Direct Connect), dane wędrują przez publiczny internet — podatne na man-in-the-middle."},
{title:"Spójność polityk bezpieczeństwa",text:"On-premise ma swoje narzędzia (Active Directory, lokalne firewalle), chmura ma własne (IAM, security groups). Trudność: utrzymanie spójnych polityk w obu środowiskach.",example:"Pracownik odchodzi z firmy. IT usuwa go z AD (on-premise), ale zapomina o koncie w AWS IAM — ma dostęp przez kolejne miesiące. Brak centralnej kontroli tożsamości."},
{title:"Shadow IT i kontrola danych",text:"Pracownicy często korzystają z nieautoryzowanych usług chmurowych. Dane firmowe trafiają poza kontrolowane środowisko.",example:"Marketingowiec przesyła dane klientów do niezatwierdzonego narzędzia SaaS. Dane opuszczają kontrolowane środowisko — naruszenie GDPR i polityki bezpieczeństwa."}
]},
analogy:{pl:"Środowisko hybrydowe to jak firma z biurem i pracownikami zdalnymi: masz zasady bezpieczeństwa w biurze (firmawall, kontrola dostępu), ale pracownicy zdalni korzystają z własnych sieci. Utrzymanie spójnych zasad w obu miejscach jest wyzwaniem.",en:"A hybrid environment is like a company with office and remote workers: you have office security rules (firewall, access control), but remote workers use their own networks. Maintaining consistent security policies across both environments is the core challenge."},
answer:"Hybrid environments create several security challenges. Securing data in transit between on-premise and cloud systems requires TLS encryption and private network links like AWS Direct Connect to prevent interception over public internet. Maintaining consistent security policies across disparate platforms is complex — on-premise uses Active Directory and local firewalls while cloud uses IAM and security groups, creating gaps where deprovisioned accounts may persist in one environment. Identity and access management must be centralized to prevent orphaned accounts. Shadow IT — employees using unauthorized cloud services — can exfiltrate data outside controlled environments, creating GDPR compliance violations and unmonitored data flows.",
keywords:["TLS","VPN","IAM","shadow IT","GDPR","Active Directory","lateral movement","data in transit","policy consistency"]},

{num:"Q17",original:"What are the most frequent threats to the security of ICT networks?",
lecture:{intro:"Krajobraz zagrożeń ICT jest dynamiczny, ale pewne ataki dominują statystycznie. Rozumienie mechanizmu każdego zagrożenia pozwala ocenić jakie obrony są potrzebne.",
points:[
{title:"Malware i Ransomware",text:"Złośliwe oprogramowanie szyfrujące pliki i żądające okupu. Ransomware to dziś główna przyczyna przestojów operacyjnych w organizacjach. Wektory: phishing, exploity, drive-by download.",example:"Atak WannaCry 2017: ransomware sparaliżował British NHS — tysiące szpitali nie miały dostępu do danych pacjentów. Straty globalne: ~4 miliardy USD. Przyczyna: niezałatana podatność w Windows."},
{title:"DDoS — Distributed Denial of Service",text:"Tysiące zainfekowanych urządzeń (botnet) zalewa serwer fałszywymi żądaniami do wyczerpania zasobów. Serwer przestaje odpowiadać na legalne żądania.",example:"Atak Mirai Botnet 2016: zainfekowane urządzenia IoT (kamery, routery) sparaliżowały DNS Dyn — niedostępne przez kilka godzin były Twitter, Netflix, Reddit, Amazon."},
{title:"Phishing i spear phishing",text:"Socjotechniczne nakłanianie do ujawnienia danych lub kliknięcia złośliwego linku. Spear phishing: celowany atak na konkretną osobę z personalizacją.",example:"Spear phishing na CFO firmy: email 'od CEO' w pilnym tonie prosi o pilny przelew 2 mln EUR na nowe konto. Business Email Compromise kosztuje firmy miliardy rocznie."},
{title:"Man-in-the-Middle (MitM)",text:"Atakujący przechwytuje i może modyfikować komunikację między dwoma stronami. Wymaga: pozycjonowania w sieci (ARP spoofing, rogue WiFi) lub kompromisu certyfikatu.",example:"Fałszywy hotspot WiFi 'Hotel_Free_WiFi' w kawiarni: wszystkie nieszyfrowane połączenia przechodzą przez serwer atakującego, który odczytuje dane logowania do stron bez HTTPS."}
]},
analogy:{pl:"Zagrożenia ICT to jak rodzaje przestępczości: ransomware to porwanie za okup, DDoS to zablokowanie wejścia do sklepu przez tłum, phishing to oszust podszywający się pod bank, MitM to podsłuch telefonu.",en:"ICT threats are like types of crime: ransomware is kidnapping for ransom, DDoS is blocking a store entrance with a crowd, phishing is a fraudster impersonating your bank, and MitM is wiretapping a phone call."},
answer:"The most frequent ICT network threats are: malware and ransomware, which encrypt data and demand payment — exemplified by WannaCry that paralyzed hospitals globally by exploiting an unpatched Windows vulnerability. DDoS attacks use botnets of thousands of compromised devices to overwhelm servers with traffic until they become unavailable to legitimate users. Phishing and spear phishing use social engineering to steal credentials or trick users into executing malicious payloads — Business Email Compromise alone costs organizations billions annually. Man-in-the-Middle attacks intercept communications between parties, often via rogue Wi-Fi hotspots or ARP spoofing, capturing unencrypted data and credentials.",
keywords:["ransomware","DDoS","botnet","phishing","spear phishing","MitM","ARP spoofing","Business Email Compromise","WannaCry"]},

{num:"Q34",original:"Explain the difference between symmetric and asymmetric encryption.",
lecture:{intro:"Szyfrowanie to fundamentalny mechanizm ochrony danych. Dwa podejścia różnią się zasadniczo: ilością kluczy i zastosowaniem. W praktyce często są używane razem w protokołach takich jak TLS.",
points:[
{title:"Symmetric Encryption — jeden klucz",text:"Ten sam klucz szyfruje i odszyfrowuje. Szybkie obliczeniowo. Problem: jak bezpiecznie przesłać klucz do drugiej strony? (Key distribution problem).",example:"AES-256 szyfruje dysk laptopa — szybkie bo używa jednego klucza. Ale jak wysłać ten klucz drugiej osobie bezpiecznie przez internet? To problem symmetric encryption."},
{title:"Asymmetric Encryption — para kluczy",text:"Klucz publiczny (do szyfrowania) i prywatny (do odszyfrowywania). Klucz publiczny można swobodnie udostępniać. Wolniejsze obliczeniowo niż symmetric.",example:"HTTPS: przeglądarka używa klucza publicznego serwera żeby zaszyfrować wiadomość. Tylko serwer z kluczem prywatnym może ją odszyfrować. Klucz publiczny można opublikować na całym świecie."},
{title:"Praktyczne użycie: Hybrid Encryption",text:"W praktyce TLS łączy oba: asymmetric encryption do bezpiecznej wymiany klucza sesji, potem symmetric encryption (AES) do szybkiego szyfrowania całej komunikacji.",example:"TLS handshake: 1) przeglądarka szyfruje random secret kluczem publicznym serwera (asymmetric), 2) serwer odszyfrowuje kluczem prywatnym, 3) oboje mają teraz wspólny klucz sesji, 4) cała komunikacja idzie AES (symmetric, szybko)."}
]},
analogy:{pl:"Symmetric to zamek z jednym kluczem — szybki, ale masz problem jak dać kopię klucza innemu człowiekowi bezpiecznie. Asymmetric to skrzynka pocztowa: każdy może wrzucić list (klucz publiczny = otwarta szczelina), ale tylko właściciel może ją otworzyć i odebrać (klucz prywatny).",en:"Symmetric is a lock with one key — fast, but how do you safely give a copy to someone else? Asymmetric is a mailbox: anyone can drop in a letter (public key = open slot), but only the owner can open it and retrieve the contents (private key)."},
answer:"Symmetric encryption uses a single shared key for both encryption and decryption — it is computationally fast, making it suitable for encrypting large volumes of data, but the fundamental challenge is the key distribution problem: how to securely share the key with the other party. Asymmetric encryption uses a mathematically linked key pair — a public key freely distributed for encrypting, and a private key kept secret for decrypting. This solves key distribution but is computationally slower. In practice, modern protocols like TLS combine both: asymmetric encryption securely exchanges a symmetric session key during the handshake, then fast AES symmetric encryption handles all subsequent communication.",
keywords:["AES","RSA","key distribution","public key","private key","TLS","hybrid encryption","key pair","session key"]},

{num:"Q35",original:"DoS (Denial of Service) attacks - give examples of DoS attacks and how to avoid them.",
lecture:{intro:"DoS ataki mają na celu uczynienie usługi niedostępną przez wyczerpanie zasobów: przepustowości, mocy obliczeniowej, pamięci lub połączeń. Kluczowe rozróżnienie: DoS (jeden sprawca) vs DDoS (tysiące sprawców).",
points:[
{title:"Flood attacks — zalanie przepustowością",text:"UDP Flood, ICMP Flood, SYN Flood — atakujący wysyła ogromną ilość pakietów wyczerpując przepustowość lub tablicę połączeń serwera.",example:"SYN Flood: atakujący wysyła tysiące żądań TCP SYN bez odpowiadania na SYN-ACK — serwer utrzymuje tysiące 'półotwartych' połączeń wyczerpując zasoby tablicy połączeń."},
{title:"Application Layer attacks",text:"Zamiast zalewać przepustowość, atakujący wysyła złożone żądania HTTP wymagające dużych zasobów serwera. Trudniejsze do wykrycia bo przypominają normalny ruch.",example:"HTTP GET Flood na endpoint '/search?q=...' wywołujący kosztowną operację bazy danych — atakujący wysyła 100k żądań/s. Serwer CPU jest wyczerpany przez przetwarzanie, nie przez sieć."},
{title:"Mitygacja i ochrona",text:"Rate limiting ogranicza liczbę żądań z jednego IP. CDN i WAF (Web Application Firewall) filtrują złośliwy ruch przed dotarciem do serwera. Anti-DDoS services (Cloudflare, AWS Shield) absorbują ruch.",example:"Cloudflare Magic Transit: kiedy atak DDoS zaczyna się, ruch jest przekierowywany przez sieć Cloudflare, która ma pojemność 100+ Tbps — absorbuje atak, przepuszczając tylko legalny ruch."}
]},
analogy:{pl:"DoS to jak zablokowanie wejścia do restauracji: jeden napastnik stoi w drzwiach i blokuje innych gości. DDoS to jak zorganizowanie 10,000 osób które jednocześnie próbują wejść — nikt prawdziwy nie może się dostać. Rate limiting to bramkarz który wpuszcza max 100 osób na raz.",en:"DoS is like one person blocking a restaurant entrance. DDoS is organizing 10,000 people to rush the door simultaneously — no real customer can get in. Rate limiting is a bouncer allowing maximum 100 people at a time regardless of crowd size."},
answer:"DoS attacks aim to make services unavailable by exhausting resources. Common types include SYN Flood attacks which exploit TCP handshake by sending thousands of connection requests without completing them, filling the server's connection table. UDP and ICMP floods exhaust network bandwidth. Application layer attacks send computationally expensive requests — like complex search queries — to exhaust CPU rather than bandwidth, making them harder to distinguish from legitimate traffic. Mitigation involves rate limiting to restrict requests per IP, Web Application Firewalls to filter malicious patterns, CDN distribution to absorb traffic, and specialized anti-DDoS services like Cloudflare or AWS Shield that have sufficient capacity to absorb even large volumetric attacks.",
keywords:["SYN Flood","UDP Flood","rate limiting","WAF","CDN","Cloudflare","AWS Shield","application layer","DDoS","botnet"]},

{num:"Q36",original:"What are the most common types of denial-of-service (DoS and DDoS) attacks, what technical, organizational, and legal factors affect system vulnerability to these attacks, and what methods can be used for effective prevention?",
lecture:{intro:"Rozszerzenie pytania Q35 o trzy wymiary podatności (techniczny, organizacyjny, prawny) i kompleksową prewencję. Kluczowe: podatność to nie tylko kwestia techniczna.",
points:[
{title:"Typy ataków",text:"Volumetric (zalanie przepustowością), Protocol (exploitowanie słabości protokołu, np. SYN Flood), Application Layer (kosztowne żądania HTTP).",example:"Atak na Github 2018: 1.35 Tbps przez Memcached amplification — jeden z największych DDoS w historii. Amplification: atakujący spoofuje IP ofiary wysyłając małe żądania do serwerów Memcached, które odpowiadają 50,000× większymi pakietami."},
{title:"Czynniki podatności",text:"Techniczne: wąska przepustowość, brak filtrowania. Organizacyjne: brak planu response, nieaktualny software. Prawne: jurysdykcja atakujących utrudnia ściganie.",example:"Organizacyjne: firma bez playbooka DDoS response traci 4 godziny na komunikację wewnętrzną zanim zacznie mitygację. Firma z testowanym planem reaguje w 15 minut."},
{title:"Prewencja wielowarstwowa",text:"ISP-level filtering, anycast routing (ruch rozproszony geograficznie), challenge-response dla suspicious traffic (CAPTCHA, JS challenge), capacity planning.",example:"Anycast: Cloudflare ma 300+ lokalizacji na świecie. Atak DDoS jest automatycznie rozproszony między wszystkie lokalizacje — każda absorbuje mały fragment ataku. Żadna pojedyncza lokalizacja nie jest przytłoczona."}
]},
analogy:{pl:"DDoS to jak cyfrowa demonstracja: tysiące 'protestujących' blokują wejście. Podatność techniczna to za wąskie drzwi. Podatność organizacyjna to brak planu dla ochrony. Anycast to wiele wejść do budynku — demonstranci rozpraszają się.",en:"DDoS is like a digital demonstration: thousands blocking the entrance. Technical vulnerability is a too-narrow door. Organizational vulnerability is having no security response plan. Anycast is having hundreds of building entrances worldwide — the crowd disperses across all of them."},
answer:"Common DDoS types include volumetric attacks (UDP/ICMP floods exhausting bandwidth), protocol attacks (SYN floods exploiting TCP handshake), and application layer attacks targeting expensive server operations. Technical vulnerability factors include insufficient bandwidth, lack of traffic filtering, and unpatched software. Organizational factors include absence of incident response plans and untrained teams that lose critical time during attacks. Legal factors include jurisdictional challenges when attackers operate from countries with no extradition treaties. Effective prevention requires layers: ISP-level filtering, anycast routing to distribute attack traffic globally across hundreds of PoPs, Web Application Firewalls, rate limiting, and dedicated DDoS mitigation services like Cloudflare or AWS Shield with terabit-scale absorption capacity.",
keywords:["volumetric attack","protocol attack","application layer","anycast","ISP filtering","incident response","Memcached amplification","Cloudflare","AWS Shield"]}
]},

{id:"C",label:"C",color:"#378ADD",title:"Architektura Chmury & Distributed Systems",questions:[
{num:"Q62",original:"What are the challenges related to the development and implementation of distributed systems with the use of cloud infrastructure, considering the requirements of scalability, accessibility and coherence of the data?",
lecture:{intro:"Systemy rozproszone w chmurze muszą jednocześnie spełniać trzy wymagania, które wchodzą ze sobą w konflikt. Fundament: twierdzenie CAP — nie możesz mieć jednocześnie wszystkich trzech.",
points:[
{title:"CAP Theorem — fundamentalny trade-off",text:"Consistency (wszystkie węzły widzą te same dane), Availability (system zawsze odpowiada), Partition tolerance (system działa mimo utraty połączenia między węzłami). W środowisku sieciowym partition tolerance jest obligatoryjna — musisz wybierać między C i A.",example:"Amazon DynamoDB (AP): woli dostępność nad spójnością — możesz dostać stare dane, ale system zawsze odpowiada. Google Spanner (CP): woli spójność — może odmówić odpowiedzi podczas podziału sieci."},
{title:"Synchronizacja danych między węzłami",text:"Dane replikowane w wielu regionach geograficznych mogą chwilowo być niespójne. Eventual consistency: gwarantuje że w końcu wszystkie węzły będą spójne — ale nie natychmiast.",example:"Instagram: polubienie posta może pojawić się u jednych użytkowników wcześniej niż u innych — serwery w różnych regionach synchronizują się z opóźnieniem. To akceptowalna eventual consistency dla social media."},
{title:"Skalowanie bez przestojów",text:"Skalowanie horyzontalne (dodawanie węzłów) jest łatwiejsze niż wertykalne (większa maszyna), ale wymaga stateless architecture i load balancing.",example:"Netflix: podczas premiery popularnego serialu automatycznie uruchamia tysiące dodatkowych instancji serwisów. Skalowanie horyzontalne — więcej małych maszyn, nie jedna wielka."}
]},
analogy:{pl:"Dystrybuowany system w chmurze to jak sieć fast food: każda restauracja musi mieć aktualne menu (spójność), zawsze być otwarta (dostępność), i działać nawet gdy centralny serwer nie odpowiada (partition tolerance). Nie możesz mieć wszystkich trzech perfekcyjnie — musisz wybierać kompromis.",en:"A distributed cloud system is like a fast food franchise: each location must have updated menus (consistency), always be open (availability), and work even when the central server is down (partition tolerance). You can't have all three perfectly — you must choose a trade-off."},
answer:"Developing distributed cloud systems involves balancing the CAP theorem trade-offs: in practice, network partitions are unavoidable, so systems must choose between consistency and availability. Data synchronization across geographic nodes creates eventual consistency challenges — data may be temporarily stale in some regions. Scaling to handle unpredictable workloads requires stateless microservice architectures enabling horizontal scaling, but this introduces complexity in session management and data coherence. Additional challenges include distributed transaction management — ensuring atomic operations across multiple services — and maintaining latency SLAs when services communicate across regions.",
keywords:["CAP theorem","eventual consistency","horizontal scaling","partition tolerance","consistency","availability","stateless architecture"]},

{num:"Q63",original:"What techniques of system design can be applied to integrate distributed applications in the cloud environment, ensuring their high accessibility and fault tolerance?",
lecture:{intro:"Wysoka dostępność w systemach rozproszonych nie pochodzi z braku awarii — pochodzi z projektowania pod założenie, że awarie ZAWSZE się zdarzają. Cel: system działa mimo awarii komponentów.",
points:[
{title:"Redundancja i replication",text:"Krytyczne usługi i dane są replikowane w wielu strefach dostępności (AZ) lub regionach. Brak single point of failure.",example:"Baza danych PostgreSQL z primary w us-east-1a i read replicas w us-east-1b i us-east-1c. Jeśli primary padnie, automatyczny failover na replica w ciągu sekund."},
{title:"Load Balancing",text:"Ruch rozproszony między wieloma instancjami. Load balancer kieruje żądania do zdrowych instancji i usuwa z rotacji te, które nie odpowiadają na health checks.",example:"AWS ALB (Application Load Balancer) monitoruje health serwisów co 30 sekund. Jeśli instancja przestaje odpowiadać, ALB automatycznie przestaje kierować do niej ruch — bez interwencji operatora."},
{title:"Circuit Breaker Pattern",text:"Zapobiega cascading failures: jeśli downstream serwis zaczyna fail'ować, circuit breaker 'otwiera' i zatrzymuje żądania do niego. Po czasie próbuje ponownie (half-open state).",example:"Serwis płatności wywołuje serwis bankowy. Serwis bankowy zaczyna timeoutować. Bez circuit breaker: serwis płatności też zaczyna timeoutować → wywołujący go też timeoutuje → cała aplikacja padła. Z circuit breaker: po 5 failach otwiera się, zwraca szybko 'service unavailable', reszta systemu działa."}
]},
analogy:{pl:"Fault tolerant system to jak armia z zasadą nigdy-nie-bądź-sam: każdy żołnierz (serwis) ma backup, dowódca (load balancer) wie kto jest zdolny do walki, a circuit breaker to zasada 'jeśli oddział traci ponad 50% straty, wycofaj się i nie bierz więcej misji'.",en:"A fault tolerant system is like an army with a never-go-alone rule: every soldier (service) has backup, the commander (load balancer) knows who is operational, and the circuit breaker is the rule 'if a unit takes over 50% casualties, fall back and take no more missions'."},
answer:"High availability in distributed cloud systems is achieved through multiple design techniques. Redundancy and replication across multiple availability zones or regions eliminates single points of failure — databases use primary-replica configurations with automatic failover. Load balancing distributes traffic across healthy instances and automatically removes unhealthy ones from rotation based on health check failures. The Circuit Breaker pattern prevents cascading failures: when a downstream service begins failing, the circuit breaker opens and returns fast errors rather than waiting for timeouts, preventing the failure from propagating through the entire system. These patterns together ensure that individual component failures do not cause system-wide outages.",
keywords:["redundancy","replication","load balancing","circuit breaker","health check","failover","availability zones","cascading failure","single point of failure"]},

{num:"Q76",original:"What advantages result from using containers (e.g.: Docker) and orchestration (e.g.: Kubernetes) in AI systems based on cloud distributed processing?",
lecture:{intro:"Kontenery i orkiestracja rozwiązują fundamentalne problemy wdrażania AI: 'u mnie działa ale u klienta nie', automatyczne skalowanie pod zmienny load, i zarządzanie setkami serwisów.",
points:[
{title:"Docker — reprodukowalność środowiska",text:"Kontener pakuje aplikację ze wszystkimi zależnościami (biblioteki, runtime, konfiguracja) w izolowany, przenośny unit. 'Works on my machine' staje się 'works everywhere'.",example:"Model ML z PyTorch 2.1, CUDA 11.8, i 47 bibliotekami Python. Bez Dockera: konfiguracja środowiska na nowym serwerze to kilka dni. Z Dockerem: docker pull my-model:v2.1 i uruchomienie w minutę."},
{title:"Kubernetes — automatyczne skalowanie i zarządzanie",text:"K8s orkiestruje kontenery: automatyczne skalowanie (HPA — Horizontal Pod Autoscaler), self-healing (restartuje padłe pody), rolling updates (wdrożenie bez przestoju).",example:"Serwis inferencji modelu ML: normalnie 3 repliki. W godzinach szczytu K8s automatycznie skaluje do 50 replik na podstawie CPU utilization. Po szczycie skaluje z powrotem. Zero ręcznej interwencji."},
{title:"GPU scheduling i resource isolation",text:"Kubernetes potrafi zarządzać GPU jako zasobem — przydzielać GPU do kontenerów AI, izolować workloady żeby nie konkurowały o zasoby.",example:"K8s cluster z 10 GPU: model treningowy dostaje 8 GPU, serwis inferencji dostaje 2 GPU. Izolacja zasobów zapewnia że trening nie zakłóca obsługi produkcyjnych żądań."}
]},
analogy:{pl:"Docker to jak standardowy kontener transportowy — możesz załadować go na dowolny statek, ciężarówkę czy pociąg, a zawartość dotrze nienaruszona. Kubernetes to port morski który zarządza tysiącami takich kontenerów: wie gdzie są, skaluje przepustowość i naprawia uszkodzone.",en:"Docker is like a standardized shipping container — load it onto any ship, truck, or train and the contents arrive intact. Kubernetes is the port managing thousands of these containers: tracking locations, scaling throughput, and replacing damaged ones automatically."},
answer:"Docker containers solve the environment reproducibility problem for AI systems: complex ML models with specific Python library versions, CUDA versions, and configurations are packaged into portable images that run identically in development, testing, and production. This eliminates 'works on my machine' failures critical for AI systems with intricate dependency chains. Kubernetes orchestrates these containers at scale, providing Horizontal Pod Autoscaling — automatically scaling inference service replicas from 3 to 50 during peak traffic and back down during quiet periods. Kubernetes also manages GPU resources as schedulable assets, ensuring training and inference workloads are isolated and don't compete for expensive GPU capacity.",
keywords:["Docker","Kubernetes","HPA","horizontal pod autoscaler","GPU scheduling","resource isolation","rolling update","self-healing","reproducibility"]},

{num:"Q77",original:"What architectural techniques should be taken into consideration during the design of systems that must operate in real time in cloud distributed systems?",
lecture:{intro:"Real-time systemy mają twardą wymaganą latencją — każda milisekunda ma znaczenie. Architektura musi być zaprojektowana żeby eliminować źródła opóźnień: sieć, dysk, blokowanie wątków.",
points:[
{title:"Event-Driven Architecture z Apache Kafka",text:"Zamiast synchronicznych wywołań API (czekasz na odpowiedź), komponenty komunikują się przez asynchroniczne eventy. Kafka to rozproszony log zdarzeń z bardzo niską latencją i wysoką throughput.",example:"System wykrywania fraudów: transakcja trafia do Kafka topic, serwis ML pobiera event, przetwarza w <100ms i publikuje decyzję do innego topicu — bez blokowania flow transakcji."},
{title:"In-Memory Data Stores — Redis",text:"Dostęp do dysku to ~10ms. Dostęp do RAM to ~100ns. Redis przechowuje dane w pamięci — dla danych sesji, cache'owania wyników, rate limiting — eliminuje slow disk I/O.",example:"API gateway używa Redis do sprawdzania rate limit: każde żądanie sprawdza w Redis czy użytkownik nie przekroczył limitu. W pamięci = mikrosekundy. Na dysku = milisekundy = zbyt wolno dla każdego żądania."},
{title:"Stateless services i connection pooling",text:"Stateless: każde żądanie jest niezależne — serwis nie trzyma stanu sesji. Umożliwia dowolne skalowanie. Connection pooling: ponowne użycie połączeń DB zamiast nawiązywania nowego przy każdym żądaniu.",example:"Bez connection pooling: nowe połączenie do PostgreSQL = ~10ms handshake. Z PgBouncer (pooler): reużycie istniejącego połączenia = <1ms. Przy 10k RPS różnica jest olbrzymia."}
]},
analogy:{pl:"Real-time system to jak restauracja fast food — każde zamówienie musi być gotowe w 60 sekund. Kafka to kolejka zamówień na wyświetlaczu. Redis to gotowe składniki pod ręką (nie w lodówce w piwnicy). Stateless to każdy kasjer może obsłużyć każdego klienta.",en:"A real-time system is like a fast food restaurant — every order must be ready in 60 seconds. Kafka is the order display queue. Redis is prepared ingredients kept at the counter (not in the basement freezer). Stateless means any cashier can serve any customer."},
answer:"Real-time cloud systems require architectural techniques that eliminate latency sources. Event-Driven Architecture with Apache Kafka enables asynchronous communication — components react to events rather than blocking on synchronous API calls, allowing sub-100ms fraud detection pipelines to process transactions without blocking their flow. In-memory data stores like Redis replace slow disk I/O for frequently accessed data: session state, rate limiting counters, and cached results respond in microseconds versus milliseconds from disk. Stateless service design enables horizontal scaling without session affinity requirements. Connection pooling with tools like PgBouncer reuses database connections rather than establishing new ones per request — critical at high request rates where connection overhead becomes significant.",
keywords:["Apache Kafka","Redis","event-driven","stateless","connection pooling","in-memory","PgBouncer","latency","asynchronous","throughput"]},

{num:"Q84",original:"What advantages can be brought by using cloud technologies, such as serverless computing, in the context of generative AI models in distributed applications?",
lecture:{intro:"Serverless computing to model gdzie deweloper pisze tylko kod funkcji, a dostawca chmury zarządza całą infrastrukturą. Dla GenAI to szczególnie atrakcyjne ze względu na nieregularny, bursty charakter ruchu.",
points:[
{title:"Scale-to-zero i ekonomika bursty traffic",text:"Serverless nie płacisz za czas bezczynności — tylko za czas wykonania. Przy nieregularnym ruchu GenAI (rzadkie zapytania) cost savings mogą być ogromne.",example:"Chatbot AI dla małej firmy: 1000 zapytań dziennie rozłożonych nierównomiernie. Lambda: płacisz za ~1000 × 3s wykonania = 3000s. Zawsze-włączony serwer: płacisz za 24h × 30 dni. Oszczędność może być 90%."},
{title:"Zero infrastructure management",text:"Brak serwerów do patch'owania, konfigurowania, monitorowania dostępności. Deweloper skupia się na logice biznesowej.",example:"Startup AI integrujący OpenAI API: zamiast konfigurować Docker, K8s, load balancer — wdrażają Lambda function. Cały pipeline od kodu do produkcji w kilka minut."},
{title:"Wyzwania serverless dla GenAI: Cold Starts",text:"Gdy funkcja nie była wywoływana przez jakiś czas, pierwsze wywołanie inicjalizuje środowisko uruchomieniowe — 'cold start' może trwać kilka sekund. Dla interaktywnego AI to zauważalna latencja.",example:"Lambda z dużymi zależnościami ML: cold start 5-8 sekund. Techniki mitygacji: provisioned concurrency (pre-warm instances), małe deployment packages, użycie snap start (Lambda SnapStart dla Java)."}
]},
analogy:{pl:"Serverless to jak taksówka on-demand zamiast własnego samochodu: płacisz tylko gdy jedziesz (płacisz za wykonanie), nie musisz dbać o serwisowanie (brak zarządzania infrastrukturą), ale czekasz na przyjazd przy pierwszym zamówieniu (cold start).",en:"Serverless is like an on-demand taxi instead of owning a car: you pay only when riding (pay per execution), no maintenance needed (no infrastructure management), but you wait for the first pickup (cold start)."},
answer:"Serverless computing provides significant advantages for GenAI applications. The scale-to-zero capability means organizations pay only for actual execution time rather than idle server capacity — for applications with bursty, unpredictable AI query patterns this can reduce infrastructure costs by 80-90% compared to always-on servers. Zero infrastructure management allows teams to focus on model integration rather than server configuration, patching, and capacity planning. However, GenAI serverless deployments face the cold start challenge: when functions are invoked after periods of inactivity, initialization can add several seconds of latency — mitigated through provisioned concurrency or optimized deployment packages.",
keywords:["serverless","Lambda","scale-to-zero","cold start","provisioned concurrency","bursty traffic","pay-per-execution","infrastructure management"]},

{num:"Q91",original:"What process automation tools can be applied in life-cycle management of systems based on the cloud distributed infrastructure?",
lecture:{intro:"Zarządzanie infrastrukturą chmurową ręcznie to prosta droga do błędów, niespójności i naruszenia bezpieczeństwa. Infrastructure as Code i CI/CD pipelines traktują infrastrukturę jak kod — z kontrolą wersji, review, testami i automatycznym wdrożeniem.",
points:[
{title:"Terraform — Infrastructure as Code",text:"Terraform opisuje infrastrukturę chmurową w deklaratywnych plikach HCL. Jednakowe środowiska, wersjonowanie w Git, możliwość review zmian przed wdrożeniem (terraform plan).",example:"Nowy environment dla klienta: bez IaC = 3 dni konfiguracji ręcznej + błędy. Z Terraform: terraform apply = 15 minut, identyczne z poprzednimi środowiskami."},
{title:"CI/CD — GitHub Actions i Jenkins",text:"Pipeline automatyzuje: build → test → security scan → staging deploy → production deploy. Każdy commit do main triggera pełen pipeline.",example:"GitHub Actions pipeline dla mikroserwisu AI: push → uruchom testy jednostkowe → zbuduj Docker image → push do ECR → deploy na staging K8s → integration tests → deploy na production. Czas: 12 minut od commita do produkcji."},
{title:"GitOps i Helm dla K8s",text:"GitOps: stan klastra K8s jest opisany w Git. ArgoCD automatycznie synchronizuje klaster z repozytorium — 'desired state' w Git = 'actual state' w klastrze.",example:"DevOps inżynier zmienia liczbę replik w values.yaml w repozytorium. ArgoCD wykrywa zmianę i automatycznie skaluje deployment w K8s. Audit trail: każda zmiana jest commitem z autorem i timestampem."}
]},
analogy:{pl:"IaC z CI/CD to jak fabryka samochodów z linią montażową: projekt samochodu (kod infrastruktury w Git), linia montażowa (CI/CD pipeline) produkuje identyczne egzemplarze, QA automatycznie testuje każdy (automated tests), przed wypuszczeniem do klienta (deploy na production).",en:"IaC with CI/CD is like a car factory with an assembly line: the car blueprint (infrastructure code in Git), the assembly line (CI/CD pipeline) produces identical copies, QA automatically tests each one (automated tests), before delivery to the customer (production deploy)."},
answer:"Cloud infrastructure lifecycle management relies on Infrastructure as Code and CI/CD automation. Terraform uses declarative configuration files to define cloud resources — enabling versioning in Git, code review before deployment, and consistent environment reproduction that eliminates configuration drift between environments. CI/CD pipelines with GitHub Actions or Jenkins automate the full deployment lifecycle: every code commit triggers automated builds, tests, security scans, container image creation, and progressive deployment to staging then production. GitOps tools like ArgoCD extend this to Kubernetes — the desired cluster state is defined in Git repositories and automatically reconciled to match the actual cluster state, providing complete auditability of every infrastructure change.",
keywords:["Terraform","IaC","CI/CD","GitHub Actions","Jenkins","GitOps","ArgoCD","Helm","Kubernetes","infrastructure as code"]}
]},

{id:"D",label:"D",color:"#7F77DD",title:"OOP & Programowanie",questions:[
{num:"Q43",original:"What are the key differences between a class and an object in object-oriented programming and how do these differences affect the development and use of a code?",
lecture:{intro:"Klasa i obiekt to fundamentalna para pojęć w OOP. Ich właściwe rozumienie determinuje jak myślisz o programowaniu obiektowym — czy struktury i instancje, blueprint i rzeczywistość.",
points:[
{title:"Klasa — blueprint",text:"Klasa to szablon, definicja, opis — nie zajmuje pamięci na dane instancji. Definiuje pola (atrybuty) i metody (zachowania). Istnieje w czasie kompilacji.",example:"Klasa 'Samolot' definiuje: pola (rejestration, model, capacity) i metody (takeOff(), land(), refuel()). To tylko opis — żaden konkretny samolot nie istnieje."},
{title:"Obiekt — instancja",text:"Obiekt to konkretna instancja klasy, alokowana w pamięci heap. Zajmuje pamięć. Posiada konkretne wartości atrybutów. Tworzony przez new (Java/C#/Python).",example:"Airplane boeing = new Airplane('SP-LRA', 'Boeing 787', 294) — konkretny obiekt, konkretne wartości w pamięci. Możesz mieć tysiące obiektów Airplane, każdy z własnymi danymi."},
{title:"Wpływ na development",text:"Ta separacja umożliwia enkapsulację (stan w obiekcie, zachowanie w klasie), polimorfizm (różne klasy, ten sam interfejs) i reużywalność (jedna klasa, wiele obiektów).",example:"Klasa BankAccount zdefiniowana raz — tworzone miliony obiektów dla każdego klienta. Każdy obiekt ma własny balance, własną historię transakcji, ale tę samą logikę deposit()/withdraw()."}
]},
analogy:{pl:"Klasa to przepis na ciasto — opisuje składniki i kroki, nie waży nic. Obiekt to konkretne upieczone ciasto — zajmuje miejsce, ma konkretne składniki, możesz je zjeść. Z jednego przepisu możesz upiec wiele ciast (wiele obiektów z jednej klasy).",en:"A class is a recipe for a cake — describes ingredients and steps, weighs nothing. An object is the actual baked cake — it takes up space, has specific ingredients, you can eat it. One recipe can produce many cakes (many objects from one class)."},
answer:"A class is a blueprint or template that defines the structure — fields representing state and methods representing behavior — but does not occupy memory for instance data. It exists at compile time as a type definition. An object is a concrete instance of a class allocated in heap memory at runtime, with specific values for each field. This distinction enables key OOP principles: encapsulation by bundling state with behavior inside instances, reusability by creating many objects from one class definition, and polymorphism by treating different class instances through a common interface. In practice, one BankAccount class serves millions of customer objects, each with isolated state but shared behavior logic.",
keywords:["class","object","instance","heap","blueprint","encapsulation","instantiation","runtime","compile time"]},

{num:"Q45",original:"What is encapsulation in object-oriented programming? What are its main advantages and why is it significant to develop a solid and secure code?",
lecture:{intro:"Enkapsulacja to jeden z czterech filarów OOP (obok dziedziczenia, polimorfizmu i abstrakcji). Polega na ukrywaniu wewnętrznego stanu obiektu i kontroli dostępu przez metody. To nie tylko konwencja — to mechanizm bezpieczeństwa i łatwości utrzymania.",
points:[
{title:"Ukrywanie stanu — private fields",text:"Pola klasy oznaczone private nie są dostępne bezpośrednio z zewnątrz. Dostęp przez gettery/settery pozwala walidować i kontrolować zmiany.",example:"BankAccount bez enkapsulacji: account.balance = -1000000 — dowolna zmiana, brak walidacji. Z enkapsulacją: account.withdraw(1000000) → metoda sprawdza czy są środki, loguje transakcję, rzuca wyjątek jeśli brakuje."},
{title:"Stabilność API mimo zmian wewnętrznych",text:"Zewnętrzny kod używa publicznego API (metod). Możesz zmienić wewnętrzną implementację bez breaking change — dopóki publiczne metody działają tak samo.",example:"BankAccount przechowywało balance jako double. Zmiana na BigDecimal (precyzja finansowa) wewnątrz klasy — kod klientów nie musi wiedzieć o tej zmianie. Public API niezmienione."},
{title:"Znaczenie dla bezpieczeństwa",text:"Bez enkapsulacji atakujący z dostępem do kodu może manipulować stanem obiektów bezpośrednio. Enkapsulacja zmusza do przejścia przez walidację.",example:"Obiekt User bez enkapsulacji: user.role = 'admin' — prosta eskalacja uprawnień. Z enkapsulacją: user.setRole('admin') → walidacja czy wywołujący ma uprawnienia do zmiany roli."}
]},
analogy:{pl:"Enkapsulacja to jak bankomat: nie widzisz wewnętrznych mechanizmów (ukryty stan), możesz tylko korzystać z dozwolonych operacji (publiczne metody: wypłata, sprawdzenie salda). Próba bezpośredniego dostępu do gotówki bez interfejsu to alarm (brak dostępu do private fields).",en:"Encapsulation is like an ATM: you don't see internal mechanisms (hidden state), you can only use permitted operations (public methods: withdraw, check balance). Trying to access the cash directly without the interface triggers an alarm (no direct access to private fields)."},
answer:"Encapsulation hides an object's internal state by marking fields private and controlling access through public methods. This provides several advantages. First, data integrity: setters can validate input before modifying state — a bank account's withdraw() method checks available balance before reducing it, impossible with direct field access. Second, implementation stability: internal data structures can be changed without breaking external code that uses the public API. Third, security: every state modification goes through controlled methods that can enforce authorization checks, preventing privilege escalation attacks where attackers directly assign elevated roles to objects.",
keywords:["private","getter","setter","data integrity","API stability","information hiding","access control","public interface"]},

{num:"Q46",original:"What is the significance of polymorphism in object-oriented programming and what are the examples of its practical application in various programming languages?",
lecture:{intro:"Polimorfizm to zdolność obiektów różnych klas do bycia traktowanymi jako obiekty wspólnej klasy bazowej. To mechanizm który sprawia że kod jest otwarty na rozszerzenie, zamknięty na modyfikację (Open/Closed Principle).",
points:[
{title:"Polimorfizm przez dziedziczenie — override",text:"Klasa pochodna nadpisuje metodę klasy bazowej. Wywołanie metody na referencji klasy bazowej uruchamia implementację klasy pochodnej (dynamic dispatch).",example:"Shape baseShape = new Circle(); baseShape.area() — mimo że typ referencji to Shape, wywołana zostaje implementacja Circle.area(). Możesz dodać Triangle bez zmiany kodu który używa Shape."},
