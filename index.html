analogy:{pl:"Monitoring cloud to jak kokpit samolotu: Prometheus/Grafana to instrumenty (prędkość, wysokość, paliwo), Jaeger to czarna skrzynka (pełna historia lotu/requestu), Cost Explorer to wskaźnik paliwa (budżet), a alerting to system ostrzegawczy (pull up! pull up!).",en:"Cloud monitoring is like a cockpit: Prometheus/Grafana are instruments (speed, altitude, fuel), Jaeger is the black box (full flight/request history), Cost Explorer is the fuel gauge (budget), and alerting is the warning system (pull up! pull up!)."},
answer:"Cloud monitoring solutions span three areas. Infrastructure and APM monitoring uses Prometheus with Grafana for metrics including GPU utilization, Jaeger or Zipkin for distributed tracing showing end-to-end request flow across services, and ELK stack for log aggregation — with RED metrics tracking Rate, Errors, and Duration per service. Cost optimization through AWS Cost Explorer identifies over-provisioned resources — right-sizing instances can save $15K monthly, reserved instances save 40% for steady workloads, and resource tagging enables fair cost attribution per team. Auto-optimization through Kubernetes HPA with custom metrics scales based on GPU memory utilization, predictive scaling anticipates daily traffic patterns to pre-scale before demand spikes, and incident alerting through PagerDuty with escalation policies ensures rapid response to production issues.",
keywords:["Prometheus","Grafana","Jaeger","ELK","distributed tracing","Cost Explorer","right-sizing","reserved instances","HPA","predictive scaling","PagerDuty","RED metrics"]},

{num:"Q82",original:"What techniques used in software engineering are significant for the development of distributed systems that use machine learning algorithms in a cloud?",
lecture:{intro:"Rozwój rozproszonych systemów ML wymaga technik łączących klasyczną inżynierię oprogramowania z ML-specific practices — reproducibility, experiment tracking i continuous training.",
points:[
{title:"Reproducibility i experiment management",text:"DVC dla data versioning, MLflow/W&B dla experiment tracking (hyperparameters, metrics, artifacts). Każdy eksperyment musi być w pełni reprodukowalny: ten sam kod + te same dane + te same hyperparameters = te same wyniki.",example:"MLflow experiment: log lr=0.001, batch_size=32, model=resnet50, data_version=v2.3 → accuracy=0.87, F1=0.84. Inny inżynier may reproduce dokładnie te wyniki miesiące później. Bez tego: 'u mnie działało z accuracy 0.9' — niemożliwe do zweryfikowania."},
{title:"Microservices i API-first design",text:"Każdy ML component jako niezależny serwis z well-defined API (REST/gRPC). Contract testing między serwisami. Feature flags dla gradual rollout nowych modeli. Blue-green deployment dla instant rollback.",example:"gRPC API dla ML inference: PredictRequest {features: [...], model_version: 'v3'} → PredictResponse {prediction: 0.87, confidence: 0.93}. Contract test weryfikuje: response zawsze ma prediction i confidence fields. Feature flag: 'use_new_model' = true dla 10% users."},
{title:"Testing strategy dla ML systems",text:"Poza unit/integration tests: data validation tests, model performance tests (accuracy thresholds), slice analysis (per-group fairness), A/B tests w produkcji, shadow mode (new model receives live traffic but responses nie są serwowane userowi).",example:"Testing layers: unit tests (functions), data validation (Great Expectations), model tests (accuracy > 0.85 na test set, fairness disparity < 5%), integration tests (API contract), shadow mode (nowy model na live traffic przez tydzień — compare z production model), A/B test (5% traffic przez 2 tygodnie)."}
]},
analogy:{pl:"Inżynieria ML to jak farmaceutyka: każdy eksperyment musi być powtarzalny i udokumentowany (reproducibility), testy kliniczne przechodzą wiele faz (testing layers), nowy lek najpierw testowany na małej grupie (shadow/canary), a dopiero potem masowo wdrażany (full rollout).",en:"ML engineering is like pharmaceuticals: every experiment must be repeatable and documented (reproducibility), clinical trials go through multiple phases (testing layers), new drugs are first tested on a small group (shadow/canary), then mass-deployed (full rollout)."},
answer:"Key software engineering techniques for ML distributed systems include reproducibility through DVC for data versioning and MLflow for experiment tracking — ensuring any experiment can be exactly replicated with the same code, data, and hyperparameters yielding identical results. Microservices with API-first design expose each ML component via well-defined REST or gRPC interfaces with contract testing between services, feature flags for gradual model rollout, and blue-green deployment for instant rollback. Testing strategy extends beyond traditional unit and integration tests to include data validation with Great Expectations, model performance tests with accuracy thresholds, slice analysis for per-group fairness, shadow mode where new models process live traffic without serving responses for comparison, and A/B testing on small traffic percentages before full rollout.",
keywords:["reproducibility","DVC","MLflow","experiment tracking","gRPC","contract testing","feature flags","shadow mode","A/B testing","blue-green","Great Expectations","slice analysis"]},

{num:"Q83",original:"What challenges related to data security and privacy can occur in systems operating in cloud distributed processing?",
lecture:{intro:"Systemy cloud z distributed processing przetwarzają dane w wielu lokalizacjach i serwisach — mnożąc surface area dla ataków i komplikując compliance z regulacjami prywatności.",
points:[
{title:"Data in transit i at rest",text:"Dane przemieszczają się między wieloma serwisami, regionami i providerami. Encryption in transit (mTLS między serwisami) i at rest (AES-256, KMS managed keys). Key rotation automatyczna. Data classification: public, internal, confidential, restricted.",example:"Istio service mesh: automatic mTLS między wszystkimi serwisami w K8s cluster — zero-config encryption in transit. AWS KMS: managed keys z automatic annual rotation. S3 Server-Side Encryption: AES-256 dla wszystkich obiektów. Data classified: PII = restricted, analytics = internal."},
{title:"Privacy i compliance w multi-region",text:"GDPR wymaga: data minimization, prawo do usunięcia (right to be forgotten), data residency. Distributed processing komplikuje: dane mogą być skopiowane, cachowane, logowane w wielu miejscach. Anonimizacja vs pseudonimizacja.",example:"GDPR right to be forgotten: user request usunięcia wymaga: usunięcia z primary DB, wszystkich replik, cache'ów Redis, backupów, logs, feature store, i wytrenowanych modeli (model unlearning problem). Bez centralnego data lineage — niemożliwe do zagwarantowania."},
{title:"Access control i audit",text:"Zero Trust + RBAC + attribute-based access control (ABAC). Audit logging każdego dostępu do danych. Data lineage tracking: skąd dane przyszły, jak były transformowane, kto miał dostęp. SOC 2, ISO 27001 compliance.",example:"AWS CloudTrail loguje KAŻDE API call (kto, co, kiedy, skąd). RBAC: ML engineer ma dostęp do anonymized training data, nie do raw PII. ABAC: dostęp do patient data tylko dla users z attribute department=medical AND location=EU. Data lineage w Apache Atlas."}
]},
analogy:{pl:"Bezpieczeństwo danych w chmurze to jak ochrona tajnej receptury rozproszonej po wielu kuchniach: każda kuchnia (serwis) musi mieć sejf (encryption), kamery (audit logging), listę upoważnionych kucharzy (RBAC), i śledzenie kto dotykał jakich składników (data lineage). A receptura nie może wyjechać za granicę (data residency).",en:"Cloud data security is like protecting a secret recipe distributed across many kitchens: each kitchen (service) needs a safe (encryption), cameras (audit logging), an authorized chef list (RBAC), and tracking of who touched which ingredients (data lineage). And the recipe can't leave the country (data residency)."},
answer:"Cloud distributed processing faces several data security and privacy challenges. Data in transit between services requires mutual TLS encryption, while data at rest needs AES-256 encryption with KMS-managed keys and automatic rotation — Istio service mesh provides zero-config mTLS across all Kubernetes services. Privacy compliance in multi-region deployments complicates GDPR requirements: the right to be forgotten requires deletion from primary databases, replicas, caches, backups, logs, and feature stores — demanding comprehensive data lineage tracking through tools like Apache Atlas. Access control combines Zero Trust, RBAC, and attribute-based access control to ensure ML engineers access only anonymized training data, never raw PII. Complete audit logging through AWS CloudTrail records every API call for SOC 2 and ISO 27001 compliance.",
keywords:["mTLS","encryption at rest","KMS","GDPR","right to be forgotten","data lineage","RBAC","ABAC","audit logging","CloudTrail","Zero Trust","data residency","SOC 2"]},

{num:"Q84",original:"What advantages can be brought by using cloud technologies, such as serverless computing, in the context of generative AI models in distributed applications?",
lecture:{intro:"Serverless computing to model gdzie deweloper pisze tylko kod funkcji — provider zarządza infrastrukturą. Dla GenAI z nieregularnym, bursty ruchem to szczególnie atrakcyjna opcja ekonomiczna.",
points:[
{title:"Scale-to-zero i ekonomika bursty traffic",text:"Serverless: płacisz tylko za czas wykonania — zero kosztu gdy idle. Przy nieregularnym ruchu GenAI (rzadkie zapytania z peak'ami) oszczędności mogą sięgać 80-90% vs always-on. Auto-scaling bez konfiguracji.",example:"AI chatbot dla małej firmy: 1000 zapytań dziennie rozłożonych nierównomiernie. Lambda: płacisz ~1000 × 3s = 3000s execution. Always-on serwer: 24h × 30 dni = 2.6M sekund. Serverless: ~$5/mies vs ~$150/mies always-on = 97% savings."},
{title:"Zero infrastructure management i szybki time-to-market",text:"Brak serwerów do patchowania, konfigurowania, monitorowania. Developer skupia się na logice. Wdrożenie od kodu do produkcji w minuty. Idealne dla startupów i MVP.",example:"Startup integrujący OpenAI API: Lambda function + API Gateway. Wdrożenie: 30 minut od kodu do production URL. Bez serverless: Docker + K8s + load balancer + monitoring + auto-scaling = dni konfiguracji. Time-to-market: 30 min vs 3 dni."},
{title:"Wyzwania: Cold Starts i ograniczenia",text:"Cold start: gdy funkcja nie była wywoływana, pierwsze wywołanie inicjalizuje runtime — 1-10 sekund. Dla interaktywnego AI to zauważalna latencja. Provisioned concurrency, SnapStart, małe deployment packages mitygują.",example:"Lambda z PyTorch + model: cold start 5-8 sekund (ładowanie modelu do pamięci). Mitygacje: provisioned concurrency (pre-warmed instances, eliminuje cold start ale zwiększa koszt), model na EFS (shared filesystem — jeden model load per container), Lambda SnapStart (Java — snapshot pamięci po init)."}
]},
analogy:{pl:"Serverless to jak taksówka on-demand zamiast własnego samochodu: płacisz tylko gdy jedziesz (pay-per-execution), nie dbasz o serwis i przeglądy (zero infrastructure), ale czekasz na przyjazd przy pierwszym zamówieniu (cold start), i masz limit bagażu (memory/timeout limits).",en:"Serverless is like an on-demand taxi instead of owning a car: pay only when riding (pay-per-execution), no maintenance or inspections (zero infrastructure), but wait for pickup on the first call (cold start), and luggage is limited (memory/timeout limits)."},
answer:"Serverless computing provides significant advantages for GenAI applications. Scale-to-zero capability means organizations pay only for actual execution time — for bursty AI query patterns this reduces costs by 80-90% compared to always-on servers. Zero infrastructure management eliminates server patching, configuration, and capacity planning, enabling deployment from code to production URL in 30 minutes versus days with traditional infrastructure. Auto-scaling handles traffic spikes without configuration. However, cold starts present a challenge for interactive AI: loading ML models on first invocation adds 5-8 seconds of latency. Mitigations include provisioned concurrency for pre-warmed instances, shared model storage on EFS, and Lambda SnapStart for faster initialization. Serverless is ideal for low-to-medium traffic AI applications and rapid MVP development.",
keywords:["serverless","Lambda","scale-to-zero","cold start","provisioned concurrency","pay-per-execution","API Gateway","SnapStart","bursty traffic","time-to-market"]},

{num:"Q85",original:"What mechanisms of synchronisation and communication in distributed systems support the efficient operation of generative AI algorithms in a cloud?",
lecture:{intro:"Komunikacja między komponentami systemu AI determinuje wydajność całego pipeline'u. Synchroniczna vs asynchroniczna, request-response vs event-driven — każdy wzorzec ma swoje zastosowanie.",
points:[
{title:"Message Queues i Event Streaming",text:"Kafka dla high-throughput event streaming (miliony events/sec). RabbitMQ/SQS dla task queues z guaranteed delivery. Decoupling: producer i consumer niezależne — failure jednego nie blokuje drugiego. Backpressure handling naturalne.",example:"AI pipeline: user request → SQS queue → Lambda pobiera z queue → wywołuje SageMaker endpoint → wynik do output queue → response service doręcza userowi. Queue buforuje peak: 10K requests/min w queue, processing 1K/min — zero lost requests, graceful handling."},
{title:"gRPC vs REST dla inter-service communication",text:"gRPC: binary protocol (protobuf), HTTP/2 multiplexing, streaming, code generation. 2-10x szybszy niż REST/JSON. Idealne dla high-throughput internal ML service communication. REST: lepszy dla external APIs (universal support).",example:"ML inference internal API w gRPC: PredictRequest protobuf → binary serialization (10x mniejszy niż JSON) → HTTP/2 multiplexing (wiele requestów na jednym połączeniu) → response w 2ms vs 8ms dla REST/JSON. External API: REST + OpenAPI spec dla kompatybilności."},
{title:"Distributed coordination i consensus",text:"Raft/Paxos dla consensus w replikacji. Distributed locks (Redis RedLock, ZooKeeper) dla mutual exclusion. Leader election dla single-writer patterns. Saga pattern dla distributed transactions.",example:"Distributed training coordination: parameter server pattern — workers wysyłają gradienty, server agreguje i broadcastuje updated weights. AllReduce (ring topology) — bardziej efficient, każdy node agreguje część gradientów. NCCL optymalizuje GPU-to-GPU communication."}
]},
analogy:{pl:"Komunikacja w systemach AI to jak logistyka w dużej firmie kurierskiej: Kafka to taśma sortująca paczki (high-throughput streaming), gRPC to expresowa linia wewnętrzna (szybka internal communication), REST to standardowa poczta (universal ale wolniejsza), a Raft to system głosowania kierowników, który oddział prowadzi (leader election).",en:"Communication in AI systems is like logistics in a courier company: Kafka is the package sorting belt (high-throughput streaming), gRPC is the internal express line (fast internal communication), REST is standard mail (universal but slower), and Raft is the manager voting system deciding which branch leads (leader election)."},
answer:"Distributed AI systems use several communication mechanisms. Message queues and event streaming with Kafka handle high-throughput event processing at millions of events per second, while SQS or RabbitMQ provide guaranteed delivery task queues with natural backpressure handling — decoupling producers from consumers so failures don't cascade. gRPC with protocol buffers provides 2-10x faster inter-service communication than REST/JSON through binary serialization and HTTP/2 multiplexing — ideal for high-throughput internal ML inference calls, while REST remains preferred for external APIs due to universal client support. Distributed coordination uses Raft consensus for replication, distributed locks with Redis RedLock for mutual exclusion, and AllReduce with NCCL for efficient gradient synchronization in distributed GPU training across nodes.",
keywords:["Kafka","gRPC","protobuf","REST","message queue","SQS","RabbitMQ","Raft","NCCL","AllReduce","backpressure","HTTP/2","distributed locks"]},

{num:"Q86",original:"What design templates are applied most frequently during the development of distributed systems that use generative AI and operate in cloud environments?",
lecture:{intro:"Wzorce projektowe dla rozproszonych systemów AI łączą klasyczne distributed systems patterns z ML-specific patterns — tworząc proven solutions dla powtarzalnych problemów.",
points:[
{title:"Saga, CQRS i Event Sourcing",text:"Saga: distributed transactions przez sekwencję local transactions z compensating actions. CQRS: osobne modele dla read (query) i write (command) — optymalizacja każdego niezależnie. Event Sourcing: przechowywanie eventów zamiast stanu — pełny audit trail.",example:"E-commerce AI: OrderPlaced event → Payment saga (charge card OR compensate: refund) → Inventory saga (reserve items OR compensate: release). CQRS: write model w PostgreSQL (strong consistency), read model w Elasticsearch (fast search). Event log w Kafka — replay do odtworzenia stanu."},
{title:"Strangler Fig i Sidecar",text:"Strangler Fig: stopniowa migracja monolitu do mikroserwisów — nowe features w nowych serwisach, stare stopniowo przenoszone. Sidecar: dodatkowy container obok main container w podzie — obsługuje cross-cutting concerns (logging, monitoring, security).",example:"Strangler Fig: stary monolith obsługuje 90% ruchu. Nowy ML recommendation service obsługuje /api/recommend. Stopniowo: /api/search → nowy serwis, /api/user → nowy serwis. Po roku monolith obsługuje 10%. Sidecar: Envoy proxy jako sidecar — mTLS, tracing, rate limiting bez zmiany application code."},
{title:"Circuit Breaker, Retry i Bulkhead",text:"Circuit Breaker: zapobiega kaskadowym awariom. Retry z exponential backoff: automatyczne ponawianie transient failures. Bulkhead: izolacja zasobów między critical i non-critical paths — awaria jednego nie wpływa na drugi.",example:"AI inference z Circuit Breaker: 5 failures w 30s → circuit open → fallback do cached/simple response. Retry z exponential backoff: 1s, 2s, 4s, 8s — z jitter żeby uniknąć thundering herd. Bulkhead: osobny thread pool dla ML inference i osobny dla user API — ML slowdown nie blokuje user requests."}
]},
analogy:{pl:"Wzorce projektowe to jak sprawdzone strategie w szachach: Saga to gambit (ruch z planem B), CQRS to granie na dwóch szachownicach (read/write), Circuit Breaker to obrona króla (chroni przed kaskadą), Strangler Fig to stopniowa wymiana figur (migracja bez ryzyka).",en:"Design patterns are like proven chess strategies: Saga is a gambit (a move with plan B), CQRS is playing on two boards (read/write), Circuit Breaker is king defense (prevents cascading), Strangler Fig is gradually replacing pieces (migration without risk)."},
answer:"Frequently applied design patterns for distributed AI cloud systems include the Saga pattern managing distributed transactions through local transaction sequences with compensating actions for rollback. CQRS separates read and write models for independent optimization — writes to PostgreSQL for consistency, reads from Elasticsearch for fast search. Event Sourcing stores events instead of state in Kafka, providing complete audit trails and ability to replay history. The Strangler Fig pattern enables gradual monolith-to-microservices migration by routing new features to new services while incrementally moving old ones. Sidecar pattern attaches Envoy proxy containers for cross-cutting concerns like mTLS, tracing, and rate limiting without modifying application code. Circuit Breaker with Retry and exponential backoff prevents cascade failures, while the Bulkhead pattern isolates resource pools between critical and non-critical paths.",
keywords:["Saga","CQRS","Event Sourcing","Strangler Fig","Sidecar","Circuit Breaker","Retry","Bulkhead","exponential backoff","compensating transaction","Envoy"]},

{num:"Q87",original:"What aspects of distributed system design should be taken into consideration in order to ensure their high efficiency in the context of applications operating in a cloud?",
lecture:{intro:"Wysoka wydajność w cloud distributed systems wymaga optymalizacji na każdej warstwie — od algorytmów i struktur danych przez networking po deployment strategy.",
points:[
{title:"Networking i data locality",text:"Minimalizacja network hops i cross-region calls. Co-locate compute z danymi. gRPC zamiast REST dla internal communication. CDN dla edge caching. Service mesh optimized routing.",example:"Cross-region API call: 100ms latency. Same-region: 1ms. Same-AZ: 0.5ms. Design: ML inference i feature store w tym samym AZ — eliminacja 99.5% network latency. CDN: static assets i cached AI responses serwowane z nearest POP (~5ms zamiast 100ms)."},
{title:"Horizontal scaling i load balancing",text:"Stateless services + external state store = unlimited horizontal scaling. Consistent hashing dla cache distribution. Least-connections load balancing. Auto-scaling na custom metrics (queue depth, GPU utilization).",example:"Consistent hashing dla Redis cluster: dodanie nowego node'a wymaga remapowania tylko 1/n kluczy (zamiast rehashowania wszystkich). Least-connections LB: nowe requesty trafiają do instancji z najmniejszą liczbą aktywnych połączeń — natural load balancing."},
{title:"Database optimization i async processing",text:"Read replicas dla read-heavy workloads. Connection pooling. Query optimization z indeksami. Async processing z queues dla non-critical paths. Batch processing zamiast row-by-row dla bulk operations.",example:"E-commerce: synchronicznie = accept order (<100ms). Asynchronicznie przez queue = payment processing, inventory update, email notification, ML recommendation update. User widzi 'order confirmed' natychmiast — reszta w tle. Batch: update 1M product embeddings w jednym Spark job zamiast 1M individual API calls."}
]},
analogy:{pl:"Wydajność cloud systemu to jak wydajność lotniska: data locality to samoloty startujące z najbliższego pasa (nie latające na drugi koniec lotniska), horizontal scaling to otwieranie nowych bramek (zamiast powiększania jednej), async to bagaż jadący oddzielną taśmą (nie blokuje pasażerów).",en:"Cloud system performance is like airport efficiency: data locality is planes using the nearest runway (not taxiing across the airport), horizontal scaling is opening new gates (not enlarging one), async is luggage on a separate belt (not blocking passengers)."},
answer:"High-efficiency cloud distributed systems require optimization across layers. Network optimization through data co-location eliminates cross-region latency — placing ML inference and feature stores in the same availability zone reduces network overhead from 100ms to 0.5ms. Horizontal scaling with stateless services and external state stores enables unlimited scaling, with consistent hashing for cache distribution ensuring only 1/n keys remap when adding nodes. Database optimization includes read replicas for read-heavy workloads, connection pooling eliminating per-request handshake overhead, and proper indexing. Asynchronous processing with message queues handles non-critical operations in the background — accepting orders synchronously in under 100ms while processing payments, notifications, and ML updates asynchronously through queues.",
keywords:["data locality","horizontal scaling","consistent hashing","load balancing","connection pooling","read replicas","async processing","CDN","gRPC","co-location","stateless"]},

{num:"Q88",original:"How does the use of cloud tools for data processing in real time affect the efficiency of AI algorithms?",
lecture:{intro:"Real-time data processing w chmurze bezpośrednio wpływa na jakość predykcji AI — świeższe dane = dokładniejsze predykcje. Stream processing umożliwia continuous learning i instant feature updates.",
points:[
{title:"Stream Processing frameworks",text:"Apache Kafka + Flink/Spark Structured Streaming: przetwarzanie eventów w real-time z exactly-once semantics. Windowed aggregations (tumbling, sliding, session windows). Complex Event Processing (CEP) dla pattern detection.",example:"Fraud detection: Flink przetwarza transaction stream z Kafka. Sliding window 5-minutowy: 'jeśli >5 transakcji z różnych krajów w 5 min → flag as suspicious'. Latency: event-to-decision w <100ms. Without stream processing: batch job co godzinę → fraud wykrywany z 1h opóźnieniem."},
{title:"Real-time Feature Engineering",text:"Features obliczane w real-time z event streams: 'ilość transakcji w ostatnich 5 min', 'average order value last 24h'. Feature store (Feast) serwuje te features do modelu z sub-ms latency.",example:"Feature 'user_transaction_count_5min': Flink aggreguje z Kafka → zapisuje do Redis (online store Feast) → ML model czyta z Redis przy każdej predykcji. Feature jest aktualna co sekundę, nie co godzinę jak w batch. Accuracy improvement: 8% dla fraud detection."},
{title:"Continuous learning i model freshness",text:"Real-time data feeds continuous/online learning — model aktualizuje wagi na bieżąco zamiast retrainingu co tydzień. Data z produkcji automatycznie staje się training data dla następnej iteracji modelu.",example:"Recommendation model: co godzinę incremental training na najnowszych click/purchase events z Kafka. Model jest zawsze aktualny z trendami — nowy produkt pojawia się w rekomendacjach w ciągu godzin, nie dni. A/B test: model z hourly updates → 12% lepszy CTR niż weekly retrained."}
]},
analogy:{pl:"Real-time data processing dla AI to jak live dashboard vs wczorajszy raport: model z real-time features to lekarz z live EKG pacjenta, model z batch features to lekarz czytający wczorajsze wyniki badań — oba diagnozują, ale live data pozwala złapać problem w momencie gdy się dzieje.",en:"Real-time data processing for AI is like a live dashboard vs yesterday's report: a model with real-time features is a doctor with a live patient ECG, a model with batch features reads yesterday's test results — both diagnose, but live data catches problems as they happen."},
answer:"Cloud real-time data processing directly improves AI algorithm efficiency through fresher features and faster feedback. Stream processing frameworks like Apache Flink with Kafka process events with sub-100ms latency and exactly-once semantics — enabling fraud detection decisions within milliseconds versus hourly batch detection. Real-time feature engineering computes features like transaction counts over sliding windows, stored in online feature stores like Feast with Redis backend for sub-millisecond model serving access — improving fraud detection accuracy by 8% compared to hourly batch features. Continuous learning feeds production data streams back into model training for incremental updates — new products appear in recommendations within hours instead of days, with A/B tests showing 12% better click-through rates for hourly-updated models versus weekly-retrained ones.",
keywords:["stream processing","Flink","Kafka","real-time features","Feast","sliding window","continuous learning","exactly-once","CEP","online feature store","incremental training"]},

{num:"Q89",original:"What are the advantages of using distributed databases in systems based on distributed processing in a cloud?",
lecture:{intro:"Rozproszone bazy danych są zaprojektowane do działania na wielu nodach, data centers i regionach — dostarczając skalowalność, dostępność i wydajność nieosiągalną dla single-node databases.",
points:[
{title:"Horizontal scalability i high availability",text:"Dodanie nodów zwiększa capacity liniowo — bez migracji do większego hardware. Dane replikowane między nodami/regionami. Automatic failover gdy node pada — zero data loss z synchronous replication. RPO ≈ 0.",example:"CockroachDB: 3 nody obsługują 10K transactions/sec. Dodanie 27 nodów = 100K transactions/sec — liniowe skalowanie bez zmian w aplikacji. Node failure → automatic failover w sekundach, zero data loss dzięki Raft consensus replication."},
{title:"Geographic distribution i data residency",text:"Dane serwowane z najbliższego regionu — redukcja latencji dla globalnych userów. Compliance z data residency requirements: dane EU w EU, dane US w US — jedna logiczna baza, wiele fizycznych lokalizacji.",example:"MongoDB Atlas global clusters: dane userów EU w regionie Frankfurt, dane US w Virginia, dane Asia w Singapore. Aplikacja widzi jedną bazę — routing automatyczny. Read latency: 20ms (local) zamiast 200ms (cross-region). GDPR: EU data never leaves EU."},
{title:"Elastic resource management",text:"Auto-scaling na demand. Serverless options skalują do zera gdy idle. Pay per actual usage — optimalne dla variable workloads. Cloud-native distributed databases eliminują DBA overhead.",example:"Amazon Aurora Serverless v2: automatycznie skaluje od 0.5 ACU w nocy do 64 ACU podczas Black Friday traffic spikes. Koszt: proporcjonalny do actual usage. DynamoDB on-demand: zero capacity planning, pay per read/write — idealny dla unpredictable AI query patterns."}
]},
analogy:{pl:"Rozproszona baza danych to jak sieć bibliotek miejskich: każda filia ma kopie popularnych książek (replikacja), nowe filie otwierasz gdy rośnie zapotrzebowanie (horizontal scaling), zamknięta filia nie blokuje czytelników — idą do sąsiedniej (failover), a książki o historii miasta zostają w lokalnej filii (data residency).",en:"A distributed database is like a city library network: each branch has copies of popular books (replication), new branches open as demand grows (horizontal scaling), a closed branch doesn't block readers — they go next door (failover), and local history books stay in the local branch (data residency)."},
answer:"Distributed databases provide four key advantages for cloud systems. Horizontal scalability enables linear capacity growth by adding nodes — CockroachDB scales from 10K to 100K transactions per second simply by adding nodes without application changes. High availability through data replication across nodes and regions with automatic failover via Raft consensus ensures zero downtime and near-zero data loss. Geographic distribution serves data from the nearest region — reducing read latency from 200ms cross-region to 20ms local — while enabling GDPR compliance by keeping EU data physically in EU data centers. Elastic resource management through serverless options like Aurora Serverless and DynamoDB on-demand automatically scales capacity to demand, including scaling to zero when idle for optimal cost efficiency with variable AI workloads.",
keywords:["distributed database","horizontal scaling","replication","Raft consensus","auto-failover","CockroachDB","MongoDB Atlas","Aurora Serverless","DynamoDB","data residency","RPO"]},

{num:"Q90",original:"What problems can be faced by system designers in the context of adjusting generative AI algorithms to the specific character of cloud distributed processing?",
lecture:{intro:"Dostosowanie algorytmów GenAI do cloud distributed processing stawia specyficzne problemy: model partitioning, data consistency w training, inference optimization, i cost-quality trade-offs.",
points:[
{title:"Model partitioning i distributed training challenges",text:"Duże modele nie mieszczą się na jednym GPU. Model parallelism: dzielenie modelu między GPU (complexity). Data parallelism: kopie modelu na wielu GPU, split danych (communication overhead). Pipeline parallelism: overlap computation i communication.",example:"Training 70B parameter model: nie mieści się na jednym A100 (80GB). DeepSpeed ZeRO-3: sharduje parameters, gradients, i optimizer states między 64 GPU. Każdy GPU trzyma 1/64 stanu — umożliwia training modelu który nie zmieściłby się na żadnym single GPU."},
{title:"Inference optimization trade-offs",text:"Quantization (FP16 → INT4): 4x mniej pamięci, ale potencjalna degradacja jakości. Knowledge distillation: mniejszy 'student' model uczy się od dużego 'teacher'. Speculative decoding: mały model generuje draft, duży weryfikuje — 2-3x speedup.",example:"Llama-2 70B: FP16 = 140GB GPU memory (2x A100). INT4 quantization (GPTQ) = 35GB (1x A100). Jakość: 99.2% benchmarku FP16. Speculative decoding: mały 7B model generuje 5 tokenów, 70B weryfikuje w jednym forward pass — 2.5x szybsze generation."},
{title:"Cost-quality optimization i model selection",text:"Nie zawsze największy model jest najlepszy — mniejszy fine-tuned model może być lepszy i 100x tańszy dla specific domain. Cost per token/query musi być budżetowalny. Prompt caching i semantic similarity caching redukują redundant inference.",example:"Porównanie: GPT-4 ($30/1M tokens) vs fine-tuned Llama-2 13B ($0.50/1M tokens) na customer support task. Fine-tuned 13B: 94% accuracy (vs 97% GPT-4). 60x tańszy per query. Semantic caching: similar questions (cosine similarity >0.95) serwowane z cache — 40% queries cached, 40% cost reduction."}
]},
analogy:{pl:"Dostosowanie AI do cloud to jak dostosowanie silnika samolotowego do drona: silnik (model) jest za duży — musisz go podzielić na części (model parallelism), zmniejszyć (quantization), lub zbudować mniejszą kopię (distillation). I koniecznie zmieścić w budżecie na paliwo (inference cost).",en:"Adapting AI to cloud is like fitting an aircraft engine into a drone: the engine (model) is too big — you must split it (model parallelism), shrink it (quantization), or build a smaller copy (distillation). And definitely fit the fuel budget (inference cost)."},
answer:"Adapting GenAI to cloud distributed processing presents several challenges. Model partitioning for distributed training requires splitting large models across GPUs using DeepSpeed ZeRO-3 for parameter sharding, data parallelism for batch distribution, or pipeline parallelism for overlapping computation and communication. Inference optimization involves trade-offs between quality and cost: quantization from FP16 to INT4 reduces memory requirements by 4x with minimal quality loss, knowledge distillation creates smaller specialist models, and speculative decoding uses small draft models verified by large models for 2-3x speedup. Cost-quality optimization often favors domain-specific fine-tuned smaller models over large general-purpose ones — a fine-tuned 13B model at $0.50/M tokens may achieve 94% of GPT-4's accuracy at 60x lower cost, with semantic caching further reducing costs by serving similar queries from cache.",
keywords:["model parallelism","data parallelism","DeepSpeed ZeRO","quantization","GPTQ","knowledge distillation","speculative decoding","inference cost","semantic caching","fine-tuning","cost-quality trade-off"]},

{num:"Q91",original:"What process automation tools can be applied in life-cycle management of systems based on the cloud distributed infrastructure?",
lecture:{intro:"Zarządzanie lifecycle'em cloud infrastruktury ręcznie to proszenie się o błędy. IaC, CI/CD i GitOps traktują infrastrukturę jak kod — z wersjonowaniem, review, testami i automatycznym wdrożeniem.",
points:[
{title:"Terraform — Infrastructure as Code",text:"Deklaratywne pliki HCL opisują cloud resources. Plan → Apply workflow. Stan przechowywany w remote backend (S3). Modules dla reusable components. Multi-cloud support. Drift detection.",example:"Nowy environment: bez IaC = 3 dni ręcznej konfiguracji z nieuniknionymi odchyleniami od template. Z Terraform: terraform apply = 15 minut, identycznie z poprzednimi. Drift detection: terraform plan ujawnia zmiany zrobione ręcznie poza IaC — wymusza consistency."},
{title:"CI/CD — GitHub Actions i Jenkins",text:"Pipeline automatyzuje: build → test → security scan → staging deploy → production deploy. Każdy commit triggeruje pełen pipeline. Parallelization skraca feedback loop. Environment-specific configurations z secrets management.",example:"GitHub Actions: on push → lint → unit tests → build Docker → push to ECR → deploy na staging K8s → integration tests → manual approval gate → deploy production. Czas: 12 minut od commita do production. Rollback: git revert → auto-deploy previous version."},
{title:"GitOps z ArgoCD i Helm",text:"GitOps: pożądany stan klastra K8s opisany w Git repo. ArgoCD automatycznie synchronizuje cluster z repo — każdy merge to deployment. Helm charts pakują entire service stack. Audit trail: git log = deployment history.",example:"Engineer zmienia replicas: 3→5 w values.yaml. PR → review → merge → ArgoCD wykrywa diff → auto-apply na cluster. Cały audit: kto zmienił, kiedy, dlaczego (PR description), i co dokładnie się zmieniło (git diff). Rollback: ArgoCD reverts to previous Git commit."}
]},
analogy:{pl:"IaC z CI/CD to jak fabryka samochodów z linią montażową: projekt samochodu w Git (kod infrastruktury), linia montażowa (CI/CD pipeline) produkuje identyczne egzemplarze, kontrola jakości automatycznie testuje każdy (automated tests), i każdy ma numer VIN do śledzenia (audit trail).",en:"IaC with CI/CD is like a car factory with an assembly line: car blueprint in Git (infrastructure code), assembly line (CI/CD pipeline) produces identical copies, QA automatically tests each one (automated tests), and each has a VIN for tracking (audit trail)."},
answer:"Cloud infrastructure lifecycle management relies on three pillars. Terraform uses declarative HCL configuration files for Infrastructure as Code — enabling version-controlled, reviewable infrastructure changes with plan-apply workflow, drift detection catching manual modifications, and multi-cloud support through a unified language. CI/CD pipelines with GitHub Actions or Jenkins automate the full deployment lifecycle: every commit triggers builds, tests, security scans, and progressive deployment from staging to production in 12 minutes, with one-command rollback via git revert. GitOps tools like ArgoCD continuously synchronize Kubernetes cluster state with Git repositories — every merge triggers automatic deployment, with Helm charts packaging entire service stacks and git log providing complete audit trail of every infrastructure change with author, timestamp, and rationale.",
keywords:["Terraform","IaC","CI/CD","GitHub Actions","Jenkins","ArgoCD","GitOps","Helm","drift detection","HCL","audit trail","rollback"]},

{num:"Q92",original:"What methods of scaling and optimising cloud resources are most efficient for applications that operate in distributed systems?",
lecture:{intro:"Efektywne skalowanie cloud resources wymaga combination automatycznego scaling, right-sizing, cost optimization strategies i architectural decisions minimalizujących resource waste.",
points:[
{title:"Auto-scaling strategies",text:"Horizontal Pod Autoscaler (HPA): skaluje repliki na podstawie CPU/memory/custom metrics. Vertical Pod Autoscaler (VPA): adjustuje resource requests per pod. Cluster Autoscaler: dodaje/usuwa nody. Predictive scaling: ML-based anticipation.",example:"HPA z custom metric: scale na queue_depth > 100 messages (zamiast CPU). VPA: pod requestował 2GB RAM ale używa 500MB → VPA redukuje do 700MB, uwalniając zasoby. Predictive: AWS learnt pattern '9AM spike' → pre-scales 15 minut wcześniej."},
{title:"Right-sizing i cost optimization",text:"Identyfikacja over-provisioned resources. Reserved Instances/Savings Plans dla steady workloads (40-60% savings). Spot instances dla fault-tolerant batch jobs (70-90% savings). Graviton/ARM instances: lepszy price-performance dla web workloads.",example:"Cost analysis: 50 instancji m5.xlarge at 20% avg CPU → right-size do m5.large (50% cost reduction). 10 always-on → Reserved Instances (40% savings). Batch training → spot (75% savings). Web servers → Graviton3 ARM (40% better price-perf than x86)."},
{title:"Architectural optimization",text:"Serverless dla event-driven (scale-to-zero). Container right-sizing (resource requests/limits). Multi-tier storage (hot/warm/cold). Caching layers reducing compute need. Edge computing offloading central cloud.",example:"Architecture optimization: move static ML model predictions to CloudFront edge cache (eliminate API call entirely). Redis cache for repeated queries (95% cache hit rate). S3 Intelligent-Tiering: auto-moves data between storage tiers based on access patterns — 40% storage savings."}
]},
analogy:{pl:"Optymalizacja cloud resources to jak zarządzanie energią w smart home: auto-scaling to termostat automatycznie regulujący temperaturę (zasoby), right-sizing to wymiana żarówek na LED (mniejsze ale wystarczające), spot instances to tanie pranie nocą (off-peak pricing), a caching to termos z gorącą wodą (nie grzejesz za każdym razem).",en:"Cloud resource optimization is like smart home energy management: auto-scaling is a thermostat auto-adjusting temperature (resources), right-sizing is swapping bulbs for LEDs (smaller but sufficient), spot instances are cheap night-time laundry (off-peak pricing), and caching is a thermos of hot water (don't heat every time)."},
answer:"Efficient cloud resource scaling combines multiple strategies. Auto-scaling through Kubernetes HPA with custom metrics like queue depth, VPA for automatic resource right-sizing, and predictive scaling using ML to anticipate demand patterns and pre-scale before spikes. Cost optimization through right-sizing over-provisioned instances, Reserved Instances or Savings Plans for steady workloads saving 40-60%, spot instances for fault-tolerant batch jobs saving 70-90%, and ARM-based Graviton instances offering 40% better price-performance for web workloads. Architectural optimization includes serverless for event-driven scale-to-zero patterns, multi-tier caching with CDN edge and Redis reducing compute requirements by 95% for repeated queries, and S3 Intelligent-Tiering automatically moving data between storage tiers based on access patterns for 40% storage cost reduction.",
keywords:["HPA","VPA","Cluster Autoscaler","predictive scaling","right-sizing","Reserved Instances","spot instances","Graviton","serverless","caching","Intelligent-Tiering","cost optimization"]},

{num:"Q93",original:"What efficiency-related and technical aspects should be taken into consideration during the design of distributed systems in the context of cloud architecture based on serverless computing?",
lecture:{intro:"Serverless computing (FaaS) zmienia paradygmat designu — od zarządzania serwerami do zarządzania funkcjami. Wymaga uwzględnienia specyficznych aspektów wydajnościowych i technicznych.",
points:[
{title:"Cold starts i execution model",text:"Cold start: inicjalizacja runtime + deployment package + application init. Mitygacje: provisioned concurrency, minimal dependencies, lazy initialization. Execution model: stateless, event-triggered, timeout limits (15 min Lambda). Warm containers reused.",example:"Lambda z Node.js: cold start ~200ms (lekki). Lambda z Python + PyTorch: cold start 5-8s (ciężki ML framework). Mitygacja: Lambda SnapStart (Java) lub provisioned concurrency ($0.015/GB-hour) eliminuje cold starts dla latency-sensitive endpoints."},
{title:"State management i integration patterns",text:"Serverless jest inherently stateless. Stan w external services: DynamoDB, S3, Redis, Step Functions (orchestration). Event-driven patterns: API Gateway → Lambda → SQS → Lambda → DynamoDB. Fan-out/fan-in dla parallel processing.",example:"Step Functions orchestracja: event → Lambda (validate input) → Lambda (call ML model) → choice state (if confidence > 0.9 → auto-approve, else → SQS for human review) → Lambda (save result to DynamoDB). Visual workflow editor — no custom orchestration code."},
{title:"Cost model i performance optimization",text:"Pay-per-invocation + pay-per-duration + pay-per-memory. Optimization: right-size memory (more memory = more CPU = faster execution = lower duration cost). Batch processing: SQS batch size = process multiple events per invocation. Connection reuse.",example:"Lambda 128MB: execution 10s = 1.28 GB-seconds. Lambda 1024MB: execution 2s = 2.05 GB-seconds. Lambda 512MB: execution 3s = 1.54 GB-seconds. Sweet spot: 512MB — fastest per-$ execution. RDS Proxy: reuse DB connections across Lambda invocations (eliminate connection overhead)."}
]},
analogy:{pl:"Serverless to jak food truck zamiast restauracji: zero stałych kosztów lokalu (infrastructure), płacisz za czas gotowania (execution), ale musisz się rozgrzewać za każdym razem (cold start), nie masz magazynu (stateless), i musisz przechowywać składniki w lodówce u kolegi (external state).",en:"Serverless is like a food truck instead of a restaurant: zero fixed rent (infrastructure), pay for cooking time (execution), but must warm up each time (cold start), no storage room (stateless), and ingredients stored in a friend's fridge (external state)."},
answer:"Serverless architecture requires careful consideration of efficiency aspects. Cold starts — initialization delays of 200ms to 8 seconds depending on runtime and dependencies — are mitigated through provisioned concurrency, minimal deployment packages, Lambda SnapStart, and lazy initialization of heavy dependencies. State management uses external services since serverless is inherently stateless: DynamoDB for persistence, Redis for caching, and Step Functions for workflow orchestration with visual state machines. Cost optimization involves right-sizing memory allocation — more memory provides proportionally more CPU, so optimal memory is where cost-per-execution is minimized. Integration patterns use event-driven architectures with API Gateway triggering Lambda, SQS for decoupling with batch processing, and fan-out/fan-in for parallel workloads. RDS Proxy eliminates database connection overhead across invocations.",
keywords:["serverless","cold start","provisioned concurrency","Step Functions","DynamoDB","event-driven","Lambda","API Gateway","SQS","fan-out","RDS Proxy","SnapStart"]},

{num:"Q94",original:"What techniques of data storage and data processing are most suitable for generative AI models operating in distributed systems?",
lecture:{intro:"GenAI models mają unikalne wymagania: masowe datasety treningowe, high-throughput data pipelines, distributed training, low-latency inference serving — każde wymaganie potrzebuje dedykowanej techniki.",
points:[
{title:"Training data storage",text:"Object storage (S3, GCS) dla raw datasets — nieograniczona pojemność, tanie. Data lakes z tiered quality (Bronze/Silver/Gold). Distributed file systems (Lustre, FSx) dla high-throughput parallel reads podczas trainingu.",example:"GPT-style training: 10TB tekstu w S3 → preprocessed do tokenized Parquet na FSx for Lustre. 256 GPU czyta różne shardy danych równolegle z Lustre — throughput 100+ GB/s. S3 sam ma zbyt wysoką latencję dla random reads podczas trainingu."},
{title:"Vector Databases dla RAG",text:"Przechowują i wyszukują high-dimensional embeddings dla Retrieval-Augmented Generation. Semantic search nad knowledge bases grounding odpowiedzi LLM w faktycznych danych. Sub-10ms latency dla similarity search.",example:"Pinecone/Weaviate/Milvus: embeddings 1M firmowych dokumentów. User query → embed pytanie → cosine similarity search w vector DB → top-5 relevant docs → inject into LLM prompt → grounded answer z citations. Search latency: <10ms na 1M dokumentów."},
{title:"Inference serving i caching",text:"vLLM z PagedAttention: efektywne zarządzanie KV-cache w GPU memory. Continuous batching łączy requesty. Semantic caching: similar queries (embedding similarity >0.95) serwowane z cache bez ponownego inference.",example:"vLLM serwuje Llama-2 70B: PagedAttention dynamicznie alokuje GPU memory dla KV-cache (nie marnuje pamięci na padding). Continuous batching: 100+ concurrent requests. Semantic cache: 40% queries mają similar query w cache → 40% reduction w GPU compute cost."}
]},
analogy:{pl:"Infrastruktura danych dla AI to jak profesjonalna kuchnia restauracyjna: magazyn składników (S3 object storage), zamrażarka gotowych sosów bazowych (vector DB z embeddings), wielu kucharzy pracujących równolegle przy gorących potrawach (distributed training z Lustre), i wydawka z gotowymi daniami plus recycling popularnych zamówień (inference serving + semantic cache).",en:"AI data infrastructure is like a professional restaurant kitchen: ingredient warehouse (S3 object storage), freezer of pre-made base sauces (vector DB with embeddings), multiple chefs working in parallel on hot dishes (distributed training with Lustre), and serving counter with finished plates plus recycling popular orders (inference serving + semantic cache)."},
answer:"Generative AI in distributed systems requires specialized data techniques. Training data storage uses object storage like S3 for raw datasets at unlimited scale, data lakes with Bronze/Silver/Gold quality tiers, and distributed file systems like FSx for Lustre providing 100+ GB/s throughput for parallel GPU reads during training. Vector databases like Pinecone, Weaviate, or Milvus store high-dimensional embeddings for RAG — enabling sub-10ms semantic similarity search over millions of documents to ground LLM responses in factual data. Inference serving with vLLM uses PagedAttention for efficient GPU memory management of KV-cache and continuous batching for high concurrent request throughput. Semantic caching identifies queries with similar embeddings and serves cached responses, reducing GPU compute costs by up to 40%.",
keywords:["object storage","data lake","Lustre","vector database","Pinecone","Weaviate","RAG","embedding","vLLM","PagedAttention","KV-cache","semantic caching","continuous batching"]},

{num:"Q95",original:"What cloud tools allow for efficient management of AI training processes in cloud distributed systems?",
lecture:{intro:"Zarządzanie procesami treningowymi AI w chmurze wymaga narzędzi do orkiestracji eksperymentów, zarządzania zasobami GPU, trackowania wyników i automatyzacji pipeline'ów.",
points:[
{title:"ML Platforms i experiment tracking",text:"AWS SageMaker, Google Vertex AI, Azure ML: managed training z auto-provisioning GPU. MLflow: open-source experiment tracking (params, metrics, artifacts, model registry). Weights & Biases: collaborative experiment visualization.",example:"SageMaker Training Job: specify instance type (ml.p4d.24xlarge), data location (S3), training script → SageMaker provisions instances, downloads data, runs training, saves model to S3, terminates instances. MLflow logs: every hyperparameter, metric per epoch, and final model artifact."},
{title:"Distributed training frameworks",text:"PyTorch DDP (Distributed Data Parallel): najprościejszy multi-GPU. DeepSpeed ZeRO: memory-efficient training gigantycznych modeli. Horovod: framework-agnostic distributed training. Kubeflow: Kubernetes-native ML pipelines z TFJob/PyTorchJob operators.",example:"Kubeflow PyTorchJob: definiujesz spec (master: 1 pod, workers: 7 pods, GPU per pod: 8) → Kubeflow scheduluje na K8s cluster z GPU node pool → training na 64 GPU z PyTorch DDP → model saved to S3 → registered w MLflow. Entire pipeline jako Kubeflow Pipeline DAG."},
{title:"Resource management i cost control",text:"GPU quota management. Spot instance training z checkpointing (resume from last checkpoint po preemption). Training job scheduling: queue-based (dzielenie GPU cluster między teamy). Budget alerts i automatic job termination.",example:"Spot training: checkpoint co 30 minut do S3. Spot instance preempted → nowa spot instance → resume from last checkpoint. Max 30 min lost work, 75% cost savings. GPU scheduling: FIFO queue — team A training queued, starts when team B finishes. Budget alert: $5K/mies limit → auto-terminate jobs exceeding budget."}
]},
analogy:{pl:"Zarządzanie treningiem AI to jak zarządzanie laboratorium badawczym: SageMaker/Vertex to wyposażenie laboratorium (managed hardware), MLflow to dziennik laboratoryjny (każdy eksperyment udokumentowany), Kubeflow to harmonogram użycia sprzętu (scheduling), a spot instances to wypożyczanie sprzętu na godziny zamiast kupowania (cost efficiency).",en:"Managing AI training is like managing a research lab: SageMaker/Vertex is lab equipment (managed hardware), MLflow is the lab notebook (every experiment documented), Kubeflow is the equipment schedule (scheduling), and spot instances are hourly equipment rental instead of buying (cost efficiency)."},
answer:"Cloud tools for AI training management include managed ML platforms like SageMaker, Vertex AI, and Azure ML that auto-provision GPU instances, handle data loading, execute training, save models, and terminate resources automatically. Experiment tracking with MLflow logs every hyperparameter, metric per epoch, and model artifact for full reproducibility, with Weights & Biases providing collaborative visualization. Distributed training frameworks — PyTorch DDP for multi-GPU, DeepSpeed ZeRO for memory-efficient large model training, and Kubeflow for Kubernetes-native ML pipeline orchestration — manage complex multi-node training jobs. Resource management includes spot instance training with automatic checkpointing for 75% cost savings, queue-based GPU scheduling for fair resource sharing between teams, and budget alerts with automatic job termination to prevent cost overruns.",
keywords:["SageMaker","Vertex AI","MLflow","Weights & Biases","PyTorch DDP","DeepSpeed","Kubeflow","spot training","checkpointing","GPU scheduling","experiment tracking","distributed training"]}

]},

{id:"D",label:"D",color:"#7F77DD",title:"OOP & Programowanie",questions:[

{num:"Q41",original:"How is exception handling implemented in a selected programming language and what are its main mechanisms and best practices?",
lecture:{intro:"Exception handling zarządza błędami runtime'owymi w sposób kontrolowany, zapobiegając crashom i utrzymując stabilność programu. Każdy nowoczesny język implementuje wzorzec try-catch-finally.",
points:[
{title:"Try-Catch-Finally pattern",text:"try: blok z ryzykownym kodem. catch: obsługuje konkretne typy wyjątków. finally: wykonuje cleanup niezależnie od wyniku — zamykanie plików, połączeń, zwalnianie zasobów. Python: try-except-finally. Java/C#: try-catch-finally.",example:"Python: try: f = open('data.txt'); data = f.read() except FileNotFoundError as e: log(f'File missing: {e}') except PermissionError: log('No access') finally: f.close(). Hierarchia: łap specyficzne wyjątki przed ogólnymi."},
{title:"Hierarchia wyjątków i checked vs unchecked",text:"Wyjątki tworzą hierarchię klas. Łapanie klasy bazowej obsługuje wszystkie podtypy. Java unikalna: checked exceptions (must catch or declare) vs unchecked (RuntimeException). Python i C# mają tylko unchecked.",example:"Python: BaseException → Exception → (ValueError, TypeError, IOError...). Java: Throwable → Exception → IOException (checked — musisz obsłużyć) i RuntimeException → NullPointerException (unchecked — nie musisz deklarować)."},
{title:"Best practices",text:"Nie łap generic Exception (ukrywa bugs). Twórz custom exceptions dla domain logic. Nigdy nie połykaj wyjątków cicho (empty catch). Używaj context managers (Python with, C# using, Java try-with-resources) dla automatycznego cleanup.",example:"Python with: with open('file.txt') as f: data = f.read() — plik zamknięty automatycznie nawet przy exception. Java try-with-resources: try (var conn = getConnection()) { ... } — połączenie zamknięte automatycznie. Custom: class InsufficientFundsError(Exception): pass."}
]},
analogy:{pl:"Exception handling to jak siatka bezpieczeństwa pod trapezem w cyrku: try to akrobacja (ryzykowny kod), catch to siatka łapiąca upadek (obsługa błędu), finally to powrót na platformę i uporządkowanie sprzętu (cleanup) — niezależnie czy akrobacja się udała czy nie.",en:"Exception handling is like a safety net under a trapeze: try is the acrobatics (risky code), catch is the net catching falls (error handling), finally is returning to the platform and tidying equipment (cleanup) — regardless of whether the act succeeded."},
answer:"Exception handling uses the try-catch-finally pattern to manage runtime errors gracefully. The try block contains risky code, catch blocks handle specific exception types in order from most specific to most general, and finally ensures resource cleanup executes regardless of outcome. Languages differ: Java uniquely has checked exceptions requiring explicit handling or declaration in method signatures, while Python and C# use only unchecked exceptions. Best practices include catching specific exceptions rather than generic Exception which hides bugs, creating custom exception classes for domain logic like InsufficientFundsError, never swallowing exceptions with empty catch blocks, and using resource management patterns — Python's with statement, C#'s using, Java's try-with-resources — for automatic cleanup of files, connections, and other resources.",
keywords:["try-catch-finally","exception hierarchy","checked exception","unchecked exception","custom exception","with statement","try-with-resources","context manager","stack trace","cleanup"]},

{num:"Q42",original:"How is exception handling implemented in a chosen programming language, what programming constraints influence its efficiency, and what techniques and best practices help minimize the impact of exceptions on code performance and security?",
lecture:{intro:"Rozszerzenie Q41 o aspekty wydajnościowe i bezpieczeństwa — exceptions mają koszt runtime'owy i mogą ujawniać wrażliwe informacje jeśli nie są obsługiwane poprawnie.",
points:[
{title:"Koszt wydajnościowy exceptions",text:"Rzucanie wyjątku jest 100-1000x wolniejsze niż normalny return. Zero-cost exception model: zero overhead gdy wyjątek NIE występuje, ale drogi unwind gdy występuje. Nigdy nie używaj exceptions do flow control — to anti-pattern.",example:"Java: użycie NumberFormatException w pętli parsowania (try-catch zamiast walidacji) jest 100x wolniejsze niż sprawdzenie inputu regexem lub try-parse. Zasada: exceptions dla sytuacji wyjątkowych, nie dla normalnego flow."},
{title:"Bezpieczeństwo — nie ujawniaj internals",text:"Stack traces i exception messages mogą ujawnić: ścieżki plików, schematy bazy danych, wewnętrzną architekturę. NIGDY nie eksponuj raw exception details do end userów. Loguj pełne details server-side, zwracaj generic message do usera.",example:"ZŁE: API zwraca 'SqlException: Invalid column password_hash in table dbo.Users at UserController.cs:42' — atakujący zna schemat DB, nazwy tabel i strukturę kodu. DOBRE: API zwraca 'Internal server error' + correlation ID. Pełny stack trace w server-side logs."},
{title:"Efektywne wzorce: Result types i structured logging",text:"Result/Optional types dla expected failures (zamiast exceptions). Exceptions tylko dla truly exceptional cases. Structured logging z exception details, correlation IDs. Centralized error tracking (Sentry, Application Insights).",example:"Rust: Result<T, E> zamiast exceptions — caller MUSI obsłużyć error, nie ma hidden control flow. C# z Sentry: try { ... } catch (Exception ex) { Log.Error(ex, 'Failed for OrderId={OrderId}', orderId); throw; } — structured log + rethrow. Sentry agreguje exceptions i alertuje na spike'i."}
]},
analogy:{pl:"Exceptions to jak alarm przeciwpożarowy: potrzebny w sytuacjach awaryjnych (pożar), ale jeśli włącza się przy każdym gotowaniu (flow control), ludzie go ignorują (performance hit + desensitization). Alarm powinien też mówić strażakom co się pali, NIE gościom restauracji (security — nie ujawniaj details).",en:"Exceptions are like a fire alarm: necessary for emergencies (fire), but if triggered every time you cook (flow control), people ignore it (performance hit). The alarm should tell firefighters what's burning, NOT restaurant guests (security — don't expose details)."},
answer:"Exception handling efficiency depends on implementation approach. Performance: throwing exceptions is 100-1000x slower than normal returns — modern runtimes use zero-cost exception models with no overhead in the happy path but expensive stack unwinding when thrown. Never use exceptions for flow control; use input validation and Result/Optional types for expected failures. Security: never expose raw exception details to users — stack traces can leak file paths, database schemas, and internal architecture to attackers. Return generic error messages with correlation IDs while logging full details server-side. Efficient patterns include Rust's Result<T,E> type forcing explicit error handling, structured logging with context like order IDs for debugging, and centralized error tracking with Sentry or Application Insights for aggregated exception monitoring and spike alerting.",
keywords:["zero-cost exceptions","performance overhead","security leak","stack trace","Result type","Optional","structured logging","Sentry","correlation ID","flow control anti-pattern"]},

{num:"Q43",original:"What are the key differences between a class and an object in object-oriented programming and how do these differences affect the development and use of a code?",
lecture:{intro:"Klasa i obiekt to fundamentalna para pojęć w OOP. Klasa to blueprint/szablon definiujący strukturę i zachowanie. Obiekt to konkretna instancja tej klasy istniejąca w pamięci z konkretnymi danymi.",
points:[
{title:"Klasa — blueprint w compile time",text:"Klasa definiuje pola (atrybuty = stan) i metody (zachowania). Nie zajmuje pamięci na dane instancji. Istnieje jako typ w systemie typów. Ładowana raz do memory (metadata area / method area).",example:"class BankAccount { private decimal balance; public void Deposit(decimal amount) {...} public void Withdraw(decimal amount) {...} } — to opis. Żadne konto jeszcze nie istnieje. Zero pamięci na balance."},
{title:"Obiekt — instancja w runtime",text:"Obiekt to konkretna realizacja klasy alokowana na heap przez konstruktor (new). Każdy obiekt ma własny stan (wartości pól) ale współdzieli metody z innymi obiektami tej samej klasy. Garbage collector zarządza lifecycle.",example:"BankAccount acc1 = new BankAccount(1000); BankAccount acc2 = new BankAccount(5000); — dwa obiekty, ten sam typ, różny stan. acc1.balance = 1000, acc2.balance = 5000. Obie współdzielą te same metody Deposit/Withdraw."},
{title:"Wpływ na development",text:"Separacja class/object umożliwia: enkapsulację (stan ukryty w obiekcie), polimorfizm (różne klasy za wspólnym interfejsem), reużywalność (jedna klasa → miliony obiektów). Static members należą do klasy, nie do instancji.",example:"Klasa BankAccount zdefiniowana raz — bank tworzy miliony obiektów (kont) dla każdego klienta. Każdy obiekt ma izolowany balance i historię transakcji, ale identyczną logikę biznesową. Static: BankAccount.InterestRate = 0.05 — wspólne dla wszystkich kont."}
]},
analogy:{pl:"Klasa to przepis na ciasto — opisuje składniki i kroki, nie waży nic, nie można go zjeść. Obiekt to konkretne upieczone ciasto — zajmuje miejsce, ma konkretny smak, możesz je zjeść. Z jednego przepisu upieczesz tysiąc ciast — z jednej klasy stworzysz milion obiektów.",en:"A class is a cake recipe — describes ingredients and steps, weighs nothing, you can't eat it. An object is an actual baked cake — takes up space, has a specific taste, you can eat it. One recipe bakes a thousand cakes — one class creates a million objects."},
answer:"A class is a blueprint defining structure through fields representing state and methods representing behavior — it exists at compile time as a type definition without allocating memory for instance data. An object is a concrete instance of a class allocated on the heap at runtime via the constructor, with specific values for each field and its own isolated state. This distinction enables core OOP principles: encapsulation by bundling state with behavior inside each instance, reusability through creating millions of objects from one class definition, and polymorphism by treating different class instances through a common interface. Static members belong to the class itself shared across all instances, while instance members are unique per object. Understanding this enables proper use of design patterns, memory management, and object lifecycle in production applications.",
keywords:["class","object","instance","blueprint","heap allocation","constructor","static member","instance member","encapsulation","polymorphism","garbage collector"]},

{num:"Q44",original:"What are the key differences between a class and an object in object-oriented programming across different programming languages, and how does the specificity of a given language affect their definition, creation, and usage in code?",
lecture:{intro:"Koncept class/object jest uniwersalny, ale języki implementują go różnie — od strict typing do prototypal inheritance — wpływając na workflow developera i architekturę kodu.",
points:[
{title:"Java/C# — klasyczne OOP ze strict typing",text:"Ścisły system typów z explicit deklaracjami. Klasy definiują typy. Single inheritance klas + multiple inheritance interfejsów. Wszystko dziedziczy z Object. Compile-time type checking catches errors before runtime.",example:"Java: public class Dog extends Animal implements Serializable, Comparable<Dog> { ... } — jawna hierarchia, sprawdzana w compile time. new Dog() tworzy instancję. Garbage collector zarządza lifecycle. Nie możesz dziedziczyć z dwóch klas."},
{title:"Python — dynamic OOP z duck typing",text:"Dynamic typing: 'jeśli kwacze jak kaczka, to jest kaczką'. Klasy to first-class objects (możesz je przypisywać do zmiennych). Multiple inheritance z MRO (C3 linearization). Brak enforced access modifiers — konwencja _private.",example:"Python: class Dog(Animal, Serializable): — multiple inheritance. dog = Dog() — no 'new' keyword. type(Dog) returns <class 'type'> — klasy same są obiektami! _name = convention for private. __name = name mangling (nadal dostępne jako _Dog__name)."},
{title:"JavaScript/Rust/Go — alternatywne modele",text:"JS: prototype-based — obiekty dziedziczą bezpośrednio od obiektów (ES6 class to syntactic sugar). Rust: structs + traits (brak klas i dziedziczenia). Go: structs + interfaces (brak klas, composition over inheritance).",example:"JS: class Dog extends Animal {} — wygląda class-based, ale pod spodem to prototype chain. Rust: struct Dog { name: String } impl Animal for Dog { fn speak(&self) { } } — zero klas, zero inheritance, traits = polimorfizm. Go: type Dog struct { name string } — interfaces satisfied implicitly."}
]},
analogy:{pl:"Języki OOP to jak różne systemy prawne: Java/C# to prawo kodeksowe (ścisłe typy, jawna hierarchia, egzekwowane reguły), Python to prawo zwyczajowe (elastyczne, oparte na konwencji i zaufaniu), JavaScript to prawo precedensowe (prototypy — dziedziczysz po konkretnych przykładach), Rust/Go to nowoczesna konstytucja (composition zamiast inheritance).",en:"OOP languages are like legal systems: Java/C# is civil law (strict types, explicit hierarchy, enforced rules), Python is common law (flexible, convention-based trust), JavaScript is case law (prototypes — inheriting from specific precedents), Rust/Go is a modern constitution (composition over inheritance)."},
answer:"Languages implement the class-object concept differently. Java and C# use classic OOP with strict compile-time typing, explicit class hierarchies, single class inheritance, and multiple interface inheritance — everything inherits from Object. Python uses dynamic typing with duck typing and multiple inheritance resolved via C3 linearization MRO, where classes themselves are first-class objects. JavaScript uses prototypal inheritance where objects inherit directly from other objects — ES6 class syntax is syntactic sugar over the prototype chain. Rust and Go take non-traditional approaches: Rust uses structs with traits for polymorphism without classes or inheritance, Go uses structs with implicitly-satisfied interfaces favoring composition. These differences affect developer workflow: Java catches type errors at compile time, Python enables rapid prototyping, and Rust provides zero-cost abstractions with compile-time memory safety.",
keywords:["class-based","prototype-based","duck typing","MRO","C3 linearization","trait","struct","dynamic typing","static typing","multiple inheritance","composition"]},

{num:"Q45",original:"What is encapsulation in object-oriented programming? What are its main advantages and why is it significant to develop a solid and secure code?",
lecture:{intro:"Enkapsulacja to filar OOP polegający na ukrywaniu wewnętrznego stanu obiektu i kontrolowaniu dostępu wyłącznie przez publiczne metody. To nie tylko konwencja — to mechanizm bezpieczeństwa i utrzymywalności.",
points:[
{title:"Ukrywanie stanu — private fields + public methods",text:"Pola oznaczone private niedostępne bezpośrednio z zewnątrz. Dostęp przez gettery/settery z walidacją. Zewnętrzny kod nie może ustawić obiektu w nieprawidłowy stan — klasa sama pilnuje swoich invariantów.",example:"Bez enkapsulacji: account.balance = -1000000 — bezpośrednia modyfikacja, brak walidacji, stan nieprawidłowy. Z enkapsulacją: account.Withdraw(1000000) → metoda sprawdza saldo, loguje transakcję, rzuca InsufficientFundsException jeśli brak środków."},
{title:"Stabilność API mimo zmian wewnętrznych",text:"Zewnętrzny kod zależy od publicznego API (metod). Wewnętrzna implementacja może się zmienić bez breaking change — dopóki publiczne metody zachowują kontrakt. Loose coupling między komponentami.",example:"BankAccount wewnętrznie zmienia przechowywanie balance z double na BigDecimal (precyzja finansowa). Publiczne API: Deposit(), Withdraw(), GetBalance() — bez zmian. Żaden kod zewnętrzny nie musi się zmieniać. Refactoring bez ryzyka."},
{title:"Bezpieczeństwo kodu",text:"Bez enkapsulacji atakujący z dostępem do kodu może manipulować stanem bezpośrednio. Enkapsulacja wymusza przejście przez walidację i autoryzację w każdej modyfikacji stanu.",example:"Bez enkapsulacji: user.role = 'admin' — jednolinijkowa eskalacja uprawnień. Z enkapsulacją: user.SetRole('admin') → metoda weryfikuje: czy caller ma uprawnienia do zmiany roli? czy 'admin' to valid role? loguje zmianę do audit trail. Brak shortcutów."}
]},
analogy:{pl:"Enkapsulacja to jak bankomat: nie widzisz mechanizmów wewnętrznych (ukryty stan), możesz tylko korzystać z dozwolonych operacji (publiczne metody: wypłata, sprawdzenie salda). Próba bezpośredniego dostępu do sejfu z gotówką bez interfejsu = alarm (brak dostępu do private). A bankomat sam sprawdza czy masz środki (walidacja).",en:"Encapsulation is like an ATM: you don't see internal mechanisms (hidden state), you can only use permitted operations (public methods: withdraw, check balance). Trying to access the cash vault directly = alarm (no access to private). And the ATM checks whether you have funds (validation)."},
answer:"Encapsulation hides an object's internal state by marking fields private and controlling access exclusively through public methods with validation logic. This provides data integrity — setters validate input before modifying state, making it impossible for external code to put an object in an invalid state like a negative bank balance. It ensures API stability — internal implementation can change freely without breaking external consumers, since they depend only on the public method contracts. It enhances security — every state modification goes through controlled methods that can enforce authorization checks, preventing privilege escalation where attackers might directly assign elevated roles. The combination creates robust, maintainable code where each class is responsible for enforcing its own invariants, reducing bugs and security vulnerabilities across the entire codebase.",
keywords:["encapsulation","private","public","getter","setter","data integrity","API stability","information hiding","invariant","access control","loose coupling"]},

{num:"Q46",original:"What is the significance of polymorphism in object-oriented programming and what are the examples of its practical application in various programming languages?",
lecture:{intro:"Polimorfizm ('wiele form') to zdolność obiektów różnych klas do bycia traktowanymi przez wspólny interfejs. Umożliwia pisanie kodu otwartego na rozszerzenie, zamkniętego na modyfikację (Open/Closed Principle).",
points:[
{title:"Runtime polymorphism — dynamic dispatch",text:"Metoda wywoływana na referencji klasy bazowej uruchamia implementację klasy pochodnej. Decyzja o tym KTÓRA implementacja — podejmowana w runtime na podstawie faktycznego typu obiektu, nie typu referencji. Virtual method table (vtable) pod spodem.",example:"Shape shape = new Circle(5); shape.Area() → wywołuje Circle.Area() = π×25, NIE Shape.Area(). Dodanie Triangle nie wymaga zmiany kodu używającego Shape. Java: wszystkie metody virtual by default. C#: wymaga virtual/override keywords."},
{title:"Interface polymorphism — kontrakty",text:"Interface definiuje kontrakt (zestaw metod). Wiele niezwiązanych klas implementuje ten sam interface. Kod zależy od interfejsu — nie zna concrete class. Fundament Dependency Injection i testability.",example:"interface Payable { void ProcessPayment(decimal amount); }. Implementacje: CreditCard, BankTransfer, Crypto, ApplePay. Kod checkout: void Checkout(Payable method, decimal total) { method.ProcessPayment(total); } — działa z każdą metodą płatności bez zmian. Nowa metoda = nowa klasa, zero zmian w checkout."},
{title:"Compile-time polymorphism i praktyczne zastosowania",text:"Method overloading (ta sama nazwa, różne parametry) i generics (List<T>) rozwiązywane w compile time. Praktyka: Strategy pattern, plugin architectures, dependency injection, mock objects w testach.",example:"Strategy pattern: interface SortStrategy { void Sort(List data); }. QuickSort, MergeSort, TimSort — każda implementuje interfejs. Sorting context używa SortStrategy — podmiana algorytmu bez zmiany kodu. W testach: MockPaymentProcessor implementuje Payable — testuj checkout bez realnych płatności."}
]},
analogy:{pl:"Polimorfizm to jak pilot telewizora: pilot (kod) wysyła sygnał 'włącz'. Samsung reaguje inaczej niż LG i Sony — ale pilot nie musi wiedzieć który producent. Każdy TV implementuje 'interfejs zdalnego sterowania' po swojemu. Dodanie nowej marki TV nie wymaga nowego pilota.",en:"Polymorphism is like a TV remote: the remote (code) sends 'turn on'. Samsung responds differently than LG or Sony — but the remote doesn't need to know the manufacturer. Each TV implements the 'remote control interface' in its own way. Adding a new TV brand doesn't require a new remote."},
answer:"Polymorphism allows objects of different classes to be treated through a common interface, enabling flexible, extensible code. Runtime polymorphism through method overriding uses dynamic dispatch — a Shape reference invokes Circle.area() or Triangle.area() based on the actual object type at runtime via the virtual method table. This enables the Open/Closed Principle: adding new shape types requires zero modification of existing code. Interface polymorphism is even more powerful: a checkout system using a Payable interface works with CreditCard, BankTransfer, or Cryptocurrency interchangeably — new payment methods are added by implementing the interface without touching checkout logic. Compile-time polymorphism through method overloading and generics provides type-safe code reuse. Practical applications include the Strategy pattern for swappable algorithms, dependency injection for testability, and mock objects enabling isolated unit testing.",
keywords:["polymorphism","dynamic dispatch","virtual method","vtable","interface","Open/Closed Principle","Strategy pattern","mock objects","dependency injection","method overriding","overloading"]},

{num:"Q47",original:"What are the differences in public, private and protected access modifiers in various programming languages? How do these differences affect the way of managing the access to class members?",
lecture:{intro:"Access modifiers kontrolują widoczność członków klasy, wymuszając enkapsulację na poziomie języka. Ich semantyka różni się znacząco między językami — od strict enforcement do convention-based.",
points:[
{title:"Java — 4 poziomy",text:"public: wszędzie. protected: ten sam package + podklasy. default (package-private): tylko ten sam package — unikalny dla Javy. private: tylko ta klasa. Package-private to domyślny level (brak modyfikatora).",example:"Java: private int id; protected String name; public void display(); int count; (package-private). id dostępne tylko wewnątrz klasy. name: podklasy + ten sam package. display(): wszędzie. count: tylko klasy w tym samym package."},
{title:"C# — 5 poziomów z assembly granularity",text:"public, private, protected jak Java. internal: ten sam assembly (DLL). protected internal: assembly OR podklasy. private protected: assembly AND podklasy. Assembly-level granularity to unikalna cecha C#.",example:"C#: internal class Helper { ... } — widoczna tylko w tym DLL. protected internal int Value; — dostępne dla podklas LUB kodu w tym samym assembly. InternalsVisibleTo: expose internal members do test project — testowanie bez public API."},
{title:"Python — konwencja zamiast enforcement",text:"Brak enforced access modifiers. Konwencja: public (bez prefixu), protected (_prefix), private (__prefix → name mangling do _ClassName__field). Deweloperzy ufają sobie nawzajem — 'we are all consenting adults'.",example:"Python: self._internal = 42 (konwencja: protected — 'nie dotykaj z zewnątrz'). self.__secret = 99 (name-mangled do _MyClass__secret — nadal dostępne jeśli znasz mangled name). Zero enforcement — ale łamanie konwencji = code review rejection."}
]},
analogy:{pl:"Access modifiers to jak system kluczy w hotelu: public = lobby (każdy wchodzi), protected = piętra hotelowe (goście i obsługa danego piętra), private = twój pokój (tylko ty), internal = zaplecze (tylko pracownicy hotelu), a Python to hostel — drzwi pokojów mają tabliczkę 'proszę nie wchodzić' ale nie mają zamka.",en:"Access modifiers are like a hotel key system: public = lobby (everyone enters), protected = hotel floors (guests and staff of that floor), private = your room (only you), internal = back-of-house (hotel employees only), and Python is a hostel — room doors have a 'please don't enter' sign but no lock."},
answer:"Access modifiers differ significantly across languages. Java offers four levels: public everywhere, protected in same package plus subclasses, package-private as the default for same-package-only access, and private within the class only. C# adds assembly-level granularity with internal for same-DLL visibility and protected internal for assembly-or-subclass access, plus InternalsVisibleTo for exposing internals to test projects. Python uses convention rather than enforcement: no prefix for public, single underscore for protected by convention, and double underscore triggering name mangling for pseudo-private — but all are technically accessible. These differences affect design: Java and C# enforce encapsulation at compile time catching violations early, while Python trusts developer discipline with code review as enforcement. The key principle across all languages: minimize public API surface, exposing only what external code genuinely needs.",
keywords:["public","private","protected","internal","package-private","name mangling","access modifier","encapsulation","InternalsVisibleTo","assembly","convention"]},

{num:"Q48",original:"Explain the notions of a class and an object. Defining a class, creating and deleting objects in a selected programming language.",
lecture:{intro:"Pytanie koncentruje się na praktycznej składni i lifecycle obiektów — od definicji klasy przez konstrukcję po destrukcję/garbage collection w konkretnym języku.",
points:[
