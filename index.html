keywords:["Firebase Auth","JWT","social login","MFA","custom claims","Admin SDK","Security Rules","ID token","anonymous auth","cross-platform","OAuth","phone auth"]},

{num:"S2-11",original:"How do you perform unit testing in both Java (JUnit) and .NET (xUnit/NUnit) for web and mobile applications?",
lecture:{intro:"Unit testing weryfikuje poszczególne komponenty w izolacji — najszybszy i najtańszy sposób znajdowania bugów. Oba ekosystemy mają dojrzałe frameworki z podobnymi konceptami ale różną składnią.",
points:[
{title:"JUnit 5 (Java)",text:"@Test oznacza test method. @BeforeEach/@AfterEach: setup/teardown per test. @BeforeAll/@AfterAll: per klasa. Assertions: assertEquals, assertTrue, assertThrows. @ParameterizedTest z @ValueSource/@CsvSource dla data-driven tests.",example:"@Test void shouldCalculateTotal() { Cart cart = new Cart(); cart.add(new Item('Book', 29.99)); cart.add(new Item('Pen', 4.99)); assertEquals(34.98, cart.getTotal(), 0.01); } @ParameterizedTest @ValueSource(ints = {-1, 0, -100}) void shouldRejectNegativeQuantity(int qty) { assertThrows(IllegalArgumentException.class, () -> cart.setQuantity(qty)); }"},
{title:"xUnit / NUnit (.NET)",text:"xUnit: [Fact] simple tests, [Theory] + [InlineData] parameterized. Assert.Equal, Assert.Throws<T>. NUnit: [Test], [TestCase(1,2,3)]. Constructor injection for setup (xUnit) vs [SetUp] method (NUnit). IClassFixture<T> for shared expensive resources.",example:"[Fact] public void ShouldCalculateTotal() { var cart = new Cart(); cart.Add(new Item('Book', 29.99m)); cart.Add(new Item('Pen', 4.99m)); Assert.Equal(34.98m, cart.Total); } [Theory] [InlineData(-1)] [InlineData(0)] public void ShouldRejectInvalidQty(int qty) { Assert.Throws<ArgumentException>(() => cart.SetQuantity(qty)); }"},
{title:"Best practices — AAA pattern i naming",text:"Arrange-Act-Assert: setup → execute → verify. Jeden behavior per test. Descriptive names: Should_[ExpectedBehavior]_When_[Condition]. Fast execution — no DB, no network, no filesystem. Dependencies mocked.",example:"// Arrange var mockRepo = new Mock<IUserRepository>(); mockRepo.Setup(r => r.FindById(1)).Returns(testUser); var service = new UserService(mockRepo.Object); // Act var result = service.GetUser(1); // Assert Assert.Equal('Alice', result.Name); mockRepo.Verify(r => r.FindById(1), Times.Once);"}
]},
analogy:{pl:"Unit test to jak kontrola jakości jednego elementu na linii produkcyjnej: sprawdzasz czy śrubka (jednostka kodu) spełnia specyfikację zanim trafi do maszyny (systemu). Mock to plastikowa atrapa reszty maszyny — testujesz śrubkę w izolacji. Parameterized test to sprawdzanie tej samej śrubki z 10 różnymi wymiarami za jednym razem.",en:"A unit test is like quality-checking one part on a production line: verify the screw (code unit) meets spec before it enters the machine (system). A mock is a plastic dummy of the rest of the machine — test the screw in isolation. Parameterized test is checking the same screw with 10 different dimensions at once."},
answer:"Unit testing in Java uses JUnit 5 with @Test annotations for test methods, assertEquals and assertThrows for assertions, @BeforeEach for per-test setup, and @ParameterizedTest with @ValueSource or @CsvSource for data-driven testing. In .NET, xUnit uses [Fact] for simple tests and [Theory] with [InlineData] for parameterized tests, with constructor injection for setup. NUnit uses [Test] and [TestCase] attributes with [SetUp] methods. Both ecosystems follow the AAA pattern — Arrange test data and mocks, Act by calling the method under test, Assert expected outcomes. Best practices include testing one behavior per test, using descriptive names like ShouldRejectNegativeQuantity, keeping tests fast with no I/O dependencies, and mocking external dependencies with Mockito or Moq to ensure true isolation.",
keywords:["JUnit","xUnit","NUnit","@Test","[Fact]","[Theory]","AAA pattern","parameterized test","assertEquals","Assert.Equal","assertThrows","@BeforeEach","isolation"]},

{num:"S2-12",original:"Compare the use of mocking frameworks in Java (Mockito) and .NET (Moq) for testing APIs in web and mobile applications.",
lecture:{intro:"Mocking frameworks tworzą fake objects symulujące realne zależności — umożliwiając testowanie komponentów w pełnej izolacji bez baz danych, API zewnętrznych czy file system.",
points:[
{title:"Mockito (Java) — tworzenie i stubbing",text:"mock() tworzy fake object. when().thenReturn() definiuje zachowanie stubu. verify() sprawdza czy interakcja miała miejsce. @Mock + @InjectMocks dla field injection. ArgumentCaptor przechwytuje argumenty dla assertions.",example:"@Mock UserRepository repo; @Mock EmailService email; @InjectMocks UserService service; @Test void shouldNotifyOnRegistration() { when(repo.save(any())).thenReturn(savedUser); service.register(newUser); verify(email).sendWelcome(argCaptor.capture()); assertEquals('alice@test.com', argCaptor.getValue().getEmail()); }"},
{title:"Moq (.NET) — Setup i Verify",text:"Mock<T> tworzy fake. Setup().Returns() definiuje zachowanie. Verify() sprawdza interakcje. It.IsAny<T>() dla argument matchers. CallBase = true dla partial mocks. Sequence support dla ordered verification.",example:"var repoMock = new Mock<IUserRepository>(); var emailMock = new Mock<IEmailService>(); repoMock.Setup(r => r.Save(It.IsAny<User>())).Returns(savedUser); var service = new UserService(repoMock.Object, emailMock.Object); service.Register(newUser); emailMock.Verify(e => e.SendWelcome(It.Is<User>(u => u.Email == 'alice@test.com')), Times.Once);"},
{title:"Zaawansowane wzorce i API testing",text:"Stub: dostarcz canned response (when/Setup). Mock: weryfikuj interakcje (verify/Verify). Spy: wrap real object, override selectively. API testing: mock HttpClient dla testowania integracji z zewnętrznymi API bez ich wywoływania.",example:"Testowanie serwisu wywołującego zewnętrzne payment API: mock HttpClient zwraca predefined JSON responses. Testujesz wszystkie scenariusze: success, timeout, 500 error, invalid response — bez single realnego API call. Mockito: when(httpClient.send(any())).thenReturn(mockResponse(200, '{\"status\":\"ok\"}'))."}
]},
analogy:{pl:"Mock to jak dublet kaskaderski w filmie: wygląda jak prawdziwy aktor (implementuje ten sam interfejs), robi dokładnie to co mu każesz w scenariuszu (stub — Setup/when), i reżyser sprawdza czy wykonał scenę poprawnie (verify). Spy to aktor grający siebie ale z podmienionym jednym dialogiem.",en:"A mock is like a stunt double in a movie: looks like the real actor (implements same interface), does exactly what the script says (stub — Setup/when), and the director checks the stunt was performed correctly (verify). A spy is the real actor playing themselves but with one line replaced."},
answer:"Mockito and Moq serve identical purposes with similar APIs. Mockito creates mocks with mock() or @Mock annotation, stubs behavior with when().thenReturn(), and verifies interactions with verify() — @InjectMocks automatically wires mocks into the test subject. Moq creates mocks with Mock<T>, stubs with Setup().Returns(), and verifies with Verify() — using .Object to extract the mock instance for injection. Both support argument matchers — any() and It.IsAny<T>() — for flexible expectations, and argument captors for detailed assertion on passed values. For API testing, both mock HttpClient to simulate external API responses — testing success, timeout, error, and invalid response scenarios without real network calls. Advanced patterns include partial mocks through spies for wrapping real objects with selective overrides, and ordered verification for testing interaction sequences.",
keywords:["Mockito","Moq","mock","stub","spy","verify","when","Setup","argument matcher","ArgumentCaptor","It.IsAny","partial mock","HttpClient mock"]},

{num:"S2-13",original:"Explain how design patterns like Singleton and Factory can be applied in Android (Java/Kotlin) and .NET mobile development (Xamarin/MAUI).",
lecture:{intro:"Design patterns rozwiązują powtarzalne problemy. Singleton gwarantuje jedną instancję; Factory enkapsuluje tworzenie obiektów. Oba szeroko stosowane w mobile development ze specyficznymi adaptacjami.",
points:[
{title:"Singleton Pattern",text:"Gwarantuje jedną instancję klasy w całej aplikacji. Thread-safe implementacja konieczna (wiele wątków w mobile). Zastosowania: database helper, shared preferences, network client, analytics tracker.",example:"Kotlin: object DatabaseHelper : SQLiteOpenHelper(...) { ... } — keyword 'object' tworzy thread-safe Singleton automatycznie. Jedna instancja, lazy initialization, thread-safe. C# MAUI: private static readonly Lazy<Database> _instance = new(() => new Database()); public static Database Instance => _instance.Value; — Lazy<T> = thread-safe + lazy."},
{title:"Factory Pattern",text:"Enkapsuluje logikę tworzenia obiektów. Client request'uje obiekt bez znajomości szczegółów tworzenia. Umożliwia platform-specific implementacje za wspólnym interfejsem. Abstract Factory: rodziny powiązanych obiektów.",example:"MAUI: interface INotificationService { void Show(string msg); }. Factory: public static INotificationService Create() => DeviceInfo.Platform == DevicePlatform.Android ? new AndroidNotificationService() : new iOSNotificationService(); — platform detection ukryta w factory, business logic nie wie na jakiej platformie działa."},
{title:"Modern alternative: DI Container",text:"Singleton i Factory mają wady: hidden dependencies, trudność testowania (Singleton), growing complexity (Factory). DI container (Hilt w Android, MAUI built-in DI) to modern alternative łącząca zalety obu bez wad.",example:"Android Hilt: @Singleton @Provides fun provideDatabase(@ApplicationContext ctx: Context): AppDatabase = Room.databaseBuilder(ctx, AppDatabase::class.java, 'app.db').build() — Singleton lifetime managed by DI, mockable w testach. MAUI: builder.Services.AddSingleton<IDatabase, SqliteDatabase>(); — ten sam efekt co manual Singleton ale testowalne i wymienne."}
]},
analogy:{pl:"Singleton to jak prezydent kraju — jeden w danym momencie, wszyscy się do niego odwołują, decyzje globalne. Factory to jak dealership samochodowy — mówisz 'chcę SUV-a' i dostajesz gotowy samochód bez wiedzenia jak zbudowany (Android vs iOS implementation). DI container to jak agencja rekrutacyjna — łączy potrzeby (interfejsy) z kandydatami (implementacje) automatycznie.",en:"Singleton is like a country's president — one at a time, everyone references them, global decisions. Factory is like a car dealership — you say 'I want an SUV' and get a car without knowing how it was built (Android vs iOS). DI container is like a recruitment agency — matches needs (interfaces) with candidates (implementations) automatically."},
answer:"Singleton ensures a single instance application-wide — Kotlin's object keyword creates thread-safe singletons automatically for database helpers and network clients, while C# MAUI uses Lazy<T> for thread-safe lazy initialization. Factory pattern encapsulates object creation logic — particularly valuable in cross-platform mobile development where platform-specific implementations of notifications, camera access, or file storage are created behind common interfaces, hiding platform detection from business logic. However, modern best practice prefers DI containers over manual Singleton and Factory implementations: Android's Hilt and MAUI's built-in DI provide Singleton lifetime management through AddSingleton<IService, Implementation>() — achieving the same single-instance guarantee while maintaining testability through mock injection and loose coupling through interface contracts.",
keywords:["Singleton","Factory","object keyword","Lazy<T>","Hilt","DI container","AddSingleton","thread-safe","platform-specific","design pattern","MAUI","Room"]},

{num:"S2-14",original:"Discuss how functional programming paradigms (e.g., higher-order functions, immutability) are applied in Java (Streams, Lambdas) and .NET (LINQ, Delegates).",
lecture:{intro:"Functional programming — pure functions, immutability, higher-order functions — jest coraz głębiej zintegrowane z językami OOP. Java Streams i C# LINQ to flagowe przykłady FP w mainstreamowych językach.",
points:[
{title:"Higher-Order Functions i Lambda Expressions",text:"Funkcje przyjmujące lub zwracające inne funkcje. Java: lambda expressions z Stream API (filter, map, reduce). C#: delegates, lambda expressions z LINQ (Where, Select, Aggregate). Deklaratywny styl zamiast imperatywnego.",example:"Java: users.stream().filter(u -> u.getAge() > 18).map(User::getName).sorted().collect(toList()). C#: users.Where(u => u.Age > 18).Select(u => u.Name).OrderBy(n => n).ToList(). Identyczna logika, prawie identyczna składnia — deklaratywny pipeline zamiast pętli for z if-ami."},
{title:"Immutability — eliminacja bugów shared state",text:"Dane które nie mogą być zmienione po utworzeniu. Java records (Java 16+): immutable by default z auto-generated equals/hashCode/toString. C# records: identycznie. Eliminuje race conditions w multithreaded code bez synchronizacji.",example:"Java: record User(String name, int age) {} — immutable. User updated = new User('Alice', user.age() + 1); — tworzysz NOWY obiekt zamiast mutować istniejący. Thread A i Thread B mogą bezpiecznie czytać tego samego User — nikt go nie zmieni. C#: record User(string Name, int Age); var updated = user with { Age = user.Age + 1 };"},
{title:"Pattern Matching i lazy evaluation",text:"Java sealed classes + switch expressions: type-safe exhaustive matching. C# pattern matching w switch: complex conditional logic. Oba: lazy evaluation w streams/LINQ — operacje wykonywane dopiero przy terminal operation (collect/ToList).",example:"C#: var description = shape switch { Circle c => $'Circle r={c.R}', Rectangle r => $'Rect {r.W}x{r.H}', _ => 'Unknown' }; — exhaustive, type-safe. Lazy: users.Where(u => u.Active).Take(10) — filtrowanie i take RAZEM, nie filtruj WSZYSTKICH potem weź 10. Efektywne na milionowych kolekcjach."}
]},
analogy:{pl:"FP w Java/C# to jak przepis kulinarny: Stream/LINQ to 'weź składniki → umyj (filter) → pokrój (map) → ugotuj (reduce)' — deklaratywny pipeline. Immutability to 'nie zmieniaj oryginalnego przepisu — zrób kopię z modyfikacjami'. Lazy evaluation to 'nie przygotowuj 100 porcji od razu — gotuj na zamówienie'.",en:"FP in Java/C# is like a cooking recipe: Stream/LINQ is 'take ingredients → wash (filter) → chop (map) → cook (reduce)' — a declarative pipeline. Immutability is 'don't modify the original recipe — make a copy with changes'. Lazy evaluation is 'don't prepare 100 portions upfront — cook to order'."},
answer:"Functional programming in Java and .NET provides powerful data processing and safety features. Higher-order functions through Java's Stream API with lambdas — stream().filter().map().collect() — and C#'s LINQ with delegates — Where().Select().ToList() — enable declarative data transformation pipelines replacing imperative loops with readable chains. Immutability through Java records and C# records creates data types that cannot be modified after creation, eliminating entire categories of concurrency bugs since immutable objects are inherently thread-safe without synchronization. Pattern matching — Java's sealed classes with switch expressions and C#'s switch patterns — provides type-safe exhaustive conditional logic. Lazy evaluation in both streams and LINQ defers execution until terminal operations, enabling efficient processing of large collections by composing operations without materializing intermediate results.",
keywords:["lambda","Stream API","LINQ","higher-order function","immutability","record","pattern matching","lazy evaluation","functional programming","delegate","sealed class","pipeline"]},

{num:"S2-16",original:"How does Spring Boot (Java) and ASP.NET Core implement dependency inversion to achieve modular software design?",
lecture:{intro:"Dependency Inversion Principle (DIP): moduły high-level nie powinny zależeć od modułów low-level — oba powinny zależeć od abstrakcji. Spring i ASP.NET Core implementują to przez IoC containers.",
points:[
{title:"DIP w Spring Boot",text:"@Component classes auto-registered w container. @Autowired wstrzykuje by interface type. Spring resolve'uje concrete implementation w runtime. @Profile beans dla environment-specific implementacji. @Qualifier gdy wiele implementacji jednego interfejsu.",example:"interface OrderRepository { Order findById(int id); } @Repository class JpaOrderRepository implements OrderRepository { ... } @Repository @Profile('test') class InMemoryOrderRepository implements OrderRepository { ... } @Service class OrderService { @Autowired OrderService(OrderRepository repo) {} } — Spring auto-wires JPA w produkcji, InMemory w testach."},
{title:"DIP w ASP.NET Core",text:"Explicit registration interface→implementation w Program.cs. Trzy lifetimes: Transient, Scoped, Singleton. Constructor injection resolve'owany automatycznie. IServiceProvider dla dynamic resolution.",example:"// Registration builder.Services.AddScoped<IOrderRepository, EfOrderRepository>(); builder.Services.AddScoped<IEmailService, SmtpEmailService>(); // Usage — DI auto-resolves class OrderController { OrderController(IOrderRepository repo, IEmailService email) { } } // Test override services.AddScoped<IOrderRepository, InMemoryOrderRepository>();"},
{title:"Clean Architecture i moduły",text:"Domain layer: definiuje interfejsy (abstrakcje). Infrastructure layer: implementuje je (concrete classes). Presentation layer: konsumuje through DI. Zależności wskazują DO WEWNĄTRZ — domain ma zero external dependencies. Modułowość: każdy moduł wymienialny niezależnie.",example:"Domain: interface IUserRepository { User Find(int id); }. Infrastructure: class PostgresUserRepository : IUserRepository { ... }. API: class UserController { UserController(IUserRepository repo) {} }. Domain nie wie o PostgreSQL. Zmiana na MongoDB = nowa klasa w Infrastructure, zero zmian w Domain i API."}
]},
analogy:{pl:"DIP to jak kontrakt z firmą kurierską: twój sklep (high-level) nie zależy od konkretnego kuriera (low-level), tylko od umowy dostawy (interfejs). Zmiana kuriera z DPD na InPost? Podpisujesz nową umowę (rejestracja w DI), sklep działa identycznie (zero zmian w kodzie). W testach 'dostarczasz' sam na rowerze (mock).",en:"DIP is like a delivery contract: your store (high-level) doesn't depend on a specific courier (low-level), just on the delivery agreement (interface). Switching from FedEx to UPS? Sign a new contract (DI registration), the store works identically (zero code changes). In tests, you 'deliver' by bicycle yourself (mock)."},
answer:"Both frameworks implement Dependency Inversion through IoC containers that resolve abstractions to concrete implementations. Spring Boot uses annotation-based auto-discovery — @Service and @Repository classes are found automatically, @Autowired injects by interface type, and @Profile enables environment-specific implementations without code changes. ASP.NET Core uses explicit registration in Program.cs with AddTransient, AddScoped, and AddSingleton lifetimes, with constructor injection automatically resolving entire dependency graphs. Both enable Clean Architecture: the Domain layer defines interfaces with zero external dependencies, Infrastructure implements them with specific technologies, and DI wires everything together — switching from PostgreSQL to MongoDB requires only a new implementation class and one registration line change, with zero modifications to domain logic or API controllers.",
keywords:["Dependency Inversion","DIP","IoC","Clean Architecture","@Autowired","AddScoped","@Profile","interface","abstraction","domain layer","infrastructure layer","modular"]},

{num:"S2-17",original:"Explain how functional programming concepts (e.g., pure functions, immutability) can be used in embedded systems programming for improved reliability.",
lecture:{intro:"FP w embedded to nie akademicka abstrakcja — pure functions i immutability bezpośrednio poprawiają niezawodność systemów gdzie debugowanie jest trudne, a awaria może być katastrofalna.",
points:[
{title:"Pure Functions — determinizm i testowalność",text:"Funkcje bez side effects: ten sam input ZAWSZE daje ten sam output. Łatwe do testowania na desktopie bez hardware. Łatwe do formalnej weryfikacji (theorem proving). Kluczowe w safety-critical systems (automotive, medical, aerospace).",example:"Pure: int celsius_to_fahrenheit(int c) { return c * 9 / 5 + 32; } — testowalne anywhere, deterministic. Impure: int read_temperature() { return HAL_ADC_Read(ADC_CHANNEL_1); } — zależy od hardware, untestable offline. Architektura: HAL layer (impure) → Logic layer (PURE — all business rules) → App layer."},
{title:"Immutability — thread safety bez locków",text:"Immutable data eliminuje race conditions w multi-threaded RTOS bez synchronizacji. Brak locków = brak deadlocków = prostsza, niezawodna concurrency. const keyword w C jako partial immutability.",example:"const sensor_reading_t reading = {.temp = 25, .humidity = 60, .timestamp = now()}; — po utworzeniu NIKT nie może zmienić. Bezpiecznie współdzielone między ISR (interrupt service routine) i main loop i RTOS tasks — zero locków, zero race conditions, zero deadlocków."},
{title:"State machines jako pure functions",text:"Embedded systems to często state machines. Modelowanie: pure function (current_state, event) → new_state. Deterministic, testable offline, formally verifiable. Separacja: I/O na granicach, pure logic w środku.",example:"state_t next_state(state_t curr, event_t evt) { if (curr == IDLE && evt == BUTTON_PRESS) return HEATING; if (curr == HEATING && evt == TEMP_REACHED) return READY; ... } — PURE function. Testowalna na desktopie z unit testami: assertEquals(HEATING, next_state(IDLE, BUTTON_PRESS)). 100% coverage możliwe bez hardware."}
]},
analogy:{pl:"FP w embedded to jak laboratorium sterylne: pure functions to eksperymenty w kontrolowanych warunkach (powtarzalne, deterministyczne niezależnie od 'pogody' na zewnątrz). Immutability to zasada 'nie dotykaj próbek po pobraniu' (thread safety). State machine jako pure function to protokół laboratoryjny — jasny, krok po kroku, weryfikowalny.",en:"FP in embedded is like a sterile lab: pure functions are experiments under controlled conditions (repeatable, deterministic regardless of outside 'weather'). Immutability is the rule 'don't touch samples after collection' (thread safety). State machine as pure function is a lab protocol — clear, step by step, verifiable."},
answer:"Functional programming improves embedded systems reliability through three mechanisms. Pure functions with no side effects produce deterministic output for every input — enabling comprehensive testing on desktop without hardware and formal verification for safety-critical automotive, medical, and aerospace systems. The architecture separates pure logic from hardware: HAL layer handles impure I/O, business logic layer is entirely pure and portable. Immutability eliminates race conditions in multi-threaded RTOS environments without synchronization overhead — const data safely shared between interrupt service routines and RTOS tasks with zero locks and zero deadlock risk. State machines modeled as pure functions — taking current state and event, returning new state — are fully deterministic and testable offline with 100% coverage achievable through unit tests, without any hardware dependency.",
keywords:["pure function","immutability","RTOS","thread safety","const","state machine","deterministic","HAL","side effect","formal verification","safety-critical","embedded"]},

{num:"S2-18",original:"Discuss how multithreading is handled in Java (ExecutorService) and .NET (Task Parallel Library) for performance optimization.",
lecture:{intro:"Multithreading umożliwia równoległe wykonanie zadań, wykorzystując wielordzeniowe CPU. Oba platformy dostarczają high-level abstrakcje nad surowym zarządzaniem wątkami — unikając boilerplate'u i typowych bugów.",
points:[
{title:"Java ExecutorService",text:"Thread pool management: FixedThreadPool (stała liczba wątków), CachedThreadPool (dynamic, rośnie wg potrzeb), ScheduledThreadPool (periodic tasks), ForkJoinPool (recursive divide-and-conquer, work stealing). Submit Callable/Runnable → get Future<T> result.",example:"ExecutorService exec = Executors.newFixedThreadPool(8); List<Future<Result>> futures = tasks.stream().map(t -> exec.submit(() -> process(t))).toList(); List<Result> results = futures.stream().map(f -> f.get()).toList(); exec.shutdown(); — 8 wątków przetwarzających listę tasków równolegle. ForkJoinPool: sortowanie merge sort — dziel tablicę rekurencyjnie, każdy pod-task na osobnym wątku."},
{title:".NET Task Parallel Library (TPL)",text:"Task/Task<T> reprezentują async operacje. ThreadPool zarządzany automatycznie. Parallel.For/ForEach dla data parallelism (podziel kolekcję między wątki). PLINQ: AsParallel() na LINQ queries. async/await integracja z TPL.",example:"// Data parallelism Parallel.ForEach(images, img => ProcessImage(img)); // Task-based var tasks = urls.Select(url => Task.Run(() => Download(url))).ToArray(); var results = await Task.WhenAll(tasks); // PLINQ var processed = data.AsParallel().Where(x => x.IsValid()).Select(x => Transform(x)).ToList();"},
{title:"Synchronizacja i concurrent collections",text:"Java: synchronized, ReentrantLock, Semaphore, CountDownLatch, ConcurrentHashMap (lock-free segments). .NET: lock, SemaphoreSlim, Mutex, ConcurrentDictionary, Interlocked (atomic operations). Producer-consumer: BlockingQueue (Java) / Channel<T> (.NET).",example:"Java ConcurrentHashMap: map.compute(key, (k, v) -> v == null ? 1 : v + 1); — atomic read-modify-write bez explicit lock. .NET Channel<T>: producer pisze, consumer czyta — z backpressure (bounded capacity). Channel lepszy niż BlockingCollection bo async-native i zero-allocation w hot path."}
]},
analogy:{pl:"Multithreading to jak restauracja z wieloma kucharzami: ExecutorService/TPL to szef kuchni przydzielający zadania (thread pool manager). Synchronized/lock to kolejka do jednego noża (mutual exclusion). ConcurrentHashMap to tablica zamówień gdzie wielu kelnerów może pisać jednocześnie (lock-free). ForkJoinPool to dzielenie dużego ciasta między kucharzy — każdy kroi swoją część, potem składają razem.",en:"Multithreading is like a restaurant with multiple chefs: ExecutorService/TPL is the head chef assigning tasks (thread pool manager). Synchronized/lock is a queue for one knife (mutual exclusion). ConcurrentHashMap is an order board where multiple waiters write simultaneously (lock-free). ForkJoinPool is splitting a large cake among chefs — each cuts their part, then they assemble."},
answer:"Java's ExecutorService provides thread pool management with FixedThreadPool for predictable concurrency, CachedThreadPool for dynamic scaling, and ForkJoinPool for recursive divide-and-conquer with work-stealing between threads. Tasks submitted as Callable return Future<T> for result retrieval. .NET's Task Parallel Library uses Task<T> with automatic ThreadPool management, Parallel.ForEach for data parallelism distributing collection processing across cores, and PLINQ adding AsParallel() to LINQ queries for transparent parallelization. Both provide thread-safe concurrent collections — ConcurrentHashMap with lock-free segments in Java and ConcurrentDictionary in .NET — and synchronization primitives from basic locks to Semaphores and CountDownLatch/ManualResetEvent. Producer-consumer patterns use BlockingQueue in Java and Channel<T> in .NET with built-in backpressure support. Java 21 adds virtual threads enabling millions of lightweight threads with synchronous-looking code.",
keywords:["ExecutorService","TPL","thread pool","ForkJoinPool","Task","Parallel.ForEach","PLINQ","ConcurrentHashMap","synchronized","lock","Channel<T>","work stealing","virtual threads"]}

]},

{id:"E",label:"E",color:"#BA7517",title:"Algorytmy & Złożoność",questions:[

{num:"Q20",original:"How does the analysis of computational (time and memory) complexity affect the choice of an algorithm for a particular task?",
lecture:{intro:"Analiza złożoności to narzędzie inżynierskie pozwalające PRZEWIDZIEĆ zachowanie algorytmu przy dużych danych ZANIM go zaimplementujesz. Notacja Big-O opisuje wzrost czasu/pamięci jako funkcję rozmiaru wejścia n.",
points:[
{title:"Klasy złożoności czasowej — od O(1) do O(2ⁿ)",text:"O(1) stała: hash table lookup. O(log n) logarytmiczna: binary search. O(n) liniowa: przejście tablicy. O(n log n): merge sort. O(n²) kwadratowa: bubble sort. O(2ⁿ) wykładnicza: brute-force combinatorics. Klasa determinuje SKALOWANIE — O(n²) na 1M elementów to 10¹² operacji = godziny. O(n log n) to 20M operacji = milisekundy.",example:"Sortowanie 1M rekordów: Bubble Sort O(n²) ≈ 10¹² operacji ≈ godziny na nowoczesnym CPU. Merge Sort O(n log n) ≈ 20M operacji ≈ milisekundy. Ten sam problem, ta sama ilość danych — ale algorytm O(n²) jest 50,000x wolniejszy. Przy 10M rekordów różnica rośnie do 500,000x."},
{title:"Złożoność pamięciowa i trade-offy",text:"Niektóre algorytmy wymieniają czas na pamięć: hash table używa O(n) pamięci dla O(1) lookup. In-place sorting oszczędza pamięć ale może być wolniejszy. W embedded/mobile z ograniczoną RAM — space complexity jest krytyczna.",example:"Counting Sort: O(n+k) czas ale O(k) dodatkowej pamięci (k = zakres wartości). Dla k=10 (cyfry 0-9): super-fast i mało pamięci. Dla k=10⁹ (numery telefonów): 4GB RAM na samo counting array — nierealistyczne. Space complexity eliminuje algorytm niezależnie od świetnego czasu."},
{title:"Praktyka: amortized analysis i constant factors",text:"Big-O ignoruje stałe i niższe rzędy. W praktyce O(n log n) z dużymi stałymi może być wolniejszy niż O(n²) dla małych n. Cache behavior, branch prediction, data patterns mają realny wpływ. Timsort: insertion sort O(n²) dla <64 elementów, merge sort O(n log n) dla większych.",example:"Insertion Sort O(n²) bije Merge Sort O(n log n) dla tablic <50 elementów — mniejszy overhead, lepsze cache behavior. Dlatego Timsort (Python/Java default) używa Insertion Sort dla małych pod-tablic. QuickSort: worst-case O(n²) ale average-case O(n log n) — z random pivot worst-case ma prawdopodobieństwo astronomicznie niskie."}
]},
analogy:{pl:"Złożoność obliczeniowa to jak wybór drogi do pracy: O(1) to teleportacja (instant niezależnie od odległości), O(log n) to autostrada (szybka, skaluje się z odległością logarytmicznie), O(n) to zwykła droga (proporcjonalna do odległości), O(n²) to objazd przez każdą wioskę po drodze. Przy małym miasteczku różnica niewielka — przy metropolii fundamentalna.",en:"Complexity is like choosing a route to work: O(1) is teleportation (instant regardless of distance), O(log n) is a highway (fast, scales logarithmically), O(n) is a regular road (proportional to distance), O(n²) is a detour through every village. Small town — small difference. Big city — life or death."},
answer:"Computational complexity analysis directly determines algorithm feasibility for a given problem size. Time complexity in Big-O notation shows how execution time scales with input: O(n²) on a million items requires a trillion operations taking hours, while O(n log n) needs only 20 million operations completing in milliseconds — a 50,000x difference. Space complexity determines memory requirements, with trade-offs like hash tables using O(n) memory for O(1) lookup speed. Practical considerations include that Big-O ignores constant factors — Insertion Sort O(n²) outperforms Merge Sort O(n log n) for arrays under 50 elements due to lower overhead, which is why Timsort uses both. Average-case and amortized analysis often matter more than worst-case: QuickSort's O(n²) worst case essentially never occurs with randomized pivots. The choice depends on input size, memory constraints, data characteristics, and whether worst-case guarantees are required.",
keywords:["Big-O","time complexity","space complexity","O(1)","O(n)","O(n log n)","O(n²)","amortized analysis","Timsort","QuickSort","Merge Sort","cache performance","trade-off"]},

{num:"Q21",original:"What are the most frequent techniques applied for optimisation of algorithms and in what situations are they most efficient?",
lecture:{intro:"Techniki optymalizacji algorytmów redukują złożoność czasową i/lub pamięciową przez sprytny rozkład problemu, wybór struktur danych i wykorzystanie matematycznych właściwości problemu.",
points:[
{title:"Divide and Conquer i Dynamic Programming",text:"D&C: rozbij problem na mniejsze podproblemy, rozwiąż rekurencyjnie, połącz wyniki. Efektywny gdy podproblemy NIE nakładają się. DP: gdy podproblemy SIĘ nakładają — zapamiętaj rozwiązania (memoization/tabulation) żeby nie liczyć tego samego wielokrotnie. DP zamienia exponential w polynomial.",example:"D&C: Merge Sort dzieli tablicę na pół → sortuje każdą → merge'uje. O(n log n) guaranteed. DP: Fibonacci bez DP: O(2ⁿ) — drzewo rekurencji eksploduje. Z memoization: O(n) — każda wartość liczona raz. Knapsack problem: brute force O(2ⁿ), DP O(n×W) gdzie W = pojemność."},
{title:"Greedy Algorithms",text:"W każdym kroku wybierz LOKALNIE optymalną opcję, licząc na globalnie optymalny wynik. Szybki i prosty ale działa TYLKO dla problemów z greedy-choice property i optimal substructure. Nie zawsze daje optimum — ale gdy działa, jest najszybszy.",example:"Huffman coding: greedy łączenie dwóch najrzadszych symboli → optymalny prefix-free code. Dijkstra: greedy wybór najbliższego nieodwiedzonego wierzchołka → najkrótsze ścieżki (działa bo wagi ≥ 0). Zachłanny coin change dla standardowych nominałów (1,5,10,25) → optymalny. Ale dla {1,3,4} kwota 6: greedy daje 4+1+1=3 monety, optimum 3+3=2 monety — greedy fails!"},
{title:"Optymalizacja przez struktury danych",text:"Wybór właściwej struktury danych drastycznie poprawia wydajność. Hash table: O(1) lookup/insert. Balanced BST: O(log n) ordered operations. Heap: O(log n) priority queue. Bloom filter: O(1) membership test z małym false positive rate.",example:"Znajdowanie duplikatów w tablicy: naive nested loop O(n²). Z HashSet: O(n) — insert każdy element, sprawdź czy już istnieje. 1M elementów: O(n²) = 10¹² operacji ≈ godziny. O(n) z HashSet = 10⁶ operacji ≈ milisekundy. Jedna zmiana struktury danych = 1,000,000x speedup."}
]},
analogy:{pl:"Techniki optymalizacji to jak strategie w grze planszowej: Divide & Conquer to rozbijanie dużej bitwy na mniejsze potyczki (łatwiejsze do wygrania). DP to notatnik z wynikami poprzednich ruchów (nie obliczaj tego samego dwa razy). Greedy to branie najlepszego dostępnego ruchu natychmiast (szybko ale nie zawsze wygrywa). Struktury danych to wybór narzędzi — klucz zamiast łomu do otwierania drzwi.",en:"Optimization techniques are like board game strategies: Divide & Conquer splits a big battle into smaller skirmishes. DP is a notebook of previous move results (don't calculate the same thing twice). Greedy takes the best available move immediately (fast but doesn't always win). Data structures are choosing tools — a key instead of a crowbar to open a door."},
answer:"Key optimization techniques include Divide and Conquer — splitting problems into independent subproblems solved recursively, like Merge Sort achieving guaranteed O(n log n). Dynamic Programming handles overlapping subproblems by storing solutions — transforming Fibonacci from O(2ⁿ) to O(n) through memoization, and Knapsack from exponential to O(n×W). Greedy algorithms make locally optimal choices at each step — producing optimal results for problems with the greedy-choice property like Huffman coding and Dijkstra's shortest paths, but failing for problems like certain coin change variants. Data structure optimization often provides the biggest practical speedup: replacing a nested loop O(n²) duplicate search with a HashSet O(n) lookup yields a million-fold improvement on large datasets. The choice depends on problem structure: overlapping subproblems suggest DP, independent subproblems suggest D&C, and greedy-choice property enables greedy algorithms.",
keywords:["Divide and Conquer","Dynamic Programming","Greedy","memoization","tabulation","HashSet","binary search tree","heap","Bloom filter","Huffman","Dijkstra","Knapsack"]},

{num:"Q22",original:"How do time and memory constraints influence the choice between algorithmic optimization and heuristic approaches in solving computational problems?",
lecture:{intro:"Gdy exact algorithms są zbyt wolne lub pamięciożerne, heurystyki dostarczają 'wystarczająco dobre' rozwiązania w praktycznym czasie. Wybór zależy od akceptowalnych trade-offów.",
points:[
{title:"NP-Hard problems i granice exact algorithms",text:"Niektóre problemy (TSP, graph coloring, SAT, bin packing) nie mają znanych polynomial-time exact algorithms. Dla dużych inputów exact solutions są nieosiągalne — nawet najszybszy komputer nie zdąży. Heurystyki to jedyna praktyczna opcja.",example:"Travelling Salesman Problem: exact dla 20 miast = sekundy. 30 miast = godziny. 50 miast = dłużej niż wiek wszechświata. Dla 1000 miast w Amazon delivery routing? Tylko heurystyki. Simulated annealing daje rozwiązanie w 95% optimum w sekundach."},
{title:"Heurystyki — near-optimal w practical time",text:"Genetic algorithms (ewolucja rozwiązań), simulated annealing (losowe perturbacje z malejącą 'temperaturą'), ant colony optimization (symulacja mrówek). Brak gwarancji optymalności ale often within 1-5% of optimal. Streaming algorithms: O(1) space na potencjalnie nieskończonych danych.",example:"HyperLogLog: zliczanie unikalnych elementów w data stream. Exact: O(n) pamięci (przechowuj wszystkie). HyperLogLog: 12KB pamięci → estymacja distinct count miliardów elementów z <1% error. 12KB vs terabajty — heurystyka umożliwia coś co exact algorithm nie może."},
{title:"Hybrid approaches i decision criteria",text:"Łącz exact algorithms dla małych podproblemów z heurystykami dla overall structure. Meta-heurystyki kierują procesem szukania. Decision: wymagana jakość rozwiązania, dostępne zasoby, real-time requirements, rozmiar problemu.",example:"Vehicle routing: heuristic buduje initial solution (nearest neighbor). Large Neighborhood Search: iteracyjnie niszczy i odbudowuje fragmenty rozwiązania używając exact optimization (branch-and-bound na małych podproblemach). Hybrid: 98% optimal w 10 minut vs exact 100% w 10 lat."}
]},
analogy:{pl:"To jak nawigacja GPS: dla krótkiej trasy po mieście — oblicza DOKŁADNIE najszybszą drogę (exact algorithm, małe dane). Dla trasy przez 50 miast Europy? Daje 'dobrą' trasę w sekundę (heurystyka), bo obliczenie idealnej trasy trwałoby dłużej niż sama podróż. Hybrid: exact dla lokalnych odcinków, heurystyka dla ogólnej trasy.",en:"It's like GPS navigation: for a short city route — calculates the EXACT fastest path (exact algorithm, small data). For a 50-city European tour? Gives a 'good' route in a second (heuristic), because computing the perfect one would take longer than the trip itself. Hybrid: exact for local segments, heuristic for overall route."},
answer:"The choice between exact algorithms and heuristics depends on problem complexity, input size, and resource constraints. For NP-hard problems like TSP, exact algorithms become infeasible beyond small inputs — the Travelling Salesman for 50 cities exceeds any computer's practical capacity, while simulated annealing finds 95%-optimal solutions in seconds. Memory constraints also drive the choice: exact distinct counting requires O(n) memory, while HyperLogLog achieves sub-1% error using only 12KB for billions of elements. Hybrid approaches combine both — heuristics for overall structure with exact methods for small decomposed subproblems, achieving 98% optimality in minutes versus exact 100% in impractical timeframes. The decision criteria are: required solution quality, available computational resources, real-time response requirements, and problem scale.",
keywords:["NP-hard","heuristic","genetic algorithm","simulated annealing","TSP","HyperLogLog","streaming algorithm","meta-heuristic","approximation","hybrid approach","Large Neighborhood Search"]},

{num:"Q23",original:"How can algorithmic approaches affect the scalability of an IT system?",
lecture:{intro:"Wybór algorytmu bezpośrednio determinuje jak system skaluje. Źle dobrany algorytm może działać świetnie na 100 użytkownikach ale zawalić się na 100,000 — nawet na najlepszym hardware.",
points:[
{title:"Złożoność a wzrost użytkowników",text:"Gdy rośnie liczba użytkowników, rosną dane. O(n²) staje się bottleneckiem szybciej niż O(n log n). Skalowalne systemy używają algorytmów rosnących sub-liniowo lub liniowo z rozmiarem danych. Hardware scaling NIE kompensuje złego algorytmu.",example:"Search w 1M produktów: linear scan O(n) = 1M porównań per query. Binary search na sorted data O(log n) = 20 porównań. Przy 1 miliardzie produktów: 1B vs 30 porównań. Podwojenie serwerów NIE pomoże z O(n) — dalej będzie 500M porównań per serwer. Zmiana algorytmu: jedyne rozwiązanie."},
{title:"Distributed algorithms i horizontal scaling",text:"Algorytmy muszą być parallelizable dla horizontal scaling. MapReduce: divide data across nodes, process in parallel, aggregate. Consistent hashing: rovnomierny rozkład danych z minimalnym remapping przy dodaniu noda.",example:"Word count na 1TB tekstu: single machine O(n) = godziny. MapReduce na 100 nodach: Map dzieli pracę, Reduce agreguje — minuty. Near-linear speedup. Consistent hashing w distributed cache: dodanie nowego node'a = remapping tylko 1/n kluczy (nie rehash wszystkich) — smooth horizontal scaling."},
{title:"Caching, indexing i load balancing",text:"B-tree index zamienia O(n) table scan na O(log n) lookup. LRU cache daje O(1) dla hot data. Bloom filter: O(1) membership test. Load balancing algorithms (round-robin, least-connections, consistent hashing) determinują jak równomiernie rozkłada się obciążenie.",example:"DB query bez indeksu: skanuje 100M wierszy (sekundy). Z B-tree indeksem: ~25 tree levels (mikrosekundy). + Redis cache: O(1) dla powtórzonych queries. Bloom filter przed DB: 'na pewno nie ma' w O(1) eliminuje 90% zbędnych DB lookups. Łączny efekt: 100,000x szybszy response."}
]},
analogy:{pl:"Algorytmy a skalowalność to jak system obsługi w restauracji: dobry algorytm to efektywny kelner — obsłuży 10 i 100 stolików sprawnie (skaluje się). Zły to kelner który przy 100 stolikach biega w kółko sprawdzając każdy stolik po kolei (O(n) scan zamiast O(1) system przywoławczy). Żaden dodatkowy kelner nie naprawi złego systemu.",en:"Algorithms and scalability are like restaurant service: a good algorithm is an efficient waiter — handles 10 and 100 tables smoothly (scales). A bad one runs in circles checking every table sequentially with 100 tables (O(n) scan instead of O(1) call system). No extra waiters fix a bad system."},
answer:"Algorithm choice fundamentally determines system scalability. As user count grows, data grows — an O(n²) algorithm becomes a bottleneck exponentially faster than O(n log n), and no amount of hardware scaling compensates for algorithmic inefficiency. Binary search on a billion items needs only 30 comparisons versus a billion for linear scan. For horizontal scaling, algorithms must be parallelizable — MapReduce distributes work across nodes for near-linear speedup, while consistent hashing ensures adding nodes remaps only 1/n of keys instead of rehashing everything. Caching and indexing provide multiplicative improvements: B-tree indexes convert O(n) table scans to O(log n) lookups, LRU caches provide O(1) for repeated queries, and Bloom filters eliminate 90% of unnecessary database lookups with O(1) membership testing — combining for 100,000x faster response times.",
keywords:["scalability","Big-O","MapReduce","consistent hashing","B-tree index","LRU cache","Bloom filter","horizontal scaling","parallelization","load balancing"]},

{num:"Q24",original:"What are the consequences of using algorithms with different computational complexities for the scalability of IT systems and their ability to handle a growing number of users?",
lecture:{intro:"Różne złożoności obliczeniowe mają KONKRETNE konsekwencje: degradation patterns, koszty infrastruktury, threshold effects (nagłe załamanie) i real-world case studies skalowania.",
points:[
{title:"Wzorce degradacji i threshold effects",text:"O(n): degradacja liniowa — 2x użytkowników = 2x czas response. O(n²): degradacja kwadratowa — 2x użytkowników = 4x czas. O(log n): prawie niezauważalne — 2x użytkowników = +1 operacja. Threshold effect: system działa OK aż do pewnego punktu — potem nagły cliff zamiast gradual degradation.",example:"API sprawdzające permissions: O(n) scan = 1ms przy 1K users, 1s przy 1M users (linear degradation). O(log n) z balanced tree = 1ms przy 1K, 3ms przy 1M (barely noticeable). O(n²) nested check = 1ms przy 1K, 16 MINUT przy 1M users — system effectively dead."},
{title:"Konsekwencje kosztowe",text:"Nieefektywny algorytm wymaga więcej hardware żeby kompensować — zwiększając cloud bills. O(n²) może wymagać 100 serwerów tam gdzie O(n log n) potrzebuje 2. Różnica kosztowa jest OGROMNA i rośnie z każdym nowym użytkownikiem.",example:"Firma: recommendation engine O(n²) kosztuje $50K/mies w AWS compute przy 1M users. Refactoring do O(n log n) z proper indexing: $5K/mies — ten sam performance. 90% savings. Przy 10M users: $500K vs $8K. Algorytm determinuje czy firma przetrwa scaling."},
{title:"Proactive complexity management",text:"Performance testing z production-scale data ZANIM users dojdą. Complexity auditing w code review — O(n²) w hot path to red flag. Load testing symulujący przyszły wzrost. Chaos engineering identyfikujący bottlenecki.",example:"Netflix chaos engineering: regular load tests symulują 10x aktualny traffic, identyfikując algorytmiczne bottlenecki zanim wpłyną na real users. Code review policy: każdy nested loop w hot path wymaga justification i benchmark. Complexity budget per endpoint: max O(n log n) na hot paths."}
]},
analogy:{pl:"To jak prowadzenie restauracji: przy 10 gościach każdy system obsługi działa. Przy 10,000 widać, czy kuchnia (algorytm) jest wydajna czy chaotyczna. Zły algorytm to kucharz gotujący dania po kolei zamiast równolegle — przy 10 zamówieniach OK, przy 10,000 każdy czeka godzinę. Żadna ilość dodatkowych kucharzy nie pomoże jeśli proces jest sekwencyjny.",en:"It's like running a restaurant: with 10 guests any system works. At 10,000 you see whether the kitchen (algorithm) is efficient or chaotic. A bad algorithm is a chef cooking dishes one by one instead of in parallel — 10 orders is fine, 10,000 means everyone waits an hour. No number of extra chefs helps if the process is sequential."},
answer:"Different algorithmic complexities produce concrete scalability consequences. O(n) algorithms degrade linearly — doubling users doubles response time, predictable and manageable. O(n²) creates threshold effects where systems work fine until a critical user count triggers sudden collapse — doubling users quadruples response time from 1 second to 16 minutes at scale. O(log n) barely notices growth — a billion items needs only 30 operations. Cost implications are massive: an O(n²) recommendation engine costs $50K monthly where O(n log n) costs $5K — and the gap widens exponentially with growth. Proactive management through load testing at 10x current traffic, complexity auditing in code reviews flagging O(n²) in hot paths, and complexity budgets per endpoint prevent scaling surprises. The fundamental insight: algorithmic efficiency cannot be solved by adding hardware — it requires better algorithms.",
keywords:["degradation pattern","threshold effect","cost optimization","complexity audit","load testing","chaos engineering","performance budget","O(n²) bottleneck","code review","scaling cliff"]},

{num:"Q25",original:"What are the key differences between algorithmic and heuristic approaches in solving problems related to IT systems?",
lecture:{intro:"Algorytmy gwarantują poprawny/optymalny wynik przez systematyczną procedurę. Heurystyki poświęcają gwarancje na rzecz praktycznej wykonalności — dając 'wystarczająco dobre' rozwiązania szybko.",
points:[
{title:"Gwarancje poprawności i optymalności",text:"Algorytm (Dijkstra, binary search): GWARANTUJE znalezienie optymalnego/poprawnego wyniku — dowodzone matematycznie. Heurystyka (A*, greedy approximation, genetic): dostarcza DOBRE rozwiązanie bez gwarancji optymalności. Trade-off: pewność vs praktyczność.",example:"Shortest path: Dijkstra gwarantuje najkrótszą ścieżkę (matematyczny dowód). A* heuristic: often znajduje ją szybciej dzięki heurystycznej funkcji kierującej search, ale gwarantuje optimum TYLKO jeśli heurystyka jest admissible (nigdy nie przeszacowuje)."},
{title:"Time-quality trade-off",text:"Exact algorithms mogą wymagać exponential time dla NP-hard problems — nierealistyczne dla dużych inputów. Heurystyki dostarczają acceptable solutions w polynomial time. Approximation ratio: jak daleko od optimum może być heurystyka (np. 11/9 × OPT + 6/9 dla First Fit Decreasing bin packing).",example:"Bin packing: exact (branch and bound) = exponential time. First Fit Decreasing heuristic: O(n log n) czas, rozwiązanie gwarantowane ≤ 11/9 × OPT + 6/9 bins. Dla 1000 items: exact = dni obliczeń. FFD = milisekundy z wynikiem max 22% gorszym niż idealny."},
{title:"Kiedy co stosować — decision matrix",text:"Exact gdy: problem jest polynomial, correctness krytyczna (medycyna, finanse), input mały. Heurystyka gdy: problem NP-hard, approximate solution akceptowalna, real-time response wymagany, data zaszumione/zmieniające się.",example:"Dawkowanie leku: EXACT algorithm — życie zależy od poprawności. Delivery route optimization: heurystyka — trasa 98% optymalna jest w pełni akceptowalna (2% dłuższa = 5 minut więcej na 4h trasie). Robot pathfinding w dynamic environment: heurystyka bo przeszkody się zmieniają szybciej niż exact recomputation."}
]},
analogy:{pl:"Algorytm to GPS obliczający IDEALNĄ trasę matematycznie — trwa chwilę ale masz gwarancję najkrótszej drogi. Heurystyka to doświadczony taksówkarz — nie jedzie najkrótszą drogą zawsze, ale ZAWSZE dojeżdża szybko, nawet w korku (changing conditions), i nie potrzebuje 5 minut na obliczenia przed startem.",en:"An algorithm is GPS calculating the mathematically PERFECT route — takes a moment but guarantees the shortest path. A heuristic is an experienced taxi driver — doesn't always take the shortest road, but ALWAYS arrives quickly, even in traffic (changing conditions), and doesn't need 5 minutes of calculation before starting."},
answer:"Algorithmic approaches guarantee correct or optimal solutions through mathematically proven systematic procedures — Dijkstra provably finds the shortest path, binary search always locates the target element. Heuristic approaches sacrifice these guarantees for practical feasibility — providing good solutions within known approximation bounds in reasonable time. The key trade-off is certainty versus speed: exact algorithms may require exponential time for NP-hard problems, while heuristics like First Fit Decreasing for bin packing run in O(n log n) with solutions guaranteed within 22% of optimal. The choice depends on context: use exact algorithms when correctness is critical like medical dosage calculations or financial transactions, the problem is polynomial complexity, or inputs are small. Use heuristics when problems are NP-hard, approximate solutions are acceptable like delivery route optimization, real-time response is required, or data is dynamic and noisy.",
keywords:["algorithm","heuristic","optimality guarantee","approximation ratio","NP-hard","A*","greedy","Dijkstra","polynomial time","admissible heuristic","exact solution","trade-off"]},

{num:"Q26",original:"In what situations is a heuristic approach more effective than an algorithmic one, considering the dynamic nature of data and the availability of computational resources?",
lecture:{intro:"Heurystyki dominują gdy: przestrzeń rozwiązań jest ogromna, dane się zmieniają szybciej niż exact recomputation, zasoby są ograniczone, lub real-time response jest konieczny — czyli w większości real-world systemów.",
points:[
{title:"Dynamic i streaming data",text:"Gdy dane zmieniają się ciągle, rekalkulacja exact solution jest marnotrawstwem — wynik może być nieaktualny zanim obliczenie się skończy. Online algorithms i incremental updates adaptują się efektywnie do zmian.",example:"Trading: dane rynkowe zmieniają się co milisekundę. Exact portfolio optimization na 10,000 aktywach: minuty obliczeń → nieaktualny w momencie zakończenia. Heurystyczny trading agent: adaptuje pozycję w real-time reagując na zmiany. Latency-sensitive: 1ms heuristic >> 60s exact."},
{title:"Resource-constrained environments",text:"IoT devices, drones, mobile apps: ograniczone CPU i RAM. Exact algorithms mogą być zbyt ciężkie. Heurystyki dostarczają acceptable solutions w tight resource budgets.",example:"Drone navigation z limited onboard compute: RRT* (Rapidly-exploring Random Trees) heuristic path planning — good path w 50ms. Exact A* z pełną mapą: optimal path ale 50 sekund. W powietrzu 50 sekund = zderzenie z przeszkodą. Heuristic 50ms z 95% optimal path = bezpieczny lot."},
{title:"Multi-objective i nieprecyzyjne problemy",text:"Gdy wiele sprzecznych celów i preferencje nie są dokładnie zdefiniowane — heurystyki (evolutionary algorithms) eksplorują Pareto frontier efektywnie. Exact methods wymagałyby precyzyjnej single objective function.",example:"Network design: minimalizuj koszt, latencję I maksymalizuj reliability jednocześnie — 3 sprzeczne cele. NSGA-II (evolutionary algorithm) generuje zestaw Pareto-optymalnych rozwiązań: 'ten design tani ale wolniejszy', 'ten szybki ale droższy'. Decision-maker wybiera trade-off — nie algorytm."}
]},
analogy:{pl:"To jak zakupy: algorytm to porównywanie cen KAŻDEGO produktu w KAŻDYM sklepie w mieście (idealnie ale nierealistycznie). Heurystyka to doświadczony kupujący — idzie do sprawdzonego sklepu, bierze co jest dobre i tanie, bez analizy wszystkiego. Przy 5 produktach — policz dokładnie. Przy cotygodniowych zakupach 50 produktów — użyj doświadczenia.",en:"It's like shopping: an algorithm compares prices of EVERY product in EVERY store in the city (ideal but impractical). A heuristic is an experienced shopper — goes to a trusted store, picks what's good and affordable without analyzing everything. For 5 items — calculate exactly. For weekly 50-item shopping — use experience."},
answer:"Heuristics outperform exact algorithms in several critical situations. With dynamic streaming data — market prices changing every millisecond, real-time sensor readings — exact solutions become obsolete before computation finishes, while heuristic agents adapt in real-time within 1ms. In resource-constrained environments like drones and IoT devices, heuristics like RRT* provide 95%-optimal paths in 50ms versus minutes for exact algorithms — the difference between safe flight and collision. For multi-objective problems with conflicting goals — cost versus latency versus reliability — evolutionary algorithms like NSGA-II explore the Pareto frontier presenting decision-makers with trade-off options rather than requiring a single precise objective function. The principle: when a 95% optimal solution in 100ms is more valuable than 100% optimal in 100 hours, heuristics win — and in real-world systems, this is almost always the case.",
keywords:["online algorithm","streaming data","RRT*","evolutionary algorithm","NSGA-II","Pareto frontier","real-time","IoT","resource-constrained","multi-objective","latency-sensitive"]},

{num:"Q57",original:"A model developed in Scilab/Matlab is an approximation of the reality. Precise rendering is accompanied by uncertainties, for example, in terms of model parameters, boundary conditions that can affect the accuracy and reliability of results. Discuss these uncertainties on a selected example.",
lecture:{intro:"Modele matematyczne w Scilab/Matlab to uproszczenia rzeczywistości. Każde uproszczenie wprowadza niepewność — zrozumienie i kwantyfikacja tych niepewności jest kluczowe dla niezawodnych decyzji inżynierskich.",
points:[
{title:"Niepewność parametrów",text:"Parametry modelu (właściwości materiałów, współczynniki) mierzone z ograniczoną precyzją. Małe wariacje parametrów mogą ZNACZĄCO wpłynąć na output — szczególnie w modelach nieliniowych. Monte Carlo simulation: losuj parametry z rozkładów → obserwuj rozkład wyników.",example:"Analiza wytrzymałości belki stalowej: moduł Younga stali = 200 GPa ±5%. Monte Carlo z 10,000 próbek: maksymalne ugięcie waha się ±12% mimo 'tylko' 5% niepewności parametru. Nieliniowość amplifikuje niepewność. Inżynier musi projektować z marginesem bezpieczeństwa."},
{title:"Niepewność warunków brzegowych i modelu",text:"Realne warunki brzegowe (obciążenia, temperatury, wiązania) są idealizowane w modelach. Ponadto sam model matematyczny może pomijać ważne zjawiska fizyczne (upraszczające założenia). Żadne tuning parametrów nie naprawi strukturalnie złego modelu.",example:"Symulacja transferu ciepła: model zakłada stałą temperaturę otoczenia 20°C. Realnie: zmienia się 15-30°C w ciągu dnia. Dodanie stochastycznego warunku brzegowego zmienia peak temperature predictions o 8°C. Model liniowej sprężyny fails przy dużych odkształceniach — potrzeba modelu nieliniowego."},
{title:"Błędy numeryczne i mesh convergence",text:"Dyskretyzacja ciągłych równań (MES, różnice skończone) wprowadza błędy obcięcia i zaokrąglenia. Mesh refinement study: porównaj wyniki na coraz gęstszych siatkach aż do konwergencji. Jeśli wynik zmienia się znacząco z mesh — nie ufaj mu.",example:"FEM symulacja naprężeń: coarse mesh (100 elementów) → max stress 150 MPa. Fine mesh (10,000 elementów) → 185 MPa. Very fine (100,000 elementów) → 190 MPa. Convergence study: true value ≈ 192 MPa. Coarse mesh miał 22% error — decyzja inżynierska oparta na nim byłaby niebezpieczna."}
]},
analogy:{pl:"Model Matlab to jak mapa — przydatna do nawigacji, ale NIE jest terenem. Niepewność parametrów to jak niedokładna skala mapy (odległości przybliżone). Warunki brzegowe to jak pogoda (zmienna, nieprzewidywalna). Błędy numeryczne to jak pikselizacja mapy (zoom in i detale znikają). Dobry inżynier wie że mapa ≠ teren i projektuje z marginesem.",en:"A Matlab model is like a map — useful for navigation but NOT the territory. Parameter uncertainty is like an inaccurate map scale (approximate distances). Boundary conditions are like weather (variable, unpredictable). Numerical errors are like map pixelation (zoom in and details disappear). A good engineer knows map ≠ territory and designs with margin."},
answer:"Models in Scilab/Matlab face four types of uncertainty. Parameter uncertainty arises because material properties and coefficients are measured with limited precision — Monte Carlo simulation shows that a 5% uncertainty in steel's Young's modulus can produce 12% variation in maximum deflection, amplified by nonlinearity. Boundary condition uncertainty stems from idealizing real-world conditions — assuming constant ambient temperature when it varies 15°C daily changes thermal predictions by 8°C. Model structure uncertainty reflects simplifying assumptions — a linear spring model fails for large deformations where nonlinear behavior dominates, and no parameter tuning fixes a structurally wrong model. Numerical discretization errors from finite element or finite difference methods require mesh convergence studies — a coarse mesh can show 22% error in stress predictions versus converged solutions, making engineering decisions based on it potentially dangerous.",
keywords:["uncertainty","Monte Carlo simulation","sensitivity analysis","mesh convergence","FEM","boundary conditions","discretization error","model validation","numerical error","Scilab","Matlab","safety margin"]}

]},

{id:"F",label:"F",color:"#888780",title:"Infrastruktura & Systemy Operacyjne",questions:[

{num:"Q8",original:"How do energy-saving technologies affect the efficiency of computing infrastructure?",
lecture:{intro:"Efektywność energetyczna w IT to imperatyw ekonomiczny i środowiskowy. Centra danych zużywają 1-2% globalnej energii elektrycznej — technologie oszczędzania energii są kluczowe dla sustainable IT.",
points:[
{title:"DVFS — Dynamic Voltage and Frequency Scaling",text:"CPU dynamicznie dostosowuje napięcie i częstotliwość do obciążenia. Niższa częstotliwość = kwadratowa redukcja mocy (P ∝ V²×f). Znacząco zmniejsza zużycie energii przy niskim i średnim obciążeniu bez wpływu na peak performance.",example:"Serwer przy 50% load: DVFS obniża z 3.5 GHz do 2.0 GHz → redukcja zużycia CPU o ~60% przy pełnym spełnieniu wymagań wydajnościowych. Przy idle: redukcja do 0.8 GHz → 85% mniej energii. Na 1000 serwerach: oszczędność $200K/rok na samym prądzie."},
{title:"Wirtualizacja i konsolidacja",text:"Wiele workloadów na mniejszej liczbie fizycznych serwerów — zwiększenie utilization z typowych 10-20% do 60-80%. Mniej hardware = mniej energii na compute I cooling. Containers jeszcze lżejsze niż VMs.",example:"Firma konsoliduje 500 lekko obciążonych serwerów (avg 8% utilization) na 50 zwirtualizowanych (avg 65% utilization). Redukcja zużycia energii o 70%, oszczędność $500K/rok na hardware, prąd i cooling. Dodatkowy bonus: mniej physical space w data center."},
{title:"Efficient cooling i nowoczesny hardware",text:"Cooling zużywa 30-40% energii data center. Free cooling (powietrze zewnętrzne), liquid cooling, hot/cold aisle containment, AI-optimized cooling. ARM processors (Graviton), SSDs, 80+ Platinum PSU — więcej compute per watt.",example:"Google DeepMind AI zredukowało energię chłodzenia data center o 40% przewidując optymalne ustawienia na podstawie pogody, obciążenia i stanu sprzętu. AWS Graviton3 (ARM): 60% lepsza efektywność energetyczna niż porównywalne x86 dla web workloadów. PUE (Power Usage Effectiveness) spada z 2.0 do 1.1."}
]},
analogy:{pl:"Oszczędzanie energii w IT to jak oszczędzanie paliwa w samochodzie: DVFS to tryb eco silnika (mniej mocy gdy nie potrzebujesz), wirtualizacja to carpooling (wielu pasażerów w jednym aucie zamiast osobnych), cooling to klimatyzacja (ogromny żarłok — AI optymalizuje), a ARM to nowoczesny hybrydowy silnik (więcej km na litrze).",en:"Energy saving in IT is like fuel economy in a car: DVFS is engine eco-mode (less power when you don't need it), virtualization is carpooling (many passengers in one car), cooling is AC (huge energy hog — AI optimizes it), and ARM is a modern hybrid engine (more km per liter)."},
answer:"Energy-saving technologies significantly impact computing infrastructure efficiency across multiple layers. Dynamic Voltage and Frequency Scaling adjusts CPU power based on workload — reducing frequency cuts power consumption quadratically since power is proportional to voltage squared times frequency, saving up to 85% at idle. Server virtualization and consolidation increases hardware utilization from typical 10-20% to 60-80%, reducing total servers and energy consumption by up to 70%. Efficient cooling through free cooling, liquid cooling, and AI-optimized controls like Google's DeepMind solution reduces cooling energy by 40% — critical since cooling consumes 30-40% of total data center power. Modern hardware including ARM-based processors like AWS Graviton3 delivers 60% better energy efficiency than x86 for web workloads. Together these technologies reduce data center energy consumption by 50-70%, measured by the PUE metric approaching the theoretical minimum of 1.0.",
keywords:["DVFS","PUE","virtualization","consolidation","free cooling","liquid cooling","ARM","Graviton","energy efficiency","data center","80+ Platinum","DeepMind"]},

{num:"Q9",original:"What are the main challenges related to the implementation of energy-saving systems in large computing environments?",
lecture:{intro:"Mimo oczywistych korzyści, wdrażanie technologii energooszczędnych w dużych środowiskach napotyka bariery techniczne, organizacyjne i finansowe.",
points:[
{title:"Performance vs efficiency trade-offs",text:"Agresywne oszczędzanie energii może zwiększyć latencję, zmniejszyć throughput lub naruszyć SLA. Znalezienie optymalnej równowagi wymaga ciągłego monitoringu i precyzyjnego tuningu per workload type.",example:"Cloud provider włącza aggressive DVFS na serwerach z latency-sensitive bazami danych: 99th percentile query latency skacze z 5ms do 50ms — naruszenie SLA. Fix: profile workloady i stosuj DVFS TYLKO na batch/background jobs, nie na latency-critical paths."},
{title:"Legacy infrastructure i measurement",text:"Starszy hardware nie ma nowoczesnych power management features. Retrofit istniejących facility (cooling, power distribution) jest kosztowny i wymaga downtime. Dokładny pomiar zużycia per workload jest złożony — bez granularnych metryk nie da się optymalizować.",example:"10-letni data center z raised-floor cooling: konwersja na hot/cold aisle containment wymaga $2M inwestycji i tygodni downtime. ROI: 5+ lat. Shared K8s cluster z 200 mikroserwisami od 15 teamów: przypisanie kosztu energii do każdego serwisu wymaga power monitoring + scheduling data integration — complex data engineering."},
{title:"Skala i heterogeniczność",text:"Duże środowiska mają diverse hardware (różne generacje CPU/GPU), różne workloady (batch vs interactive vs ML training) i różne wymagania. One-size-fits-all policy nie działa — każdy typ serwera i workload potrzebuje innego profilu optymalizacji.",example:"Hyperscaler zarządza 100,000+ serwerów w 30 generacjach hardware: każda generacja ma inne DVFS capabilities, thermal characteristics i optimal operating points. Wymaga automated, hardware-aware energy policies z ML-based optimization per server type × workload type matrix."}
]},
analogy:{pl:"To jak oszczędzanie energii w ogromnym biurowcu: nie możesz po prostu wyłączyć ogrzewania zimą (SLA!), stary budynek trudno ocieplić (legacy), nie wiesz kto na którym piętrze zużywa ile prądu (measurement), i każde piętro ma inne potrzeby — serwerownia vs open space vs sala konferencyjna (heterogeneity).",en:"It's like saving energy in a huge office building: you can't just turn off heating in winter (SLA!), old buildings are hard to insulate (legacy), you don't know which floor uses how much power (measurement), and each floor has different needs — server room vs open space vs conference hall (heterogeneity)."},
answer:"Implementing energy-saving systems in large computing environments faces several challenges. Performance-efficiency trade-offs require careful per-workload tuning — aggressive DVFS on latency-sensitive database servers can violate SLA requirements, requiring different policies for interactive versus batch workloads. Legacy infrastructure lacks modern power management features, and retrofitting cooling systems requires significant downtime and multi-million dollar investment with 5+ year ROI. Measurement and attribution of energy consumption per workload is complex in shared multi-tenant environments like Kubernetes clusters with hundreds of microservices, making optimization and fair cost allocation difficult without granular power monitoring integrated with workload scheduling data. Scale and heterogeneity across tens of thousands of servers spanning 30 hardware generations requires automated, ML-based energy policies rather than one-size-fits-all approaches, with each server type and workload combination needing its own optimization profile.",
keywords:["SLA trade-off","DVFS tuning","legacy infrastructure","PUE measurement","heterogeneity","retrofit","workload profiling","energy policy","thermal management","ROI","cost attribution"]},

{num:"Q13",original:"How does IoT affect the design and functionality of multifunctional robots?",
lecture:{intro:"IoT transformuje roboty z samodzielnych maszyn w połączone, context-aware systemy dzielące dane, koordynujące działania i wykorzystujące cloud intelligence do rozszerzonych zdolności.",
points:[
{title:"Sensor fusion i cloud-connected intelligence",text:"IoT sensory dostarczają robotom danych środowiskowych wykraczających poza onboard sensors — pogoda, ruch, stany budynku, status sprzętu. Cloud/edge offloading: ciężkie obliczenia (ML inference, path planning) na serwerach, robot jest mniejszy i tańszy.",example:"Drone dostawczy: ograniczone onboard compute. Via 5G IoT: wysyła strumień z kamery do edge server'a — real-time object detection i path planning z <50ms latency. Drone jest lekki i tani, intelligence jest w chmurze. Dodatkowe dane: pogoda z API, ruch z city sensors, no-fly zones."},
{title:"Fleet coordination i predictive maintenance",text:"IoT umożliwia swarming — roboty dzielą mapy, rozdzielają zadania, unikają kolizji. MQTT lub ROS2/DDS dla real-time robot-to-robot communication. IoT sensory na komponentach robota (silniki, baterie) + ML = predykcja awarii przed ich wystąpieniem.",example:"10 robotów czyszczących w szpitalu koordynowanych przez MQTT: dzielą mapy wyczyszczonych obszarów, dzielą budynek na strefy, dynamicznie reassignują strefy gdy jeden robot jedzie na ładowanie. Vibration sensor na ramieniu robota → Azure IoT Hub → ML model wykrywa zużycie łożyska 2 tygodnie przed awarią."}
]},
analogy:{pl:"Robot bez IoT to jak pracownik bez telefonu — robi swoje ale nie wie co się dzieje wokół i nie może poprosić o pomoc. Robot z IoT to pracownik ze smartfonem, Slackiem, GPS i dostępem do firmowego systemu — wie wszystko, koordynuje się z zespołem, prosi cloud o pomoc w trudnych decyzjach i raportuje swój stan zdrowia automatycznie.",en:"A robot without IoT is like a worker without a phone — does their job but doesn't know what's happening around them and can't ask for help. A robot with IoT is a worker with smartphone, Slack, GPS, and company system access — knows everything, coordinates with team, asks cloud for help on hard decisions, and auto-reports health status."},
answer:"IoT transforms multifunctional robots in several ways. Sensor fusion provides environmental awareness beyond onboard sensors — weather data, building occupancy, equipment status — enabling context-aware decisions. Cloud-connected intelligence through 5G offloads heavy computation like ML inference and path planning to edge servers, making robots smaller and cheaper while maintaining sophisticated AI capabilities with sub-50ms latency. Fleet coordination through MQTT and ROS2/DDS protocols enables robot swarms to share maps, distribute tasks dynamically, and avoid conflicts — ten hospital cleaning robots dividing floor plans and reassigning zones when one charges. Predictive maintenance using IoT telemetry from robot components combined with ML models predicts failures weeks before they occur — vibration sensors detecting bearing wear patterns for scheduled replacement during planned downtime rather than emergency breakdowns.",
keywords:["IoT","sensor fusion","edge computing","5G","MQTT","ROS2","DDS","fleet coordination","predictive maintenance","robot swarm","cloud offloading","telemetry"]},

{num:"Q14",original:"What types of data collected by IoT sensors are the most useful to multifunctional robots?",
lecture:{intro:"Wartość danych IoT dla robotów zależy od ich zadań, środowiska i potrzeb decyzyjnych. Różne typy sensorów dostarczają komplementarnych warstw informacji tworząc complete situational awareness.",
points:[
{title:"Dane przestrzenne i nawigacyjne",text:"LiDAR (2D/3D mapping), ultrasonic (proximity), GPS (outdoor), UWB beacons (cm-accurate indoor positioning), RFID tags (lane guidance, item identification). Fundamentalne dla każdego mobilnego robota — nawigacja, unikanie przeszkód, mapping (SLAM).",example:"Warehouse AGV: LiDAR buduje 3D mapę otoczenia w real-time, UWB beacons zapewniają centymetrową dokładność pozycji indoor (GPS nie działa wewnątrz budynku), floor-embedded RFID tags wyznaczają trasy. Fusion tych 3 źródeł: niezawodna nawigacja nawet gdy jedno źródło fail'uje."},
{title:"Dane środowiskowe i o obecności ludzi",text:"Temperatura, wilgotność, jakość powietrza, oświetlenie, wibracje — adaptacja zachowania do warunków. PIR motion sensors, kamery, pressure mats, BLE beacons — wykrywanie obecności ludzi. Kluczowe dla bezpieczeństwa i adaptywnego zachowania.",example:"Robot rolniczy: czujniki wilgotności gleby + dane pogodowe + sensor mokrości liści → decyzja: które pole nawadniać, kiedy opryskiwać (nie przed deszczem), które rośliny wymagają uwagi. Szpitalny robot delivery: BLE beacons wykrywają zatłoczony korytarz → alternative route. PIR w pokoju pacjenta = 'zajęty' → robot czeka za drzwiami."},
{title:"Dane o statusie systemów i sprzętu",text:"Dane z BMS (Building Management System): HVAC, windy, drzwi, alarmy pożarowe. Robot interaguje z infrastrukturą budynku i planuje wokół stanów systemów. Digital twin: wirtualny model budynku aktualizowany przez IoT w real-time.",example:"Security patrol robot: dane z czujników zamków drzwi (otwarte po godzinach = alert), panel alarmów pożarowych (alarm = natychmiast jedź tam), system wind (wezwij windę autonomicznie). Digital twin budynku aktualizowany co sekundę — robot planuje trasę w wirtualnym modelu, wykonuje w rzeczywistym."}
]},
analogy:{pl:"Dane IoT dla robotów to jak zmysły dla człowieka: LiDAR to wzrok (widzisz otoczenie), czujniki środowiskowe to dotyk i węch (czujesz temperaturę, wilgoć, jakość powietrza), dane o obecności to słuch (słyszysz kto jest wokół), a status systemów to czytanie tablicy informacyjnej (wiesz co się dzieje w budynku).",en:"IoT data for robots is like human senses: LiDAR is sight (see surroundings), environmental sensors are touch and smell (feel temperature, humidity, air quality), occupancy data is hearing (know who's around), and system status is reading an info board (know what's happening in the building)."},
answer:"The most useful IoT sensor data for robots spans four categories. Spatial and navigation data from LiDAR for 3D mapping, UWB beacons for centimeter-accurate indoor positioning, and RFID tags for lane guidance — fused together for reliable navigation even when one source fails. Environmental condition data from temperature, humidity, soil moisture, and air quality sensors enables adaptive behavior — agricultural robots deciding irrigation timing based on soil conditions and weather forecasts. Occupancy and activity data from PIR sensors, cameras, and BLE beacons is critical for human safety — robots detecting crowded corridors for alternative routing and occupied rooms for polite waiting. Equipment and system status data from building management systems allows robots to interact with infrastructure — autonomously calling elevators, detecting unlocked doors after hours, and responding to fire alarms with digital twin models updated in real-time.",
keywords:["LiDAR","UWB","GPS","RFID","PIR sensor","BLE beacon","soil moisture","HVAC","BMS","digital twin","sensor fusion","SLAM","environmental sensor"]},

{num:"Q37",original:"What is virtualization in the context of operating systems and what benefits does it bring?",
lecture:{intro:"Wirtualizacja tworzy abstrakcyjne wersje zasobów hardware'owych — pozwalając wielu systemom operacyjnym i aplikacjom współdzielić fizyczny hardware efektywnie i w izolacji.",
points:[
{title:"Typy wirtualizacji",text:"Hardware/server virtualization (VMs via hypervisor). OS-level virtualization (containers — Docker). Network virtualization (SDN, VLANs). Storage virtualization (SAN, NAS abstraction). Desktop virtualization (VDI — wirtualne pulpity). Każdy typ abstrahuje inny zasób.",example:"Jeden fizyczny serwer z 64 cores i 256GB RAM: uruchamia 20 VMs — od Windows Server przez Ubuntu po CentOS — każda z własnym izolowanym OS i zasobami. Lub 200 kontenerów Docker współdzielących jądro Linux — lżejsze niż VMs, szybszy startup."},
{title:"Resource efficiency i consolidation",text:"Wiele workloadów na wspólnych zasobach — utilization z 10-20% do 60-80%. Mniej hardware = mniej energii, mniej miejsca, mniej kosztów. Containers jeszcze efektywniejsze niż VMs — shared kernel, MB zamiast GB overhead per instance.",example:"500 fizycznych serwerów (avg 12% utilization) → 50 host serwerów z VMware vSphere (avg 70% utilization). Oszczędność: $3M/rok na hardware, prąd, cooling, data center space. Docker containers: 10-50MB per container vs 1-10GB per VM. Startup: sekundy vs minuty."},
{title:"Izolacja, flexibility i DR",text:"Każda VM/container działa w izolacji — crash lub security breach w jednej nie wpływa na inne. Live migration: przenieś running VM na inny host bez downtime. Snapshoty: instant backup i restore. Disaster recovery z VM replication.",example:"VMware vMotion: live-migruje running VM z failing host na healthy host w <2 sekundy — users doświadczają zero downtime mimo hardware failure. Snapshot przed risky update: jeśli coś pójdzie nie tak → restore snapshot w sekundy zamiast godzin reinstalacji. Hosting provider: customer A zhackowany → container izolowany → customer B bezpieczny."}
]},
analogy:{pl:"Wirtualizacja to jak apartamentowiec: zamiast budować osobny dom (fizyczny serwer) dla każdej rodziny (aplikacji), budujesz jeden budynek z wieloma mieszkaniami (VMs/containers). Każde mieszkanie jest niezależne (izolacja), współdzielą fundamenty i instalacje (hardware), a zarządca (hypervisor) przydziela zasoby i dba o porządek.",en:"Virtualization is like an apartment building: instead of building separate houses (physical servers) for each family (application), you build one building with many apartments (VMs/containers). Each apartment is independent (isolation), they share foundations and utilities (hardware), and the building manager (hypervisor) allocates resources and maintains order."},
answer:"Virtualization creates abstract representations of hardware resources, enabling multiple operating systems and applications to share physical infrastructure efficiently. Key types include hardware virtualization through VMs managed by hypervisors like VMware ESXi, OS-level virtualization through Docker containers sharing the host kernel, network virtualization through SDN, and storage virtualization. Benefits include dramatic resource efficiency — consolidation increases server utilization from 10-20% to 60-80%, reducing hardware costs by millions annually. Strong isolation ensures crashes or security breaches in one VM don't affect others. Flexibility features like VMware vMotion live-migrate running VMs between hosts with zero downtime, snapshots provide instant backup and restore, and VM replication enables disaster recovery. Containers add even more efficiency with MB-level overhead and second-level startup times versus GB and minutes for VMs.",
keywords:["virtualization","VM","container","Docker","hypervisor","VMware","consolidation","isolation","live migration","vMotion","snapshot","VDI","SDN","vSphere"]},

{num:"Q38",original:"What is a hypervisor in virtualization, what role does it perform and how is it organised?",
lecture:{intro:"Hypervisor (Virtual Machine Monitor) to warstwa software'u tworzącą i zarządzająca maszynami wirtualnymi — alokująca fizyczne zasoby i zapewniająca hardware abstraction dla guest OS-ów.",
points:[
{title:"Type 1 — Bare-Metal Hypervisor",text:"Działa bezpośrednio na hardware BEZ host OS. Najlepsza wydajność i bezpieczeństwo. Używany w enterprise data centers i cloud platforms. VMware ESXi, Microsoft Hyper-V Server, KVM (Linux kernel module), Citrix XenServer.",example:"VMware ESXi: instalujesz bezpośrednio na fizyczny serwer (nie ma Windows/Linux pod spodem). ESXi to miniaturowy OS (~150MB) zoptymalizowany wyłącznie do zarządzania VMs. vCenter zarządza tysiącami ESXi hostów centralnie. AWS EC2: modified KVM hypervisor (Nitro) — Type 1 na custom hardware."},
