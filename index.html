{title:"Specialized testing types",text:"Performance tests (JMeter, k6): load, stress, spike testing. Security tests (OWASP ZAP, Snyk): vulnerability scanning. Contract tests (Pact): API compatibility. Visual regression (Percy): pixel-level UI comparison. Chaos tests: deliberate failure injection.",example:"k6 load test: simulate 10,000 concurrent users → verify: p99 latency < 200ms, error rate < 0.1%, throughput > 5000 RPS. Snyk: scan dependencies → flag CVE-2024-xxxx in lodash 4.17.20 → auto-create PR upgrading to 4.17.21. Percy: screenshot comparison before/after CSS change → highlight unintended visual differences."}
]},
analogy:{pl:"Test automation to jak kontrola jakości na linii produkcyjnej: unit tests to sprawdzanie każdej śrubki (szybkie, masowe), integration tests to sprawdzanie czy moduły pasują do siebie (montaż), E2E to testowanie gotowego samochodu na torze (end-to-end). Automatyzacja: robot sprawdza 1000 śrubek/minutę vs człowiek 10/minutę — i nigdy nie ma złego dnia.",en:"Test automation is like quality control on a production line: unit tests check every screw (fast, mass), integration tests check if modules fit together (assembly), E2E tests drive the finished car on the track (end-to-end). Automation: a robot checks 1000 screws/minute vs human 10/minute — and never has a bad day."},
answer:"Software testing spans a pyramid of types. Unit tests at the base verify individual functions in isolation — fast, numerous, and cheap to maintain, forming 70% of tests. Integration tests in the middle verify component interactions like API with database. End-to-end tests at the top simulate complete user flows through Selenium or Cypress — slowest but highest confidence. Automation provides massive benefits: thousands of tests run in minutes versus days manually, consistent execution eliminates human error, instant regression detection on every commit catches bugs immediately instead of weeks later, and automated test gates enable CI/CD deployment pipelines. Specialized testing includes performance testing with k6 simulating 10,000 concurrent users, security scanning with Snyk flagging vulnerable dependencies, contract testing with Pact verifying API compatibility, and visual regression with Percy detecting unintended UI changes at pixel level.",
keywords:["test pyramid","unit test","integration test","E2E","Cypress","Selenium","CI/CD","regression","JMeter","k6","Snyk","Pact","Percy","test automation","TDD"]},

{num:"Q19",original:"What are the most popular version control systems and what are their main advantages and disadvantages while working in large teams?",
lecture:{intro:"Git dominuje rynek (90%+ projektów) jako distributed VCS. Zrozumienie Git jest obowiązkowe dla każdego developera. Alternatywy (SVN, Mercurial) istnieją ale tracą relevance.",
points:[
{title:"Git — distributed VCS",text:"Każdy developer ma PEŁNĄ kopię repozytorium lokalnie — offline work, fast operations, no single point of failure. Powerful branching i merging (branches to lightweight pointers). Staging area (index) umożliwia selective commits. Integracja: GitHub, GitLab, Bitbucket — code review, CI/CD, issue tracking.",example:"Git: 'git branch feature/payment' (0ms — creates pointer), 'git checkout feature/payment' (0ms — switches HEAD). Work offline na pociągu → commit locally → push when internet available. Cały Linux kernel (30M+ lines, 20,000+ contributors) zarządzany przez Git. GitHub: 100M+ repositories."},
{title:"Git workflows dla dużych teamów",text:"Git Flow: main (production), develop, feature/*, release/*, hotfix/* branches. Structured ale complex. Trunk-based development: wszyscy commitują do main, feature flags ukrywają niegotowe features. PR/MR review process zapewnia jakość. Monorepo vs multirepo trade-offs.",example:"Google używa trunk-based development z monorepo dla MILIARDÓW linii kodu — feature flags pozwalają na ciągłą integrację bez destabilizacji. Commit to main CODZIENNIE lub częściej. Contrast z Git Flow: feature branch żyje 3 tygodnie → 50 other devs committed to main → merge nightmare z setkami conflicts. Trunk-based eliminuje long-lived branches."},
{title:"Wyzwania w dużych teamach i alternatywy",text:"Merge conflicts: wielu developerów modyfikuje te same pliki. Learning curve: Git jest potężny ale złożony (rebase, cherry-pick, bisect). Large files: Git nie radzi sobie z binary files (Git LFS rozwiązuje). SVN: centralized, prostszy ale brak offline work. Mercurial: distributed jak Git ale prostszy UI — w zasadzie martwy (Facebook przeszedł na Git).",example:"Large binary files: game studio z 50GB assets — Git sam nie daje rady. Git LFS: przechowuje pointers w repo, binaries na external storage (S3). SVN advantage: partial checkout (pobierz tylko folder /frontend zamiast całego repo). Git: musisz klonować wszystko (sparse checkout pomaga ale limited). Perforce: game industry standard dla massive binary repos."}
]},
analogy:{pl:"Git to jak Google Docs dla kodu: wielu ludzi edytuje jednocześnie (branching), widzisz historię każdej zmiany z autorem i datą (git log), możesz porównać dowolne dwie wersje (diff), i cofnąć się do dowolnego momentu (git revert). Bez Git: wysyłasz sobie kod emailem pytając 'kto ma najnowszą wersję?' — chaos, wersja_final_v3_NAPRAWDE_final.zip.",en:"Git is like Google Docs for code: multiple people edit simultaneously (branching), you see every change with author and date (git log), compare any two versions (diff), and revert to any point (git revert). Without Git: emailing code asking 'who has the latest version?' — chaos, version_final_v3_REALLY_final.zip."},
answer:"Git dominates version control with 90%+ market share as a distributed VCS where every developer holds a complete repository locally, enabling offline work and fast operations. Key advantages include powerful lightweight branching, comprehensive history with blame and bisect for debugging, and integration with platforms like GitHub and GitLab for code review and CI/CD. For large teams, Git workflows vary: Git Flow provides structured branch management with main, develop, and feature branches, while trunk-based development — used by Google for billions of lines of code — has everyone commit to main daily with feature flags hiding incomplete work, avoiding merge nightmare of long-lived branches. Challenges include merge conflicts when many developers modify the same files, a steep learning curve for advanced features like rebase and cherry-pick, and poor handling of large binary files addressed by Git LFS. SVN persists for centralized simplicity and partial checkout capability, while Perforce remains the standard in game development for massive binary repositories.",
keywords:["Git","distributed VCS","branching","merge conflict","Pull Request","trunk-based development","feature flags","Git Flow","GitHub","GitLab","Git LFS","monorepo","SVN"]},

{num:"Q61",original:"Name the main features of the unified modelling language (UML) for IT systems -- its application, characteristics and its basic diagrams.",
lecture:{intro:"UML (Unified Modeling Language) to standardowy język graficzny do wizualizacji, specyfikacji i dokumentowania systemów IT. Nie jest narzędziem coding — to narzędzie komunikacji między stakeholderami.",
points:[
{title:"Structural diagrams — statyczna struktura",text:"Class Diagram: klasy, atrybuty, metody, relacje (inheritance, composition, aggregation). Najczęściej używany. Component Diagram: high-level components i ich interfejsy. Deployment Diagram: mapping software na hardware (serwery, containers, devices).",example:"Class Diagram: User [name, email, passwordHash] → has many → Order [total, status] → has many → OrderItem [quantity, price] → references → Product [name, sku]. Relacje: User 1——* Order (one-to-many), Order *——* Product through OrderItem (many-to-many). Deployment Diagram: [Web Server: Nginx] → [App Server: Docker Container: Spring Boot] → [DB Server: PostgreSQL Primary + Replica]."},
{title:"Behavioral diagrams — dynamiczne zachowanie",text:"Sequence Diagram: interakcja między obiektami w czasie (messages, responses, loops, conditions). Use Case Diagram: aktorzy i ich interakcje z systemem (high-level requirements). Activity Diagram: workflow/flowchart z decision points i parallel paths. State Machine: stany obiektu i przejścia.",example:"Sequence Diagram login flow: User → Browser: enter credentials → Browser → AuthService: POST /login → AuthService → Database: SELECT user WHERE email=... → Database → AuthService: user record → AuthService → TokenService: generateJWT(user) → TokenService → AuthService: JWT token → AuthService → Browser: 200 OK + JWT → Browser → User: redirect to dashboard."},
{title:"Zastosowania i nowoczesne alternatywy",text:"UML: documentation, communication z non-technical stakeholders, architecture review, onboarding nowych developerów. W praktyce: Class i Sequence diagrams najczęściej używane. Narzędzia: PlantUML (text-based, version-controllable), Mermaid (Markdown-integrated), draw.io, Lucidchart. C4 model jako lightweight alternative.",example:"PlantUML w Markdown docs: @startuml class User { +name: String +email: String +login(): Boolean } class Order { +total: Decimal +status: OrderStatus } User '1' --> '*' Order @enduml — diagram generowany z tekstu, wersjonowany w Git obok kodu. Mermaid w GitHub README: natywne renderowanie diagramów."}
]},
analogy:{pl:"UML to jak plan architektoniczny budynku: Class Diagram to rozkład pomieszczeń (struktura), Sequence Diagram to plan ewakuacji (kto gdzie idzie w jakiej kolejności), Deployment Diagram to plan instalacji (gdzie serwery, jakie kable). Architect nie buduje domu — rysuje plany żeby builder (developer) wiedział co budować i client (stakeholder) wiedział co dostanie.",en:"UML is like architectural blueprints: Class Diagram is the room layout (structure), Sequence Diagram is the evacuation plan (who goes where in what order), Deployment Diagram is the installation plan (where servers go, what cables). The architect doesn't build the house — they draw plans so the builder (developer) knows what to build and the client (stakeholder) knows what they'll get."},
answer:"UML is a standardized graphical language for visualizing, specifying, and documenting IT systems. Structural diagrams capture static architecture: Class Diagrams show classes with attributes, methods, and relationships like inheritance and composition — the most commonly used UML diagram. Component Diagrams show high-level system components and interfaces, while Deployment Diagrams map software to physical hardware. Behavioral diagrams capture dynamic interactions: Sequence Diagrams show time-ordered message exchange between objects for specific scenarios like login flows, Use Case Diagrams map actor interactions with the system for requirements gathering, and Activity Diagrams model workflows with decision points and parallel paths. Modern tools include PlantUML generating diagrams from version-controllable text, Mermaid integrated into Markdown and GitHub, and the C4 model as a lightweight architectural alternative focusing on four abstraction levels.",
keywords:["UML","Class Diagram","Sequence Diagram","Use Case","Component Diagram","Deployment Diagram","Activity Diagram","PlantUML","Mermaid","C4 model","structural","behavioral"]},

{num:"S2-26",original:"How can CI/CD pipelines be implemented for mobile and embedded systems projects using GitHub Actions, Jenkins, or Azure DevOps?",
lecture:{intro:"CI/CD dla mobile i embedded ma specyficzne wyzwania: cross-compilation, device testing, app store distribution, firmware signing. GitHub Actions, Jenkins i Azure DevOps dostarczają narzędzia do automatyzacji tych procesów.",
points:[
{title:"Mobile CI/CD pipeline",text:"Build → Unit Test → UI Test (emulator/simulator) → Code Sign → Deploy to TestFlight/Play Console → Release. Wyzwania: macOS runners wymagane dla iOS builds (Apple requirement). Android: emulator w Docker. Code signing: certificates i provisioning profiles managed w secrets.",example:"GitHub Actions mobile: on: push → checkout → setup-java → build Android APK → run unit tests → start Android emulator → run Espresso UI tests → sign APK → upload to Google Play Internal Testing. iOS: runs-on: macos-latest → xcodebuild → test on Simulator → archive → export IPA → upload to TestFlight. iOS WYMAGA macOS runner — nie zbudujesz na Linux."},
{title:"Embedded CI/CD pipeline",text:"Cross-compile → Static analysis → Unit test (on host) → Integration test (emulator/QEMU) → Flash firmware → Hardware-in-loop test → OTA update deployment. Wyzwania: cross-compilation toolchains (arm-none-eabi-gcc), hardware testing wymaga physical devices w CI lab.",example:"Jenkins embedded pipeline: checkout → arm-none-eabi-gcc cross-compile → cppcheck static analysis → run unit tests on host (mock HAL) → QEMU emulator integration tests → flash to physical device via J-Link → run hardware-in-loop tests → generate firmware binary → sign z secure key → deploy OTA update to staging fleet → smoke test → promote to production fleet."},
{title:"Narzędzia i best practices",text:"GitHub Actions: YAML-based, free tier, marketplace actions. Jenkins: self-hosted, maximum flexibility, plugin ecosystem (2000+). Azure DevOps: integrated z Azure cloud, Boards, Repos, Pipelines, Artifacts. Best practices: fail fast (unit tests first), cache dependencies, parallel jobs, environment-specific configs w secrets.",example:"Optimization: cache Gradle/CocoaPods dependencies between runs (GitHub Actions: actions/cache) — build time 12min → 4min. Parallel: Android unit tests + lint + build run simultaneously. Secrets: ANDROID_SIGNING_KEY stored w GitHub Encrypted Secrets — never in repo. Branch protection: require passing CI before merge to main."}
]},
analogy:{pl:"CI/CD pipeline to jak fabryczna linia kontroli jakości: kod wchodzi z jednej strony (commit), przechodzi przez kolejne stacje kontrolne (build, test, security scan, sign), i jeśli przejdzie WSZYSTKIE — wychodzi jako gotowy produkt (release). Jedna wadliwa stacja zatrzymuje CAŁĄ linię (fail fast) — żaden wadliwy produkt nie trafia do klienta.",en:"A CI/CD pipeline is like a factory quality control line: code enters from one side (commit), passes through sequential checkpoints (build, test, security scan, sign), and if it passes ALL — exits as a finished product (release). One failed station stops the ENTIRE line (fail fast) — no defective product reaches the customer."},
answer:"CI/CD for mobile and embedded systems addresses unique challenges. Mobile pipelines on GitHub Actions build and test Android via Gradle with emulator-based Espresso UI tests, while iOS requires macOS runners for xcodebuild with Simulator testing — code signing certificates stored as encrypted secrets. Distribution goes through TestFlight and Play Console internal testing tracks. Embedded pipelines handle cross-compilation with arm-none-eabi-gcc toolchains, static analysis with cppcheck, unit tests on host with mocked HAL, QEMU emulator integration tests, and hardware-in-loop testing on physical devices via J-Link — culminating in signed OTA firmware deployment to device fleets. Jenkins offers maximum flexibility with 2000+ plugins for self-hosted embedded labs, GitHub Actions provides YAML simplicity with marketplace actions and free tier, and Azure DevOps integrates pipelines with Boards and Artifacts. Key optimizations include dependency caching reducing build times by 70%, parallel job execution, and branch protection rules requiring passing CI before merge.",
keywords:["CI/CD","GitHub Actions","Jenkins","Azure DevOps","TestFlight","Play Console","cross-compilation","arm-none-eabi","QEMU","hardware-in-loop","OTA","code signing","cache"]},

{num:"S2-29",original:"How do agile methodologies impact team projects in embedded systems programming and software development?",
lecture:{intro:"Agile w embedded to wyzwanie bo embedded ma hardware dependencies, long build cycles i safety certification requirements — ale zespoły adaptują Agile practices do tych constraints z rosnącym sukcesem.",
points:[
{title:"Agile w software development — natural fit",text:"2-4 week sprinty z working software każdy sprint. Continuous feedback od stakeholders. Self-organizing teams. Scrum: roles (PO, SM, Dev Team), ceremonies (Planning, Daily, Review, Retro), artifacts (Backlog, Sprint Backlog, Increment). Empirical process control: inspect and adapt.",example:"Web app Scrum: Sprint 1 → user registration feature (working, deployed to staging). Sprint 2 → login + password reset. Sprint 3 → user profile editing. Each sprint: demo to stakeholders → feedback → adjust priorities. Velocity: 30 story points/sprint → predictable delivery timeline. Retrospective: 'deploys are slow' → invest in CI/CD next sprint."},
{title:"Agile w embedded — adaptacje",text:"Wyzwania: hardware-software co-development (hardware NOT agile), long compilation/flashing cycles, safety standards (IEC 62304, DO-178C) wymagają upfront planning i documentation. Adaptacje: hardware-software synchronization sprints, simulation-first development (test bez hardware), compliance sprints.",example:"Embedded Scrum: Sprint 1-2: software simulation on QEMU (no hardware needed). Sprint 3: hardware prototype arrives → integration. Sprint 4: hardware-in-loop testing. 'Compliance sprint' co 3 sprints: update traceability matrix, run static analysis, generate required documentation. Definition of Done includes: code reviewed, unit tested, static analysis clean, traceability updated."},
{title:"Korzyści i mierzenie impact",text:"Szybszy feedback loop: problemy wykrywane wcześniej. Lepsza komunikacja: daily standups eliminują 'nie wiedziałem że to zmieniłeś'. Continuous improvement: retrospectives systematycznie usuwają impediments. Metrics: velocity (predictability), lead time (speed), defect rate (quality), team happiness (sustainability).",example:"Embedded team: przed Agile — integration problems odkrywane po 6 miesiącach development, 3 miesiące bug fixing. Po Agile: continuous integration na emulatorze co sprint → problemy wykrywane w 2 tygodnie zamiast 6 miesięcy. Lead time: 6 months → 2 months for feature delivery. Defect rate: 40% reduction bo wczesne testowanie."}
]},
analogy:{pl:"Agile w embedded to jak adaptowanie przepisu fine dining do food trucka: podstawowe zasady te same (jakość, higiena, feedback od klientów), ale musisz dostosować: mniejsza kuchnia (ograniczony hardware), prostsze narzędzia (emulator zamiast full test bench), i czasem musisz ugotować danie przed sprzedażą (safety certification przed release) zamiast iterować na żywo.",en:"Agile in embedded is like adapting a fine dining recipe for a food truck: core principles are the same (quality, hygiene, customer feedback), but you must adapt: smaller kitchen (limited hardware), simpler tools (emulator instead of full test bench), and sometimes you must prepare the dish before selling (safety certification before release) instead of iterating live."},
answer:"Agile methodologies significantly impact both software and embedded development. In software development, Scrum's 2-4 week sprints with working software increments provide continuous stakeholder feedback, self-organizing teams deliver predictable velocity, and retrospectives drive systematic improvement — natural fit for web and mobile applications. In embedded systems, Agile requires adaptations: hardware-software co-development needs synchronized sprints since hardware isn't agile, long compilation and flashing cycles benefit from simulation-first development on QEMU, and safety standards like IEC 62304 and DO-178C require dedicated compliance sprints for documentation and traceability. The benefits are measurable: teams report 40% defect reduction through continuous integration on emulators catching problems in 2 weeks instead of 6 months, feature delivery lead time dropping from 6 to 2 months, and improved team communication through daily standups eliminating integration surprises.",
keywords:["Agile","Scrum","Kanban","sprint","embedded Agile","IEC 62304","DO-178C","velocity","lead time","retrospective","QEMU","simulation-first","compliance sprint","Definition of Done"]}

]}
];

function scoreKey(tid,qi){return tid+"-"+qi}
function getScore(tid,qi){return s.scores[scoreKey(tid,qi)]||null}
function setScore(tid,qi,v){s.scores[scoreKey(tid,qi)]=v;localStorage.setItem("examScores",JSON.stringify(s.scores));render()}
function allQ(){return TOPICS.flatMap(t=>t.questions.map(q=>({q,t})))}
function totalQ(){return allQ().length}
function knownTotal(){return Object.values(s.scores).filter(v=>v==="know").length}
function topicKnown(t){return t.questions.filter((_,i)=>s.scores[scoreKey(t.id,i)]==="know").length}

function render(){
  const a=document.getElementById("app");
  if(s.view==="home")renderHome(a);
  else renderStudy(a);
}

function renderHome(a){
  const total=totalQ(),known=knownTotal(),pct=total?Math.round(known/total*100):0;
  let h=`<div class="home-title">Egzamin IT &mdash; Wszystkie tematy</div>
  <div class="home-sub">9 klastr&oacute;w &middot; ${total} pyta&ntilde; &middot; pe&#322;ne wyk&#322;ady z przyk&#322;adami i analogiami</div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Pyta&#324;</div><div class="stat-num">${total}</div></div>
    <div class="stat-card"><div class="stat-label">Opanowanych</div><div class="stat-num">${known}</div></div>
    <div class="stat-card"><div class="stat-label">Post&#281;p</div><div class="stat-num">${pct}%</div></div>
  </div>`;
  ["A","B","C","D","E","F","G","H","I"].forEach(lid=>{
    const group=TOPICS.filter(t=>t.label===lid);
    if(!group.length)return;
    h+=`<div class="section-label">KLASTER ${lid}</div><div class="topics-grid">`;
    group.forEach((t)=>{
      const realIdx=TOPICS.indexOf(t);
      const k=topicKnown(t),n=t.questions.length,p=n?Math.round(k/n*100):0;
      h+=`<div class="topic-card" style="border-left-color:${t.color}" onclick="openTopic(${realIdx})">
        <div class="tc-head"><div class="tc-title">${t.title}</div><div class="tc-count">${k}/${n}</div></div>
        <div class="tc-qs">${t.questions.map(q=>q.num).join(" &middot; ")}</div>
        <div class="mini-prog"><div class="mini-fill" style="width:${p}%"></div></div>
      </div>`;
    });
    h+=`</div>`;
  });
  a.innerHTML=h;
}

function renderStudy(a){
  const t=TOPICS[s.topicIdx],q=t.questions[s.qIdx],score=getScore(t.id,s.qIdx);
  const total=t.questions.length,pct=Math.round((s.qIdx+1)/total*100);
  let h=`<div class="top-bar">
    <button class="back-btn" onclick="goHome()">&larr; Tematy</button>
    <span class="topic-badge" style="border-left:2px solid ${t.color};padding-left:10px">${t.title}</span>
    <div class="prog-wrap"><span class="prog-text">${s.qIdx+1}/${total}</span>
    <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div></div>
  </div>
  <div class="mode-tabs">
    <button class="mode-tab ${s.mode==="quiz"?"active":""}" onclick="setMode('quiz')">Tryb Quiz</button>
    <button class="mode-tab ${s.mode==="study"?"active":""}" onclick="setMode('study')">Tryb Nauki</button>
  </div>
  <div class="study-layout">
    <div class="sidebar"><div class="sb-label">PYTANIA</div>`;
  t.questions.forEach((qq,qi)=>{
    const sc=getScore(t.id,qi);
    const icon=sc==="know"?"&#10003;":sc==="dontknow"?"&#10007;":"&middot;";
    h+=`<div class="sb-item ${qi===s.qIdx?"active":""}" onclick="goQ(${qi})">
      <span style="font-size:11px;line-height:1.3">${qq.num}</span><span class="sb-icon">${icon}</span></div>`;
  });
  h+=`</div><div>`;
  h+=`<div class="q-num">${q.num} &middot; ${t.title}</div>`;
  h+=`<div class="q-text">${q.original}</div>`;
  if(s.mode==="study"){
    h+=renderLec(q);
    h+=`<div class="sec-div">WZORCOWA ODPOWIED&#377; PO ANGIELSKU</div>`;
    h+=`<div class="lec-block"><div class="lec-text">${q.answer}</div></div>`;
    h+=renderKws(q);
  } else {
    if(!s.rev){
      h+=`<div class="ans-box" onclick="doReveal()"><div class="ans-hint">Odpowiedz w my&#347;lach po angielsku, potem kliknij &#380;eby sprawdzi&#263;</div></div>`;
    } else {
      h+=`<div class="ans-box revealed"><div class="ans-label">WZORCOWA ODPOWIED&#377;</div><div class="ans-text">${q.answer}</div></div>`;
      h+=renderLec(q);
      h+=renderKws(q);
      h+=`<div class="score-row">
        <button class="btn-dontknow" onclick="doScore('dontknow')">&#10007; Nie znam &mdash; powt&oacute;rz&#281;</button>
        <button class="btn-know" onclick="doScore('know')">&#10003; Znam dobrze</button>
      </div>`;
      if(score)h+=`<div class="score-msg">${score==="know"?"Zaznaczono jako opanowane &#10003;":"Zaznaczono do powt&oacute;rki"}</div>`;
    }
  }
  h+=`<div class="nav-row">
    <button class="nav-btn" onclick="prevQ()" ${s.qIdx===0?"disabled":""}&gt;&larr; Poprzednie</button>
    <span style="font-size:12px;color:var(--color-text-tertiary)">${s.qIdx+1} z ${total}</span>
    ${s.qIdx<total-1?`<button class="nav-btn" onclick="nextQ()">Nast&#281;pne &rarr;</button>`:`<button class="nav-btn" onclick="goHome()">Zako&#324;cz &#10003;</button>`}
  </div>`;
  h+=`</div></div>`;
  a.innerHTML=h;
}

function renderLec(q){
  const l=q.lecture;
  let h=`<div class="sec-div">WYK&#321;AD</div>`;
  h+=`<div class="lec-block"><div class="lec-label">WPROWADZENIE</div><div class="lec-text">${l.intro}</div></div>`;
  l.points.forEach(p=>{
    h+=`<div class="lec-block"><div class="lec-label">${p.title.toUpperCase()}</div><div class="lec-text">${p.text}</div>
    <div class="ex-block"><div class="ex-label">PRZYK&#321;AD</div><div class="ex-text">${p.example}</div></div></div>`;
  });
  h+=`<div class="analogy-block"><div class="analogy-label">ANALOGIA</div>
    <div class="analogy-pl">${q.analogy.pl}</div>
    <div class="analogy-en">${q.analogy.en}</div></div>`;
  return h;
}
function renderKws(q){
  return`<div class="kw-row">${q.keywords.map(k=>`<span class="kw">${k}</span>`).join("")}</div>`;
}

function openTopic(ti){s.topicIdx=ti;s.qIdx=0;s.rev=false;s.view="study";render()}
function goHome(){s.view="home";render()}
function goQ(qi){s.qIdx=qi;s.rev=false;render()}
function setMode(m){s.mode=m;s.rev=false;render()}
function doReveal(){s.rev=true;render()}
function doScore(v){setScore(TOPICS[s.topicIdx].id,s.qIdx,v)}
function nextQ(){s.qIdx++;s.rev=false;render()}
function prevQ(){s.qIdx--;s.rev=false;render()}

render();
</script>
