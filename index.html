{title:"Type 2 — Hosted Hypervisor",text:"Działa jako APLIKACJA na host OS. Łatwiejszy w setup ale performance overhead z dodatkowej warstwy OS. Używany do development, testing, edukacji. VirtualBox, VMware Workstation, Parallels Desktop.",example:"Developer na Windows: VMware Workstation uruchamia Ubuntu VM do cross-platform testing. Parallels na Mac: uruchamia Windows VM do testowania IE/Edge. Type 2 ma overhead ~5-15% vs Type 1 <2% — dla development OK, dla production — nie."},
{title:"Zarządzanie zasobami i security",text:"CPU scheduling: time-slicing virtual CPUs na fizyczne cores. Memory management: page tables, ballooning (reclaim unused RAM z idle VMs), overcommit. I/O virtualization: virtual NICs, virtual disks. IOMMU zapobiega VMs z bezpośrednim hardware access. Intel VT-x/AMD-V hardware extensions.",example:"Hypervisor zarządza 20 VMs na 16 fizycznych cores: time-slices vCPUs, używa ballooning żeby reclaim unused RAM z idle VMs (VM with 8GB allocated but using 2GB → reclaim 6GB for other VMs), zapewnia SR-IOV dla near-native network performance (bypass virtual switch), i Intel VT-x hardware extensions dla near-native compute performance (<2% overhead)."}
]},
analogy:{pl:"Hypervisor to jak zarządca apartamentowca: Type 1 = właściciel budynku (bezpośrednio na hardware, pełna kontrola, maksymalna efektywność). Type 2 = zarządca wynajmujący biuro w cudzym budynku (na host OS, łatwiejszy do uruchomienia ale dodatkowa warstwa). Oba przydzielają mieszkania (VMs), pilnują porządku (izolacja) i zarządzają wspólnymi zasobami (CPU, RAM, network).",en:"A hypervisor is like a building manager: Type 1 = building owner (directly on hardware, full control, maximum efficiency). Type 2 = manager renting an office in someone else's building (on host OS, easier to start but extra layer). Both allocate apartments (VMs), maintain order (isolation), and manage shared resources (CPU, RAM, network)."},
answer:"A hypervisor is the virtualization layer that creates, manages, and isolates virtual machines. Type 1 bare-metal hypervisors like VMware ESXi and KVM run directly on hardware without a host OS, providing best performance with less than 2% overhead — used in enterprise data centers and cloud platforms like AWS EC2's Nitro hypervisor. Type 2 hosted hypervisors like VirtualBox and VMware Workstation run as applications on a host OS with 5-15% overhead — used for development and testing. The hypervisor performs CPU scheduling through time-slicing virtual CPUs on physical cores, memory management with ballooning to reclaim unused RAM from idle VMs, I/O virtualization through virtual NICs and SR-IOV for near-native network performance, and strict security isolation between VMs using hardware extensions like Intel VT-x and IOMMU preventing any VM from accessing another's memory.",
keywords:["hypervisor","Type 1","Type 2","bare-metal","VMware ESXi","KVM","VirtualBox","vCPU","memory ballooning","SR-IOV","VT-x","IOMMU","Nitro"]},

{num:"Q39",original:"What is a hypervisor in virtualization, what is its role, and how do infrastructure conditions, such as hardware resources, system architecture, and performance and security requirements, affect its organization and operation?",
lecture:{intro:"Rozszerzenie Q38 — te same typy hypervisora, ale pytanie bada jak kontekst infrastrukturalny (hardware, architektura, wymagania) kształtuje konkretne decyzje konfiguracyjne i operacyjne.",
points:[
{title:"Wpływ hardware resources — NUMA i GPU",text:"Dostępne CPU cores, RAM i storage determinują VM density i profile wydajnościowe. NUMA topology: VMs powinny być pinned do NUMA nodes żeby memory access był local (~100ns) zamiast cross-NUMA (~300ns). GPU passthrough dla ML/VDI workloadów.",example:"Serwer z 2 NUMA nodes (2×32 cores, 2×128GB RAM): pinuj VMs do jednego NUMA node — memory access local (~100ns). Cross-NUMA: ~300ns = 3x wolniej. GPU passthrough: NVIDIA A100 bezpośrednio w VM dla ML training — near-native GPU performance. SR-IOV: dzielenie jednej fizycznej NIC między wiele VMs z hardware-level isolation."},
{title:"Architektura systemu — x86 vs ARM, cloud vs on-prem",text:"x86 vs ARM wpływa na kompatybilność hypervisora. Cloud vs on-premises determinuje management capabilities. Clustered vs standalone — HA i migration options. Nested virtualization dla development environments.",example:"AWS Graviton (ARM): custom Nitro hypervisor zoptymalizowany pod ARM. VMware dodało ARM support — hybrydowe klastry x86/ARM. On-premises: vSphere z vCenter centralnym zarządzaniem. Cloud: AWS Nitro — hypervisor functions offloaded na dedicated hardware cards (networking, storage) — CPU 100% dla VM workloadów."},
{title:"Wymagania performance i security",text:"Latency-sensitive workloads: CPU pinning, huge pages (2MB/1GB zamiast 4KB — mniej TLB misses), SR-IOV (bypass virtual switch). High-security: AMD SEV (Secure Encrypted Virtualization) — szyfruje pamięć każdej VM unikatowym kluczem, nawet skompromitowany hypervisor nie odczyta VM data.",example:"Financial trading VM: dedicated CPU cores (zero oversubscription — żaden inny VM nie kranie moich cykli), 1GB huge pages (99% redukcja TLB misses), SR-IOV NIC (direct hardware access bypassing virtual switch = ~2μs latency zamiast ~10μs). AMD SEV: each VM's memory encrypted with unique key — nawet hypervisor admin nie może odczytać danych VM. Confidential Computing."}
]},
analogy:{pl:"To jak budowanie hotelu: hardware to wielkość działki (ile pokoi zmieścisz), architektura to projekt budynku (aparthotel vs wieżowiec), wymagania performance to klasa hotelu (3★ vs 5★ — inne wyposażenie, inne standardy), a security requirements to system bezpieczeństwa (klucze magnetyczne vs retina scan w sejfie VIP).",en:"It's like building a hotel: hardware is lot size (how many rooms fit), architecture is building design (aparthotel vs skyscraper), performance requirements are hotel class (3★ vs 5★ — different amenities and standards), and security requirements are the security system (magnetic keys vs retina scan for VIP vault)."},
answer:"Infrastructure conditions significantly shape hypervisor configuration. Hardware resources determine VM density — NUMA topology requires careful VM placement to keep memory access local at 100ns rather than 300ns cross-NUMA, while GPU passthrough enables near-native performance for ML workloads. System architecture choices between x86 and ARM affect hypervisor compatibility — AWS Nitro offloads hypervisor functions to dedicated hardware cards giving VMs 100% of CPU resources. Performance requirements dictate configuration: latency-sensitive trading VMs need CPU pinning with zero oversubscription, 1GB huge pages reducing TLB misses by 99%, and SR-IOV bypassing virtual switches for 2μs network latency. Security requirements may demand AMD SEV for encrypted VM memory — each VM's RAM encrypted with a unique key preventing even a compromised hypervisor from reading data, enabling confidential computing in multi-tenant environments.",
keywords:["NUMA","CPU pinning","huge pages","SR-IOV","AMD SEV","confidential computing","GPU passthrough","Nitro","oversubscription","TLB","nested virtualization","ARM"]},

{num:"Q40",original:"Explain what 32 bit and 64 bit operating systems are and why we refer to them.",
lecture:{intro:"Oznaczenie 32-bit i 64-bit odnosi się do szerokości rejestrów CPU i możliwości adresowania pamięci — fundamentalnie determinując ile RAM system może wykorzystać i jak przetwarza dane.",
points:[
{title:"Szerokość rejestrów i przetwarzanie",text:"32-bit CPU przetwarza 32 bity danych per instrukcję. 64-bit: 64 bity. Wpływa na: precyzję operacji całkowitoliczbowych, rozmiar pointer'ów, ilość danych przenoszonych w jednej operacji. 32-bit integer max ≈ 4.3 miliarda. 64-bit max ≈ 18.4 kwintylionów.",example:"32-bit integer max: 2³² = 4,294,967,296. Wystarczające dla większości zastosowań ale NIE dla: timestampów Unix po 2038 (Year 2038 problem!), identyfikatorów dużych baz danych, kryptografii. 64-bit: 2⁶⁴ ≈ 1.8×10¹⁹ — wystarczające na miliardy lat."},
{title:"Adresowanie pamięci — kluczowa różnica",text:"32-bit adresuje max 2³² = 4 GB RAM (realnie 3-3.5 GB usable). 64-bit: teoretycznie 2⁶⁴ = 16 exabyte (praktyczny limit: 128 TB - 4 PB zależnie od CPU). 4GB to hard barrier nie do ominięcia w 32-bit.",example:"Serwer bazodanowy potrzebuje 32GB RAM: na 32-bit OS niemożliwe — hard limit 4GB (z PAE extension do 64GB ale per-process nadal 4GB). Na 64-bit: trywialne. ML training z 16GB GPU i 64GB system RAM: wymaga 64-bit. 32-bit era skończyła się ~2010 dla serwerów, ~2020 dla desktop."},
{title:"Kompatybilność i dlaczego to wciąż ważne",text:"64-bit OS uruchamiają 32-bit aplikacje (WoW64 na Windows, multilib na Linux). 32-bit OS NIE uruchomi 64-bit aplikacji. Windows 11: wyłącznie 64-bit (Microsoft dropped 32-bit support). ARM64 to przyszłość (Apple Silicon, mobile, embedded).",example:"Windows 11: TYLKO 64-bit — Microsoft porzucił 32-bit. Ale nadal uruchamia starsze 32-bit aplikacje przez WoW64 (Windows-on-Windows 64-bit) compatibility layer. Apple M1/M2: ARM64 — Rosetta 2 emuluje x86-64 (nie 32-bit). Trend: 64-bit universal, 32-bit legacy only w embedded/IoT."}
]},
analogy:{pl:"32-bit vs 64-bit to jak droga z 2 pasami vs 4 pasami: 32-bit przepuści ograniczoną ilość danych (4GB pamięci = 2 pasy to max), 64-bit przepuści wielokrotnie więcej (praktycznie bez limitu = 4 pasy wystarczą na dekady). Większość dzisiejszych 'ciężarówek' (aplikacji ML, baz danych) po prostu nie zmieści się na 2-pasmowej drodze.",en:"32-bit vs 64-bit is like a 2-lane vs 4-lane highway: 32-bit handles limited traffic (4GB memory cap = 2 lanes is the max), 64-bit handles vastly more (practically unlimited = 4 lanes sufficient for decades). Most of today's 'trucks' (ML applications, databases) simply don't fit on a 2-lane road."},
answer:"The 32-bit and 64-bit designations refer to CPU register width and memory addressing capability. A 32-bit system processes 32 bits per instruction and addresses a maximum of 4GB RAM — a hard physical limit. A 64-bit system processes 64 bits and addresses up to 16 exabytes theoretically, with practical limits of 128TB to 4PB. This matters because modern applications routinely exceed 4GB — database servers, ML training, video editing all require tens or hundreds of gigabytes. 64-bit integers also solve the Year 2038 problem where 32-bit Unix timestamps overflow. Compatibility: 64-bit operating systems run 32-bit applications through compatibility layers like WoW64, but 32-bit systems cannot run 64-bit software. Windows 11 is exclusively 64-bit, and ARM64 processors in Apple Silicon and mobile devices represent the industry's complete transition to 64-bit computing.",
keywords:["32-bit","64-bit","register width","memory addressing","4GB limit","WoW64","pointer size","ARM64","Year 2038","x86-64","compatibility","PAE"]},

{num:"S2-21",original:"Compare memory management techniques in Java (Garbage Collection) and .NET (CLR Memory Management) for mobile and embedded systems.",
lecture:{intro:"Java i .NET oba używają automatycznego zarządzania pamięcią przez garbage collection, ale ich implementacje różnią się w sposób istotny dla resource-constrained mobile i embedded environments.",
points:[
{title:"Java GC — wiele algorytmów do wyboru",text:"JVM oferuje: G1 (default od Java 9), ZGC (ultra-low latency <1ms pauses), Shenandoah (low-pause), Serial (single-thread, embedded), Parallel (max throughput). Android ART: concurrent copying GC. Generational: Young Gen (Eden + Survivor) i Old Gen.",example:"Android ART runtime: concurrent copying GC — Young generation collected co ~50ms z <2ms pause (nie blokuje UI thread). Embedded Android (IoT): Serial GC zmniejsza memory overhead kosztem dłuższych pauz (akceptowalne gdy brak UI). Java 21 ZGC: <1ms pauses nawet na 16TB heap — idealne dla latency-sensitive server workloads."},
{title:".NET GC — generacyjny z LOH",text:"Generational GC: Gen 0 (najnowsze obiekty, collected najczęściej, <1ms), Gen 1 (survived Gen 0), Gen 2 (long-lived). Large Object Heap (LOH) dla obiektów >85KB. Workstation GC (interactive apps — krótsza pause, mniej throughput) vs Server GC (max throughput, dłuższe pauzy).",example:".NET na mobile (MAUI): workstation GC z concurrent background collection — Gen 0 <1ms, nie blokuje UI. .NET 8 Dynamic PGO + tiered compilation redukują alokacje optymalizując hot paths. .NET NativeAOT: ahead-of-time compilation eliminuje JIT overhead — szybszy startup na mobile."},
{title:"Mobile-specific challenges i mitygacje",text:"Oba platformy: ograniczony RAM (2-8GB mobile), battery impact GC pauses, UI jank z stop-the-world collections. Mitygacje: object pooling (reuse zamiast allocate+GC), ArrayPool<T>, reduce allocations w hot paths, memory pressure callbacks od OS.",example:"Android game: pre-alokuje object pool dla bullet/enemy objects (unika GC during gameplay). .NET MAUI: ArrayPool<byte>.Shared.Rent(1024) — reuse bufferów zamiast new byte[1024] per request. Embedded: .NET Nano Framework dla mikrokontrolerów — simplified GC w 256KB RAM. Java ME Embedded: conservative mark-and-sweep na małych heapach."}
]},
analogy:{pl:"GC to jak sprzątanie biura: Java GC to doświadczony zespół z wieloma strategiami (G1 na co dzień, ZGC na ważne eventy, Serial na mały office), .NET GC to zorganizowana firma z trzema brygadami (Gen 0 daily, Gen 1 weekly, Gen 2 monthly + LOH dla mebli). Na telefonie obie ekipy muszą sprzątać cicho (concurrent) żeby nie przeszkadzać spotkaniom (UI thread).",en:"GC is like office cleaning: Java GC is an experienced crew with many strategies (G1 for daily, ZGC for important events, Serial for small offices). .NET GC is an organized company with three brigades (Gen 0 daily, Gen 1 weekly, Gen 2 monthly + LOH for furniture). On mobile, both must clean quietly (concurrent) to not disturb meetings (UI thread)."},
answer:"Java and .NET both use generational garbage collection but with different implementations important for mobile and embedded. Java's JVM offers multiple GC algorithms — G1 as default, ZGC for sub-millisecond pauses on any heap size, Serial for embedded with minimal overhead. Android's ART runtime uses concurrent copying GC with under 2ms young generation pauses that don't block the UI thread. .NET's CLR uses three-generation GC with a Large Object Heap, offering workstation mode for interactive mobile apps with shorter pauses and server mode for throughput. Both face mobile challenges: limited 2-8GB RAM, battery impact from GC activity, and UI jank from collection pauses. Mitigation strategies include object pooling and ArrayPool<T> to reuse allocations in hot paths, reducing GC pressure during gameplay or animations. For embedded, .NET Nano Framework operates in 256KB RAM while Java ME Embedded uses conservative mark-and-sweep on small heaps.",
keywords:["garbage collection","generational GC","G1","ZGC","ART runtime","Gen 0/1/2","Large Object Heap","object pooling","ArrayPool","workstation GC","server GC","NativeAOT","memory pressure"]}

]},

{id:"G",label:"G",color:"#1D9E75",title:"Bazy Danych",questions:[

{num:"Q58",original:"Discuss and compare relational and non-relational database models.",
lecture:{intro:"Relacyjne bazy danych (SQL) organizują dane w ustrukturyzowane tabele z zdefiniowanymi relacjami. Non-relacyjne (NoSQL) używają elastycznych schematów zoptymalizowanych pod konkretne modele danych i wzorce dostępu.",
points:[
{title:"Relational Databases (SQL)",text:"Ustrukturyzowane tabele z wierszami i kolumnami, enforced schemas, ACID transactions (Atomicity, Consistency, Isolation, Durability), język SQL. Silna spójność i złożone JOIN operations. Idealne gdy integrość danych jest kluczowa.",example:"E-commerce: tabela Orders, Products, Customers połączone foreign keys. Jeden SQL JOIN: SELECT o.id, c.name, p.title FROM Orders o JOIN Customers c ON o.customer_id = c.id JOIN Products p ON o.product_id = p.id — ACID gwarantuje: brak partial orders, brak orphaned records."},
{title:"Non-Relational Databases (NoSQL) — 4 typy",text:"Document (MongoDB): flexible JSON documents, nested data. Key-Value (Redis): ultra-fast lookup by key, cache/session. Column-family (Cassandra): time-series, massive write throughput. Graph (Neo4j): relationship-heavy data, social networks. Eventual consistency, horizontal scaling.",example:"Social media feed w MongoDB: post = JSON document z embedded comments i likes. Dodanie nowej feature 'reactions'? Dodaj pole do dokumentu — zero schema migration, zero downtime. Redis: session store z <1ms read/write. Cassandra: 1M writes/sec dla IoT sensor data. Neo4j: 'znajdź friends-of-friends' = natural graph traversal."},
{title:"Kiedy co wybrać i hybrid approaches",text:"SQL: complex queries, transactions, data integrity critical (finanse, healthcare). NoSQL: massive scale, flexible schema, specific patterns (real-time analytics, content management). NewSQL (CockroachDB): SQL + horizontal scaling. PostgreSQL JSONB: relational + document w jednej bazie.",example:"Banking system → PostgreSQL (ACID transactions essential — nie możesz mieć partial transfer). Game leaderboard → Redis (miliony reads/writes per second, eventual consistency OK). Social graph → Neo4j (relationship queries naturalne). Hybrid: PostgreSQL z JSONB — relational tables dla users/orders + JSONB columns dla flexible user preferences i product metadata."}
]},
analogy:{pl:"Baza relacyjna to jak biblioteka z katalogiem kartkowym — każda książka ma kartę (schemat), jest na swoim miejscu (tabela), i szukasz po autorze, tytule, dacie (SQL). NoSQL to jak magazyn z etykietowanymi pudełkami — każde pudełko może mieć inną zawartość (flexible schema), szybko je znajdziesz po etykiecie (key lookup), ale nie zrobisz łatwo cross-reference między pudełkami (no JOINs).",en:"A relational database is like a library with a card catalog — each book has a catalog card (schema), is in its place (table), searchable by author, title, date (SQL). NoSQL is like a warehouse with labeled boxes — each box has different contents (flexible schema), found quickly by label (key lookup), but cross-referencing between boxes is hard (no JOINs)."},
answer:"Relational databases use structured tables with enforced schemas, ACID transactions, and SQL query language — excelling at complex joins, data integrity, and transactional consistency essential for finance and healthcare. Non-relational databases come in four types: document stores like MongoDB for flexible JSON data without schema migrations, key-value stores like Redis for sub-millisecond caching, column-family stores like Cassandra for massive write throughput in IoT scenarios, and graph databases like Neo4j for relationship-heavy queries in social networks. NoSQL typically trades ACID for eventual consistency to achieve horizontal scaling. The choice depends on requirements: relational for transactional integrity and complex ad-hoc queries, NoSQL for massive scale and specific access patterns. Modern hybrid approaches blur the line — CockroachDB provides SQL with horizontal scaling, and PostgreSQL's JSONB enables document-store capabilities within a relational engine.",
keywords:["relational","NoSQL","ACID","eventual consistency","SQL","MongoDB","Redis","Cassandra","Neo4j","schema","JOIN","horizontal scaling","NewSQL","JSONB","CockroachDB"]},

{num:"S2-22",original:"How does real-time data processing work in mobile applications using Firebase Realtime Database or SignalR (ASP.NET)?",
lecture:{intro:"Real-time data processing w mobile apps wymaga technologii push — serwer wysyła dane do klienta natychmiast po zmianie, bez pollingu. Firebase Realtime Database i SignalR to dwa dominujące podejścia.",
points:[
{title:"Firebase Realtime Database",text:"Cloud-hosted NoSQL JSON database z real-time synchronization. Dane synchronizowane między wszystkimi klientami w milisekundach. Offline support: lokalna kopia danych, sync gdy połączenie wróci. Security Rules dla authorization. Optimized dla mobile — SDK na iOS, Android, Web.",example:"Chat app: DatabaseReference ref = database.getReference('messages/room123'); ref.addChildEventListener(...) — nasłuchuje na KAŻDĄ nową wiadomość w pokoju. User A pisze w Tokio → 50ms later User B w Warszawie widzi wiadomość. Offline: wiadomość zapisana lokalnie, wysłana gdy internet wróci. Zero dodatkowego kodu."},
{title:"SignalR (ASP.NET)",text:"Microsoft library dla real-time web/mobile. WebSocket primary, auto-fallback do SSE i Long Polling. Strongly-typed Hubs. Groups i broadcast. Scaling: Azure SignalR Service lub Redis backplane. Full control nad backend logic — w przeciwieństwie do Firebase's BaaS approach.",example:"Stock ticker app: Hub method: async Task SendPrice(string symbol, decimal price) { await Clients.Group(symbol).SendAsync('PriceUpdate', symbol, price); } — only subscribers of 'AAPL' get Apple price updates. Klient .NET MAUI: connection.On<string, decimal>('PriceUpdate', (sym, price) => UpdateUI(sym, price)); — strongly-typed, real-time."},
{title:"Firebase vs SignalR — kiedy co",text:"Firebase: rapid prototyping, small-medium apps, serverless (zero backend code), built-in offline sync, mobile-first. SignalR: full backend control, complex business logic, enterprise (.NET ecosystem), custom scaling, existing ASP.NET Core apps.",example:"Startup MVP chat app: Firebase — gotowe w dzień, zero backend, free tier do 100 concurrent connections, offline sync out-of-box. Enterprise trading dashboard: SignalR — complex server-side logic (calculate moving averages, apply business rules), custom auth, scale to 100K connections z Azure SignalR Service, integrate z existing .NET services."}
]},
analogy:{pl:"Firebase Realtime DB to jak WhatsApp — instant messaging out-of-box, zero konfiguracji serwera, działa offline, ale masz ograniczoną kontrolę nad 'serwerowcem'. SignalR to jak własny system komunikacji firmy — pełna kontrola, custom logika, enterprise features, ale musisz postawić i utrzymywać serwer.",en:"Firebase Realtime DB is like WhatsApp — instant messaging out-of-box, zero server setup, works offline, but limited control over the 'backend'. SignalR is like a company's custom communication system — full control, custom logic, enterprise features, but you must build and maintain the server."},
answer:"Real-time data processing in mobile apps uses push technology instead of polling. Firebase Realtime Database provides a cloud-hosted NoSQL JSON store with automatic synchronization across all connected clients within milliseconds — adding a listener to a data path delivers every change instantly, with built-in offline support caching data locally and syncing when connectivity returns. SignalR provides .NET-based real-time communication using WebSocket with automatic fallback, strongly-typed Hub methods, group-based broadcasting, and scaling through Azure SignalR Service or Redis backplane — offering full server-side control over business logic. Firebase suits rapid prototyping and mobile-first apps needing zero backend code with built-in offline sync. SignalR suits enterprise applications requiring complex server-side processing, custom authentication, and integration with existing .NET services.",
keywords:["Firebase Realtime Database","SignalR","WebSocket","real-time sync","offline support","Hub","push notification","SSE","Long Polling","Azure SignalR Service","BaaS","event listener"]}

]},

{id:"H",label:"H",color:"#D4537E",title:"Web & Mobile Development",questions:[

{num:"Q99",original:"Discuss the principles of MVC template operation. In what projects would you use this type of architecture?",
lecture:{intro:"MVC (Model-View-Controller) to wzorzec architektoniczny separujący trzy odpowiedzialności aplikacji. Główny cel: niezależne rozwijanie UI i logiki biznesowej, testowalność, utrzymywalność.",
points:[
{title:"Model — dane i logika biznesowa",text:"Model reprezentuje dane aplikacji i reguły biznesowe. NIE wie jak dane są wyświetlane. Niezależny od UI. Zawiera: entity classes, business rules, data validation, data access logic.",example:"Aplikacja bankowa: BankAccount z deposit(), withdraw(), getBalance() — to Model. Wie o regułach (nie można wypłacić więcej niż saldo), nie wie o HTML/CSS ani o tym czy jest wyświetlany w web czy mobile app."},
{title:"View — prezentacja i Controller — koordynacja",text:"View odpowiada za rendering danych (HTML, JSON, XML). Zero logiki biznesowej. Controller: przyjmuje HTTP requests, wywołuje Model methods, wybiera View. Mediator między user input i business logic.",example:"POST /transfer: TransferController.handle(request) → waliduje input → bankAccount.transfer(amount, target) → jeśli sukces: return SuccessView → jeśli error: return ErrorView z message. Controller DECYDUJE co się dzieje, Model WYKONUJE logikę, View WYŚWIETLA wynik."},
{title:"Kiedy MVC i alternatywy",text:"MVC: web apps z complex UI, projekty gdzie UI zmienia się niezależnie od logiki. Frameworki: Django, Rails, Spring MVC, ASP.NET Core MVC. NIE najlepszy dla: SPA (lepiej MVVM), microservices (lepiej CQRS), prostych CRUD API (lepiej minimal API).",example:"Django (Python): URL routing → View function (=Controller) → Model query → Template rendering (=View). Spring MVC: @Controller → @Service → @Repository → Thymeleaf template. ASP.NET Core: Controller → Service → EF Core → Razor View. Każdy major web framework implementuje MVC lub jego wariant."}
]},
analogy:{pl:"MVC to jak restauracja: kelner (Controller) przyjmuje zamówienie od klienta (HTTP request), przekazuje do kuchni (Model) gdzie przygotowywane jest danie (dane + logika biznesowa), kelner przynosi gotowe danie na talerzu (View). Kuchnia nie musi wiedzieć jak kelner podaje, kelner nie gotuje, a talerz nie decyduje co na nim leży.",en:"MVC is like a restaurant: the waiter (Controller) takes orders from customers (HTTP requests), passes them to the kitchen (Model) where food is prepared (data + business logic), then brings the finished dish on a plate (View). Kitchen doesn't know how the waiter serves, the waiter doesn't cook, and the plate doesn't decide what's on it."},
answer:"MVC separates applications into three components with distinct responsibilities. The Model contains data and business logic — it knows the rules like 'accounts cannot be overdrawn' but knows nothing about presentation. The View renders data to users as HTML, JSON, or XML — containing zero business logic, only presentation formatting. The Controller receives user requests, invokes Model methods for processing, and selects which View renders the response. This separation enables independent development of UI and backend, multiple Views for the same Model data across web and mobile platforms, and unit testing of Model logic without any UI dependency. MVC is implemented by major frameworks: Django, Ruby on Rails, Spring MVC, and ASP.NET Core MVC. It's ideal for server-rendered web applications with complex data-driven UIs but less suited for SPAs where MVVM pattern with client-side state management is preferred.",
keywords:["Model","View","Controller","separation of concerns","Django","Spring MVC","ASP.NET Core","routing","HTTP request","testability","Razor","Thymeleaf"]},

{num:"Q100",original:"Name and describe features of various types of mobile applications (native, hybrid, cross-platform, etc.).",
lecture:{intro:"Wybór typu aplikacji mobilnej determinuje UX, wydajność, koszt development i maintenance. Cztery główne podejścia — każde z unique trade-offami.",
points:[
{title:"Native Apps",text:"Pisane w języku platformy: Swift/Objective-C (iOS), Kotlin/Java (Android). Pełny dostęp do hardware i OS APIs. Najlepsza wydajność i UX. Wada: osobny codebase per platforma = 2x development cost i maintenance.",example:"Instagram, Spotify: native apps — ultra-smooth scrolling, 60fps animations, full access do camera/GPS/biometrics/push notifications. Koszt: dwa zespoły developerów (iOS + Android), dwa code review processes, dwie pipelines CI/CD. Sens: gdy UX i performance są competitive advantage."},
{title:"Cross-Platform (React Native, Flutter, MAUI)",text:"Jeden codebase → deploy na iOS i Android. Shared business logic, platform-specific UI rendering. Flutter: Dart + own rendering engine (Skia). React Native: JavaScript + native components. MAUI: C# + .NET. 70-90% code sharing, near-native performance.",example:"Flutter: jeden codebase w Dart kompilowany do native ARM code. Own rendering engine (Skia/Impeller) = pixel-perfect consistency na iOS i Android. Google Pay, BMW app. React Native: JavaScript z native UI components — Facebook, Instagram (części). MAUI: C# codebase → iOS, Android, Windows, macOS. Kod shared: business logic, networking, state management. Platform-specific: UI details, platform integrations."},
{title:"PWA i Hybrid Apps",text:"PWA (Progressive Web App): web app z offline support, push notifications, installability. Technologie web: HTML/CSS/JS. Zero app store — dostęp przez URL. Hybrid (Capacitor/Cordova): web app wrapped w native container z dostępem do device APIs przez plugins.",example:"PWA: Twitter Lite — 3% rozmiaru natywnej app, 65% więcej pages/session, 75% więcej tweets. Service Worker cache'uje assets offline. Manifest.json umożliwia 'Add to Home Screen'. Hybrid z Capacitor: web app + native plugins dla camera, geolocation, filesystem. Ionic framework: Angular/React/Vue UI → Capacitor native wrapper."}
]},
analogy:{pl:"Typy mobile apps to jak typy restauracji: Native = ekskluzywna restauracja z dwoma oddzielnymi kuchniami (iOS + Android) — najlepsza jakość ale najdroższa. Cross-platform = jeden szef kuchni gotujący dla dwóch sal (Flutter/RN) — 90% jakości za 50% ceny. PWA = food truck (web) — szybki, tani, wszędzie dostępny, ale bez pełnego menu. Hybrid = food truck z doczepioną grillownią (native plugins).",en:"Mobile app types are like restaurant types: Native = exclusive restaurant with two separate kitchens (iOS + Android) — best quality but most expensive. Cross-platform = one head chef cooking for two dining rooms (Flutter/RN) — 90% quality for 50% price. PWA = food truck (web) — fast, cheap, available everywhere, but limited menu. Hybrid = food truck with an attached grill (native plugins)."},
answer:"Mobile applications come in four main types. Native apps built with Swift/Kotlin provide the best performance, full hardware access, and optimal UX — but require separate codebases per platform, doubling development costs. Cross-platform frameworks like Flutter compile a single Dart codebase to native ARM code through its own rendering engine achieving near-native performance with 70-90% code sharing — used by Google Pay and BMW. React Native uses JavaScript with actual native UI components, while MAUI targets iOS, Android, Windows, and macOS from C#. Progressive Web Apps use web technologies with Service Workers for offline support and push notifications — Twitter Lite achieved 65% more pages per session at 3% the native app's size, zero app store dependency. Hybrid apps via Capacitor wrap web applications in native containers with plugin access to device APIs like camera and geolocation, bridging web convenience with native capability access.",
keywords:["native app","cross-platform","Flutter","React Native","MAUI","PWA","hybrid","Capacitor","Cordova","Swift","Kotlin","Service Worker","Dart","Skia"]},

{num:"S2-7",original:"Compare the role of progressive web apps (PWAs) and native mobile apps in cross-platform development using Java and .NET.",
lecture:{intro:"PWA i native apps reprezentują dwa końce spektrum mobile development — PWA priorytetyzuje reach i cost, native priorytetyzuje performance i capabilities. Java/.NET mają narzędzia dla obu.",
points:[
{title:"PWA — web-first approach",text:"HTML/CSS/JS z Service Worker (offline), Web App Manifest (installability), Push API (notifications). Jeden codebase dla ALL platforms (iOS, Android, desktop). Zero app store — instant updates. Ograniczenia: limited hardware access, iOS ogranicza PWA features (no push until iOS 16.4).",example:"PWA z Java backend: Spring Boot API + React/Angular frontend z Service Worker. Deploy: upload do web serwera — gotowe na WSZYSTKICH platformach. Update: zmień kod na serwerze — wszyscy mają nową wersję natychmiast (no app store review). .NET: Blazor PWA — C# w przeglądarce via WebAssembly + Service Worker."},
{title:"Native — platform-specific approach",text:"Java/Kotlin na Android, .NET MAUI na iOS/Android/Windows. Pełny hardware access: Bluetooth, NFC, ARKit/ARCore, background processing, biometrics. Best performance i UX. App store distribution — discovery ale review delays i 15-30% commission.",example:"Android Java: full access do Camera2 API (manual exposure, RAW capture), Bluetooth LE for IoT devices, WorkManager for guaranteed background tasks. .NET MAUI: C# codebase → native UI na iOS + Android + Windows + macOS. Platform-specific code w partial classes. NuGet packages dla shared logic."},
{title:"Decision matrix — kiedy co",text:"PWA: content-heavy apps (news, e-commerce), broad reach, limited budget, frequent updates. Native: hardware-intensive (camera, BLE, AR), offline-heavy, performance-critical (gaming), platform-specific UX expected.",example:"News app: PWA — content updates constantly, broad reach important, minimal hardware needs. Fitness tracker: native — needs BLE for heart rate monitor, background GPS tracking, HealthKit/Google Fit integration. E-commerce: PWA for browsing + native for checkout/loyalty (push notifications, biometric payment)."}
]},
analogy:{pl:"PWA to jak strona internetowa z supermocami — dostępna przez URL, działa wszędzie, instant updates, ale nie może sterować Bluetooth ani działać w tle bez ograniczeń. Native to jak dedykowana aplikacja w telefonie — pełna moc, pełny dostęp do hardware, ale wymaga instalacji i app store approval. Ideał to hybrid: PWA dla acquisition, native dla retention.",en:"PWA is like a website with superpowers — accessible via URL, works everywhere, instant updates, but can't control Bluetooth or run freely in the background. Native is like a dedicated phone app — full power, full hardware access, but requires installation and app store approval. Ideal: PWA for acquisition, native for retention."},
answer:"PWAs and native apps serve different needs in cross-platform development. PWAs built with web technologies plus Service Workers provide universal reach through URLs, instant updates without app store delays, and a single codebase for all platforms — Java backends with Spring Boot serve React/Angular PWA frontends, while .NET offers Blazor PWA with C# via WebAssembly. Native development through Java/Kotlin for Android and .NET MAUI for iOS/Android/Windows provides full hardware access to Bluetooth, NFC, AR, biometrics, and unrestricted background processing with optimal platform-specific UX. The choice depends on requirements: PWA for content-heavy apps with broad reach and frequent updates like news platforms, native for hardware-intensive apps requiring BLE, GPS tracking, or AR capabilities. Many organizations use both: PWA for initial user acquisition with broad web reach, and native apps for engaged users needing full device integration.",
keywords:["PWA","native app","Service Worker","Web App Manifest","Blazor","MAUI","Kotlin","app store","offline","hardware access","BLE","cross-platform"]},

{num:"S2-9",original:"Discuss how GraphQL differs from REST and how it can be used to optimize API responses in mobile applications.",
lecture:{intro:"GraphQL to query language i runtime dla API — klient specyfikuje DOKŁADNIE jakie dane chce, serwer zwraca NI MNIEJ NI WIĘCEJ. Rozwiązuje problemy over-fetching i under-fetching REST.",
points:[
{title:"REST problems: over-fetching i under-fetching",text:"REST: fixed endpoints zwracają fixed data shapes. Over-fetching: GET /users/1 zwraca 50 pól gdy potrzebujesz 3. Under-fetching: potrzebujesz user + orders + recommendations = 3 osobne API calls. Na mobile: każdy extra byte i extra request to battery drain i data usage.",example:"REST: GET /users/1 → {id, name, email, address, phone, avatar, bio, ...50 fields} — potrzebujesz tylko name i avatar (over-fetch 48 pól). Potem GET /users/1/orders, GET /users/1/recommendations — 3 roundtrips. Na 3G: 3 × 200ms = 600ms latency + transferred data 10x więcej niż potrzeba."},
{title:"GraphQL solution: precise data fetching",text:"Klient wysyła query specyfikujący exact fields. Jeden endpoint, jeden request. Nested queries: user + orders + recommendations w jednym call. Introspection: self-documenting schema. Strongly typed.",example:"GraphQL: query { user(id: 1) { name avatar orders(last: 5) { total date } } } — JEDEN request, DOKŁADNIE te pola. Response: {user: {name: 'Alice', avatar: 'url', orders: [{total: 99, date: '2024-01-15'}, ...]}}. Zero over-fetching, zero under-fetching, jeden roundtrip zamiast trzech."},
{title:"Trade-offs i kiedy używać",text:"GraphQL: complexity na serwerze (resolver, N+1 problem, caching harder), no native HTTP caching (POST-only). REST: prostszy, native HTTP caching, lepszy tooling. Hybryda: REST dla prostych CRUD, GraphQL dla complex data requirements (dashboards, mobile apps z variable screen sizes).",example:"Facebook (creator of GraphQL): mobile app z setkami screen types — każdy potrzebuje innego subset danych. REST: stworzylibyśmy setki custom endpoints. GraphQL: jeden endpoint, każdy screen wysyła swoją query. N+1 fix: DataLoader batches queries. Cache: Apollo Client z normalized cache na kliencie."}
]},
analogy:{pl:"REST to jak menu fixed w restauracji — dostajesz 3-daniowy zestaw (fixed response) nawet jeśli chcesz tylko zupę. Musisz zamówić 3 razy żeby mieć zupę, drugie i deser (3 endpoints). GraphQL to jak restauracja à la carte — zamawiasz DOKŁADNIE co chcesz w jednym zamówieniu, dostajesz DOKŁADNIE to co zamówiłeś, nic więcej.",en:"REST is like a fixed restaurant menu — you get a 3-course set (fixed response) even if you only want soup. You order 3 times for soup, main, and dessert (3 endpoints). GraphQL is à la carte — order EXACTLY what you want in one order, get EXACTLY that, nothing more."},
answer:"GraphQL differs from REST by allowing clients to specify exactly which fields they need in a single request, solving two key REST problems. Over-fetching: REST endpoints return fixed data shapes — a user endpoint might return 50 fields when a mobile screen needs only 3. Under-fetching: displaying a user profile with orders and recommendations requires 3 separate REST calls. GraphQL resolves both: one query specifies exact fields including nested relationships, returning precisely the requested data in a single roundtrip — critical for mobile where every extra byte drains battery and every roundtrip adds 200ms latency on cellular networks. Trade-offs include server complexity with resolver functions and the N+1 query problem mitigated by DataLoader batching, harder HTTP caching since all requests are POST to a single endpoint, and steeper learning curve. Best approach: REST for simple CRUD APIs, GraphQL for complex data requirements like mobile apps with varied screen sizes needing different data subsets.",
keywords:["GraphQL","REST","over-fetching","under-fetching","query","resolver","DataLoader","N+1","Apollo","schema","introspection","single endpoint","mobile optimization"]},

{num:"S2-15",original:"How can automated UI testing be performed in web and mobile applications using tools like Selenium, Appium, or Cypress?",
lecture:{intro:"Automated UI testing symuluje interakcje realnego użytkownika — weryfikując że aplikacja działa poprawnie z perspektywy end-usera, na różnych przeglądarkach i urządzeniach.",
points:[
{title:"Selenium (Web) i Cypress (Modern Web)",text:"Selenium: browser automation przez WebDriver. Multi-browser (Chrome, Firefox, Safari, Edge), multi-language (Java, C#, Python, JS). Mature ecosystem ale flaky tests. Cypress: JS-only, runs inside browser. Szybszy, bardziej reliable, built-in retry i time-travel debugging. Mniej browser/language support.",example:"Selenium Java: driver.get('http://app.com'); driver.findElement(By.id('login')).sendKeys('user'); driver.findElement(By.id('submit')).click(); assert driver.getCurrentUrl().contains('/dashboard'). Cypress: cy.visit('/login'); cy.get('#username').type('user'); cy.get('button[type=submit]').click(); cy.url().should('include', '/dashboard'); — automatyczny retry, zero explicit waits."},
{title:"Appium (Mobile)",text:"Selenium-like API dla mobile apps. iOS i Android, native i hybrid apps. Device/simulator/emulator. Ten sam WebDriver protocol — developer znający Selenium łatwo przejdzie na Appium. Cross-platform test code z Page Object Model.",example:"Appium: driver.findElement(By.id('com.app:id/login_btn')).click(); driver.findElement(By.xpath('//android.widget.EditText')).sendKeys('user'); — ten sam pattern co Selenium. Run na: real device farm (AWS Device Farm, BrowserStack), local emulator, lub CI/CD pipeline z Android emulator w Docker."},
{title:"Best practices i Page Object Model",text:"Page Object Model (POM): encapsuluj UI structure per page w osobnej klasie. Zmiana UI w jednym miejscu. Test pyramid: few UI tests, more integration, most unit. CI/CD integration. Visual regression testing (Percy, Applitools) łapie visual changes niewidoczne w DOM assertions.",example:"POM: class LoginPage { get usernameField() { return cy.get('#username'); } get submitBtn() { return cy.get('[data-testid=submit]'); } login(user, pass) { this.usernameField.type(user); ... } }. Test: const login = new LoginPage(); login.login('admin', 'pass'); — zmiany selektorów UI tylko w jednym miejscu (LoginPage), nie w 50 testach."}
]},
analogy:{pl:"Automated UI test to jak mystery shopper w sklepie: klika, wpisuje, czeka na wyniki — dokładnie jak prawdziwy klient, ale systematycznie, powtarzalnie i 24/7. Page Object Model to mapa sklepu dla mystery shoppera — gdy sklep zmienia layout (UI redesign), aktualizujesz mapę raz zamiast wszystkie instrukcje shoppera.",en:"An automated UI test is like a mystery shopper: clicks, types, waits for results — exactly like a real customer, but systematically, repeatably, 24/7. Page Object Model is the store map for the mystery shopper — when the store changes layout (UI redesign), you update the map once instead of all the shopper's instructions."},
answer:"Automated UI testing uses three primary tools. Selenium automates browsers through WebDriver across Chrome, Firefox, Safari, and Edge with bindings for Java, C#, Python, and JavaScript — mature but prone to flaky tests requiring explicit waits and careful element selection. Cypress runs directly inside the browser for faster, more reliable web testing with built-in automatic retry, time-travel debugging, and zero-configuration waiting — but supports only JavaScript and fewer browsers. Appium extends the WebDriver protocol to mobile applications on iOS and Android, supporting native and hybrid apps on real devices, simulators, and cloud device farms like AWS Device Farm. Best practices include the Page Object Model encapsulating UI structure per page for single-point-of-change maintenance, the test pyramid keeping UI tests minimal with more integration and unit tests, CI/CD integration for automated regression on every commit, and visual regression tools like Percy detecting visual changes invisible to DOM assertions.",
keywords:["Selenium","Cypress","Appium","WebDriver","Page Object Model","test pyramid","visual regression","Percy","Applitools","CI/CD","device farm","flaky test","data-testid"]},

{num:"S2-19",original:"Explain how microservices architectures improve web application scalability, and how Java (Spring Boot) and .NET (Docker/Kubernetes) support them.",
lecture:{intro:"Microservices rozbijają monolith na małe, niezależnie deployowalne serwisy — każdy z własnym database, lifecycle i scaling. Spring Boot i .NET zapewniają production-ready frameworki.",
points:[
{title:"Scalability benefits",text:"Independent scaling: skaluj TYLKO serwisy pod obciążeniem (checkout w Black Friday) bez skalowania reszty. Technology freedom per serwis. Fault isolation: crash jednego serwisu nie zabija reszty. Team autonomy: osobne teamy, osobne deploymenty.",example:"Monolith: skaluj CAŁY app 10x żeby obsłużyć peak w checkout (90% zasobów zmarnowane na user profile, search). Microservices: skaluj TYLKO checkout-service 10x, reszta bez zmian. Savings: 80% mniej compute podczas peak. Team: checkout team deployuje 5x/dzień niezależnie od user team."},
{title:"Spring Boot microservices",text:"Spring Boot: opinionated framework z auto-configuration. Spring Cloud: service discovery (Eureka), config server, circuit breaker (Resilience4j), API gateway (Spring Cloud Gateway). Docker packaging + K8s deployment. Spring Boot Actuator: health checks, metrics.",example:"@SpringBootApplication class OrderService { }. Spring Cloud: @EnableDiscoveryClient → rejestracja w Eureka. @FeignClient('payment-service') interface PaymentClient { @PostMapping PaymentResult charge(PaymentRequest req); } — type-safe inter-service call z load balancing i circuit breaker. Actuator /health endpoint → K8s liveness probe."},
{title:".NET microservices z Docker/K8s",text:".NET: ASP.NET Core minimal APIs lub controllers. Docker multi-stage build (build → publish → runtime). K8s Helm charts per serwis. .NET Aspire: new orchestration framework simplifying microservices dev. Dapr: sidecar-based building blocks (pub/sub, state, service invocation).",example:".NET: Dockerfile → FROM mcr.microsoft.com/dotnet/sdk:8.0 AS build → FROM mcr.microsoft.com/dotnet/aspnet:8.0 AS runtime. Helm chart: deployment.yaml, service.yaml, hpa.yaml. .NET Aspire: var builder = DistributedApplication.CreateBuilder(); builder.AddProject<OrderService>().WithReference(redis).WithReference(postgres); — local dev orchestration mirroring production topology."}
]},
analogy:{pl:"Monolith to jak jeden ogromny sklep z wszystkim — żeby obsłużyć więcej klientów w dziale elektroniki musisz powiększyć CAŁY sklep. Microservices to mall z osobnymi sklepami — powiększ TYLKO sklep elektroniczny w Black Friday, reszta bez zmian. Każdy sklep ma własnego managera (team), własny magazyn (database) i własne godziny otwarcia (deployment schedule).",en:"A monolith is like one huge department store — to handle more electronics customers you must enlarge the ENTIRE store. Microservices is a mall with separate shops — enlarge ONLY the electronics store on Black Friday, rest unchanged. Each shop has its own manager (team), own warehouse (database), and own opening hours (deployment schedule)."},
answer:"Microservices improve scalability by enabling independent scaling of individual services — scaling only the checkout service 10x during Black Friday instead of the entire monolith, saving 80% compute costs. Fault isolation prevents one service crash from affecting others, and team autonomy enables independent deployment schedules. Spring Boot provides the foundation with auto-configuration, Spring Cloud adds service discovery via Eureka, circuit breakers with Resilience4j, and API gateway through Spring Cloud Gateway, with @FeignClient enabling type-safe inter-service calls with built-in load balancing. .NET supports microservices through ASP.NET Core with Docker multi-stage builds, Kubernetes Helm charts per service, .NET Aspire for local development orchestration mirroring production topology, and Dapr for sidecar-based building blocks handling pub/sub, state management, and service invocation across any language.",
keywords:["microservices","independent scaling","Spring Boot","Spring Cloud","Eureka","Resilience4j","Docker","Kubernetes","Helm",".NET Aspire","Dapr","fault isolation","team autonomy"]},

{num:"S2-20",original:"How do serverless computing platforms like AWS Lambda and Azure Functions enhance web application efficiency?",
lecture:{intro:"Serverless platforms uruchamiają kod w odpowiedzi na eventy — bez zarządzania serwerami, z auto-scaling od 0 do tysięcy instancji i pay-per-execution pricing.",
points:[
{title:"Core concept i event-driven execution",text:"Developer pisze funkcję (handler), platform zarządza infrastrukturą. Triggery: HTTP request, queue message, file upload, schedule (cron), database change. Auto-scale: od 0 (zero cost) do 1000+ concurrent executions automatycznie. Pay only per invocation + duration + memory.",example:"AWS Lambda: exports.handler = async (event) => { const order = JSON.parse(event.body); await processOrder(order); return { statusCode: 200 }; }. Trigger: API Gateway HTTP POST. 0 invocations = $0. 1M invocations/month × 200ms avg × 128MB = ~$0.40/month. Comparable EC2: ~$50/month always-on."},
{title:"Efficiency gains",text:"Zero idle cost (scale-to-zero). Zero server management (patching, scaling, monitoring — platform handles). Reduced time-to-market: focus on business logic only. Per-request pricing aligns cost z actual usage. Concurrent execution handles bursty traffic without pre-provisioning.",example:"Image processing pipeline: S3 upload trigger → Lambda resizes to 3 sizes → saves to S3 → Lambda generates metadata → writes to DynamoDB. Zero servers. Auto-handles: 0 uploads at 3AM (zero cost), 10,000 uploads at peak (auto-scales). Azure Functions: same model z Azure Blob Storage trigger i Cosmos DB output binding."},
{title:"Limitations i kiedy NIE serverless",text:"Cold starts: 100ms-10s initial latency. Execution limits: 15 min max (Lambda), 10 min (Functions default). Stateless: state w external services. Vendor lock-in. Not ideal for: long-running processes, persistent connections (WebSocket), heavy compute (ML training), predictable high-volume traffic (cheaper always-on).",example:"Cold start problem: Python Lambda z ML dependencies: 5-8s first invocation. Mitigation: provisioned concurrency ($0.015/GB-hour). NOT serverless: video transcoding (>15min), WebSocket chat server (persistent connection), ML training (hours of GPU). GOOD serverless: API endpoints, file processing, scheduled jobs, webhooks, IoT data processing."}
]},
analogy:{pl:"Serverless to jak Uber zamiast własnego samochodu: płacisz TYLKO za przejazdy (invocations), nie za parking, ubezpieczenie, serwis (server management). Auto-dostępny w 2 minuty (cold start). Ale: dłuższa podróż (>15min execution limit) wymaga własnego auta, i na codziennych dojazdach (predictable traffic) własny samochód jest tańszy.",en:"Serverless is like Uber instead of owning a car: pay ONLY for rides (invocations), not parking, insurance, maintenance (server management). Auto-available in 2 minutes (cold start). But: longer trips (>15min execution limit) need your own car, and for daily commutes (predictable traffic) owning is cheaper."},
answer:"Serverless platforms like AWS Lambda and Azure Functions enhance web application efficiency through event-driven execution where developers write only handler functions while the platform manages all infrastructure. The scale-to-zero capability means zero cost during idle periods, while automatic scaling to thousands of concurrent executions handles traffic bursts without pre-provisioning — an image processing pipeline automatically handles 0 uploads at 3AM and 10,000 at peak with no configuration. Pay-per-execution pricing — 1 million Lambda invocations at 200ms and 128MB costs approximately $0.40 versus $50 monthly for an always-on EC2 instance. Limitations include cold starts adding 100ms to 10 seconds on first invocation, 15-minute maximum execution time, stateless architecture requiring external state services, and vendor lock-in. Serverless excels for API endpoints, file processing, scheduled jobs, and IoT pipelines but is unsuitable for long-running processes, persistent WebSocket connections, or predictable high-volume traffic where always-on servers are more cost-effective.",
keywords:["serverless","AWS Lambda","Azure Functions","scale-to-zero","event-driven","cold start","pay-per-execution","API Gateway","provisioned concurrency","auto-scaling","trigger","FaaS"]},

{num:"S2-23",original:"What role do event-driven architectures play in embedded systems and mobile applications? Provide examples.",
lecture:{intro:"Event-driven architecture (EDA) to paradygmat gdzie flow programu jest determinowany przez eventy — user actions, sensor readings, timers, interrupts. Naturalny model zarówno dla embedded jak i mobile.",
points:[
{title:"EDA w Embedded Systems",text:"Embedded systems inherently event-driven: hardware interrupts (button press, sensor threshold, timer tick), RTOS event queues, state machines reagujące na eventy. Efektywny energy usage: sleep until event (nie busy-wait polling).",example:"Smartwatch: większość czasu CPU śpi (battery saving). Interrupt: accelerometer detects movement → wake CPU → check if wrist raise → turn on display → display time → sleep. Button press interrupt → wake → show menu. Heartrate sensor interrupt → wake → read value → log → sleep. Event-driven = months of battery life instead of hours."},
{title:"EDA w Mobile Applications",text:"Mobile OS-y event-driven by design: touch events, lifecycle events (onCreate, onResume, onPause), notifications, sensor callbacks, network state changes. Reactive programming (RxJava, Combine, Flow) formalizuje event streams. Observer pattern wszędzie.",example:"Android: onClick, onSwipe, onLocationChanged — all events. Kotlin Flow: locationFlow.filter { it.accuracy < 10 }.map { it.toAddress() }.collect { updateUI(it) } — reactive chain processing GPS events. iOS Combine: URLSession.dataTaskPublisher(for: url).map(\.data).decode(type: User.self, decoder: JSONDecoder()).receive(on: DispatchQueue.main).sink { updateUI($0) }."},
{title:"Shared patterns i korzyści",text:"Loose coupling: event producer nie zna consumera. Extensibility: dodawanie nowych handlerów bez zmiany producera. Responsiveness: system reaguje natychmiast na zdarzenia zamiast okresowego sprawdzania. Scalability: handlery mogą działać równolegle.",example:"IoT + Mobile integration: sensor (embedded) → publishes temperature event via MQTT → cloud broker → mobile app subscribes → receives event → updates UI. Żaden komponent nie zna drugiego bezpośrednio. Dodanie nowego subscribera (np. alerting service) = zero zmian w sensor code lub mobile app."}
]},
analogy:{pl:"Event-driven architecture to jak system alarmowy w domu: czujniki (event producers) wykrywają zdarzenia (ruch, dym, otwarcie drzwi) i wysyłają sygnał do centrali (event bus). Centrala powiadamia odpowiednie urządzenia (event handlers): kamerę, syrenę, twój telefon. Czujnik nie wie o kamerze, kamera nie wie o syrenie — każdy reaguje niezależnie na event.",en:"Event-driven architecture is like a home alarm system: sensors (event producers) detect events (motion, smoke, door opening) and signal the control panel (event bus). The panel notifies appropriate devices (event handlers): camera, siren, your phone. The sensor doesn't know about the camera, the camera doesn't know about the siren — each reacts independently to the event."},
answer:"Event-driven architectures are natural for both embedded and mobile systems. In embedded systems, hardware interrupts drive the entire program flow — a smartwatch CPU sleeps most of the time and wakes only on accelerometer, button, or heartrate sensor interrupts, enabling months of battery life versus hours with polling. In mobile applications, the OS is inherently event-driven with touch events, lifecycle callbacks, and sensor updates — reactive programming through Kotlin Flow, iOS Combine, and RxJava formalizes event stream processing with declarative chains of filter, map, and collect operations. Shared benefits include loose coupling between event producers and consumers, extensibility through adding new handlers without modifying producers, immediate responsiveness to changes, and parallel handler execution. In IoT integration, embedded sensors publish events via MQTT, cloud brokers route them, and mobile apps subscribe — no component knows about others, making the system infinitely extensible.",
keywords:["event-driven","interrupt","RTOS","Kotlin Flow","Combine","RxJava","Observer pattern","MQTT","reactive programming","loose coupling","sleep mode","lifecycle"]},

{num:"S2-24",original:"Explain how Android's WorkManager and iOS Background Tasks help optimize mobile application performance.",
lecture:{intro:"Mobile OS-y agresywnie ograniczają background processing żeby chronić baterię. WorkManager (Android) i BGTaskScheduler (iOS) to oficjalne API do niezawodnego przetwarzania w tle w ramach tych ograniczeń.",
points:[
{title:"Android WorkManager",text:"Gwarantowane wykonanie nawet po restarcie urządzenia. OS decyduje KIEDY (batching z innymi tasks). Constraints: requiresNetwork, requiresCharging, requiresBatteryNotLow. Chaining: task A → then B → then C. OneTimeWorkRequest lub PeriodicWorkRequest (min 15 min interval).",example:"Sync photos to cloud: val work = OneTimeWorkRequestBuilder<PhotoSyncWorker>().setConstraints(Constraints.Builder().setRequiredNetworkType(NetworkType.UNMETERED).setRequiresBatteryNotLow(true).build()).build(); WorkManager.enqueue(work). OS wykona gdy: WiFi available + battery OK. Nawet jeśli user zamknie app lub zrestartuje telefon — WorkManager retry'uje."},
{title:"iOS BGTaskScheduler",text:"BGAppRefreshTask: krótki (~30s) background fetch — odświeżenie danych, pobieranie nowego contentu. BGProcessingTask: dłuższe przetwarzanie (~minuty) — ML model update, database maintenance. OS decyduje timing based on user behavior patterns i battery/network state.",example:"iOS: BGTaskScheduler.shared.register(forTaskWithIdentifier: 'com.app.refresh', using: nil) { task in let fetchTask = task as! BGAppRefreshTask; fetchNewArticles { success in fetchTask.setTaskCompleted(success: success) } }. OS: 'user usually opens app at 8:00, schedule fetch at 7:55 żeby content był fresh'. Smart, battery-aware scheduling."},
{title:"Optimizations i best practices",text:"Batch operations: grupuj wiele małych operacji w jedną background task. Respect constraints: nie forsuj network gdy battery low. Incremental sync: wysyłaj tylko delta, nie full dataset. Exponential backoff: jeśli task fails, czekaj coraz dłużej. Monitoring: track task completion rates.",example:"Photo app: zamiast upload każdego zdjęcia osobno (100 background tasks) → batch upload 100 zdjęć w jednym WorkManager task (1 task, mniej overhead). Incremental sync: 'last synced: timestamp X' → pobierz TYLKO zmiany po X. Backoff: first retry 30s, second 60s, third 120s — nie zabij baterii retry'ami na brak sieci."}
]},
analogy:{pl:"WorkManager/BGTaskScheduler to jak inteligentna pralka z programowaniem: mówisz 'wypierz TO gdy jest tani prąd i wystarczający zapas wody' (constraints). Pralka (OS) decyduje KIEDY uruchomić program żeby być najbardziej efektywna energetycznie. Gwarantuje że pranie ZOSTANIE zrobione (reliable execution) nawet jeśli był blackout (device restart).",en:"WorkManager/BGTaskScheduler is like a smart washing machine with scheduling: you say 'wash THIS when electricity is cheap and water supply is good' (constraints). The machine (OS) decides WHEN to run for maximum energy efficiency. Guarantees the laundry WILL be done (reliable execution) even if there was a power outage (device restart)."},
answer:"Mobile operating systems aggressively restrict background processing to preserve battery life. Android's WorkManager provides guaranteed task execution with constraints — specifying required network type, battery level, and charging state — the OS determines optimal timing by batching with other tasks. Tasks survive app closure and device restarts. Chaining enables dependent task sequences. iOS BGTaskScheduler offers BGAppRefreshTask for short 30-second data fetches and BGProcessingTask for longer operations like ML model updates — the OS intelligently schedules based on learned user behavior patterns, running fetches just before the user typically opens the app. Best practices include batching multiple operations into single tasks to reduce overhead, incremental sync sending only deltas rather than full datasets, and exponential backoff on failures preventing battery drain from aggressive retries on unavailable networks.",
keywords:["WorkManager","BGTaskScheduler","background processing","constraints","battery optimization","OneTimeWorkRequest","PeriodicWorkRequest","BGAppRefreshTask","BGProcessingTask","incremental sync","exponential backoff","reliable execution"]},

{num:"S2-27",original:"Explain how edge computing influences the performance of embedded systems and mobile applications.",
lecture:{intro:"Edge computing przetwarza dane blisko źródła (na urządzeniu lub w local gateway) zamiast wysyłać wszystko do cloud — dramatycznie redukując latencję, bandwidth i dependency on connectivity.",
points:[
{title:"Latency reduction",text:"Cloud roundtrip: 50-200ms. Edge processing: 1-10ms. Dla real-time applications (autonomous vehicles, AR, industrial control) ta różnica jest krytyczna. Edge AI: ML inference bezpośrednio na urządzeniu lub local server.",example:"Autonomous vehicle: rozpoznanie pieszego wymaga <10ms response. Cloud roundtrip 100ms = samochód przejedzie 3 metry zanim dostanie odpowiedź z cloud. Edge AI na NVIDIA Jetson w samochodzie: inference w 5ms. AR app: cloud rendering 100ms = visible lag przy ruchach głowy. Edge: Apple Neural Engine przetwarza lokalne = seamless 60fps AR."},
{title:"Bandwidth reduction i offline capability",text:"IoT sensor generujący 1GB danych/dzień: wysyłanie wszystkiego do cloud = drogo i wolno. Edge przetwarza lokalnie, wysyła tylko wyniki (KB zamiast GB). Offline capability: edge działa bez internet connection — critical dla remote locations.",example:"Factory IoT: 1000 sensorów × 100 readings/sec = 100K datapoints/sec. Edge gateway: filtruje normalne, wysyła TYLKO anomalie (5/hour) do cloud. 99.99% redukcja bandwidth. Oil rig w ocean: brak stabilnego internetu. Edge server przetwarza dane lokalnie, sync'uje z cloud gdy łączność dostępna. Zero dependency on connectivity."},
{title:"Privacy i architectural patterns",text:"Wrażliwe dane (face recognition, medical) przetwarzane lokalnie — nigdy nie opuszczają urządzenia/premises. Federated learning: model trenowany na edge devices, do cloud wysyłane tylko gradient updates (nie raw data). Fog computing: hierarchia edge → fog → cloud.",example:"Apple Face ID: rozpoznawanie twarzy WYŁĄCZNIE na iPhone's Secure Enclave — biometric data NIGDY nie opuszcza urządzenia. Google Keyboard: federated learning — model autocomplete trenowany na millions of phones, Google NIGDY nie widzi tego co piszesz. Only gradient updates aggregated w cloud."}
]},
analogy:{pl:"Edge computing to jak lokalna apteka vs szpital centralny: proste sprawy (leki OTC, pomiar ciśnienia) załatwisz natychmiast w aptece za rogiem (edge = niski latency). Po złożoną operację jedziesz do szpitala (cloud = pełna moc). Edge nie zastępuje cloud — uzupełnia go dla time-critical i data-sensitive operacji.",en:"Edge computing is like a local pharmacy vs central hospital: simple things (OTC meds, blood pressure check) you handle instantly at the corner pharmacy (edge = low latency). For complex surgery you go to the hospital (cloud = full power). Edge doesn't replace cloud — it complements it for time-critical and data-sensitive operations."},
answer:"Edge computing processes data near its source rather than sending everything to the cloud, providing three critical benefits. Latency reduction from 50-200ms cloud roundtrip to 1-10ms local processing — essential for autonomous vehicles needing sub-10ms pedestrian detection, AR applications requiring seamless 60fps rendering, and industrial control systems. Bandwidth reduction of up to 99.99% by processing IoT sensor data locally and sending only anomalies to cloud — a factory with 100,000 datapoints per second sends only 5 anomalies per hour. Privacy preservation by keeping sensitive data on-device — Apple Face ID processes biometrics exclusively in the Secure Enclave, and federated learning trains ML models on edge devices sending only gradient updates to the cloud, never raw user data. Edge doesn't replace cloud but complements it in a hierarchical architecture: edge for real-time and privacy-sensitive processing, cloud for heavy computation and long-term storage.",
keywords:["edge computing","latency","bandwidth reduction","edge AI","NVIDIA Jetson","Neural Engine","federated learning","fog computing","Secure Enclave","offline capability","IoT gateway","privacy"]},

{num:"S2-28",original:"Compare how Bluetooth Low Energy (BLE) and MQTT protocols can be used in IoT-based embedded system projects.",
lecture:{intro:"BLE i MQTT to dwa dominujące protokoły IoT — ale na RÓŻNYCH warstwach i do RÓŻNYCH celów. BLE: short-range device-to-device. MQTT: long-range device-to-cloud messaging.",
points:[
{title:"BLE — short-range, low-power device communication",text:"Bluetooth Low Energy: zasięg ~50-100m, ultra-low power (button cell battery na lata), point-to-point lub broadcast. GATT (Generic Attribute Profile): services i characteristics. Idealne: wearables, sensors, beacons, medical devices. NIE do internetu bezpośrednio.",example:"Fitness tracker: BLE GATT Heart Rate Service (UUID 0x180D) → Characteristic: Heart Rate Measurement (UUID 0x2A37). Telefon łączy się z tracker BLE, subskrybuje characteristic → otrzymuje heartrate co sekundę. Zużycie: ~10μA average → battery 6-12 miesięcy na coin cell. Zasięg: 10-30m w praktyce."},
{title:"MQTT — lightweight publish/subscribe messaging",text:"Message Queuing Telemetry Transport: TCP/IP based, pub/sub model, ultra-lightweight headers (~2 bytes). Broker-based: device → publish to topic → broker → deliver to subscribers. QoS levels: 0 (at most once), 1 (at least once), 2 (exactly once). Idealne: device-to-cloud communication.",example:"Smart home: temperature sensor → MQTT publish to 'home/living_room/temp' (QoS 1) → Mosquitto broker → subscribers: dashboard app, AC controller, alerting service. Payload: 50 bytes. Total message: ~60 bytes (vs HTTP: ~500 bytes for same data). On 3G/4G: 8x mniej bandwidth niż HTTP REST."},
{title:"BLE + MQTT — complementary architecture",text:"Typowy pattern: BLE sensors → BLE Gateway (Raspberry Pi/ESP32) → MQTT → Cloud broker → Applications. BLE zbiera dane z sensorów short-range, MQTT transportuje je do cloud. Razem tworzą complete IoT pipeline od sensor do application.",example:"Industrial IoT: 50 BLE temperature sensors w factory (coin cell, 5 lat baterii). BLE Gateway (ESP32) zbiera readings z wszystkich 50 sensorów co 10 sekund. Gateway publishes aggregated data przez MQTT (over WiFi/4G) do AWS IoT Core. Cloud: stores, analyzes, alerts. Total architecture: ultra-low-power sensors + reliable cloud delivery."}
]},
analogy:{pl:"BLE to jak walkie-talkie — krótki zasięg, bezpośrednia komunikacja między dwoma osobami (device-to-device), bateria trzyma bardzo długo. MQTT to jak poczta z centralną sortownią (broker) — list (message) dociera z dowolnego miejsca na świecie do dowolnego adresata (pub/sub), ale wymaga adresu i infrastruktury pocztowej (internet). Razem: walkie-talkie zbiera info w terenie, poczta wysyła raporty do centrali.",en:"BLE is like a walkie-talkie — short range, direct person-to-person communication (device-to-device), battery lasts very long. MQTT is like postal mail with a central sorting facility (broker) — a letter (message) reaches from anywhere to anyone (pub/sub), but needs an address and postal infrastructure (internet). Together: walkie-talkie gathers field info, post office sends reports to headquarters."},
answer:"BLE and MQTT serve complementary roles in IoT. Bluetooth Low Energy provides short-range device-to-device communication at ultra-low power — sensors running on coin cell batteries for years using the GATT profile for structured data exchange within 10-100 meter range, ideal for wearables, beacons, and medical devices. MQTT provides lightweight publish-subscribe messaging over TCP/IP for device-to-cloud communication with ~2-byte overhead — 8x less bandwidth than HTTP — with three QoS levels from fire-and-forget to exactly-once delivery, ideal for reliable telemetry over cellular or WiFi networks. The typical IoT architecture combines both: BLE sensors collect data locally with minimal power consumption, a BLE gateway aggregates readings from dozens of sensors, then MQTT transports the data to cloud brokers like AWS IoT Core for storage, analysis, and alerting — creating a complete pipeline from ultra-low-power sensor to cloud application.",
keywords:["BLE","MQTT","GATT","publish/subscribe","QoS","broker","Mosquitto","AWS IoT Core","beacon","coin cell","short-range","lightweight","IoT gateway","ESP32"]},

{num:"S2-30",original:"Discuss the challenges of developing cross-platform applications for embedded systems and mobile devices, and how frameworks like Flutter or MAUI help overcome them.",
lecture:{intro:"Cross-platform development obiecuje 'write once, run everywhere' — ale embedded i mobile mają fundamentalnie różne constraints, APIs i user expectations. Frameworki pomagają, ale nie eliminują wszystkich wyzwań.",
points:[
{title:"Kluczowe wyzwania cross-platform",text:"Platform-specific APIs (camera, BLE, sensors różnią się między iOS/Android). UI expectations: iOS users oczekują iOS look & feel, Android — Material Design. Performance: abstraction layer dodaje overhead. Hardware diversity: tysiące Android devices z różnymi capabilities, screen sizes, OS versions.",example:"Camera access: iOS AVFoundation vs Android Camera2 — kompletnie różne API. Biometrics: iOS Face ID vs Android fingerprint API. UI: iOS navigation stack vs Android back button behavior. Test matrix: 3 iOS devices × 15,000 Android devices = impossibly large. Fragment'acja Androida: OS 10-14 = 95% rynku ale każda wersja ma different capabilities."},
{title:"Flutter — own rendering engine approach",text:"Dart compiled do native ARM code. Własny rendering engine (Skia/Impeller) — pixel-perfect consistency cross-platform (nie używa native UI components). Hot reload: zmiany widoczne w sekundach bez rebuild. Rosnący ecosystem: packages na pub.dev. Wyzwanie: platform-specific features wymagają platform channels (native code bridge).",example:"Flutter: MaterialApp() wygląda IDENTYCZNIE na iOS i Android (own rendering). Platform channel: MethodChannel('com.app/ble').invokeMethod('startScan') → native Kotlin/Swift kod obsługuje BLE (framework nie wie o BLE). Package: flutter_blue_plus abstracts BLE cross-platform. Hot reload: zmień kolor buttona → widzisz zmianę w <1s bez restartu app."},
{title:".NET MAUI — native UI approach",text:"C# shared codebase → native UI per platform (uses platform's actual UI controls). .NET ecosystem (NuGet, Entity Framework, SignalR). Platform-specific code w partial classes i #if ANDROID/#if IOS directives. Blazor Hybrid: web UI components w native app. Mniejszy ecosystem niż Flutter ale silna enterprise adoption.",example:"MAUI: <Button Text='Click' /> → renders jako UIButton na iOS, MaterialButton na Android, Button na Windows — NATIVE platform controls, nie custom rendering. Shared logic w C#: ViewModels, Services, Models — ~80% kodu. Platform-specific: #if ANDROID Permissions.RequestAsync<Permissions.Camera>() #endif. Blazor Hybrid: reuse web components w mobile app."}
]},
analogy:{pl:"Cross-platform to jak tłumaczenie książki na wiele języków: Flutter to tworzenie universalnego języka obrazkowego (own rendering — wygląda identycznie wszędzie, ale nie 'brzmi' jak natywny język). MAUI to zatrudnienie native tłumaczy per język (native UI — brzmi naturalnie w każdym języku, ale tłumacze mogą interpretować inaczej). Oba lepsze niż pisanie osobnej książki per język (native per platform).",en:"Cross-platform is like translating a book into many languages: Flutter creates a universal picture language (own rendering — looks identical everywhere but doesn't 'sound' native). MAUI hires native translators per language (native UI — sounds natural in each language but translators may interpret differently). Both better than writing a separate book per language (native per platform)."},
answer:"Cross-platform development for mobile and embedded faces challenges including platform-specific APIs differing between iOS and Android for camera, Bluetooth, and sensors, divergent UI expectations between iOS and Material Design, performance overhead from abstraction layers, and massive Android device fragmentation across 15,000+ devices and multiple OS versions. Flutter overcomes these with its own Skia/Impeller rendering engine providing pixel-perfect cross-platform consistency, Dart compiled to native ARM for near-native performance, hot reload for sub-second development iteration, and platform channels bridging to native code when needed for BLE or platform-specific features. .NET MAUI takes the native UI approach — C# shared codebase with platform-specific native controls (UIButton on iOS, MaterialButton on Android), ~80% code sharing for business logic, partial classes for platform-specific implementations, and Blazor Hybrid for reusing web UI components in native mobile shells. Flutter has a larger open-source ecosystem while MAUI has stronger enterprise integration with the .NET stack.",
keywords:["cross-platform","Flutter","MAUI","Dart","Skia","hot reload","platform channel","native UI","device fragmentation","Blazor Hybrid","C#","ARM compilation","NuGet"]}

]},

{id:"I",label:"I",color:"#E24B4A",title:"DevOps & Zarządzanie Projektami",questions:[

{num:"Q16",original:"Present the key differences between traditional methods of project management (e.g.: Waterfall) and agile methods (e.g.: Scrum, Kanban) and discuss situations in which each of these methods can be most efficient, especially in the context of IT projects.",
lecture:{intro:"Waterfall i Agile to dwa fundamentalnie różne podejścia do zarządzania projektami IT. Waterfall: sekwencyjny, plan-driven. Agile: iteracyjny, change-embracing. Wybór determinuje jak zespół organizuje pracę i reaguje na zmiany.",
points:[
{title:"Waterfall — sekwencyjny, predictive",text:"Liniowe fazy: Requirements → Design → Implementation → Testing → Deployment → Maintenance. Każda faza zakończona przed następną. Extensive dokumentacja upfront. Zmiany wymagań trudne i kosztowne po zakończeniu fazy design. Predictable timeline i budget — ale ryzyko że produkt nie spełnia oczekiwań (feedback po miesiącach).",example:"Budowa mostu: wymagania jasne (przepustowość, obciążenie), design stabilny (fizyka się nie zmienia), zmiana w trakcie budowy = katastrofa kosztowa. Software analog: system embedded dla samolotu — wymagania zdefiniowane przez regulatora (DO-178C), zmiana po certification = 18 miesięcy procesu. Waterfall ideal."},
{title:"Agile (Scrum/Kanban) — iteracyjny, adaptive",text:"Scrum: 2-4 tygodniowe sprinty z incremental delivery. Product Backlog → Sprint Planning → Daily Standup → Sprint Review → Retrospective. Kanban: continuous flow z WIP limits (limit work in progress). Agile Manifesto: individuals > processes, working software > docs, customer collaboration > contract negotiation, responding to change > following plan.",example:"Startup SaaS product: wymagania zmieniają się co tydzień bo rynek się zmienia. Scrum: 2-week sprint → deliver feature → user feedback → adjust next sprint. Kanban board: To Do → In Progress (WIP limit: 3) → Code Review → Testing → Done. Limit WIP prevents context switching i overload."},
{title:"Kiedy co — decision matrix",text:"Waterfall: wymagania stabilne, regulatory compliance, physical+software integration, fixed-price contracts. Agile: zmieniające się wymagania, user-facing products, innovation/R&D, time-to-market pressure. Hybrid (Scaled Agile — SAFe): large enterprises łączące Agile teams z portfolio-level planning.",example:"Government defense contract: Waterfall — fixed requirements, fixed budget, extensive compliance documentation, penalties za zmianę scope. Startup mobile app: Agile — 'pivot po każdym user test', weekly releases, product-market fit discovery. Enterprise (bank z 500 developerów): SAFe — Agile Release Trains, PI Planning, portfolio-level Kanban."}
]},
analogy:{pl:"Waterfall to jak budowanie domu z gotowym projektem: architect → blueprint → fundament → ściany → dach → wykończenie. Zmiana planu na etapie dachu = burzenie ścian. Agile to jak budowanie z LEGO: budujesz pokój, sprawdzasz czy pasuje, przerabiasz, dodajesz następny. Łatwo zmieniasz, ale trudniej przewidzieć final cost i termin.",en:"Waterfall is like building a house from finished blueprints: architect → blueprint → foundation → walls → roof → finishing. Changing plans at the roof stage = tearing down walls. Agile is like building with LEGO: build a room, check if it fits, rework, add next. Easy to change, but harder to predict final cost and deadline."},
answer:"Waterfall follows sequential phases — Requirements, Design, Implementation, Testing, Deployment — with each phase completed before the next begins. It provides predictable timelines and budgets, extensive documentation, and suits projects with stable requirements like embedded systems under regulatory compliance or fixed-price government contracts. Agile methods use iterative development: Scrum delivers working software in 2-4 week sprints with continuous user feedback, while Kanban optimizes continuous flow with WIP limits preventing team overload. Agile excels when requirements evolve, time-to-market matters, and user feedback drives direction — typical for SaaS products and startup applications. For large enterprises, Scaled Agile Framework (SAFe) combines Agile team practices with portfolio-level planning through Agile Release Trains and PI Planning ceremonies, bridging the gap between team agility and organizational governance.",
keywords:["Waterfall","Agile","Scrum","Kanban","sprint","WIP limit","SAFe","Product Backlog","Daily Standup","retrospective","iterative","sequential","compliance"]},

{num:"Q18",original:"Discuss the types of tests and benefits brought by test automation in the process of software development.",
lecture:{intro:"Test automation to fundament nowoczesnego software development — umożliwia szybkie, powtarzalne, comprehensive testowanie na każdym etapie pipeline'u, od unit tests po production monitoring.",
points:[
{title:"Test pyramid — typy testów",text:"Unit tests (base): testują single function/method w izolacji. Szybkie (<1ms each), tysiące, tanie do utrzymania. Integration tests (middle): testują interakcję między komponentami (API + DB). Wolniejsze, dziesiątki-setki. E2E tests (top): symulują real user flow przez cały system. Najwolniejsze, najbardziej fragile, kilka-kilkadziesiąt.",example:"Unit: assertEquals(10.50, calculateDiscount(100, 0.105)). Integration: POST /api/orders z real DB → verify order saved z correct total. E2E (Cypress): visit('/') → login → add item to cart → checkout → verify confirmation page. Ratio: 70% unit / 20% integration / 10% E2E."},
{title:"Benefits of automation",text:"Speed: tysiące testów w minutach vs dni manualnie. Consistency: te same testy, te same warunki, za każdym razem. Regression detection: instant feedback czy nowy kod złamał istniejącą funkcjonalność. CI/CD enabler: automated tests gate deployments. Cost: expensive upfront, ale ROI within weeks for active projects.",example:"Manual regression: 2 testers × 3 dni = 48h per release. Automated: 15 minut w CI pipeline per KAŻDY commit. 100 commits/tydzień × 15 min = 25h automated vs 48h manual PER release. Ale: 100 commits testowanych vs 1 release. 100x więcej coverage z 2x mniej czasu. Bug caught on commit vs caught after 2 weeks of development."},
