{title:"Definicja klasy (Python)",text:"Keyword class, konstruktor __init__(self), parametr self jako referencja do instancji. Ciało klasy definiuje atrybuty (pola) i metody (zachowania). Class variables vs instance variables.",example:"class Student:\n    school = 'MIT'  # class variable — shared\n    def __init__(self, name, grade):\n        self.name = name  # instance variable — per object\n        self.grade = grade\n    def is_passing(self):\n        return self.grade >= 50"},
{title:"Tworzenie i używanie obiektów",text:"Wywołanie klasy jak funkcji tworzy instancję. Konstruktor __init__ inicjalizuje stan. Obiekty to reference types — zmienne trzymają referencje, nie sam obiekt. Porównanie: is (identity) vs == (equality).",example:"s1 = Student('Alice', 85); s2 = Student('Bob', 45)\nprint(s1.is_passing())  # True\nprint(s2.is_passing())  # False\ns3 = s1  # s3 references SAME object as s1\ns3.grade = 90  # also changes s1.grade!"},
{title:"Usuwanie obiektów i Garbage Collection",text:"Python: objects usuwane gdy reference count = 0 lub przez GC dla circular references. del usuwa referencję (nie obiekt bezpośrednio). __del__ destruktor (rzadko używany). Java/C#: GC entirely, no manual delete. Disposal pattern dla unmanaged resources.",example:"s1 = Student('Alice', 85)\ndel s1  # removes reference; if no other refs, GC collects\n# Java: no delete keyword — GC handles everything\n# C#: IDisposable pattern: using (var conn = new SqlConnection()) { ... } — deterministic cleanup for unmanaged resources"}
]},
analogy:{pl:"Tworzenie obiektu to jak pieczenie ciasta: klasa to przepis (Student), __init__ to mieszanie składników (ustawianie name i grade), obiekt to gotowe ciasto w pamięci. del to wyrzucenie ciasta do kosza, a garbage collector to śmieciarka opróżniająca kosz gdy jest pełny.",en:"Creating an object is like baking: the class is the recipe (Student), __init__ is mixing ingredients (setting name and grade), the object is the finished cake in memory. del is throwing the cake in the trash, and the garbage collector is the truck emptying the bin when it's full."},
answer:"A class is a template defining attributes and methods — in Python: class Student: def __init__(self, name, grade): self.name = name. An object is created by calling the class: s = Student('Alice', 85), which invokes the __init__ constructor to initialize state. Objects are reference types — variables hold references to heap-allocated objects, so assigning s2 = s1 creates a second reference to the same object, not a copy. Deletion in Python occurs when reference count reaches zero or via garbage collection for circular references — del removes a reference but doesn't directly destroy the object. In Java and C#, garbage collection handles all object cleanup automatically. For resources requiring deterministic cleanup — file handles, database connections — Python's with statement, C#'s IDisposable with using, and Java's AutoCloseable with try-with-resources ensure cleanup regardless of exceptions.",
keywords:["class","object","constructor","__init__","new keyword","reference type","garbage collector","del","IDisposable","using statement","reference counting","lifecycle"]},

{num:"Q49",original:"What is the significance of polymorphism in object-oriented programming, what mechanisms of its implementation exist in different programming languages, and what limitations and possibilities arise from their use?",
lecture:{intro:"Rozszerzenie Q46 o mechanizmy implementacji polimorfizmu i ich trade-offy: vtable vs duck typing vs traits — każdy z innymi kosztami i możliwościami.",
points:[
{title:"Virtual Method Table (vtable) — C++/Java/C#",text:"Każda klasa z virtual methods ma vtable — lookup table mapującą nazwy metod na implementacje. Runtime cost: jedna pointer indirection per virtual call (~2ns). JIT (HotSpot, .NET JIT) może devirtualize hot calls.",example:"C++ virtual call: object ptr → vtable ptr → method address → jump. ~2ns overhead. Java: wszystkie metody virtual by default — HotSpot JIT devirtualizuje monomorphic call sites (99% calls do jednego typu) eliminując overhead. C#: virtual/override explicit."},
{title:"Duck Typing — Python/JavaScript",text:"Nie potrzeba vtable — method lookup w runtime przez attribute dictionary obiektu. Każdy obiekt z odpowiednią metodą pasuje. Elastyczny ale brak compile-time type checking — errors w runtime.",example:"Python: def calculate_area(shape): return shape.area(). Działa z Circle, Rectangle, CustomShape — cokolwiek co ma metodę area(). Nie potrzeba wspólnej klasy bazowej ani interfejsu. Ale: literówka shape.aera() = runtime AttributeError, nie compile error."},
{title:"Traits/Protocols — Rust/Go/Swift",text:"Rust traits i Go interfaces: polimorfizm BEZ dziedziczenia. Rust: static dispatch (monomorphization, zero-cost) lub dynamic dispatch (trait objects, dyn Trait). Go: implicit interface satisfaction — nie deklarujesz że implementujesz.",example:"Rust: fn area<S: Shape>(s: &S) → static dispatch via monomorphization (zero overhead, osobny kod per typ). fn area(s: &dyn Shape) → dynamic dispatch via trait object (vtable-like, ~2ns). Trade-off: static = szybsze ale code bloat; dynamic = compact ale overhead."}
]},
analogy:{pl:"Implementacje polimorfizmu to jak systemy pocztowe: vtable to stały katalog adresów (szybki lookup, ale musisz być w katalogu), duck typing to 'kto otworzy drzwi, temu dam paczkę' (elastyczny, ale ryzyko pomyłki), traits to umowa kurierska (jasne zasady bez hierarchii, zero-cost jeśli znany typ).",en:"Polymorphism implementations are like postal systems: vtable is a fixed address book (fast lookup, but must be listed), duck typing is 'whoever opens the door gets the package' (flexible but error-prone), traits are a courier contract (clear rules without hierarchy, zero-cost when type is known)."},
answer:"Polymorphism is implemented through different mechanisms with distinct trade-offs. C++, Java, and C# use virtual method tables — each class has a vtable mapping virtual methods to implementations, with approximately 2ns overhead per call that JIT compilers can often eliminate through devirtualization of monomorphic call sites. Python and JavaScript use duck typing — runtime method lookup via attribute dictionaries, offering maximum flexibility without requiring shared base classes but sacrificing compile-time error detection. Rust uses traits with two dispatch modes: monomorphization for zero-cost static dispatch generating specialized code per type, and trait objects for dynamic dispatch with vtable-like overhead. Limitations include vtable overhead for hot loops, duck typing's runtime errors from typos, the diamond problem in multiple inheritance, and code bloat from monomorphization. Each mechanism suits different contexts: performance-critical code benefits from static dispatch, rapid prototyping from duck typing, and safe abstractions from trait systems.",
keywords:["vtable","dynamic dispatch","static dispatch","duck typing","monomorphization","trait object","devirtualization","JIT","diamond problem","code bloat"]},

{num:"Q50",original:"Discuss the syntax of defining and differences in passing parameters, returning values and calling object (instance) and class (static) methods in a selected language.",
lecture:{intro:"Metody w OOP dzielą się na dwie kategorie: instance methods (operują na stanie obiektu) i static/class methods (operują na poziomie klasy, bez instancji). Semantyka przekazywania parametrów różni się między językami.",
points:[
{title:"Instance vs Static methods",text:"Instance methods mają dostęp do stanu obiektu przez self/this. Wywoływane na instancji. Static methods: brak dostępu do stanu instancji, utility functions. Python classmethod: dostęp do klasy (cls), używane jako alternative constructors.",example:"Python instance: def greet(self): return f'Hi, {self.name}'. Static: @staticmethod def celsius_to_f(c): return c*9/5+32. Classmethod: @classmethod def from_json(cls, data): return cls(**data). Java: public String greet() { return 'Hi, ' + this.name; } vs public static double toFahrenheit(double c) {...}"},
{title:"Semantyka przekazywania parametrów",text:"Java: pass-by-value dla primitives, pass-by-reference-value dla objects (kopia referencji). Python: pass-by-object-reference — mutable objects modyfikowalne in-place, immutable nie. C#: ref/out keywords dla true pass-by-reference.",example:"Python: def add(lst, item): lst.append(item) — modyfikuje oryginalną listę (mutable). def inc(x): x += 1 — NIE modyfikuje oryginału (int immutable). C#: void Swap(ref int a, ref int b) — true pass-by-reference, a i b zmienione w callerze."},
{title:"Return values i multiple returns",text:"Większość języków: jeden return value. Python: return tuple (multiple values). C#: out parameters lub tuples. Java: wrapper object lub array. Destructuring w nowoczesnych językach czyni multiple returns eleganckim.",example:"Python: def min_max(lst): return min(lst), max(lst). Caller: lo, hi = min_max(data). C#: (int Min, int Max) MinMax(List<int> lst) => (lst.Min(), lst.Max()). var (lo, hi) = MinMax(data). Java: return new int[]{min, max} — mniej elegancko."}
]},
analogy:{pl:"Instance method to kelner obsługujący KONKRETNY stolik (ma dostęp do zamówień tego stolika przez self/this). Static method to kucharz — nie obsługuje żadnego stolika, po prostu gotuje (utility bez stanu). Classmethod to menedżer restauracji — zna typ restauracji (cls) i może otworzyć nową filię (factory).",en:"An instance method is a waiter serving a SPECIFIC table (accesses that table's orders via self/this). A static method is the chef — doesn't serve any table, just cooks (utility without state). A classmethod is the restaurant manager — knows the restaurant type (cls) and can open a new branch (factory)."},
answer:"Instance methods operate on object state accessed via self in Python or this in Java/C#, called on specific object instances. Static methods belong to the class with no instance state access, serving as stateless utility functions. Python additionally provides @classmethod with cls parameter for factory patterns and alternative constructors. Parameter passing varies: Java passes primitives by value and object references by value — modifying the object through the reference works but reassigning the reference doesn't affect the caller. Python passes object references — mutable objects like lists are modifiable in-place, immutable objects like integers are not. C# offers ref and out keywords for true pass-by-reference. Return values: Python supports elegant tuple returns with destructuring, C# has named tuples and out parameters, while Java requires wrapper objects for multiple return values.",
keywords:["instance method","static method","classmethod","self","this","pass by value","pass by reference","return tuple","ref","out","factory method","utility"]},

{num:"Q51",original:"How are classes defined and objects created and deleted in a chosen programming language, what memory management mechanisms influence the object lifecycle, and what are the performance implications for applications?",
lecture:{intro:"Object lifecycle management — od alokacji przez użycie po dealokację — bezpośrednio wpływa na wydajność aplikacji. Różne strategie (GC, manual, ownership) mają różne trade-offy.",
points:[
{title:"Allocation strategies i GC generacyjny",text:"Stack allocation ~100x szybsza niż heap. JVM: bump-pointer allocation w Young Generation (prawie tak szybko jak stack). Generational hypothesis: większość obiektów umiera młodo → frequent minor GC Young Gen, rare major GC Old Gen.",example:"Java: new Object() alokowane w Eden space przez bump pointer (~10ns). Eden full → minor GC kopiuje survivors do Survivor space (~1-5ms dla 1GB heap). 95% obiektów umiera w Eden — nigdy nie docierają do Old Gen."},
{title:"GC pauses i ich wpływ",text:"GC pauses mogą powodować UI jank (mobile) lub latency spikes (serwery). Java ZGC: max pause <1ms niezależnie od heap size (do 16TB). G1: configurable target pause (default 200ms). Wybór GC algorytmu zależy od workloadu.",example:"Trading system: Java ZGC — sub-ms pauses konieczne. Web app: G1 z 200ms target — akceptowalne. Android: concurrent GC z ART runtime — <2ms young gen pauses. Batch processing: Parallel GC — maximize throughput kosztem dłuższych pauz (acceptable offline)."},
{title:"Object Pooling i Value Types",text:"Pre-alokuj i reużywaj obiekty żeby uniknąć GC pressure. Connection pools, thread pools, buffer pools. C# structs i Rust ownership: avoid heap entirely. JVM escape analysis: stack-allocate objects that don't escape method scope.",example:"Apache Commons Pool: GenericObjectPool<Connection> zarządza DB connections. Borrow → use → return (nie GC). C#: struct Point { public int X, Y; } — alokowany na stack, zero GC. JVM: Point p = new Point(1,2) w method — escape analysis może stack-allocate jeśli p nie escape'uje."}
]},
analogy:{pl:"GC to jak sprzątanie biura: generacyjne GC to sprzątanie biurek co wieczór (young gen — szybkie, częste) i gruntowne sprzątanie raz na miesiąc (old gen — wolne, rzadkie). Object pooling to zmywanie i reużywanie kubków zamiast jednorazowych. Stack allocation to notatki na whiteboard — wymazane automatycznie po spotkaniu.",en:"GC is like office cleaning: generational GC cleans desks every evening (young gen — fast, frequent) and does deep cleaning monthly (old gen — slow, rare). Object pooling is washing and reusing mugs instead of disposable cups. Stack allocation is whiteboard notes — erased automatically after the meeting."},
answer:"Object lifecycle significantly impacts performance. JVM allocation uses bump-pointer in Young Generation at near-stack speed. Generational GC exploits the fact that 95% of objects die young — collecting Young Generation frequently and cheaply while rarely touching Old Generation. GC pause impact varies by algorithm: Java ZGC achieves sub-millisecond pauses for heaps up to 16TB, essential for trading systems, while G1 with 200ms targets suits web applications. Object pooling pre-allocates and reuses expensive objects like database connections and thread pools to reduce GC pressure in high-throughput scenarios. Value types — C# structs allocated on the stack — avoid heap entirely with zero GC overhead. JVM escape analysis can automatically stack-allocate objects that don't escape method scope, combining convenience with performance.",
keywords:["generational GC","Young Generation","Eden","ZGC","G1","object pooling","escape analysis","value type","struct","bump pointer","GC pause","stack allocation"]},

{num:"Q52",original:"Describe the concept of inheritance and its implementation in a selected object-oriented programming language.",
lecture:{intro:"Dziedziczenie pozwala tworzyć nowe klasy na bazie istniejących, przejmując ich pola i metody. Wyraża relację is-a. Cel: reużywalność kodu i organizacja hierarchii klas.",
points:[
{title:"Implementacja dziedziczenia (C#/Java)",text:"Klasa pochodna (child) dziedziczy po klasie bazowej (parent). Child ma wszystkie non-private members parenta + może dodawać nowe i overridować odziedziczone. Konstruktory chained przez base()/super().",example:"C#: class ElectricCar : Car { public int BatteryLevel; public override void Refuel() { Recharge(); } } — ElectricCar is-a Car, dziedziczy Start(), Stop(), overriduje Refuel(). Java: class ElectricCar extends Car { @Override public void refuel() { recharge(); } }"},
{title:"Single vs Multiple Inheritance",text:"Java/C# pozwalają na single inheritance (jeden parent) + multiple interfaces. C++/Python pozwalają multiple inheritance — ale Diamond Problem: która implementacja gdy oba parenty ją mają? Python: MRO z C3 linearization. C++: virtual inheritance.",example:"Diamond Problem: class D inherits B and C, oba inherit A. Która wersja metody A? Python MRO: D→B→C→A (C3 linearization, left-to-right depth-first). Java/C# unikają: max 1 klasa bazowa, ale implement wielu interfejsów (interfejsy bez stanu = bez konfliktów)."},
{title:"Composition over Inheritance",text:"GoF principle: favor composition (HAS-A) over inheritance (IS-A). Dziedziczenie tworzy tight coupling. Composition jest bardziej elastyczna i unika fragile base class problem.",example:"Zamiast: class ElectricFlyingCar(Car, Airplane, Electric) — 3-way multiple inheritance nightmare. Lepiej: class ElectricFlyingCar { Engine engine; Wings wings; Battery battery; } — composition z wymiennymi komponentami. Zmiana silnika nie wymaga refactoringu hierarchii."}
]},
analogy:{pl:"Dziedziczenie to jak rodzinny biznes: dziecko (klasa pochodna) dziedziczy firmę i metody pracy od rodzica. Może zmodyfikować niektóre procesy (override) lub dodać nowe linie biznesowe (nowe metody). Composition to jak holding: firma główna posiada wyspecjalizowane spółki, każda robí swoją rzecz niezależnie.",en:"Inheritance is like a family business: the child (derived class) inherits the company and work methods from the parent. It can modify processes (override) or add new business lines (new methods). Composition is like a holding company: the main company owns specialized subsidiaries, each doing their thing independently."},
answer:"Inheritance allows a derived class to acquire fields and methods from a base class, expressing an is-a relationship. In C# and Java, the derived class inherits all non-private members, can add new members, and override inherited methods using the override keyword with constructor chaining via base() or super(). Java and C# restrict to single class inheritance, using multiple interface implementation for additional contracts — avoiding the Diamond Problem that arises in C++ and Python when multiple parents define the same method. Python resolves this via MRO with C3 linearization. The modern best practice is 'favor composition over inheritance' — composition creates looser coupling, avoids the fragile base class problem, and enables more flexible object assembly from interchangeable components rather than rigid inheritance hierarchies.",
keywords:["inheritance","base class","derived class","override","super","MRO","Diamond Problem","single inheritance","multiple inheritance","composition over inheritance","is-a","HAS-A"]},


{num:"Q53",original:"What are the key differences between automatic and dynamic variables in the context of programming? How do these differences affect memory management and operation of a programme?",
lecture:{intro:"Zmienne automatyczne (stack) i dynamiczne (heap) różnią się fundamentalnie w sposobie i czasie alokacji/dealokacji pamięci — zrozumienie tego jest kluczowe dla pisania wydajnych, bezpiecznych programów.",
points:[
{title:"Zmienne automatyczne (stack)",text:"Alokowane na stosie przy wejściu do funkcji, automatycznie zwalniane przy wyjściu. Stały rozmiar znany w compile time. Alokacja ultra-szybka (przesunięcie stack pointer). LIFO order. Brak memory leaks — niemożliwe.",example:"void foo() { int x = 42; char buf[100]; } — x i buf to zmienne automatyczne. Gdy foo() wraca — pamięć zwolniona instantly przez przesunięcie stack pointera. Zero cleanup code needed. Stack size typowo 1-8 MB (OS-dependent)."},
{title:"Zmienne dynamiczne (heap)",text:"Alokowane na heapie w runtime przez malloc/new. Zwalniane explicite (free/delete) lub przez GC. Rozmiar może być runtime-determined. Żyją dłużej niż scope funkcji. Wolniejsza alokacja (memory manager search). Ryzyko: memory leaks, fragmentation, dangling pointers.",example:"int* arr = new int[n]; — rozmiar n znany dopiero w runtime. Ta pamięć żyje aż do explicit delete[] arr lub GC. W Javie: ArrayList<Integer> list = new ArrayList<>() — heap-allocated, GC-managed. Zapomnienie free/delete = memory leak."},
{title:"Trade-offy i nowoczesne rozwiązania",text:"Stack: szybki (~100x), bezpieczny, ale mały (1-8MB) i fixed-size. Heap: elastyczny rozmiar, długi lifetime, ale wolny i ryzykowny. Nowoczesne języki: Rust ownership (compile-time safety), C++ smart pointers, GC w Java/C#/Python.",example:"Rust: let v = vec![1,2,3]; — heap-allocated ale ownership system gwarantuje: brak memory leaks, brak dangling pointers, brak data races — wszystko sprawdzone w COMPILE TIME. C++: unique_ptr<int[]> arr(new int[n]); — auto-delete gdy unique_ptr wychodzi ze scope."}
]},
analogy:{pl:"Zmienne automatyczne to jak notatki na tablicy w sali konferencyjnej — pojawiają się na spotkanie i są wymazane po jego zakończeniu, automatycznie. Zmienne dynamiczne to jak dokumenty w szafce aktowej — musisz je sam schować, podpisać i pamiętać żeby wyrzucić, bo inaczej szafka się przepełni (memory leak).",en:"Automatic variables are like notes on a conference room whiteboard — they appear for the meeting and are erased automatically when it ends. Dynamic variables are like documents in a filing cabinet — you must file, label, and remember to discard them, or the cabinet overflows (memory leak)."},
answer:"Automatic variables are allocated on the stack when entering a function scope and automatically freed on exit — allocation is ultra-fast via stack pointer adjustment, memory leaks are impossible, but size must be known at compile time and is limited to the stack size of typically 1-8 MB. Dynamic variables are allocated on the heap at runtime via new or malloc, can be any size determined at runtime, and persist beyond function scope — but risk memory leaks if not freed, heap fragmentation, and dangling pointers if accessed after deallocation. Stack allocation is roughly 100x faster than heap. Modern solutions address heap risks: Rust's ownership system prevents leaks and dangling pointers at compile time, C++ smart pointers like unique_ptr automate deallocation when scope exits, and garbage collection in Java, C#, and Python trades some performance for complete memory safety.",
keywords:["stack","heap","automatic variable","dynamic variable","malloc","new","free","memory leak","dangling pointer","smart pointer","Rust ownership","garbage collector","stack overflow"]},

{num:"Q54",original:"How does the notion of an interface differ from the class implementation in the context of object-oriented programming? What are the main advantages of using interfaces in software development?",
lecture:{intro:"Interface definiuje KONTRAKT — co obiekt potrafi. Klasa dostarcza IMPLEMENTACJĘ — jak to robi. To rozróżnienie jest kluczem do loose coupling, testowalności i SOLID principles.",
points:[
{title:"Interface — kontrakt bez implementacji",text:"Interface deklaruje sygnatury metod bez ciała (tradycyjnie). Klasa implementująca MUSI dostarczyć implementację każdej metody. Zero stanu, zero logiki. Java 8+ dodało default methods — częściowa implementacja w interface.",example:"Java: interface Flyable { void takeOff(); void land(); double getAltitude(); } — pure contract. Implementują: Airplane, Drone, Bird — każda klasa po swojemu. Airplane i Bird nie muszą mieć wspólnej klasy bazowej — łączy je kontrakt Flyable."},
{title:"Loose coupling i Dependency Inversion",text:"Kod zależy od interfejsu, nie od concrete class. Podmiana implementacji bez zmiany kodu klienta. Fundament testowalności: mock objects implementują ten sam interfejs co production code.",example:"FlightController(Flyable aircraft) — zależy od interfejsu. Produkcja: new FlightController(new Boeing787()). Testy: new FlightController(new MockAircraft()). FlightController identyczny w obu — zmienia się tylko implementacja. Dependency Injection wstrzykuje właściwą implementację."},
{title:"Multiple interface implementation",text:"Klasa może implementować wiele interfejsów — forma multiple inheritance bez Diamond Problem. Unrelated klasy mogą dzielić kontrakt bez relacji dziedziczenia. Interface Segregation Principle: wiele małych interfejsów > jeden duży.",example:"class Drone implements Flyable, Photographable, Rechargeable { } — trzy kontrakty, zero inheritance hierarchy. ISP: zamiast interface Vehicle { fly(); drive(); swim(); } lepiej: interface Flyable, interface Drivable, interface Swimmable — klasa implementuje tylko to co naprawdę potrafi."}
]},
analogy:{pl:"Interface to jak umowa o pracę — określa CO pracownik musi robić (metody). Klasa to konkretny pracownik — decyduje JAK to robi. Firma (kod klienta) podpisuje umowę z interfejsem, nie z konkretną osobą. Może wymienić pracownika (implementację) bez zmiany umowy (kodu).",en:"An interface is like an employment contract — specifies WHAT the employee must do (methods). A class is the actual employee — decides HOW. The company (client code) signs a contract with the interface, not a specific person. Can replace the employee (implementation) without changing the contract (code)."},
answer:"An interface defines a pure contract — method signatures without implementation or state — that implementing classes must fulfill. A class provides the actual implementation logic. This separation enables loose coupling: client code depends on the interface abstraction, allowing implementations to be swapped without modification — the Dependency Inversion Principle. Interfaces enable testability through mock objects implementing production interfaces, and multiple interface implementation lets unrelated classes share contracts without inheritance — a Drone can implement Flyable, Photographable, and Rechargeable simultaneously. Interface Segregation Principle recommends many small focused interfaces over one large one. Compared to abstract classes, interfaces suit unrelated classes sharing behavioral contracts, while abstract classes suit hierarchies with shared partial implementation. Java 8+ default methods blur this line by allowing interfaces to provide method implementations.",
keywords:["interface","abstract class","loose coupling","Dependency Inversion","contract","SOLID","ISP","mock objects","multiple implementation","default method","testability"]},

{num:"Q55",original:"What are the main techniques and advantages of creating new classes by inheritance from already existing classes in object-oriented programming? How does inheritance support code reusing and organisation of class hierarchy?",
lecture:{intro:"Dziedziczenie to mechanizm tworzenia specjalizowanych klas z generalnych — promujący reużywalność kodu poprzez hierarchię, ale wymagający careful design żeby unikać tight coupling.",
points:[
{title:"Code reuse i method overriding",text:"Child dziedziczy CAŁĄ funkcjonalność parenta bez przepisywania. Tylko różnice/dodania wymagają nowego kodu. Override: child nadpisuje metodę parenta zachowując ten sam interfejs. Liskov Substitution Principle: child musi być używalny wszędzie gdzie oczekiwany parent.",example:"class Vehicle { start(); stop(); } → class Car extends Vehicle { openTrunk(); } → class ElectricCar extends Car { override refuel() → recharge(); chargeBattery(); } — 3 poziomy reuse. ElectricCar ma start(), stop() z Vehicle, openTrunk() z Car, plus własne metody."},
{title:"Template Method Pattern",text:"Parent definiuje szkielet algorytmu z abstrakcyjnymi krokami. Children implementują kroki. Inversion of control: parent kontroluje flow, children dostarczają detale. Idealny dla framework design.",example:"abstract class DataProcessor { final void process() { data = read(); cleaned = clean(data); result = transform(cleaned); write(result); } abstract Object transform(Object data); } — Children implementują TYLKO transform(). Pipeline jest fixed i tested w parent. Nowy typ processora = nowa klasa z jedną metodą."},
{title:"Hierarchie klas i ograniczenia",text:"Hierarchie modelują taksonomie (Animal→Mammal→Dog) lub abstrakcje techniczne (Stream→FileStream→BufferedFileStream). Ale: głębokie hierarchie stają się fragile. Zmiana w parent łamie wiele children. Zasada: shallow hierarchies + interfaces > deep inheritance.",example:"Java Collections: Collection → List → ArrayList, LinkedList. Collection → Set → HashSet, TreeSet. 2-3 poziomy max. Głębsza hierarchia (5+ levels): każda zmiana w bazowej klasie kaskadowo wpływa na dziesiątki podklas — maintenance nightmare. Favor composition for deep structures."}
]},
analogy:{pl:"Dziedziczenie to jak linia produkcyjna samochodów: model bazowy (parent) ma silnik i koła — każdy samochód je dostaje za darmo. Wersja sportowa (child) dodaje turbo i spoiler. Nie budujesz od zera — rozszerzasz istniejący model. Ale: jeśli zmienisz podwozie (base class) — WSZYSTKIE modele muszą być zaktualizowane.",en:"Inheritance is like a car production line: the base model (parent) has engine and wheels — every car gets them for free. Sport version (child) adds turbo and spoiler. You don't build from scratch — you extend. But: change the chassis (base class) and ALL models need updating."},
answer:"Inheritance creates specialized classes from general ones, promoting code reuse — child classes inherit all parent functionality and add or override only what differs. Method overriding provides specialization while maintaining interface compatibility per the Liskov Substitution Principle — children must be usable wherever the parent is expected. The Template Method pattern leverages inheritance for framework design: the parent defines the algorithm skeleton with abstract steps, children implement only the specific steps. Class hierarchies organize code in taxonomies like Java's Collection framework with 2-3 levels of depth. However, deep hierarchies become fragile — changes in a base class cascade through all descendants. Modern best practice favors shallow hierarchies with interface-based polymorphism and composition for complex object assembly.",
keywords:["inheritance","code reuse","override","Liskov Substitution","Template Method","class hierarchy","fragile base class","shallow hierarchy","composition","specialization"]},

{num:"Q56",original:"What are the differences in syntax for defining instance and class (static) methods in a chosen programming language, how do parameter passing and return values affect their behavior, and what are the consequences of choosing a specific approach for code structure?",
lecture:{intro:"Wybór między instance i static methods ma konsekwencje architektoniczne wykraczające poza syntaks — wpływa na testowalność, coupling, thread safety i design patterns.",
points:[
{title:"Architektoniczne konsekwencje",text:"Instance methods = stateful code tied to objects. Mockable via interfaces. Static methods = stateless utility. Trudne do mockowania (wymagają PowerMock/mockStatic). Overuse static → hidden dependencies → untestable code.",example:"Static: Math.sqrt(x) — pure function, bezstanowa, łatwo testowalna. UserService.getUser(id) jako static — tworzy hidden dependency na DB, niemożliwy do mockowania w testach bez specjalnych narzędzi. Lepiej: instance method na interfejsie IUserService."},
{title:"Thread safety",text:"Static mutable state = concurrency problems. Instance state jest per-object (thread-safe jeśli każdy thread ma własną instancję). Static methods na shared state wymagają synchronizacji (locks) — źródło deadlocków.",example:"static int counter = 0; static void increment() { counter++; } — race condition przy wielu wątkach! Dwa wątki czytają 5, oba piszą 6 zamiast 7. Rozwiązanie: Interlocked.Increment(ref counter) lub instance counter per thread."},
{title:"Factory i Builder patterns",text:"Static factory methods (of(), from(), create()) łączą wygodę static z tworzeniem instancji. Builders używają instance methods dla fluent API. Best practice: static dla pure functions i factories, instance dla czegokolwiek ze stanem lub zależnościami.",example:"Java: List.of(1,2,3) — static factory zwraca immutable list. Optional.of(value). Builder: new HttpRequest.Builder().url('...').header('...').timeout(30).build() — fluent instance methods zwracające this. Static entry point → instance chain → build."}
]},
analogy:{pl:"Static methods to automaty vendingowe — nie potrzebują obsługi (instancji), zawsze ten sam wynik dla tego samego inputu, ale nie dostosujesz oferty per klient. Instance methods to kelner — potrzebuje stolika (obiektu), ale może dostosować obsługę do każdego klienta indywidualnie i jest łatwo zastępowalny (mockable).",en:"Static methods are vending machines — no staff needed (no instance), same output for same input, but you can't customize per customer. Instance methods are waiters — need a table (object), but can personalize service and are easily replaceable (mockable)."},
answer:"The choice between instance and static methods has architectural consequences beyond syntax. Instance methods are bound to objects, enabling polymorphism, interface-based mocking, and per-object state — essential for testable, loosely-coupled designs following SOLID principles. Static methods are stateless utilities — fast and simple but creating hidden dependencies that are impossible to mock in tests without special tools. Thread safety differs critically: static mutable state requires explicit synchronization and risks race conditions, while instance state per-thread is naturally safe. Factory method pattern combines static convenience with instance creation — List.of() is static but returns an instance for polymorphic use. Builder pattern uses fluent instance methods returning this for readable construction chains. Best practice: static for pure functions and factories only, instance methods for anything involving state, dependencies, or requiring testability.",
keywords:["static method","instance method","testability","mock","factory method","thread safety","race condition","pure function","hidden dependency","fluent API","Builder pattern","SOLID"]},

{num:"Q59",original:"What inheritance techniques are available in different programming languages, what are their advantages and limitations, and how do different inheritance models support code reusability and class hierarchy organization?",
lecture:{intro:"Języki oferują różne modele dziedziczenia — od single inheritance po traits/protocols — każdy z innymi trade-offami między elastycznością, bezpieczeństwem i złożonością.",
points:[
{title:"Single Inheritance (Java/C#)",text:"Jeden parent class. Prosty, bez Diamond Problem. Multiple interfaces kompensują brak multiple inheritance z implementacją. Java 8+ default methods w interfaces dodają partial implementation.",example:"Java: class Dog extends Animal implements Serializable, Comparable<Dog> { }. Jeden parent (Animal) + wiele interfejsów z default methods. Default method conflict: kompilator wymusza explicit override — developer decyduje."},
{title:"Multiple Inheritance i Mixins (Python/C++)",text:"Inherit z wielu klas. Powerful ale złożone. Diamond Problem wymaga resolution: Python MRO (C3 linearization — deterministyczna kolejność), C++ virtual inheritance (eliminuje duplikację base class). Mixins: małe klasy designed for mix-in inheritance.",example:"Python: class Robot(Sensor, Actuator, Controller): pass — 3 parents. MRO: Robot→Sensor→Actuator→Controller. Mixin pattern: class JsonMixin: def to_json(self): return json.dumps(self.__dict__). class User(Model, JsonMixin, CacheMixin): — composing capabilities bez full hierarchy."},
{title:"Traits/Protocols (Rust/Swift/Kotlin)",text:"Polimorfizm BEZ hierarchii dziedziczenia. Traits definiują zachowania implementowane niezależnie na dowolnym typie. Zero inheritance = zero Diamond Problem. Rust: zero-cost static dispatch lub dynamic dispatch.",example:"Rust: trait Printable { fn print(&self); } trait Loggable { fn log(&self) { println!('{}', self.to_string()); } } — default implementation w trait. struct Dog { name: String } impl Printable for Dog { fn print(&self) { println!('Dog: {}', self.name); } } — no class keyword, no inheritance chain."}
]},
analogy:{pl:"Modele dziedziczenia to jak systemy edukacji: single inheritance = jeden mentor (prosty, jasna ścieżka), multiple inheritance = wielu nauczycieli jednocześnie (bogata wiedza, potencjalne konflikty), mixins = kursy specjalistyczne (dodaj umiejętność bez zmiany szkoły), traits = certyfikaty umiejętności (niezależne od instytucji, łączone dowolnie).",en:"Inheritance models are like education systems: single = one mentor (simple, clear path), multiple = many teachers simultaneously (rich knowledge, potential conflicts), mixins = specialist courses (add skills without changing schools), traits = skill certificates (institution-independent, freely combinable)."},
answer:"Languages offer different inheritance models with distinct trade-offs. Single inheritance in Java and C# allows one parent class — simple and safe, compensated by multiple interface implementation with Java 8+ default methods providing partial implementation. Multiple inheritance in Python and C++ enables inheriting from multiple classes but introduces the Diamond Problem — resolved by Python's MRO with C3 linearization and C++'s virtual inheritance. The Mixin pattern uses small focused classes designed for composing specific capabilities into classes. Trait and protocol systems in Rust, Swift, and Kotlin provide polymorphism without inheritance hierarchies entirely — behaviors implemented independently on any type with zero Diamond Problem risk and Rust offering zero-cost static dispatch. Modern best practice trends toward trait-based polymorphism and composition: combining the flexibility of multiple inheritance with the safety of single inheritance.",
keywords:["single inheritance","multiple inheritance","Diamond Problem","MRO","C3 linearization","mixin","trait","protocol","virtual inheritance","default method","composition"]},

{num:"Q60",original:"Discuss the principles of defining function and class templates (also referred to as generics).",
lecture:{intro:"Generics (szablony) to mechanizm pisania type-safe kodu który działa z dowolnym typem danych bez duplikacji. Zamiast osobno ListOfInt, ListOfString — piszesz List<T> raz.",
points:[
{title:"Generic Classes i type safety",text:"Placeholder T reprezentuje typ określany przy użyciu. Kompilator sprawdza poprawność typów w compile time — zero rzutowań, zero runtime ClassCastException. Jeden kod, wiele typów, pełne bezpieczeństwo.",example:"C#: List<int> nums = new List<int>(); nums.Add(42); nums.Add('hello'); // COMPILE ERROR! Przed generics: ArrayList stored Object — rzutowania wszędzie: int x = (int)list.get(0); — ClassCastException w runtime jeśli ktoś wrzucił string."},
{title:"Generic Methods i Constraints",text:"Metody mogą być generyczne niezależnie od klasy. Constraints (bounds) ograniczają jakie typy T dozwolone: where T : IComparable (musi implementować interfejs), where T : class (reference type only), where T : new() (musi mieć parameterless constructor).",example:"C#: T FindMax<T>(List<T> items) where T : IComparable<T> { return items.Max(); }. Działa dla List<int>, List<string>, List<DateTime> — każdy typ implementujący IComparable. Nie działa dla List<object> — object nie jest IComparable."},
{title:"Implementacja: type erasure vs reification vs monomorphization",text:"Java: type erasure — generics usunięte w runtime (List<String> = List<Object> + casts). C#: reification — generics zachowane w runtime (List<string> ≠ List<int>). C++/Rust: monomorphization — osobny kod per typ (zero overhead, code bloat).",example:"Java: List<String>.getClass() == List<Integer>.getClass() → true! (erasure — ten sam typ w runtime). C#: typeof(List<string>) != typeof(List<int>) → true (reification — różne typy). C++ template<typename T> vector: kompilator generuje osobny vector<int>, vector<string> — pełna optymalizacja per typ."}
]},
analogy:{pl:"Generics to jak uniwersalny pojemnik z regulowaną wkładką: ten sam pojemnik (klasa generyczna) przechowuje monety, guziki lub cukierki — wkładkę (typ T) dobierasz przed użyciem. Bez generics: potrzebujesz osobnego pojemnika na każdy rodzaj przedmiotu, albo jednego bez wkładki gdzie wszystko się miesza (Object bez type safety).",en:"Generics are like a universal container with an adjustable insert: same container (generic class) stores coins, buttons, or candy — you choose the insert (type T) before use. Without generics: separate containers per item type, or one without insert where everything mixes together (Object without type safety)."},
answer:"Generics enable writing classes and methods with type placeholders — T — specified at usage time, providing code reuse across types while maintaining compile-time type safety. List<T> works for integers, strings, or custom objects without duplication, with the compiler catching type mismatches at compile time rather than throwing ClassCastException at runtime. Constraints like where T : IComparable restrict acceptable types, enabling generic algorithms that require specific capabilities. Implementation differs significantly: Java uses type erasure removing generics at runtime, C# uses reification preserving them as distinct runtime types, and C++ templates use monomorphization generating separate optimized code per type. The Repository<T> pattern exemplifies practical use: one generic class provides data access for all entity types, eliminating separate UserRepository, ProductRepository implementations.",
keywords:["generics","type parameter","type erasure","reification","monomorphization","constraints","type safety","Repository pattern","List<T>","compile-time","IComparable"]},

{num:"Q96",original:"What is the significance of polymorphism in object-oriented programming and what are the examples of its practical application in various programming languages?",
lecture:{intro:"To pytanie pokrywa się z Q46 — polimorfizm to zdolność obiektów różnych typów do bycia traktowanymi przez wspólny interfejs. Kluczowe zastosowania: Strategy, Observer, DI, plugin architectures.",
points:[
{title:"Podsumowanie mechanizmów",text:"Runtime: dynamic dispatch via vtable/method lookup. Compile-time: overloading, generics. Interface-based: kontrakty bez hierarchii. Każdy mechanizm z innymi trade-offami (performance, flexibility, safety).",example:"Strategy pattern: interface CompressionStrategy { byte[] compress(byte[] data); }. Implementacje: GzipCompression, LZ4Compression, ZstdCompression. Kontekst wybiera strategię dynamicznie — zero zmian w kodzie kompresji przy dodaniu nowego algorytmu."},
{title:"Praktyczne zastosowania cross-language",text:"Java: Spring DI wstrzykuje implementacje interfejsów. Python: duck typing umożliwia polimorfizm bez deklaracji. C#: LINQ extension methods na IEnumerable<T>. Rust: trait objects dla dynamic dispatch.",example:"LINQ: IEnumerable<T> — .Where(), .Select(), .OrderBy() działają na List, Array, HashSet, DB query (IQueryable). Jeden API, wiele źródeł danych. To polimorfizm w czystej formie — ten sam kod, różne implementacje pod spodem."},
{title:"Open/Closed Principle w praktyce",text:"Kod otwarty na rozszerzenie (nowe klasy), zamknięty na modyfikację (istniejący kod). Plugin architecture: nowe pluginy implementują interfejs — core application nie zmienia się. Framework hooks.",example:"VS Code extensions: każda implementuje Extension interface. Core VS Code nie zmienia się przy dodaniu nowego extension. WordPress plugins, Chrome extensions — ten sam wzorzec. Polimorfizm umożliwia: dodajesz nowy plugin bez recompilacji core."}
]},
analogy:{pl:"(Patrz Q46) Polimorfizm to jak gniazdko elektryczne: jedno gniazdko (interfejs), wiele urządzeń (implementacji). Dodanie nowego urządzenia nie wymaga zmiany instalacji elektrycznej. Open/Closed: instalacja zamknięta na modyfikację, otwarta na nowe urządzenia.",en:"(See Q46) Polymorphism is like an electrical outlet: one outlet (interface), many devices (implementations). Adding a new device doesn't require rewiring. Open/Closed: wiring closed for modification, open for new devices."},
answer:"Polymorphism's significance lies in enabling extensible, maintainable code through a common interface. Runtime polymorphism via dynamic dispatch allows Shape references to invoke Circle or Triangle implementations transparently. Interface-based polymorphism decouples code from specific classes — Spring DI injects implementations, LINQ's IEnumerable works across Lists, Arrays, and database queries identically. The Open/Closed Principle is polymorphism's architectural expression: new types are added by implementing interfaces without modifying existing code. Plugin architectures like VS Code extensions, WordPress plugins, and Chrome extensions all rely on polymorphism — new plugins implement a defined interface while the core application remains unchanged. The Strategy pattern, Observer pattern, and Dependency Injection are all practical manifestations of polymorphism solving real architectural problems.",
keywords:["polymorphism","Open/Closed Principle","Strategy pattern","plugin architecture","LINQ","IEnumerable","dynamic dispatch","DI","interface","extensibility"]},

{num:"Q97",original:"Discuss the notion of abstraction and indicate its significance in terms of multiple reuse.",
lecture:{intro:"Abstrakcja to ukrywanie złożoności implementacji za prostym, czystym interfejsem. Użytkownik wie CO robi system, nie JAK. Każdy poziom abstrakcji ukrywa złożoność niższego poziomu.",
points:[
{title:"Abstrakcja przez klasy i interfejsy",text:"Abstract class definiuje partial implementation z abstract methods — podklasy dostarczają detale. Interfejs definiuje pure contract. Oba ukrywają implementację za stabilnym API — zmiana wewnętrzna nie łamie kodu zewnętrznego.",example:"abstract class DatabaseConnection { abstract void connect(String url); ResultSet query(String sql) { connect(url); /* common logic */ } } — query() zaimplementowane (reuse!), connect() abstrakcyjne — PostgresConnection i MySQLConnection implementują po swojemu. Kod wywołujący query() nie wie jaka baza pod spodem."},
{title:"Warstwy abstrakcji i reużywalność",text:"Dobre oprogramowanie ma wiele warstw: Hardware → OS → Runtime → Framework → Application. Każda warstwa ukrywa złożoność niższej. Standard libraries (List, Map, Stream) to abstrakcje reużywane w milionach projektów.",example:"Spring JPA: userRepository.findByEmail(email) — za kulisami: JPQL → SQL → JDBC → TCP → PostgreSQL. Developer widzi JEDNĄ linię. Java Collections: List<T> interface — ArrayList, LinkedList, CopyOnWriteArrayList to implementacje. Aplikacja używa List<T> — zmiana implementacji bez zmiany kodu."},
{title:"Leaky Abstractions i dobre praktyki",text:"Leaky abstraction: gdy detale implementacji 'przeciekają' przez interfejs. ORM generujący nieefektywne SQL (N+1 problem) — abstrakcja bazy 'przecieka'. Dobra abstrakcja: minimal surface, consistent behavior, no implementation leaks.",example:"ORM leaky abstraction: users = User.objects.all() → for u in users: print(u.orders) → N+1 queries! Abstrakcja 'ukrywa' SQL ale nie ukrywa performance characteristics. Fix: users = User.objects.prefetch_related('orders') — developer musi znać implementację żeby ją obejść. Perfect abstraction jest niemożliwa (Joel Spolsky's Law)."}
]},
analogy:{pl:"Abstrakcja to kierownica samochodu: prowadzisz wiedząc tylko że obracasz kierownicę w lewo → samochód skręca w lewo. Nie musisz rozumieć przekładni zębatkowej, wspomagania, hydrauliki. Ta sama kierownica działa w Toyota i BMW (reuse). Leaky abstraction: gdy musisz wiedzieć o wspomaganiu żeby skręcić na parkingu (implementacja przecieka).",en:"Abstraction is a car's steering wheel: you drive knowing only that turning left makes the car go left. No need to understand rack and pinion, power steering, or hydraulics. Same wheel works in Toyota and BMW (reuse). Leaky abstraction: when you must know about power steering to parallel park (implementation leaks through)."},
answer:"Abstraction hides complex implementation behind a simple, clean interface — users interact with WHAT a system does without knowing HOW. Abstract classes define partial implementations with abstract methods that subclasses specialize, enabling code reuse at the base level while requiring specific implementations below. Layered abstractions — from hardware through OS, runtime, framework, to application — each hide the complexity beneath. This directly enables reuse: Java's Collection framework defines List, Map, Set abstractions used across millions of applications with ArrayList, HashMap, and TreeSet implementations swappable without code changes. Spring JPA abstracts database access so a single repository method call hides JPQL, SQL, JDBC, and TCP layers. The challenge is leaky abstractions where implementation details escape — like ORMs hiding SQL but not query performance, requiring developers to understand the underlying implementation to optimize.",
keywords:["abstraction","abstract class","interface","layered abstraction","JDBC","Spring JPA","leaky abstraction","Collection framework","reuse","information hiding","API surface"]},

{num:"Q98",original:"Discuss the conditions of applying an object-oriented and structured approach in IT system design.",
lecture:{intro:"OOP i programowanie strukturalne to różne paradygmaty z różnymi mocnymi stronami. Wybór zależy od złożoności systemu, rozmiaru zespołu, wymagań i natury problemu.",
points:[
{title:"Podejście strukturalne — top-down decomposition",text:"Rozkład problemu na funkcje/procedury. Dane i funkcje osobno. Sekwencja, selekcja, iteracja jako building blocks. Najlepsze dla: prostych systemów, skryptów, algorytmicznych problemów, performance-critical kodu.",example:"Data processing script: read_csv() → clean_data() → compute_statistics() → write_report(). Funkcje transformują dane krok po kroku. Proste, linearne, łatwe do zrozumienia. Linux kernel: mostly structured C (functions operating on structs) — performance critical."},
{title:"Podejście OOP — modelowanie domeny",text:"Model domeny jako interacting objects z state i behavior. Enkapsulacja, dziedziczenie, polimorfizm. Najlepsze dla: złożonych systemów z wieloma encjami, długo żyjących codebase'ów, dużych zespołów, GUI applications.",example:"E-commerce: User, Product, Cart, Order, Payment, Shipment — obiekty interagujące przez zdefiniowane interfejsy. 50+ developerów pracuje na różnych obiektach niezależnie. Zmiana w Payment nie wymaga zmian w Cart — enkapsulacja i interfejsy izolują komponenty."},
{title:"Hybryda i nowoczesne podejścia",text:"Większość nowoczesnych systemów łączy oba + functional programming. Microservices mogą używać różnych paradygmatów per serwis. Python web app: Flask routes (structured), SQLAlchemy models (OOP), list comprehensions (functional).",example:"Python web app: @app.route('/users') def get_users(): ... (structured routing), class User(db.Model): ... (OOP data model), users = [u.to_dict() for u in User.query.filter(...)] (functional transformation). Trzy paradygmaty w jednym pliku — każdy gdzie pasuje najlepiej."}
]},
analogy:{pl:"Strukturalne = linia montażowa (dane przepływają przez kolejne stacje/funkcje, każda robi jedną operację). OOP = zespół specjalistów (każdy obiekt zna swoje zadanie, komunikują się między sobą). Mały projekt = linia montażowa wystarcza. Duży = potrzebujesz zespołu. Nowoczesność = oba w jednym zakładzie.",en:"Structured = assembly line (data flows through stations/functions, each performs one operation). OOP = specialist team (each object knows its job, they communicate). Small project = assembly line suffices. Large = you need the team. Modern = both in one factory."},
answer:"The choice between OOP and structured approaches depends on system requirements. Structured programming decomposes problems top-down into functions with separate data — ideal for simple data processing scripts, algorithmic problems, and performance-critical systems like the Linux kernel in C. OOP models domains as interacting objects with encapsulated state — ideal for complex systems with many entities, large teams working independently on different components, and long-lived codebases where encapsulation prevents change propagation. Modern systems typically combine both paradigms plus functional programming: Flask routes use structured handlers, SQLAlchemy models use OOP, and data transformations use functional list comprehensions — each paradigm applied where it fits best. Microservices architectures allow each service to independently choose the most appropriate paradigm.",
keywords:["structured programming","OOP","top-down decomposition","encapsulation","domain modeling","functional programming","hybrid","paradigm","complexity management","Linux kernel"]},

{num:"S2-1",original:"Compare exception handling in Java and .NET, and explain how it affects web application reliability.",
lecture:{intro:"Java i .NET obsługują wyjątki fundamentalnie inaczej — Java wymusza obsługę checked exceptions w compile time, .NET polega na dyscyplinie developera. Obie strategie mają konsekwencje dla niezawodności web apps.",
points:[
{title:"Java Checked Exceptions — wymuszona obsługa",text:"Java unikalna: checked exceptions MUSZĄ być złapane lub zadeklarowane w throws. Kompilator nie przepuści kodu który ignoruje IOException. Krytycy: boilerplate. Zwolennicy: żaden error path nie jest 'zapomniany'. Unchecked (RuntimeException): nie wymagają deklaracji.",example:"Java: public User findUser(int id) throws UserNotFoundException, DatabaseException { ... } — caller MUSI obsłużyć oba. Zapomni? Compile error. Web app: każde wywołanie DB, każda operacja I/O ma explicit error handling. Niezawodność wymuszona, ale kod verbose."},
{title:".NET Unchecked Only — zaufanie i konwencja",text:"C# nie ma checked exceptions. Wszystkie exceptions unchecked. Poleganie na dokumentacji XML i konwencjach. Global exception handler middleware łapie to co 'ucieknie'. Czystszy kod, ale ryzyko unhandled exceptions w edge cases.",example:"C#: public User FindUser(int id) { ... } — zero throws clause. Caller może zapomnieć o obsłudze. ASP.NET Core: app.UseExceptionHandler('/Error') łapie WSZYSTKO co ucieknie — zwraca generic error page. Ale: specific error handling per endpoint to odpowiedzialność developera."},
{title:"Wpływ na niezawodność i nowoczesne podejście",text:"Oba ekosystemy zmierzają ku: global exception handlers, Result/Option types, structured error responses (RFC 7807 Problem Details). Exception handling sam w sobie nie determinuje niezawodności — architektura, testy i monitoring mają większy wpływ.",example:"Spring Boot: @ControllerAdvice klasa łapie wszystkie exceptions i zwraca JSON error z correlation ID. ASP.NET Core: ProblemDetails middleware generuje standardowy format. Oba produkują consistent API errors: {type, title, status, detail, traceId}. Result<T,E> pattern rośnie w popularności w obu ekosystemach."}
]},
analogy:{pl:"Java checked exceptions to jak obowiązkowy kask na budowie — wymuszony regulaminem, każdy MUSI go nosić, nawet gdy przeszkadza w pracy (boilerplate). .NET unchecked to tabliczka 'proszę nosić kask' — polega na dyscyplinie pracownika. Oba działają jeśli ludzie dbają o bezpieczeństwo, ale enforcement vs trust to fundamentalna różnica.",en:"Java checked exceptions are like mandatory hard hats on a construction site — enforced by regulation, everyone MUST wear one, even when it slows work (boilerplate). .NET unchecked is a 'please wear a hard hat' sign — relies on worker discipline. Both work if people care about safety, but enforcement vs trust is the fundamental difference."},
answer:"Java and .NET differ fundamentally in exception handling philosophy. Java uniquely enforces checked exceptions at compile time — methods must declare or catch IOExceptions, DatabaseExceptions, requiring explicit handling of every error path, which prevents 'forgotten' error scenarios but creates verbose boilerplate code. C# uses only unchecked exceptions, relying on documentation and developer discipline for error handling — cleaner code but risk of unhandled edge cases. For web application reliability, both ecosystems converge on similar modern solutions: global exception handlers — @ControllerAdvice in Spring Boot and ProblemDetails middleware in ASP.NET Core — catch escaping exceptions and produce consistent JSON error responses per RFC 7807. Result types are gaining popularity in both ecosystems for expected failures. Ultimately, application reliability depends more on testing, monitoring, and architectural patterns than on the exception handling model alone.",
keywords:["checked exception","unchecked exception","@ControllerAdvice","ProblemDetails","RFC 7807","middleware","Result type","global handler","throws","reliability"]},

{num:"S2-2",original:"How do Java Servlets and ASP.NET Core middleware handle HTTP requests in web applications?",
lecture:{intro:"Oba frameworki obsługują cykl życia HTTP request/response ale z różnymi modelami architektonicznymi — Java's servlet + filter chain vs .NET's unified middleware pipeline.",
points:[
{title:"Java Servlet Model",text:"Servlety obsługują HTTP przez service()/doGet()/doPost(). Filters (interfejs Filter) tworzą chain dla cross-cutting concerns (logging, auth, CORS). Servlet container (Tomcat, Jetty) zarządza lifecycle. Request → Filter Chain → Servlet → Response.",example:"@WebServlet('/api/users') class UserServlet extends HttpServlet { protected void doGet(req, resp) { List<User> users = service.findAll(); resp.getWriter().write(toJson(users)); } }. Filter chain: LoggingFilter → AuthFilter → CORSFilter → UserServlet. Każdy filter decyduje: pass dalej lub zwróć error response."},
{title:"ASP.NET Core Middleware Pipeline",text:"Middleware components tworzą pipeline. Każdy może: obsłużyć request, zmodyfikować go, lub przekazać do następnego. Konfiguracja w Program.cs. Kolejność MA ZNACZENIE — exception handler musi być pierwszy żeby złapać błędy ze wszystkich middleware poniżej.",example:"app.UseExceptionHandler(); app.UseHttpsRedirection(); app.UseAuthentication(); app.UseAuthorization(); app.UseRouting(); app.MapControllers(); — każdy middleware przetwarza request po kolei. UseAuthentication PRZED UseAuthorization — bo najpierw musisz wiedzieć KTO to jest, potem czy MA dostęp."},
{title:"Porównanie i konwergencja",text:"Oba używają Chain of Responsibility pattern. Java: bardziej strukturalny (servlety = endpoints, filtry = middleware). .NET: bardziej zunifikowany (wszystko jest middleware, endpoints to terminal middleware). Nowoczesne frameworki konwergują w developer experience.",example:"Spring Boot: @GetMapping('/users') List<User> getUsers() { return service.findAll(); }. .NET minimal API: app.MapGet('/users', () => service.FindAll()). Niemal identyczny developer experience mimo fundamentalnie różnych runtime'ów. Oba: deklaratywne, zwięzłe, z wbudowanym DI."}
]},
analogy:{pl:"Request pipeline to jak linia kontroli na lotnisku: każdy middleware to punkt kontrolny — paszport (authentication), boarding pass (authorization), bagaż (validation), security scan (WAF). Request przechodzi przez wszystkie punkty po kolei zanim dotrze do gate'u (endpoint/servlet).",en:"A request pipeline is like airport security: each middleware is a checkpoint — passport (authentication), boarding pass (authorization), luggage (validation), security scan (WAF). The request passes through all checkpoints in order before reaching the gate (endpoint/servlet)."},
answer:"Java Servlets handle HTTP requests through doGet/doPost methods running in servlet containers like Tomcat, with Filters forming a chain for cross-cutting concerns — logging, authentication, CORS processing — each filter deciding whether to pass the request forward or return an error. ASP.NET Core uses a unified middleware pipeline configured in Program.cs where every component — exception handling, HTTPS redirection, authentication, authorization, routing — processes requests in configured order, with each middleware able to handle, modify, or forward requests. Both implement Chain of Responsibility pattern, but .NET's model is more unified while Java's is more structured. Modern frameworks converge: Spring Boot's @GetMapping and .NET's minimal APIs provide nearly identical declarative developer experiences with built-in dependency injection despite fundamentally different runtime architectures.",
keywords:["Servlet","middleware","Filter","pipeline","Chain of Responsibility","Tomcat","Kestrel","Program.cs","cross-cutting concern","doGet","MapGet"]},

{num:"S2-3",original:"Explain how dependency injection works in both Spring Boot (Java) and ASP.NET Core (.NET) for building scalable web applications.",
lecture:{intro:"Dependency Injection (DI) to wzorzec gdzie obiekty otrzymują swoje zależności z zewnątrz zamiast tworzyć je wewnętrznie — fundament testowalnego, modularnego kodu. IoC container zarządza tworzeniem i lifecycle obiektów.",
points:[
{title:"Koncept DI i dlaczego to ważne",text:"Bez DI: klasa tworzy swoje zależności wewnętrznie (new PostgresDB()) — tight coupling, nietestowalne, niewymienialne. Z DI: klasa deklaruje CZEGO potrzebuje (interface), container dostarcza KONKRETNĄ implementację. Loose coupling umożliwia: testowanie z mockami, wymianę implementacji per environment, parallel development.",example:"Bez DI: class OrderService { private db = new PostgresDB(); } — hardcoded dependency, nie da się testować bez bazy. Z DI: class OrderService { OrderService(IDatabase db) { this.db = db; } } — w teście: new OrderService(new MockDB()), w produkcji: new OrderService(new PostgresDB()). Ten sam kod, różne implementacje."},
{title:"Spring Boot DI",text:"@Component/@Service/@Repository oznaczają klasy do auto-discovery. @Autowired wstrzykuje zależności (preferowany: constructor injection). ApplicationContext jako IoC container. Profile-specific beans: @Profile('test') dla test-only implementacji.",example:"@Service class OrderService { private final OrderRepository repo; @Autowired OrderService(OrderRepository repo) { this.repo = repo; } } @Repository class JpaOrderRepository implements OrderRepository { ... }. Spring automatycznie: skanuje classpath, znajduje implementację OrderRepository, tworzy OrderService z nią. Zero manual wiring."},
{title:"ASP.NET Core DI",text:"Built-in DI container (nie wymaga zewnętrznej biblioteki jak w starszym .NET). Rejestracja w Program.cs: AddTransient (nowa instancja per request), AddScoped (jedna per HTTP request), AddSingleton (jedna per app lifetime). Constructor injection jako primary pattern.",example:"builder.Services.AddScoped<IOrderRepository, PostgresOrderRepository>(); builder.Services.AddScoped<IOrderService, OrderService>(); — rejestracja. class OrderController { OrderController(IOrderService svc) { this.svc = svc; } } — DI container automatycznie resolve'uje cały dependency graph. W testach: zamień PostgresOrderRepository na InMemoryOrderRepository."}
]},
analogy:{pl:"DI to jak catering zamiast gotowania w domu: zamiast sam kupować składniki i gotować (tworzyć zależności), zamawiasz gotowe danie z dowolnej restauracji (wstrzykujesz implementację). Chcesz zmienić kuchnię? Zmień dostawcę, nie przebudowuj kuchni (zmień rejestrację, nie kod). W testach zamawiasz z test-kitchen (mock).",en:"DI is like ordering catering instead of cooking at home: instead of buying ingredients and cooking (creating dependencies), you order a ready meal from any restaurant (inject implementation). Want to change cuisine? Switch the supplier, don't rebuild the kitchen (change registration, not code). In tests, order from the test kitchen (mock)."},
answer:"Dependency Injection means objects declare what they need through interfaces rather than creating concrete dependencies internally — an IoC container provides the actual implementations. Spring Boot uses annotation-based auto-discovery: @Service and @Repository mark classes, @Autowired injects them via constructor injection, with ApplicationContext managing the entire dependency graph and @Profile enabling environment-specific implementations. ASP.NET Core has a built-in DI container configured in Program.cs with explicit registration using three lifetimes: AddTransient creates new instances per injection, AddScoped creates one per HTTP request, and AddSingleton creates one per application lifetime. Both enable scalable design: swapping InMemoryCache for DistributedRedisCache requires only changing the registration line, not application code. DI makes code testable through mock injection, modular through interface contracts, and scalable through environment-specific configuration.",
keywords:["dependency injection","IoC container","@Autowired","AddScoped","constructor injection","Transient","Scoped","Singleton","interface","loose coupling","testability","mock"]},

{num:"S2-4",original:"Discuss the use of asynchronous programming in C# (async/await) and Java (CompletableFuture) for improving web application performance.",
lecture:{intro:"Programowanie asynchroniczne zapobiega blokowaniu wątków podczas operacji I/O — umożliwiając web serwerowi obsługę tysięcy jednoczesnych requestów na kilku wątkach zamiast jednego wątku per request.",
points:[
{title:"C# async/await — natywna składnia",text:"async oznacza metodę jako asynchroniczną. await zawiesza wykonanie do momentu gotowości wyniku BEZ blokowania wątku — wątek wraca do thread pool i obsługuje inne requesty. Task<T> reprezentuje asynchroniczną operację. Łańcuchowanie: naturalny sequential-looking code.",example:"C#: async Task<User> GetUserAsync(int id) { var user = await _db.FindAsync(id); var orders = await _orderService.GetOrdersAsync(user.Id); return user.WithOrders(orders); } — wygląda jak synchroniczny kod ale NIE blokuje wątku podczas czekania na DB i order service. Wątek obsługuje inne requesty w międzyczasie."},
{title:"Java CompletableFuture i Virtual Threads",text:"CompletableFuture: method chaining dla async operacji (supplyAsync → thenApply → thenAccept). Mniej naturalna składnia niż C# ale równie potężna. Java 21 Virtual Threads (Project Loom): pisz synchroniczny kod który działa asynchronicznie — miliony lekkich wątków.",example:"Java: CompletableFuture.supplyAsync(() -> db.find(id)).thenApply(user -> enrichWithOrders(user)).thenAccept(user -> cache.put(user)); — chain of async ops. Java 21: try (var exec = Executors.newVirtualThreadPerTaskExecutor()) { exec.submit(() -> db.find(id)); } — wygląda synchronicznie, ale virtual thread NIE blokuje OS thread."},
{title:"Wpływ na wydajność — konkretne liczby",text:"Synchroniczny serwer: 200 wątków = max 200 jednoczesnych requestów (reszta czeka w kolejce). Asynchroniczny: 200 wątków obsługuje 10,000+ concurrent requests bo wątki nie są blokowane przez I/O wait (DB query 50ms = wątek wolny przez 50ms).",example:"ASP.NET Core z async: 10,000 concurrent requests na 4 wątkach — każdy await zwalnia wątek. Synchronicznie: potrzeba 10,000 wątków (niemożliwe — OS limit ~2000, każdy wątek = 1MB stack = 10GB RAM). Async umożliwia masową concurrency na modest hardware. Benchmark: 50x więcej throughput za te same zasoby."}
]},
analogy:{pl:"Synchroniczny serwer to kelner, który stoi przy kuchni czekając na danie — nie obsługuje nikogo innego przez 5 minut. Asynchroniczny to kelner, który przyjmuje zamówienie, idzie do następnego stolika, a po danie wróci gdy kuchnia da znać (callback/await). Ten sam kelner, 10x więcej stolików obsłużonych.",en:"A synchronous server is a waiter standing at the kitchen waiting for a dish — serving nobody for 5 minutes. Asynchronous is a waiter who takes the order, moves to the next table, and returns when the kitchen signals the dish is ready (callback/await). Same waiter, 10x more tables served."},
answer:"Asynchronous programming prevents thread blocking during I/O operations, dramatically improving web application concurrency. C# uses native async/await syntax with Task<T> — marking methods as async and using await to suspend without blocking the thread, which returns to the thread pool to handle other requests while waiting on database queries or API calls. Java uses CompletableFuture with method chaining for similar functionality, and Java 21 introduces virtual threads through Project Loom enabling synchronous-looking code on lightweight threads — millions possible versus thousands of OS threads. The performance impact is dramatic: synchronous handling requires one OS thread per request, while async allows 200 threads to serve 10,000+ concurrent requests because threads aren't blocked during the 50ms database query wait time. This enables 50x more throughput on identical hardware.",
keywords:["async/await","CompletableFuture","Task<T>","virtual threads","Project Loom","non-blocking I/O","thread pool","concurrency","throughput","event loop"]},

{num:"S2-5",original:"Explain how RESTful APIs are implemented in Java (Spring Boot) and .NET (ASP.NET Web API), and how they can be tested for reliability.",
lecture:{intro:"RESTful APIs używają HTTP methods (GET, POST, PUT, DELETE) na zasobach (URLs) zwracając JSON — standard komunikacji między serwisami. Oba frameworki oferują deklaratywne, zwięzłe API development.",
points:[
{title:"Spring Boot REST implementation",text:"@RestController + @GetMapping/@PostMapping/@PutMapping/@DeleteMapping. Jackson automatycznie serializuje/deserializuje JSON. ResponseEntity<T> dla custom status codes i headers. Spring HATEOAS dla hypermedia links.",example:"@RestController @RequestMapping('/api/users') class UserController { @GetMapping('/{id}') ResponseEntity<User> get(@PathVariable int id) { return repo.findById(id).map(ResponseEntity::ok).orElse(ResponseEntity.notFound().build()); } @PostMapping User create(@Valid @RequestBody CreateUserDto dto) { return service.create(dto); } }"},
{title:"ASP.NET Web API implementation",text:"[ApiController] + [HttpGet]/[HttpPost] attributes. System.Text.Json serializacja. ActionResult<T> dla typed responses z status codes. Swagger/OpenAPI auto-generated documentation built-in.",example:"[ApiController] [Route('api/[controller]')] class UsersController : ControllerBase { [HttpGet('{id}')] ActionResult<User> Get(int id) { var user = _service.Find(id); return user is null ? NotFound() : Ok(user); } [HttpPost] ActionResult<User> Create([FromBody] CreateUserDto dto) { var user = _service.Create(dto); return CreatedAtAction(nameof(Get), new {id = user.Id}, user); } }"},
{title:"Testowanie i reliability patterns",text:"Unit tests: mock dependencies, test business logic. Integration tests: in-memory test server (MockMvc / WebApplicationFactory). Contract tests: Pact verifies API compatibility between consumer and provider. Reliability: circuit breakers, retry, rate limiting.",example:"Spring: @SpringBootTest + MockMvc — sends real HTTP to in-memory server, assertions on JSON response. .NET: WebApplicationFactory<Program> tworzy in-memory test server — pełny pipeline bez network. Circuit breaker: Resilience4j (Java) / Polly (.NET) — po 5 failures w 30s → fallback response na 60s → half-open test → recovery."}
]},
analogy:{pl:"REST API to jak menu restauracji z kelnerem: GET = 'pokaż danie' (read), POST = 'zamów nowe' (create), PUT = 'zmień zamówienie' (update), DELETE = 'anuluj' (delete). Status code = odpowiedź kelnera: 200='proszę bardzo', 201='zamówienie przyjęte', 404='nie mamy tego', 500='pożar w kuchni'. Testy = tajemniczy klient sprawdzający jakość.",en:"REST API is like a restaurant menu with a waiter: GET = 'show the dish' (read), POST = 'order new' (create), PUT = 'change order' (update), DELETE = 'cancel'. Status code = waiter reply: 200='here you go', 201='order placed', 404='we don't have it', 500='kitchen fire'. Tests = mystery shopper checking quality."},
answer:"RESTful APIs in Spring Boot use @RestController with @GetMapping and @PostMapping annotations, Jackson for JSON serialization, and ResponseEntity for typed responses with HTTP status codes. ASP.NET Web API uses [ApiController] with [HttpGet] and [HttpPost] attributes, System.Text.Json for serialization, and ActionResult<T> with built-in Swagger documentation. Testing spans three levels: unit tests mock service dependencies, integration tests use in-memory servers — MockMvc in Spring and WebApplicationFactory in .NET — sending real HTTP requests through the full middleware pipeline without network overhead, and contract tests with Pact verify API compatibility between consumers and providers. Reliability patterns include circuit breakers via Resilience4j or Polly preventing cascade failures, retry with exponential backoff for transient errors, and rate limiting protecting against abuse.",
keywords:["REST","@RestController","ApiController","JSON","MockMvc","WebApplicationFactory","circuit breaker","Resilience4j","Polly","Swagger","OpenAPI","integration test","Pact"]},

{num:"S2-8",original:"Explain how WebSockets improve real-time communication in web and mobile applications, and how Java and .NET support them.",
lecture:{intro:"WebSockets zapewniają full-duplex, persistent connection między klientem i serwerem — umożliwiając real-time bidirectional komunikację bez overhead'u HTTP request/response per message.",
points:[
{title:"WebSocket vs HTTP — fundamentalna różnica",text:"HTTP: request-response, klient inicjuje, connection zamknięte po response. WebSocket: persistent bidirectional — po initial HTTP handshake (upgrade) connection zostaje otwarte, obie strony wysyłają kiedy chcą. Dramatycznie niższy latency i overhead.",example:"Chat app z HTTP polling co 1s: 1000 requests/user/godzinę, 99% pustych (no new messages). WebSocket: 1 connection, messages pushed instantly gdy się pojawią. 99% mniej network overhead. Latency: polling = avg 500ms (half polling interval), WebSocket = <50ms (instant push)."},
{title:"Java: Spring WebSocket + STOMP",text:"Spring WebSocket: @MessageMapping dla WebSocket endpoints. STOMP protocol dla structured messaging z topics/subscriptions (pub/sub). SockJS jako fallback dla starszych przeglądarek. Scalowanie: Redis pub/sub jako message broker między instancjami.",example:"@MessageMapping('/chat.send') void handleMessage(ChatMessage msg) { template.convertAndSend('/topic/room.' + msg.getRoomId(), msg); } — broadcast do wszystkich subscribers danego pokoju. Client: stompClient.subscribe('/topic/room.123', callback). Redis pub/sub: gdy app na 10 instancjach — wiadomość na jednej dociera do subscribers na wszystkich."},
{title:".NET: SignalR — high-level abstraction",text:"SignalR to Microsoft'owy high-level library. Auto-fallback: WebSocket → Server-Sent Events → Long Polling (transparentnie). Strongly-typed hubs. Auto-reconnect. Scaling: Azure SignalR Service lub Redis backplane.",example:"public class ChatHub : Hub { public async Task SendMessage(string user, string msg) { await Clients.All.SendAsync('ReceiveMessage', user, msg); } public async Task JoinRoom(string room) { await Groups.AddToGroupAsync(Context.ConnectionId, room); } } — broadcast do wszystkich lub do grupy. Client: connection.on('ReceiveMessage', (user, msg) => display(msg))."}
]},
analogy:{pl:"HTTP to wymiana listów pocztowych — piszesz, czekasz na odpowiedź, piszesz znowu. WebSocket to rozmowa telefoniczna — dzwonisz raz (handshake), połączenie otwarte, obie strony mówią kiedy chcą, bez czekania. SignalR to smartfon z auto-reconnect — jeśli tunel przerwie połączenie, telefon automatycznie łączy ponownie.",en:"HTTP is exchanging postal letters — write, wait for reply, write again. WebSocket is a phone call — dial once (handshake), connection stays open, both sides speak whenever they want. SignalR is a smartphone with auto-reconnect — if a tunnel drops the signal, the phone automatically reconnects."},
answer:"WebSockets provide persistent full-duplex connections for real-time bidirectional communication, replacing HTTP polling's massive overhead — a chat application drops from 1000 polling requests per user per hour to a single persistent connection with instant message delivery under 50ms. Java supports WebSockets through Spring WebSocket with @MessageMapping and STOMP protocol for structured pub/sub messaging with topic-based subscriptions, using SockJS as a fallback and Redis pub/sub for multi-instance scaling. .NET uses SignalR — a high-level library with automatic transport fallback from WebSocket to Server-Sent Events to Long Polling, strongly-typed hub methods, automatic reconnection, and scaling through Azure SignalR Service or Redis backplane. Both handle connection management, group messaging, and scaling across multiple server instances.",
keywords:["WebSocket","full-duplex","SignalR","STOMP","SockJS","real-time","pub/sub","Redis backplane","persistent connection","Hub","auto-reconnect"]},

{num:"S2-10",original:"How does Firebase Authentication simplify user authentication for both mobile and web applications?",
lecture:{intro:"Firebase Auth dostarcza drop-in authentication z obsługą email/password, social login, phone auth i anonymous auth — abstrahując złożoność bezpiecznej implementacji autentykacji od zera.",
points:[
{title:"Pre-built auth methods i cross-platform",text:"Email/password, Google, Facebook, Apple, GitHub, Twitter sign-in. Phone number via SMS OTP. Anonymous auth dla guest users (konwersja do full account później). Natywne SDK: iOS, Android, Web, Flutter, Unity. Spójne API na wszystkich platformach.",example:"Web: firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()) — jedna linia = pełny Google OAuth flow z consent screen, token exchange, session management. Ten sam user account działa na web, Android i iOS — seamless multi-platform."},
{title:"Tokeny JWT i security",text:"Po loginie: user.getIdToken() zwraca JWT z uid, email, custom claims. Backend weryfikuje: admin.auth().verifyIdToken(token). Auto-refresh tokenów. MFA support. Rate limiting against brute force. Email verification i password reset flows built-in.",example:"JWT token: {sub:'user123', email:'mat@test.pl', role:'admin', exp:3600}. Backend (Node/Python/Java): decodedToken = auth.verify_id_token(token); uid = decodedToken.uid; — weryfikacja bez DB call (JWT self-contained). Custom claims: admin.auth().setCustomUserClaims(uid, {premium: true})."},
{title:"Integration z backendem i security rules",text:"Firebase Admin SDK (Node, Python, Java, Go) weryfikuje tokeny server-side. Custom claims dla RBAC. Firestore Security Rules mogą bezpośrednio odwoływać się do auth state. Cloud Functions triggered by auth events (user created, deleted).",example:"Firestore Security Rule: allow read: if request.auth != null && request.auth.token.premium == true; — tylko zalogowani premium users mogą czytać. Cloud Function: exports.onUserCreated = functions.auth.user().onCreate((user) => { sendWelcomeEmail(user.email); createUserProfile(user.uid); }); — automatyczne onboarding."}
]},
analogy:{pl:"Firebase Auth to jak recepcja hotelowa z gotowym systemem: dostajesz gotowy system kart dostępu (tokens), obsługę gości (social login), weryfikację dokumentów (email verification), i system VIP (custom claims) — bez budowania tego wszystkiego od zera. Recepcjonista (SDK) działa na każdym piętrze (platformie) identycznie.",en:"Firebase Auth is like a hotel reception with a ready-made system: you get a key card system (tokens), guest handling (social login), document verification (email verification), and VIP system (custom claims) — without building from scratch. The receptionist (SDK) works on every floor (platform) identically."},
answer:"Firebase Authentication simplifies auth by providing pre-built methods for email/password, social logins including Google, Facebook, and Apple, phone SMS OTP, and anonymous authentication with cross-platform SDKs for Web, iOS, Android, and Flutter. After login, Firebase issues JWT ID tokens containing user ID, email, and custom claims — backends verify these with the Admin SDK without database lookups since JWTs are self-contained. Security features include automatic token refresh, multi-factor authentication, brute-force rate limiting, and built-in email verification and password reset flows. Integration extends through custom claims for role-based access control, Firestore Security Rules that reference auth state directly, and Cloud Functions triggered by auth events like user creation for automated onboarding workflows.",
