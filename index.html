answer:"Key cybersecurity practices for Java and .NET include SQL injection prevention through parameterized queries — PreparedStatement in Java, Entity Framework's LINQ in .NET — never concatenating user input into SQL strings. XSS prevention through automatic output encoding in Thymeleaf and Razor templates, plus Content Security Policy headers restricting script sources. CSRF prevention using anti-forgery tokens — Spring Security's CsrfFilter and ASP.NET's AntiForgeryToken — combined with SameSite cookie attributes. Additional layers include HTTPS enforcement with HSTS headers, security headers like X-Frame-Options and X-Content-Type-Options, server-side input validation, rate limiting, and dependency scanning with tools like Snyk to catch vulnerable libraries. Both platforms provide these security features as built-in defaults when properly configured.",
keywords:["SQL injection","XSS","CSRF","parameterized query","CSP","anti-forgery token","HSTS","OWASP","prepared statement","output encoding","SameSite","Snyk"]}

]},

{id:"C",label:"C",color:"#378ADD",title:"Architektura Chmury & Distributed Systems",questions:[

{num:"Q2",original:"Explain what hybrid processing is and how it affects the efficiency of distributed systems.",
lecture:{intro:"Hybrid processing łączy przetwarzanie on-premises z zasobami chmurowymi, umożliwiając organizacjom optymalne rozmieszczenie workloadów w zależności od wymagań kosztowych, wydajnościowych i regulacyjnych.",
points:[
{title:"Definicja i architektura",text:"Hybrid processing rozdziela workloady między lokalne data centers i platformy cloud. Wrażliwe dane pozostają on-premises, burst workloady trafiają do chmury, a urządzenia edge przetwarzają lokalnie. Orkiestracja: Kubernetes Federation, Azure Arc, AWS Outposts.",example:"Szpital: dane pacjentów przetwarzane on-premises (HIPAA compliance), trenowanie modeli ML na AWS GPU instances (zasoby obliczeniowe), real-time monitoring na urządzeniach edge (niska latencja)."},
{title:"Wpływ na efektywność",text:"Optymalizacja kosztów (cloud tylko na peak demand), redukcja latencji (lokalne przetwarzanie gdy to możliwe), compliance (wrażliwe dane on-premises), resilience (failover między środowiskami). Cloud bursting: auto-scale do chmury przy skokach obciążenia.",example:"E-commerce: stały ruch na serwerach on-premises ($5K/mies. fixed). Black Friday: auto-scale do chmury ($3K za dzień vs $50K za budowę permanentnej infrastruktury). 90% oszczędności na peak capacity."},
{title:"Wyzwania orkiestracji",text:"Scheduling workloadów między środowiskami, synchronizacja danych, spójna sieć (VPN/Direct Connect), unified monitoring. Terraform dla multi-cloud IaC, Kubernetes Federation dla kontenerów.",example:"Kubernetes Federation zarządza podami na on-premises K8s cluster i EKS (AWS), schedulując workloady na podstawie dostępności zasobów, wymagań latencji i kosztów. Terraform: jeden plik .tf opisuje zasoby w obu środowiskach."}
]},
analogy:{pl:"Hybrid processing to jak praca hybrydowa: część zadań robisz w biurze (on-premises) — poufne spotkania, dostęp do sejfu. Część z domu (cloud) — kodowanie, analiza danych. Wybierasz miejsce zależnie od zadania, optymalizując czas i koszty.",en:"Hybrid processing is like hybrid work: some tasks at the office (on-premises) — confidential meetings, vault access. Some from home (cloud) — coding, data analysis. You choose based on the task, optimizing time and cost."},
answer:"Hybrid processing distributes workloads between on-premises infrastructure and cloud platforms to optimize efficiency. Benefits include cost optimization through cloud bursting for peak demand — paying only for burst capacity instead of provisioning for maximum load permanently. Latency reduction by processing time-sensitive data locally while offloading compute-intensive batch jobs to the cloud. Compliance flexibility by keeping regulated data on-premises while leveraging cloud GPU resources for ML training. Technologies like Azure Arc and AWS Outposts extend cloud management to on-premises, Kubernetes Federation orchestrates containers across environments, and Terraform manages multi-environment infrastructure as code. The key efficiency gain is matching each workload to its optimal processing location based on cost, latency, security, and compliance requirements.",
keywords:["hybrid processing","cloud bursting","on-premises","Azure Arc","AWS Outposts","Kubernetes Federation","VPN","Direct Connect","Terraform","workload placement"]},

{num:"Q10",original:"What are the main advantages of hybrid processing in the context of distributed systems?",
lecture:{intro:"Hybrid processing łączy zalety obu światów: kontrolę i bezpieczeństwo on-premises z elastycznością i skalą chmury. Kluczowe przewagi obejmują 4 wymiary.",
points:[
{title:"Elastyczność kosztowa i skalowania",text:"Stałe koszty on-premises dla baseline load, variable koszty cloud dla peak. Unikanie over-provisioningu. Pay-as-you-go eliminuje CAPEX na hardware, który 80% czasu jest niewykorzystany.",example:"80% stałego ruchu na on-premises, 20% peak burst do chmury = 40% redukcja kosztów vs provisioning for peak on-premises. Black Friday: 10x traffic handled bez permanentnej infrastruktury."},
{title:"Data sovereignty i compliance",text:"Regulowane dane (GDPR, HIPAA) pozostają w lokalnym DC, jednocześnie wykorzystując cloud do nieregulowanych workloadów. Spełnienie wymagań data residency bez rezygnacji z cloud benefits.",example:"Firma EU: dane osobowe w on-premises DC we Frankfurcie (GDPR compliance). Zanonimizowane dane analityczne i ML training w AWS eu-west-1. Pełna zgodność regulacyjna + pełna moc cloud AI."},
{title:"Resilience i stopniowa migracja",text:"Failover między środowiskami eliminuje single point of failure. DR site w chmurze bez kosztów dedicated hardware. Stopniowa migracja workloadów zmniejsza ryzyko vs big-bang migration.",example:"Year 1: dev/test w cloud (niskie ryzyko). Year 2: non-critical production. Year 3: ewaluacja remaining on-premises. Każdy krok walidowany przed następnym — zero big-bang risk."}
]},
analogy:{pl:"Hybrid processing to jak posiadanie mieszkania w mieście (on-premises: stałe, kontrolowane) i domku letniskowego (cloud: elastyczny, na żądanie). Używasz tego co pasuje do sytuacji — nie musisz wybierać jedno.",en:"Hybrid processing is like having a city apartment (on-premises: stable, controlled) and a vacation home (cloud: flexible, on-demand). You use whichever fits the situation — no need to choose just one."},
answer:"Main advantages of hybrid processing include cost flexibility — using cloud only for peak demand while maintaining on-premises for baseline, avoiding costly over-provisioning and reducing infrastructure costs by up to 40%. Data sovereignty enables keeping regulated data on-premises for GDPR or HIPAA compliance while leveraging cloud for non-sensitive workloads and ML training. Resilience through cross-environment failover eliminates single points of failure, with cloud-based disaster recovery avoiding dedicated DR hardware costs. Gradual cloud migration allows incremental workload migration — starting with dev/test, moving to non-critical production, then evaluating remaining workloads — dramatically reducing migration risk versus big-bang approaches.",
keywords:["cost optimization","data sovereignty","GDPR","HIPAA","resilience","failover","gradual migration","cloud bursting","CAPEX","pay-as-you-go"]},

{num:"Q11",original:"How does hybrid processing enable the efficient use of local and cloud resources?",
lecture:{intro:"Hybrid processing optymalizuje wykorzystanie zasobów dynamicznie routując workloady do najodpowiedniejszej infrastruktury na podstawie warunków real-time i wymagań.",
points:[
{title:"Strategia rozmieszczenia workloadów",text:"Klasyfikacja po wymaganiach: latencja, compliance, koszt, intensywność obliczeniowa. Każdy workload na optymalnej infrastrukturze. Real-time IoT → edge. ML training → cloud GPU. Financial records → on-premises.",example:"Real-time IoT: edge gateway (latencja <10ms). ML training: cloud p4d.24xlarge spot instances (koszt-efektywne GPU). Dane finansowe: on-premises encrypted storage (compliance). Statyczna strona: CDN (globalna wydajność)."},
{title:"Auto-scaling i cloud bursting",text:"On-premises obsługuje base load. Cloud auto-skaluje na peak. Kubernetes HPA + cluster autoscaler + multi-cluster management. Scale-to-zero w cloud gdy peak minie.",example:"Normalnie: 10 podów on-premises obsługuje 1000 RPS. Black Friday: cloud cluster auto-skaluje do 100 podów na 10,000 RPS. Po peak: cloud cluster scale-to-zero. Płacisz tylko za faktyczne użycie burst capacity."},
{title:"Data tiering i edge computing",text:"Hot data on-premises (szybki NVMe SSD), warm data w cloud standard storage, cold data w archive (S3 Glacier). Edge devices przetwarzają dane lokalnie, wysyłając do cloud tylko istotne wyniki — redukcja bandwidth 99%+.",example:"Fabryka IoT: edge gateway analizuje 1000 odczytów sensorów/sekundę lokalnie. Tylko 5 anomalii/godzinę wysyłanych do cloud do dalszej analizy — 99.5% redukcja bandwidth i kosztów transferu. Hot/warm/cold tiering oszczędza 70% na storage."}
]},
analogy:{pl:"To jak dystrybucja towarów: lokalne magazyny (edge/on-premises) dla szybkich dostaw w mieście, centralne magazyny (cloud) dla dużych zamówień hurtowych, i archiwum (cold storage) dla starych produktów. Każdy poziom zoptymalizowany pod swoje zadanie.",en:"It's like goods distribution: local warehouses (edge/on-premises) for quick city deliveries, central warehouses (cloud) for large wholesale orders, and archives (cold storage) for old products. Each tier optimized for its purpose."},
answer:"Hybrid processing optimizes resource utilization through workload placement strategy — classifying tasks by latency, compliance, cost, and compute requirements, then routing to optimal infrastructure. Cloud bursting handles demand spikes by auto-scaling to cloud resources while on-premises handles baseline load, with Kubernetes multi-cluster management orchestrating seamlessly. Data tiering places hot data on fast local NVMe storage, warm data in standard cloud storage, and cold data in archive tiers like S3 Glacier, with automated lifecycle policies reducing storage costs by up to 70%. Edge computing integration preprocesses IoT sensor data locally, sending only anomalies and aggregated results to cloud — reducing bandwidth consumption by over 99% while maintaining sub-10ms local response times.",
keywords:["workload placement","cloud bursting","auto-scaling","data tiering","edge computing","HPA","lifecycle policy","S3 Glacier","hot/warm/cold","NVMe","bandwidth optimization"]},

{num:"Q62",original:"What are the challenges related to the development and implementation of distributed systems with the use of cloud infrastructure, considering the requirements of scalability, accessibility and coherence of the data?",
lecture:{intro:"Systemy rozproszone w chmurze muszą balansować ograniczenia twierdzenia CAP — Consistency, Availability, Partition Tolerance — spełniając jednocześnie wymagania skalowalności i dostępności.",
points:[
{title:"Wyzwania skalowalności",text:"Stateful services trudne do horizontal scaling. Sharding baz danych wprowadza złożoność zapytań cross-shard. Service discovery i load balancing między regionami dodają latencję. Rozwiązanie: eksternalizacja stanu do Redis/DB, czyniąc serwisy stateless.",example:"Skalowanie stateful session service: sticky sessions łamią horizontal scaling. Rozwiązanie: eksternalizacja sesji do Redis Cluster — serwisy stają się stateless, dowolnie skalowalne. 100 instancji → 1000 instancji bez zmiany architektury."},
{title:"Wyzwania dostępności",text:"99.99% uptime = max 52 min downtime/rok. Wymaga redundancji na każdej warstwie: compute, storage, networking. Multi-AZ deployment, auto-failover, health checks, circuit breakers. Każda dodatkowa dziewiątka (99.9→99.99) jest 10x droższa.",example:"99.9% = 8.7h downtime/rok (single AZ). 99.99% = 52 min/rok (wymaga: multi-AZ, auto-failover, circuit breakers, chaos testing). 99.999% = 5 min/rok (wymaga: multi-region active-active + automatyczna orkiestracja). Koszt rośnie wykładniczo."},
{title:"Wyzwania spójności danych i operational complexity",text:"Transakcje rozproszone są wolne i złożone. Eventual consistency = tymczasowo nieaktualne odczyty. Conflict resolution w multi-master setup. Distributed tracing, log aggregation i koordynacja deploymentów wymagają zaawansowanego toolingu.",example:"Globalny e-commerce: user w Tokio aktualizuje koszyk, user w NYC widzi stary koszyk przez 200ms. Akceptowalne dla koszyka, NIE dla płatności — wymaga per-operation consistency decisions. Monitoring: Jaeger tracing + ELK logs + ArgoCD deployment."}
]},
analogy:{pl:"System rozproszony w chmurze to jak zarządzanie siecią restauracji na 3 kontynentach: skalowalność = otwieranie nowych lokali na żądanie, dostępność = żaden lokal nigdy zamknięty, spójność = identyczne menu i jakość wszędzie. CAP theorem: możesz mieć tylko 2 z 3 jednocześnie.",en:"A distributed cloud system is like managing a restaurant chain on 3 continents: scalability = opening new locations on demand, availability = no restaurant ever closed, consistency = identical menu and quality everywhere. CAP theorem says you can only have 2 of 3 simultaneously."},
answer:"Distributed cloud systems face challenges across three dimensions governed by the CAP theorem. Scalability requires making services stateless by externalizing state to Redis or databases, implementing database sharding, and managing service discovery across regions. Availability targeting 99.99% demands multi-AZ deployment, auto-failover, circuit breakers, and chaos testing — each additional nine of availability is exponentially more expensive. Data consistency forces per-operation trade-off decisions: eventual consistency is acceptable for shopping carts but not for payment processing, requiring different consistency models within the same system. Operational complexity includes distributed tracing with Jaeger, log aggregation with ELK stack, coordinated deployments via ArgoCD, and cross-region incident response playbooks.",
keywords:["CAP theorem","scalability","availability","consistency","stateless","sharding","multi-AZ","circuit breaker","distributed tracing","eventual consistency","Jaeger","ArgoCD"]},

{num:"Q63",original:"What techniques of system design can be applied to integrate distributed applications in the cloud environment, ensuring their high accessibility and fault tolerance?",
lecture:{intro:"Wysoka dostępność i fault tolerance wymagają projektowania pod kątem awarii na każdej warstwie — od pojedynczych instancji po całe data centers. Zasada: everything fails, all the time.",
points:[
{title:"Redundancja i circuit breakers",text:"Deploy w wielu AZ/regionach. Replikacja baz synchroniczna (strong consistency) lub asynchroniczna (wydajność). Circuit breakers (Resilience4j, Polly) zapobiegają kaskadowym awariom — gdy serwis pada, circuit otwiera się i zwraca fallback zamiast czekać na timeout.",example:"Resilience4j circuit breaker: po 5 failures w 30 sekund otwiera circuit na 60s (zwraca cached response). Potem half-open: testuje 1 request. Jeśli OK — zamyka circuit. Zapobiega: jeden wolny serwis blokuje wszystkie inne czekające na jego odpowiedź."},
{title:"Health checks i self-healing",text:"Liveness probes wykrywają crashe. Readiness probes wykrywają przeciążenie. Kubernetes auto-restartuje crashed pody i rescheduluje na healthy nody. Deployment strategy: rolling update = zero-downtime deploy.",example:"K8s liveness probe: httpGet /health co 10s. 3 kolejne failures → restart poda. Readiness probe: jeśli fails → pod usunięty z Service endpoints (zero traffic). Pod automatycznie wraca po recovery. Rolling update: nowa wersja wdrażana pod po podzie — zero downtime."},
{title:"Chaos engineering",text:"Celowe wstrzykiwanie awarii w produkcji testuje resilience. Netflix Chaos Monkey, AWS Fault Injection Simulator. Buduje pewność że system przetrwa realne awarie — zanim się zdarzą.",example:"Chaos Monkey losowo terminuje EC2 instancje w produkcji. Jeśli system automatycznie recovers i user nie zauważa — fault tolerance potwierdzona. Quarterly 'Game Day': symulacja awarii całego AZ z zespołem on-call."}
]},
analogy:{pl:"Fault tolerance to jak projektowanie samolotu: podwójne silniki (redundancja), autopilot przejmuje gdy pilot zemdleje (circuit breaker + self-healing), czarne skrzynki rejestrują wszystko (monitoring), i regularne symulacje katastrof na symulatorze (chaos engineering).",en:"Fault tolerance is like airplane design: dual engines (redundancy), autopilot takes over when the pilot faints (circuit breaker + self-healing), black boxes record everything (monitoring), and regular disaster simulations on a simulator (chaos engineering)."},
answer:"High availability and fault tolerance require multi-layered design techniques. Redundancy through multi-AZ and multi-region deployment with active-active configurations eliminates single points of failure. Circuit breakers using Resilience4j or Polly prevent cascade failures by opening circuits to failing services and returning fallback responses. Health checks via Kubernetes liveness and readiness probes enable self-healing — automatic pod restart on crashes and traffic removal from overloaded instances. Rolling updates deploy new versions pod by pod for zero-downtime releases. Chaos engineering through tools like Netflix Chaos Monkey and AWS Fault Injection Simulator proactively validates resilience by injecting real failures in production. The combined approach ensures systems degrade gracefully rather than failing catastrophically.",
keywords:["redundancy","circuit breaker","Resilience4j","Polly","health check","liveness probe","self-healing","chaos engineering","Chaos Monkey","rolling update","active-active","failover"]},

{num:"Q64",original:"What are the advantages and disadvantages of an approach based on microservices in the context of integrating generative AI with systems distributed in a cloud?",
lecture:{intro:"Architektura mikroserwisów rozbija aplikację na małe, niezależnie deployowalne serwisy — oferując zarówno korzyści jak i wyzwania specyficzne dla integracji AI.",
points:[
{title:"Zalety: niezależne skalowanie i technologia",text:"GPU-intensive AI serwisy skalują się osobno od business logic. Wolność technologiczna: Python/PyTorch dla ML, Java/Go dla API. Izolowany deployment: update modelu AI bez wpływu na resztę systemu. A/B testing modeli przez service mesh traffic splitting.",example:"ML inference service: skaluje do 20 GPU podów w peak. User service: 4 CPU pody. Niezależne skalowanie oszczędza 60% vs skalowanie całego monolitu. Canary: 90% traffic → model v2, 10% → model v3 przez Istio VirtualService."},
{title:"Wady: latencja i złożoność operacyjna",text:"Komunikacja sieciowa między serwisami dodaje latencję. Rozproszone zarządzanie danymi. Debugowanie distributed systems. Operacyjny overhead: monitoring, deployment, service mesh, distributed tracing dla każdego serwisu.",example:"AI prediction wymaga danych z 3 serwisów: User Service + History Service + ML Service. Trzy network hopy dodają 15ms latencji vs in-process calls w monolicie. Monitoring 50 serwisów wymaga: Jaeger, ELK, Prometheus, Grafana, PagerDuty."},
{title:"Best practices i ewolucja",text:"Zacznij od modular monolith, wydzielaj serwisy gdy uzasadnione (różne skalowanie, deployment, technologia). API Gateway dla komunikacji z klientem. Service mesh (Istio) dla observability i traffic management.",example:"Ewolucja: monolith → wydzielenie ML inference service (potrzebuje GPU) → wydzielenie data pipeline (inne skalowanie) → reszta zostaje jako modular monolith. Każde wydzielenie uzasadnione konkretną potrzebą, nie dogmatem."}
]},
analogy:{pl:"Mikroserwisy dla AI to jak specjalistyczny szpital: każdy oddział (serwis) ma własnych lekarzy i sprzęt (technologię), skaluje się niezależnie (więcej kardiologów gdy potrzeba), ale wymaga recepcji (API gateway), koordynacji (service mesh) i centralnej dokumentacji medycznej (distributed tracing).",en:"Microservices for AI are like a specialist hospital: each department (service) has its own doctors and equipment (technology), scales independently (more cardiologists when needed), but requires reception (API gateway), coordination (service mesh), and centralized medical records (distributed tracing)."},
answer:"Microservices offer significant advantages for AI integration: independent scaling lets GPU-intensive inference services scale separately from CPU-based business logic, saving up to 60% versus monolith scaling. Technology freedom enables Python for ML alongside Java for APIs. Isolated deployment allows model updates without affecting other services, with A/B testing via service mesh traffic splitting. However, disadvantages include inter-service network latency adding milliseconds per hop, distributed data management complexity, debugging challenges across services, and operational overhead requiring Jaeger, ELK, Prometheus, and PagerDuty for each service. Best practice: start with a modular monolith and extract services only when justified by concrete needs — different scaling, deployment cycles, or technology requirements.",
keywords:["microservices","independent scaling","API gateway","service mesh","Istio","A/B testing","latency","distributed tracing","monolith-first","technology freedom","canary deployment"]},

{num:"Q65",original:"What are the key aspects of software engineering for the development of systems based on distributed processing that use generative AI models in a cloud?",
lecture:{intro:"Budowanie rozproszonych systemów AI wymaga specjalizowanych praktyk inżynieryjnych łączących MLOps, cloud architecture i distributed systems design w spójny pipeline.",
points:[
{title:"MLOps Pipeline",text:"CI/CD rozszerzone o ML: data versioning (DVC), experiment tracking (MLflow), model registry, automated training, deployment (KServe), monitoring driftu. Trzy poziomy dojrzałości MLOps: manual → partially automated → fully automated.",example:"Pipeline: DVC wersjonuje dane → MLflow loguje eksperymenty → model rejestrowany w MLflow Registry → deploy przez KServe na K8s → Prometheus + custom metrics monitorują accuracy i latency → alert gdy accuracy < threshold → auto-retraining."},
{title:"Infrastructure as Code i GitOps",text:"Terraform/Pulumi dla reproducible cloud infrastructure. Kubernetes manifesty dla orkiestracji serwisów. ArgoCD dla GitOps — desired state w Git = actual state w klastrze. Każda zmiana infrastruktury jest code-reviewed i audytowalna.",example:"Terraform definiuje: GPU node pools, VPC, load balancers, managed databases. ArgoCD obserwuje Git repo — merge PR z nową konfiguracją K8s automatycznie aktualizuje klaster. Audit trail: każda zmiana to commit z autorem i timestampem."},
{title:"Observability i security",text:"Distributed tracing (Jaeger), structured logging (ELK/Loki), metryki (Prometheus/Grafana), AI-specific monitoring (model drift, data quality). Security: model access control, data encryption, responsible AI (bias detection, explainability SHAP).",example:"Custom Prometheus metrics: model_prediction_latency_seconds, model_accuracy_rolling_7d, data_drift_score. Alert: accuracy < 0.85 → trigger evaluation pipeline. SHAP values dla każdej predykcji umożliwiają wyjaśnienie decyzji modelu regulatorowi."}
]},
analogy:{pl:"Inżynieria AI w chmurze to jak budowa i obsługa zautomatyzowanej fabryki: MLOps to linia produkcyjna (od surowca-danych do gotowego modelu), IaC to projekt architektoniczny fabryki, observability to system kamer i czujników, a security to kontrola dostępu i audyt jakości.",en:"Cloud AI engineering is like building an automated factory: MLOps is the production line (from raw data to finished model), IaC is the factory blueprint, observability is the camera and sensor system, and security is access control and quality audit."},
answer:"Key software engineering aspects for distributed AI systems include MLOps pipelines integrating data versioning with DVC, experiment tracking with MLflow, model registry, and automated training and deployment via KServe on Kubernetes. Infrastructure as Code using Terraform ensures reproducible cloud infrastructure, while GitOps via ArgoCD maintains desired cluster state in Git with full audit trails. Observability combines distributed tracing with Jaeger, structured logging with ELK, infrastructure metrics with Prometheus and Grafana, and AI-specific monitoring for model performance drift and data quality. Security encompasses model access control, data encryption at rest and in transit, and responsible AI practices including bias detection and explainability through SHAP values.",
keywords:["MLOps","MLflow","DVC","KServe","Terraform","ArgoCD","GitOps","Jaeger","Prometheus","model drift","SHAP","responsible AI","experiment tracking"]},

{num:"Q66",original:"What methods of IT system modelling can be applied in order to design scalable applications in the cloud architecture?",
lecture:{intro:"Modelowanie systemów pomaga architektom wizualizować, analizować i walidować design aplikacji cloudowych przed implementacją — zmniejszając ryzyko i koszty zmian.",
points:[
{title:"C4 Model i UML",text:"C4 (Context, Container, Component, Code) dostarcza hierarchiczną wizualizację na 4 poziomach zoomu — od birds-eye view systemu do szczegółów kodu. UML sequence/component diagrams dla detailowego designu interakcji między komponentami.",example:"C4 Level 1 (Context): system, aktorzy zewnętrzni (users, external APIs). Level 2 (Container): web app, API, database, message queue. Level 3 (Component): wewnętrzna struktura API — controllers, services, repositories. Każdy poziom odpowiada na inne pytania stakeholderów."},
{title:"Domain-Driven Design (DDD)",text:"Bounded Contexts mapują się na mikroserwisy. Ubiquitous Language zapewnia alignment biznes-IT. Event Storming odkrywa domain events i granice serwisów poprzez warsztaty z ekspertami domenowymi.",example:"E-commerce DDD: Bounded Contexts = Order, Payment, Inventory, Shipping → każdy staje się mikroserwisem z własną bazą danych. Domain events: OrderPlaced, PaymentProcessed, ItemShipped — komunikacja między kontekstami przez eventy."},
{title:"Architecture Decision Records i cloud frameworks",text:"ADR dokumentują kluczowe decyzje architektoniczne, ich kontekst i trade-offy. AWS Well-Architected Framework (6 filarów) i Azure Architecture Center dostarczają reference architectures i best practices.",example:"ADR-007: 'Użyjemy event-driven architecture dla order processing. Kontekst: potrzeba async processing dla peak handling. Decyzja: Kafka. Konsekwencje: eventual consistency, operational complexity, ale 10x lepszy throughput.' Każdy ADR w Git obok kodu."}
]},
analogy:{pl:"Modelowanie systemu to jak tworzenie planu miasta przed budową: C4 to mapy o różnym przybliżeniu (satelita→ulica→budynek→pokój), DDD to podział na dzielnice z własnymi zasadami (bounded contexts), ADR to protokoły decyzji urbanistycznych (dlaczego tu park, a nie parking).",en:"System modeling is like creating a city plan before building: C4 is maps at different zoom levels (satellite→street→building→room), DDD divides into districts with their own rules (bounded contexts), and ADRs are urban planning decision records (why a park here, not a parking lot)."},
answer:"System modeling for cloud applications uses several complementary approaches. The C4 model provides hierarchical visualization at Context, Container, Component, and Code levels — answering different stakeholder questions at each zoom level without overwhelming detail. Domain-Driven Design maps bounded contexts to microservice boundaries through event storming workshops with domain experts, using ubiquitous language to align business and technical teams. Architecture Decision Records document key trade-off decisions in version-controlled files alongside code, preserving the reasoning behind architectural choices. Cloud-specific frameworks like AWS Well-Architected with its six pillars provide reference architectures and design principles for scalable, secure, reliable cloud applications.",
keywords:["C4 model","UML","DDD","bounded context","event storming","ADR","Well-Architected Framework","reference architecture","ubiquitous language","microservice boundary"]},

{num:"Q67",original:"How can DevOps and CI/CD processes support the development and implementation of applications based on generative AI in distributed systems operating in a cloud?",
lecture:{intro:"DevOps i CI/CD są niezbędne dla szybkich cykli iteracji wymaganych przez systemy AI — gdzie modele, dane i kod zmieniają się równolegle i często.",
points:[
{title:"MLOps — CI/CD dla ML",text:"Rozszerza tradycyjne CI/CD o: walidację danych, trenowanie modelu, ewaluację metryk, model registry, automated deployment. Pipeline: push → lint → unit tests → data validation → train → evaluate → if metrics improve → deploy.",example:"GitHub Actions workflow: on push → lint code → run tests → validate training data schema → train model → evaluate F1/accuracy → jeśli metryki lepsze niż production → deploy na staging → integration tests → promote do production. 12 minut od commita do produkcji."},
{title:"Infrastructure automation i GitOps",text:"Terraform dla cloud resources, Helm charts dla K8s deployments, ArgoCD dla GitOps. Zmiany infrastruktury przechodzą ten sam process review co kod — PR, code review, automated tests.",example:"PR zmieniający typ GPU instance: terraform plan pokazuje cost diff → team review'uje → merge → ArgoCD auto-applies na K8s cluster. Rollback: git revert commit → ArgoCD automatycznie przywraca poprzednią konfigurację."},
{title:"Monitoring, feedback loop i safe releases",text:"Continuous monitoring modelu feeds back do development cycle. Automated alerts triggerują retraining. Canary i blue-green deployments dla bezpiecznych release'ów modeli AI z automatic rollback.",example:"Canary deployment: nowy model serwuje 5% traffic przez 24h. Jeśli error rate poniżej progu → gradually increase do 100%. Jeśli metryki degradują → auto-rollback do poprzedniej wersji. Zero human intervention needed."}
]},
analogy:{pl:"DevOps/CI/CD dla AI to jak automatyczna fabryka: CI testuje każdą część (testy kodu i modelu), CD montuje i dostarcza (deployment), monitoring to kontrola jakości na końcu linii (metryki produkcyjne), a canary to testowa partia przed masową produkcją.",en:"DevOps/CI/CD for AI is like an automated factory: CI tests every part (code and model tests), CD assembles and delivers (deployment), monitoring is quality control at the end of the line (production metrics), and canary is a test batch before mass production."},
answer:"DevOps and CI/CD extend to MLOps for AI systems, adding data validation, automated model training, metric evaluation, and model registry to traditional code pipelines. Infrastructure automation through Terraform and Helm ensures reproducible, code-reviewed infrastructure changes, with GitOps via ArgoCD maintaining desired cluster state from Git repositories. Continuous monitoring of model performance creates automated feedback loops — Prometheus alerts can trigger retraining pipelines when accuracy degrades below thresholds. Safe release strategies include canary deployments serving new models to a small traffic percentage with automatic rollback on metric degradation, and blue-green deployments for instant switching between model versions. The key principle: treat ML models and training data with the same rigor as application code — version control, automated testing, peer review, and staged deployments.",
keywords:["CI/CD","MLOps","DevOps","ArgoCD","GitOps","Terraform","Helm","canary deployment","blue-green","model registry","automated retraining","monitoring"]},

{num:"Q68",original:"What challenges can be faced by software engineers during the integration of distributed systems with a cloud infrastructure when such systems use generative AI algorithms?",
lecture:{intro:"Integracja AI z systemami rozproszonymi w chmurze stawia unikalne wyzwania wykraczające poza tradycyjne distributed systems — GPU scarcity, model size, inference latency i cost management.",
points:[
{title:"Model serving i GPU constraints",text:"LLM wymagają specjalistycznej infrastruktury: batching (vLLM), KV-cache management, quantization. GPU są drogie i limitowane (quota). Latencja vs rozmiar modelu to kluczowy trade-off.",example:"Serving Llama-2 70B: wymaga 2x A100 80GB GPU per instancja ($6/h). vLLM z PagedAttention zarządza pamięcią efektywnie. 4-bit quantization (GPTQ) redukuje do 1x A100 z minimalnym spadkiem jakości. 75% redukcja kosztów GPU."},
{title:"Zarządzanie kosztami i data pipeline complexity",text:"GPU compute jest drogie. Spot instances dla trainingu (75% taniej), auto-scaling inference, model optimization (distillation, quantization, pruning). Data pipelines łączą real-time (Kafka/Flink) i batch (Spark) processing.",example:"Training na 8x A100 spot: $8/h vs $32/h on-demand = 75% savings (z checkpoint'ami na wypadek preemption). Inference: quantized model na T4 ($0.5/h) vs full model na A100 ($3/h). Feature pipeline: Kafka → Flink → Feature Store → Model."},
{title:"Team skill gaps i organizacja",text:"ML engineers mogą nie znać cloud/distributed systems. DevOps mogą nie znać AI. Cross-functional teams i shared platformy (Kubeflow + MLflow) bridgują lukę kompetencyjną.",example:"Platform team buduje ML platform (Kubeflow + MLflow + monitoring templates). ML engineers skupiają się na modelach — korzystają z platformy bez zarządzania K8s. DevOps utrzymuje infrastrukturę. Shared abstractions redukują wymagane kompetencje per rola."}
]},
analogy:{pl:"Integracja AI z chmurą to jak instalacja nowoczesnego silnika rakietowego w istniejącym samolocie: silnik (AI model) jest potężny, ale wymaga nowego paliwa (GPU), nowych czujników (monitoring), specjalistycznych mechaników (ML engineers), i zupełnie innego budżetu na paliwo (GPU costs).",en:"Integrating AI with cloud is like installing a rocket engine in an existing airplane: the engine (AI model) is powerful, but needs new fuel (GPU), new sensors (monitoring), specialist mechanics (ML engineers), and a completely different fuel budget (GPU costs)."},
answer:"Software engineers face several unique challenges integrating AI with distributed cloud systems. Model serving requires specialized infrastructure — LLMs need GPU memory management through tools like vLLM with PagedAttention, batching strategies, and quantization to balance latency and cost. GPU compute costs are significant — spot instances save 75% for training with checkpointing, while model quantization reduces inference costs by up to 75%. Data pipeline complexity spans both real-time streams via Kafka and Flink for features, and batch processing via Spark for training data preparation. Team skill gaps between ML engineers, cloud architects, and DevOps require cross-functional collaboration and shared ML platforms like Kubeflow that abstract infrastructure complexity from model development work.",
keywords:["model serving","vLLM","quantization","GPU cost","spot instance","data pipeline","feature store","Kubeflow","skill gap","PagedAttention","batching","GPTQ"]},

{num:"Q69",original:"What design methods may improve fault tolerance in AI systems operating in a distributed environment in a cloud?",
lecture:{intro:"AI systems wymagają specyficznych metod fault tolerance wykraczających poza standardowe distributed systems — model fallback chains, graceful degradation AI features, i resilient inference pipelines.",
points:[
{title:"Model fallback chain",text:"Jeśli primary model padnie, fallback do prostszego modelu, potem do rule-based system, potem do cached response. Gwarantuje ciągłość serwisu nawet podczas awarii AI — degradacja graceful zamiast total failure.",example:"Chain: GPT-4 (primary, najlepsza jakość) → GPT-3.5 (fallback, szybszy i tańszy) → keyword-matching rules (emergency, zero ML dependency) → cached most-popular response (last resort). Każdy krok szybszy i bardziej niezawodny."},
{title:"Multi-model redundancy i async inference",text:"Deploy modeli w wielu zonach/providerach. Ensemble: kombination predykcji z wielu modeli. Queue-based async inference dla non-real-time features — jeśli ML service padnie, user widzi default recommendations zamiast error.",example:"Fraud detection: Model A (TensorFlow) na AWS US-East, Model B (PyTorch, inna architektura) na Azure EU-West. Ensemble kombinuje predykcje — nawet jeśli jeden fails, drugi działa. Non-critical features (rekomendacje) z async queue: ML service down → default recommendations."},
{title:"Feature store resilience i data fallbacks",text:"Feature store z cachingiem zapewnia że modele mogą serwować predykcje nawet gdy data sources są niedostępne. Offline feature computation + default feature values jako safety net.",example:"Feature store cachuje last-known user features w Redis. Real-time feature service down → predykcja z cached features (lekko stale ale functional) zamiast total failure. Default feature values dla nowych userów bez historii — model zawsze ma input."}
]},
analogy:{pl:"Fault tolerance AI to jak system oświetlenia awaryjnego: prąd główny (GPU model) → agregat (prostszy model) → baterie UPS (reguły) → świece (cache). Zawsze jest jakieś światło — nigdy ciemność. Im niższy poziom, tym prostsze ale pewniejsze.",en:"AI fault tolerance is like emergency lighting: main power (GPU model) → generator (simpler model) → UPS batteries (rules) → candles (cache). There is always some light — never total darkness. Each lower level is simpler but more reliable."},
answer:"AI-specific fault tolerance methods include model fallback chains — cascading from the primary model to simpler models, then rule-based systems, then cached responses — ensuring service continuity during AI component failures with graceful degradation instead of total failure. Multi-model redundancy deploys different model architectures across zones or providers, with ensemble approaches combining predictions for both accuracy and resilience — if one model fails, the other still serves. Async inference queues for non-critical AI features like recommendations mean users see defaults rather than errors when the ML service is unavailable. Feature store resilience through Redis caching provides last-known feature values when real-time data sources are down, with default values for new users ensuring the model always has input to work with.",
keywords:["model fallback","graceful degradation","circuit breaker","ensemble","multi-model","feature store","caching","async inference","redundancy","default values"]},

{num:"Q70",original:"How do system design techniques based on microservices support the use of generative AI in distributed cloud applications?",
lecture:{intro:"Mikroserwisy zapewniają naturalną architekturę dla GenAI: każda zdolność AI jako niezależny serwis z własnym lifecycle, skalowaniem i stack technologicznym.",
points:[
{title:"AI Service Isolation",text:"Każda zdolność AI jako niezależny mikroserwis: text generation, image classification, recommendations — z własnym skalowaniem, deployment cycle i technologią. GPU serwisy izolowane od CPU serwisów.",example:"Serwisy: text-generation (GPT na A100 GPU), image-classification (ResNet na T4 GPU), recommendation (XGBoost na CPU), search (embedding model na T4). Każdy z niezależnym HPA, deployment pipeline i budżetem GPU."},
{title:"Service mesh dla AI traffic management",text:"Istio/Linkerd umożliwia: traffic splitting dla A/B testing modeli, canary releases, mutual TLS, circuit breaking, retry policies z exponential backoff. Kluczowe dla bezpiecznych rolloutów nowych modeli.",example:"Istio VirtualService: route 95% traffic → model-v2 (production), 5% → model-v3 (candidate). Monitor latency, accuracy, error rate przez 48h. Jeśli v3 lepszy → gradually shift. Jeśli gorszy → rollback w sekundach."},
{title:"Event-driven communication między AI serwisami",text:"Zamiast synchronicznych REST calls, eventy przez Kafka/RabbitMQ. Decoupling: producer nie czeka na consumer. Enables: replay events, multiple consumers, natural backpressure handling.",example:"Nowe zdjęcie uploaded → event do Kafka → image-classification service konsumuje i klasyfikuje → event z wynikiem → recommendation service konsumuje i aktualizuje rekomendacje → notification service wysyła alert. Każdy serwis niezależny, failure jednego nie blokuje innych."}
]},
analogy:{pl:"Mikroserwisy + AI to jak zespół specjalistów w studio filmowym: reżyser (API gateway) koordynuje, operator (image service), dźwiękowiec (audio service), scenarzysta (text service) — każdy ekspert w swoim fachu, pracują równolegle, komunikują się przez walkie-talkie (event bus).",en:"Microservices + AI are like specialists in a film studio: the director (API gateway) coordinates, cinematographer (image service), sound engineer (audio service), screenwriter (text service) — each an expert, working in parallel, communicating via walkie-talkie (event bus)."},
answer:"Microservices naturally support GenAI through AI service isolation — each capability as an independent service with its own scaling, deployment, and technology stack. GPU-intensive inference scales independently from CPU-based business logic. Service mesh tools like Istio enable A/B testing of model versions through traffic splitting, canary releases with automatic rollback based on metric thresholds, and mutual TLS for secure inter-service communication. Event-driven communication via Kafka decouples AI services — image classification, recommendation, and notification services process events independently, so failure in one doesn't block others. This architecture enables ML teams to iterate on models independently of application teams, deploying new model versions multiple times per day without coordinating with the broader system.",
keywords:["microservices","AI service","service mesh","Istio","traffic splitting","canary","event-driven","Kafka","independent scaling","GPU isolation","A/B testing"]},

{num:"Q71",original:"What problems related to data coherence can occur during the designing of systems in the distributed architecture? How can such problems be solved with the use of cloud tools?",
lecture:{intro:"Spójność danych w systemach rozproszonych jest regulowana przez twierdzenie CAP — w praktyce wybieramy między silną spójnością a dostępnością. Cloud tools oferują tunable consistency models.",
points:[
{title:"CAP Theorem i modele spójności",text:"Strong consistency: wszystkie odczyty widzą najnowszy zapis. Eventual consistency: odczyty mogą chwilowo widzieć stare dane. Causal consistency: respektuje relacje przyczynowo-skutkowe. Wybór zależy od wymagań biznesowych per operacja.",example:"System bankowy: strong consistency dla salda konta (musi być dokładne). Social media 'like counter': eventual consistency (chwilowe 999 zamiast 1000 jest akceptowalne). Czat: causal consistency (odpowiedź musi pojawić się po pytaniu)."},
{title:"Typowe problemy spójności",text:"Stale reads: odczyt starej wartości. Lost updates: dwa jednoczesne zapisy — jeden nadpisuje drugi. Split-brain: partycja sieciowa tworzy dwóch 'masterów'. Write conflicts w multi-master replication.",example:"Dwóch użytkowników edytuje ten sam dokument w różnych regionach. Bez conflict resolution jeden edit nadpisuje drugi (lost update). CRDT (Conflict-free Replicated Data Types) rozwiązują to: oba edity mergują się automatycznie bez konfliktu."},
{title:"Cloud tools i architectural patterns",text:"Azure Cosmos DB: 5 poziomów spójności (strong → eventual). Google Spanner: globally strong consistency z TrueTime. Saga pattern dla distributed transactions. Event sourcing z Kafka dla audit trail. CQRS separuje read/write models.",example:"Azure Cosmos DB: per-request wybór consistency level. Strong dla płatności, session consistency dla koszyka, eventual dla like counters. Saga pattern: Order → Payment → Inventory — każdy krok z compensating transaction (refund, restock) jeśli następny fails."}
]},
analogy:{pl:"Spójność danych w systemach rozproszonych to jak synchronizacja zegarów w różnych strefach czasowych: strong consistency = jeden zegar atomowy dla wszystkich (dokładny ale kosztowny), eventual consistency = każdy zegar sam się kalibruje (szybki ale chwilowe różnice), session consistency = twój zegarek zawsze spójny z twoimi poprzednimi odczytami.",en:"Data coherence in distributed systems is like synchronizing clocks across time zones: strong consistency = one atomic clock for everyone (accurate but expensive), eventual consistency = each clock self-calibrates (fast but temporary differences), session consistency = your watch always consistent with your own previous readings."},
answer:"Distributed architectures face data coherence challenges governed by the CAP theorem. Common problems include stale reads of outdated values, lost updates from concurrent writes, split-brain scenarios during network partitions creating multiple masters, and write conflicts in multi-master replication. Cloud tools address these with tunable consistency: Azure Cosmos DB offers five levels from strong to eventual — choosing per request based on business needs. Google Cloud Spanner provides globally strong consistency using TrueTime atomic clocks. Architectural patterns help: the Saga pattern manages distributed transactions through compensating actions for rollback, event sourcing with Kafka provides eventual consistency with complete audit trails, CQRS separates read and write models for independent optimization, and CRDTs enable conflict-free concurrent updates across replicas.",
keywords:["CAP theorem","strong consistency","eventual consistency","Saga pattern","CQRS","event sourcing","CRDT","split-brain","Cosmos DB","Spanner","TrueTime","compensating transaction"]},

{num:"Q72",original:"How does the cloud architecture support the implementation and integration of distributed processing systems in the context of generative AI?",
lecture:{intro:"Chmura dostarcza managed services dla każdego etapu lifecycle AI: compute (GPU instances), storage (S3, GCS), ML platforms (SageMaker, Vertex AI), i serving infrastructure.",
points:[
{title:"Managed ML Services",text:"AWS SageMaker, Google Vertex AI, Azure ML — end-to-end platformy do trainingu, servingu i monitoringu modeli bez zarządzania infrastrukturą. AutoML dla szybkiego prototypowania. Custom training z GPU dla zaawansowanych modeli.",example:"Vertex AI: upload data do GCS → wybierz algorithm → configure training job (GPU type, hyperparameters) → deploy endpoint → monitor accuracy i latency. Zero zarządzania K8s, GPU drivers, czy CUDA. Gotowy endpoint w godzinę."},
{title:"Elastic compute i ekonomika",text:"GPU instances on demand. Spot/preemptible instances dla trainingu (70-90% taniej). Auto-scaling inference endpoints. Pay-per-use eliminuje upfront hardware investment.",example:"Training: 8x p4d.24xlarge spot instances na 12h ≈ $300. Ten sam hardware purchased: ~$200K. Cloud eliminuje 99.85% kosztu hardware dla periodic training jobs. Aurora Serverless: auto-scale od 2 ACU w nocy do 64 ACU w peak — pay-per-use."},
{title:"Data services i networking",text:"Managed databases (RDS, DynamoDB), streaming (Kinesis, Pub/Sub), storage (S3, GCS), analytics (BigQuery, Athena). VPC isolation, PrivateLink, IAM, KMS — security bez custom implementation.",example:"Data pipeline: IoT data → Kinesis → Lambda (transform) → S3 (raw) → Glue (clean) → S3 (features) → SageMaker (train) → Endpoint (serve). Wszystko managed services. Networking: training w private subnet bez internet access, model artifacts w encrypted S3."}
]},
analogy:{pl:"Chmura dla AI to jak wynajem studia filmowego vs budowanie własnego: dostajesz kamery (GPU), oświetlenie (storage), montownię (ML platform), ekipę techniczną (managed services) i sale projekcyjne (serving endpoints) — bez kupowania czegokolwiek. Płacisz za czas wynajmu.",en:"Cloud for AI is like renting a film studio versus building your own: you get cameras (GPU), lighting (storage), editing suite (ML platform), tech crew (managed services), and screening rooms (serving endpoints) — without buying anything. You pay for rental time."},
answer:"Cloud architecture supports distributed AI through managed ML services like SageMaker, Vertex AI, and Azure ML providing end-to-end training, serving, and monitoring without infrastructure management — from data upload to production endpoint in hours. Elastic compute offers GPU instances on demand with spot pricing reducing training costs by 70-90% versus on-demand, while auto-scaling inference endpoints like Aurora Serverless adjust capacity to demand automatically. Integrated data services — managed databases, streaming platforms, and analytics engines — create seamless data pipelines feeding AI models. Security through VPC isolation, IAM, and KMS encryption ensures compliant deployments without custom security implementations. The key advantage: teams focus on model development while cloud services handle scaling, availability, and infrastructure management.",
keywords:["SageMaker","Vertex AI","managed service","GPU instance","spot pricing","elastic compute","auto-scaling","VPC","IAM","KMS","data pipeline","serverless"]},

{num:"Q73",original:"What strategies of requirements management are most efficient in the process of developing AI systems, with the consideration of cloud distributed processing services?",
lecture:{intro:"Wymagania systemów AI są inherentnie niepewne — wydajność modelu nieprzewidywalna przed trenowaniem, jakość danych zmienna, wartość biznesowa zależy od accuracy modelu. Iteracyjne podejście jest konieczne.",
points:[
{title:"Iteracyjne wymagania i ML-specific metrics",text:"Agile/Scrum z krótkimi sprintami. Wymagania ewoluują w miarę eksperymentów z modelami. Definition of Done zawiera metryki modelu: accuracy, F1, latency SLA, fairness constraints. Każdy sprint waliduje hipotezy.",example:"Sprint 1: 'Model osiąga >80% accuracy na test set'. Sprint 2: 'Latency <100ms p99 per prediction'. Sprint 3: 'A/B test pokazuje >5% improvement conversion rate'. Sprint 4: 'Fairness audit — disparity <5% across demographics'."},
{title:"Stakeholder alignment i komunikacja",text:"Data scientists, engineers, product managers i compliance officers mają różne concerns. Regularne demo i dashboardy metryk alignują oczekiwania. Wspólne decision-making o trade-offach (accuracy vs latency vs cost).",example:"Weekly model review: data scientists prezentują accuracy trends, engineers pokazują latency/cost metrics, PM pokazuje business impact (conversion rate, revenue). Wspólna decyzja: czy wydać $5K więcej na GPU żeby poprawić latency o 20ms?"},
{title:"Cloud infrastructure requirements",text:"Budget constraints, scaling limits, data residency, availability SLA dla cloud resources. Te wymagania ograniczają architekturę i wpływają na model selection (mniejszy model = tańszy inference).",example:"Budget: max $10K/mies na inference compute. Scaling: handle 10x traffic spike w <5 min. Data: PII stays in EU (GDPR). Availability: 99.9% uptime dla AI endpoints. Te constrainty eliminują niektóre modele (zbyt drogie) i wymuszają quantization."}
]},
analogy:{pl:"Wymagania dla AI to jak planowanie ekspedycji naukowej: znasz kierunek (cel biznesowy), ale nie dokładną trasę (wyniki modelu). Planujesz iteracyjnie sprint po sprincie, dostosowując kurs na podstawie tego co odkryjesz po drodze — jak żeglarze korygujący kurs co dzień.",en:"AI requirements are like planning a scientific expedition: you know the direction (business goal), but not the exact route (model results). You plan iteratively sprint by sprint, adjusting course based on discoveries — like sailors correcting course daily."},
answer:"AI system requirements management requires iterative approaches because model performance is inherently unpredictable before training. Agile sprints with ML-specific Definitions of Done incorporating model quality metrics — accuracy targets, latency SLAs, and fairness constraints — validate hypotheses incrementally. Regular stakeholder alignment through weekly model reviews bridges different concerns of data scientists, engineers, product managers, and compliance officers, enabling joint trade-off decisions between accuracy, latency, and cost. Cloud infrastructure requirements including compute budgets, scaling capacity, data residency, and availability SLAs constrain architecture choices and influence model selection — sometimes requiring smaller, quantized models to meet cost targets.",
keywords:["iterative requirements","Agile","model metrics","SLA","fairness constraint","stakeholder alignment","trade-off","Definition of Done","budget","data residency"]},

{num:"Q74",original:"What approach toward software quality management is most appropriate for the development of generative AI systems in the cloud environment?",
lecture:{intro:"Zarządzanie jakością systemów AI rozszerza tradycyjną jakość oprogramowania o wymiary jakości modelu, jakości danych i odpowiedzialnego AI.",
points:[
{title:"AI Testing Pyramid",text:"Unit tests (funkcje), integration tests (pipelines), model tests (metryki na held-out data + slice analysis + adversarial examples), system tests (end-to-end), shadow/canary deployment tests. Model testing jest unikalny dla AI.",example:"Model testing: evaluate na test set (overall accuracy), challenge set (edge cases, adversarial inputs), slice analysis (accuracy per demographic group), regression tests (czy nowy model nie pogarsza wyników na specific use cases). Wszystko automated w CI/CD pipeline."},
{title:"Data Quality i monitoring produkcyjny",text:"Schema validation, distribution monitoring, freshness checks. Great Expectations framework dla testowania data pipelines. W produkcji: model performance metrics, data drift detection (Evidently AI), business metric correlation.",example:"Great Expectations: expect_column_values_to_be_between('age', 0, 150), expect_column_values_to_not_be_null('email'). Run na każdym pipeline execution. Evidently AI: weekly monitoring prediction distribution drift — JS divergence > threshold → alert → trigger evaluation."},
{title:"Responsible AI",text:"Fairness metrics across demographics (gender, age, ethnicity). Explainability (SHAP/LIME dla feature importance). Privacy (differential privacy, anonymization). Ethical review processes dla high-stakes decisions.",example:"Monthly fairness audit: compare model accuracy/false positive rate across gender, age i ethnicity groups. Flag any metric z >5% disparity. SHAP values dla top-10 features per prediction — regulatorowi i klientowi wyjaśniamy dlaczego model podjął taką decyzję."}
]},
analogy:{pl:"Jakość AI to jak kontrola jakości w restauracji z gwiazdkami Michelin: testujesz składniki na wejściu (data quality), sprawdzasz przepis (model tests), próbujesz gotowe danie (system tests), zbierasz opinie gości (production monitoring), i regularnie sprawdzasz czy kuchnia nie dyskryminuje grup klientów (fairness audit).",en:"AI quality is like Michelin restaurant quality control: test ingredients on arrival (data quality), verify the recipe (model tests), taste the finished dish (system tests), collect guest feedback (production monitoring), and regularly check that the kitchen doesn't discriminate against guest groups (fairness audit)."},
answer:"Software quality for AI requires a multi-dimensional approach. The AI testing pyramid includes unit tests for functions, integration tests for pipelines, model evaluation on held-out data with slice analysis across demographics and adversarial testing for edge cases, plus end-to-end system tests. Data quality management uses frameworks like Great Expectations for automated schema and distribution validation in every pipeline run. Production monitoring tracks model performance drift and data drift using tools like Evidently AI, with automated alerts triggering evaluation or retraining when metrics degrade. Responsible AI practices include fairness audits comparing metrics across demographic groups, explainability through SHAP values for decision transparency, and ethical review processes for high-stakes applications. All quality gates should be automated in CI/CD pipelines.",
keywords:["testing pyramid","model testing","data quality","Great Expectations","Evidently AI","drift detection","SHAP","LIME","fairness","responsible AI","slice analysis","adversarial testing"]},

{num:"Q75",original:"What tools and technologies support integration of generative AI with cloud platforms of distributed processing, ensuring the flexibility and scalability of the system?",
lecture:{intro:"Kompletny toolchain dla cloud AI obejmuje: compute (GPU), orkiestrację (K8s), ML platforms, model serving, feature infrastructure i monitoring — zintegrowany pipeline od danych do produkcji.",
points:[
{title:"ML Platforms i Model Serving",text:"AWS SageMaker, Google Vertex AI, Azure ML — managed end-to-end ML lifecycle. Model serving: vLLM (LLM z PagedAttention), KServe (K8s-native serving), TensorRT-LLM (NVIDIA optimization), Seldon Core (multi-framework).",example:"vLLM serwuje LLM z: PagedAttention (efektywne zarządzanie GPU memory), continuous batching (wysoki throughput), OpenAI-compatible API endpoint. KServe na K8s: auto-scaling, canary rollouts, multi-model serving na shared GPU."},
{title:"Data i Feature Infrastructure",text:"Feast (feature store — consistent features w training i inference), Apache Kafka (streaming), Spark (batch processing), Pinecone/Weaviate/Milvus (vector databases dla RAG). Data lake: S3/GCS z Parquet format.",example:"Feast: definiujesz features raz, serwujesz konsekwentnie w training (batch) i inference (real-time). Zapobiega training-serving skew — jedna z najczęstszych przyczyn degradacji modelu w produkcji. Vector DB: semantic search over 1M dokumentów w <10ms."},
{title:"Orchestration i Monitoring",text:"Kubeflow (ML workflows on K8s), MLflow (experiment tracking + model registry), Weights & Biases (visualization), Prometheus/Grafana (infrastructure), custom AI metrics.",example:"End-to-end: data → Kafka → Spark processing → Feast feature store → Kubeflow training pipeline → MLflow registry → KServe deployment → Prometheus metrics → Grafana dashboards → PagerDuty alerts. Fully automated, observable pipeline."}
]},
analogy:{pl:"Narzędzia AI w chmurze to jak profesjonalna kuchnia restauracyjna: piece różnych typów (GPU instances), lodówki i mroźnie (storage tiers), robot kuchenny (ML platform), taśma sushi (serving pipeline), termometry i timery (monitoring), i system zamawiania (feature store).",en:"Cloud AI tools are like a professional restaurant kitchen: various oven types (GPU instances), fridges and freezers (storage tiers), food processor (ML platform), sushi conveyor (serving pipeline), thermometers and timers (monitoring), and ordering system (feature store)."},
answer:"Key tools for cloud AI integration span several categories. ML platforms like SageMaker and Vertex AI provide managed end-to-end lifecycle management. Model serving tools — vLLM with PagedAttention for LLMs, KServe for Kubernetes-native serving, TensorRT-LLM for NVIDIA optimization — handle production inference with auto-scaling and canary deployments. Data infrastructure includes Feast for consistent feature serving across training and inference preventing training-serving skew, Kafka for real-time streaming, and vector databases like Pinecone for RAG semantic search. Orchestration via Kubeflow manages ML workflow pipelines, MLflow tracks experiments and maintains model registries, and Prometheus with Grafana provides infrastructure and custom AI metric monitoring. The complete pipeline: data streams through Kafka to Spark processing, features stored in Feast, models trained via Kubeflow, registered in MLflow, deployed through KServe, and monitored with Prometheus.",
keywords:["SageMaker","Vertex AI","vLLM","KServe","TensorRT-LLM","Feast","Kafka","Spark","MLflow","Kubeflow","Prometheus","Pinecone","vector database","feature store"]},

{num:"Q76",original:"What advantages result from using containers (e.g.: Docker) and orchestration (e.g.: Kubernetes) in AI systems based on cloud distributed processing?",
lecture:{intro:"Kontenery i orkiestracja to fundament nowoczesnych cloud-native systemów AI — zapewniają spójność, skalowalność, powtarzalność i efektywność operacyjną.",
points:[
{title:"Docker — spójność i powtarzalność",text:"Kontener pakuje aplikację + wszystkie zależności w portable unit. Identical environment od dev laptop przez staging do production. Immutable deployments eliminują 'works on my machine'. Fast startup vs VMs.",example:"ML model w Docker: FROM python:3.11 → COPY requirements.txt → RUN pip install torch transformers → COPY model/ → CMD ['serve']. Ten sam kontener uruchamiany identycznie na laptopie developera i na produkcyjnym K8s z GPU."},
{title:"Kubernetes — orkiestracja i auto-scaling",text:"Auto-scaling (HPA/VPA): skalowanie podów na podstawie CPU, memory lub custom metrics (GPU utilization, request queue depth). Self-healing: auto-restart crashed podów. Rolling updates: zero-downtime deployment nowych wersji modelu. GPU scheduling przez NVIDIA device plugin.",example:"AI inference deployment: K8s HPA skaluje pody od 2 do 20 na podstawie GPU utilization metric. Crashed pod → K8s natychmiast scheduluje replacement na healthy node. Rolling update: nowa wersja modelu deploy'owana pod po podzie — zero user-facing downtime."},
{title:"AI-specific benefits i operational advantages",text:"KServe: Kubernetes-native model serving z canary traffic split. Kubeflow: distributed training na wielu nodach. Helm charts pakują cały AI service stack (Deployment, Service, HPA, PVC, ConfigMap) w jeden deployable package. Multi-cloud portability.",example:"Helm chart pakuje: Deployment (pody z modelem), Service (networking), HPA (scaling rules), PVC (model storage), ConfigMap (hyperparameters). Jedna komenda: helm install my-model ./chart — deploy pełnego AI service stack. Te same manifesty działają na AWS EKS, Azure AKS, GCP GKE."}
]},
analogy:{pl:"Kontenery to jak kontenery transportowe: standardowy rozmiar (interfejs), dowolna zawartość (aplikacja + zależności), ładowane na dowolny statek (serwer/cloud). Kubernetes to zautomatyzowany port morski — zarządza tysiącami kontenerów: rozładowuje, przeładowuje, wymienia uszkodzone, i skaluje operacje automatycznie.",en:"Containers are like shipping containers: standard size (interface), any contents (app + dependencies), loaded on any ship (server/cloud). Kubernetes is an automated seaport — managing thousands of containers: unloading, reloading, replacing damaged ones, and scaling operations automatically."},
answer:"Docker containers provide environment consistency from development through production by packaging ML models with all dependencies into portable, immutable units — eliminating 'works on my machine' issues. Kubernetes orchestrates containers with auto-scaling based on GPU utilization or request queue depth, self-healing through automatic pod restart on failures, and rolling updates for zero-downtime model deployments. AI-specific tools built on Kubernetes include KServe for model serving with canary traffic splitting between model versions, Kubeflow for distributed training pipelines across multiple GPU nodes, and NVIDIA device plugin for GPU scheduling. Helm charts package entire AI service stacks — deployments, scaling rules, storage, and configuration — into single deployable packages that work identically across AWS EKS, Azure AKS, and GCP GKE for multi-cloud portability.",
keywords:["Docker","Kubernetes","container","HPA","GPU scheduling","KServe","Kubeflow","Helm","rolling update","self-healing","NVIDIA device plugin","multi-cloud","immutable deployment"]},

{num:"Q77",original:"What architectural techniques should be taken into consideration during the design of systems that must operate in real time in cloud distributed systems?",
lecture:{intro:"Real-time systemy mają twardą wymaganą latencję — każda milisekunda ma znaczenie. Architektura musi eliminować źródła opóźnień: sieć, dysk, blokowanie wątków, cold starts.",
points:[
{title:"Event-Driven Architecture z Apache Kafka",text:"Zamiast synchronicznych wywołań API (czekasz na odpowiedź), komponenty komunikują się przez asynchroniczne eventy. Kafka to rozproszony log zdarzeń z bardzo niską latencją i wysoką throughput. Flink/Spark Streaming do real-time processing.",example:"System wykrywania fraudów: transakcja trafia do Kafka topic, Flink pobiera event, model ML przetwarza w <50ms, decyzja publikowana do output topic — bez blokowania flow transakcji. 100K events/sec throughput."},
{title:"In-Memory Data Stores — Redis",text:"Dostęp do dysku ~10ms. Dostęp do RAM ~100ns — 100,000x szybciej. Redis przechowuje session data, cache, rate limits, feature values w pamięci. Eliminuje slow disk I/O z critical path.",example:"API gateway sprawdza rate limit w Redis: każde żądanie = jeden GET w Redis (<0.1ms). Na dysku to byłoby 10ms — przy 10K RPS różnica to 100 sekund vs 1 sekunda agregowanego czasu per sekundę. Redis Cluster dla HA i sharding."},
{title:"Stateless services i connection pooling",text:"Stateless: każde żądanie niezależne — serwis nie trzyma session state. Dowolne skalowanie i routing. Connection pooling: reużycie połączeń DB zamiast nowego handshake przy każdym request — PgBouncer, HikariCP.",example:"Bez connection pooling: nowe połączenie TCP do PostgreSQL = ~10ms handshake + TLS negotiation. Z PgBouncer: reużycie istniejącego = <0.5ms. Przy 10K RPS: 100s vs 5s overhead per sekundę. Stateless + pooling = fundamenty real-time performance."}
]},
analogy:{pl:"Real-time system to jak restauracja fast food: Kafka to kolejka zamówień na wyświetlaczu (event-driven), Redis to gotowe składniki pod ręką zamiast w lodówce w piwnicy (in-memory), stateless to każdy kasjer może obsłużyć każdego klienta (horizontal scaling), connection pooling to otwarte okienko zamiast zamykania i otwierania drzwi przy każdym kliencie.",en:"A real-time system is like fast food: Kafka is the order display queue (event-driven), Redis is prepared ingredients at the counter not in the basement freezer (in-memory), stateless means any cashier serves any customer (horizontal scaling), connection pooling is keeping the window open instead of closing and reopening the door for each customer."},
answer:"Real-time cloud systems require architectural techniques that eliminate latency at every layer. Event-Driven Architecture with Apache Kafka enables asynchronous processing — components react to events rather than blocking on synchronous calls, enabling sub-50ms fraud detection pipelines processing 100K events per second. In-memory data stores like Redis replace disk I/O for frequently accessed data — session state, rate limiting, cached results — responding in microseconds versus the 10ms of disk access. Stateless service design enables unrestricted horizontal scaling without session affinity. Connection pooling with PgBouncer or HikariCP reuses database connections, eliminating the 10ms TCP handshake overhead per request that becomes critical at high request rates.",
keywords:["Apache Kafka","Redis","event-driven","Flink","stateless","connection pooling","PgBouncer","HikariCP","in-memory","latency","throughput","real-time"]},

{num:"Q78",original:"How does the use of cloud computational infrastructure affect the efficiency of AI algorithms in distributed systems?",
lecture:{intro:"Infrastruktura cloud dramatycznie wpływa na efektywność AI: dostęp do najnowszego hardware GPU/TPU, elastic scaling, managed services i high-speed networking między nodami.",
points:[
{title:"GPU/TPU access bez CAPEX",text:"Cloud daje dostęp do najnowszych GPU (A100, H100) i TPU bez inwestycji kapitałowej. Różne typy instancji optymalizowane pod training (A100 SXM) vs inference (T4, Inferentia). Spot pricing 70-90% taniej dla training.",example:"Training 70B parameter model: 8x A100 SXM4 (640GB total GPU memory) = $25/h on-demand, $8/h spot. Zakup tego hardware: ~$200K+. Inference: Inferentia2 instances na AWS = 4x lepszy price-performance niż GPU dla inference workloadów."},
{title:"Distributed training i networking",text:"Cloud networking 100-400Gbps (EFA na AWS, InfiniBand na Azure) umożliwia multi-node training z near-linear speedup. NCCL optymalizuje GPU-to-GPU communication. Data parallelism, model parallelism, pipeline parallelism.",example:"AWS p5.48xlarge z 8x H100 + 3200Gbps EFA networking: 8 takich instancji (64 GPU) osiągają near-linear training speedup z PyTorch DDP i NCCL backend. 8x szybciej niż single node, ~95% efficiency."},
{title:"Auto-scaling inference i data proximity",text:"Cloud auto-scaling dopasowuje inference capacity do demand. Serverless endpoints (SageMaker Serverless) skalują do zera gdy idle. Data co-located z compute minimalizuje transfer latency i koszty.",example:"SageMaker Serverless endpoint: skaluje od 0 do 20 instancji automatycznie. W nocy: zero kosztu. Peak: pełna capacity. Oszczędność 70% vs always-on. Training data w S3 same-region jak EC2: <1ms data access. Cross-region: 50-100ms + $90/TB transfer cost."}
]},
analogy:{pl:"Chmura dla AI to jak wynajem wyścigowego bolidu F1 na tor: dostajesz najlepszy sprzęt (GPU H100), pit crew (managed services), telemetrię (monitoring) — płacisz za godziny na torze, nie za cały bolid. A na co dzień jeździsz normalnym samochodem (tańsze instancje).",en:"Cloud for AI is like renting an F1 car for the track: you get the best hardware (GPU H100), pit crew (managed services), telemetry (monitoring) — pay for track hours, not the whole car. And daily you drive a normal car (cheaper instances)."},
answer:"Cloud infrastructure dramatically affects AI efficiency through GPU/TPU access without capital investment — different instance types optimized for training like A100 with 80GB memory versus inference like AWS Inferentia with 4x better price-performance, with spot pricing reducing training costs by 70-90%. High-speed networking at 100-400Gbps through AWS EFA or Azure InfiniBand enables distributed training with near-linear multi-GPU scaling using NCCL for optimized GPU-to-GPU communication. Auto-scaling inference matches capacity to demand — serverless endpoints scale to zero when idle, saving up to 70% versus always-on deployments. Data proximity by co-locating compute and storage in the same region eliminates the 50-100ms cross-region latency and $90/TB transfer costs that would otherwise bottleneck training data pipelines.",
keywords:["GPU","TPU","A100","H100","Inferentia","EFA","NCCL","distributed training","spot pricing","auto-scaling","serverless","data proximity"]},

{num:"Q79",original:"What challenges can be faced in the scaling of systems based on generative AI in cloud distributed environments?",
lecture:{intro:"Skalowanie systemów GenAI stawia unikalne wyzwania: GPU scarcity, koszty rosnące z traffic, latency-throughput trade-offs, i bottlenecki w data pipeline — nie w samym modelu.",
points:[
{title:"GPU resource constraints i koszty",text:"GPU availability jest limitowana (quota, regional availability). Multi-tenant GPU sharing wymaga careful memory management. Koszty inference skalują się liniowo z traffic — duże modele są drogie per request. Quantization i distillation redukują requirements.",example:"Peak demand: potrzeba 100 A100 GPU ale cloud quota to 64. Rozwiązania: request quota increase (tygodnie), spot instances z fallback, quantization modelu (4-bit GPTQ: 75% mniej GPU), lub model distillation (mniejszy student model z 95% jakości teacher'a)."},
{title:"Latency vs throughput trade-off",text:"Większy batch size = lepsza GPU utilization (throughput) ale wyższa latencja per request. Continuous batching (vLLM) balansuje oba. Tiered model strategy: prosty model dla łatwych queries, duży dla złożonych.",example:"Batch size 1: 50ms latency, 20 req/s throughput. Batch 32: 200ms latency, 500 req/s. Continuous batching w vLLM: 80ms latency, 400 req/s — najlepszy balance. Tiered: GPT-3.5 dla FAQ (szybki, tani), GPT-4 dla złożonych pytań (wolniejszy, droższy)."},
{title:"Data pipeline jako bottleneck",text:"Feature computation, embedding generation, preprocessing muszą skalować razem z inference. Często pipeline danych jest bottleneckiem, nie sam model. Distributed processing z Spark/Flink skaluje pipeline.",example:"System rekomendacji: generowanie embeddings dla 100M produktów zajmuje 12h na single GPU. Distributed: 20 GPU z data parallelism = 36 minut. Ale feature store update zajmuje 2h — to jest faktyczny bottleneck, nie model inference."}
]},
analogy:{pl:"Skalowanie AI to jak rozbudowa restauracji gwiazdzistkowej: potrzebujesz więcej kucharzy (GPU) — ale są drodzy i trudno dostępni. Optymalizujesz przepisy (quantization), wprowadzasz express menu (tiered models), i upewniasz się że dostawa składników (data pipeline) nadąża za rozbudowaną kuchnią.",en:"Scaling AI is like expanding a Michelin restaurant: you need more chefs (GPU) — but they're expensive and scarce. You optimize recipes (quantization), introduce an express menu (tiered models), and ensure ingredient delivery (data pipeline) keeps up with the expanded kitchen."},
answer:"Scaling generative AI systems faces unique challenges. GPU resource constraints with limited availability and high costs require optimization through quantization reducing GPU requirements by 75% and model distillation creating smaller models retaining 95% of quality. The latency-throughput trade-off means larger batch sizes improve GPU utilization but increase per-request latency — continuous batching in vLLM provides the best balance. Tiered model strategies route simple queries to fast cheap models and complex ones to large expensive models. Data pipeline bottlenecks often limit scaling more than model inference itself — feature computation, embedding generation, and preprocessing must scale proportionally, requiring distributed processing with Spark or Flink to keep pace with growing inference demand.",
keywords:["GPU scaling","quantization","GPTQ","model distillation","continuous batching","vLLM","tiered models","data pipeline bottleneck","throughput","latency trade-off","spot instance"]},

{num:"Q80",original:"What techniques of data management are efficient in systems based on distributed processing in a cloud?",
lecture:{intro:"Efektywne zarządzanie danymi w rozproszonych systemach cloud wymaga technik balansujących spójność, dostępność, wydajność i koszty na geograficznie rozproszónej infrastrukturze.",
points:[
{title:"Data Partitioning (Sharding)",text:"Horizontal partitioning rozdziela dane między nody na podstawie partition key. Hash-based (równomierne rozłożenie), range-based (sequential access), geographic (data locality). Enables linear horizontal scaling storage i throughput.",example:"User database sharded po hash(user_id): users 1-1M na shard 1, 1M-2M na shard 2. Każdy shard obsługuje swój load niezależnie. Dodanie sharda = linear scaling. Wyzwanie: cross-shard queries (JOIN between shards) są kosztowne."},
{title:"Multi-level caching",text:"CDN → application cache (Redis) → database cache. Cache-aside pattern: sprawdź cache, jeśli miss → query DB → zapisz w cache. Write-through: zapis do cache i DB jednocześnie. TTL controls freshness.",example:"API response flow: CDN cache (static, TTL 1h) → Redis cache (query results, TTL 5min) → PostgreSQL (source of truth). 95% requestów obsługiwanych z cache — DB widzi tylko 5% traffic. Hit rate 95% = 20x redukcja DB load."},
{title:"Replication i Data Lake architecture",text:"Master-slave replication dla read scaling. Multi-master dla write availability. Data Lake: S3/GCS w tiered quality (Bronze=raw, Silver=cleaned, Gold=aggregated). Data Mesh decentralizuje ownership do domain teams.",example:"PostgreSQL: primary w EU, read replicas w US i Asia. Writes do EU, reads serwowane lokalnie — latency z 200ms do 20ms dla remote users. Data Lake na S3: raw JSON events (Bronze) → Spark → cleaned Parquet (Silver) → aggregated analytics tables (Gold)."}
]},
analogy:{pl:"Zarządzanie danymi w chmurze to jak zarządzanie siecią supermarketów: sharding to podział produktów między magazyny regionalne, caching to półki przy kasie (najczęściej kupowane pod ręką), replication to kopie towaru w każdym sklepie, a data lake to centralny magazyn hurtowy z surowcami, półproduktami i gotowymi towarami.",en:"Cloud data management is like managing a supermarket chain: sharding splits products across regional warehouses, caching is the checkout shelf (most-bought items handy), replication copies stock to every store, and a data lake is the central wholesale warehouse with raw materials, semi-processed goods, and finished products."},
answer:"Efficient cloud data management techniques include data partitioning through horizontal sharding — distributing data across nodes by hash, range, or geography for linear horizontal scaling of storage and throughput. Multi-level caching with CDN, Redis, and database caches reduces latency and database load — with cache-aside pattern achieving 95% hit rates that reduce database traffic by 20x. Data replication through master-slave for read scaling or multi-master for write availability, with geographic replicas reducing cross-region latency from 200ms to 20ms. Data Lake architectures on S3 or GCS organize data in tiered quality levels — Bronze for raw ingestion, Silver for cleaned Parquet files, Gold for aggregated analytics — while Data Mesh decentralizes ownership to domain teams for better scalability of the data organization itself.",
keywords:["sharding","caching","Redis","cache-aside","replication","data lake","Bronze/Silver/Gold","data mesh","CDN","TTL","Parquet","master-slave","write-through"]},

{num:"Q81",original:"What solutions are available for monitoring and optimising the efficiency of systems operating in a cloud, especially in the context of distributed processing?",
lecture:{intro:"Monitoring cloud systemów łączy metryki infrastrukturalne, wydajność aplikacji i AI-specific observability w unified dashboards z alertingiem.",
points:[
{title:"Infrastructure i APM monitoring",text:"Prometheus + Grafana dla metryk (CPU, memory, GPU utilization, disk I/O). Distributed tracing (Jaeger/Zipkin) dla end-to-end request flow. Log aggregation (ELK stack, Grafana Loki). RED metrics: Rate, Errors, Duration per serwis.",example:"Jaeger trace: user request → API gateway (2ms) → auth service (5ms) → ML inference (150ms) → database (10ms) = 167ms total. Trace pokazuje: inference to 90% latencji — tu szukać optymalizacji (quantization, batching, caching)."},
{title:"Cost optimization",text:"Cloud cost monitoring (AWS Cost Explorer, Azure Cost Management). Right-sizing: identyfikacja over-provisioned instances. Reserved instances dla steady load. Spot instances dla batch jobs. Tagging dla cost attribution per team/project.",example:"Cost Explorer identyfikuje: 30 instancji m5.xlarge z 15% average CPU utilization. Rekomendacja: right-size do m5.large → oszczędność $15K/mies. RI dla 10 always-on instancji: 40% savings vs on-demand. Tagging: team=ML, project=recommender → fair cost allocation."},
{title:"Auto-optimization i alerting",text:"Kubernetes HPA/VPA auto-skaluje na podstawie custom metrics. Predictive scaling (AWS Predictive Scaling) antycypuje load based on patterns. PagerDuty/OpsGenie dla incident alerting z escalation policies.",example:"K8s HPA z custom metric: gpu_memory_utilization > 80% → scale up. Predictive scaling: learnt że traffic spikes codziennie o 9:00 → pre-scales 15 minut wcześniej. Alert cascade: warning → Slack, critical → PagerDuty → phone call to on-call engineer."}
]},
