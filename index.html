
<style>
:root{
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --font-mono:'SF Mono','Fira Code','Cascadia Code',monospace;
  --border-radius-md:8px;
  --border-radius-lg:12px;
  --color-accent:#4f6ef7;
  --color-background-page:#f0f2f7;
  --color-background-primary:#ffffff;
  --color-background-secondary:#f4f6fb;
  --color-text-primary:#1a1d2e;
  --color-text-secondary:#5a6278;
  --color-text-tertiary:#9aa0b4;
  --color-border-primary:#c5cbdb;
  --color-border-secondary:#dde1ee;
  --color-border-tertiary:#ebeef6;
  --color-text-success:#16a34a;
  --color-text-danger:#dc2626;
  --color-background-success:#f0fdf4;
  --color-background-danger:#fef2f2;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08);
}
html,body{background:var(--color-background-page);min-height:100vh}
body{padding:1.25rem;max-width:900px;margin:0 auto}
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:1rem 0;font-family:var(--font-sans)}
.top-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:1.5rem}
.back-btn{background:none;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:6px 14px;font-size:13px;color:var(--color-text-secondary);cursor:pointer}
.back-btn:hover{background:var(--color-background-secondary)}
.topic-badge{font-size:12px;color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:999px;padding:4px 12px}
.prog-wrap{display:flex;align-items:center;gap:8px;margin-left:auto}
.prog-text{font-size:12px;color:var(--color-text-tertiary)}
.prog-bar{width:70px;height:3px;background:var(--color-border-tertiary);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--color-accent);border-radius:2px;transition:width .3s}
.home-title{font-size:24px;font-weight:700;color:var(--color-text-primary);margin-bottom:6px}
.home-sub{font-size:14px;color:var(--color-text-secondary);margin-bottom:1.5rem}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.stat-card{background:var(--color-background-primary);border-radius:var(--border-radius-md);padding:.875rem 1rem;box-shadow:var(--shadow-sm);border:0.5px solid var(--color-border-tertiary)}
.stat-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.stat-num{font-size:22px;font-weight:700;color:var(--color-accent)}
.section-label{font-size:11px;color:var(--color-text-tertiary);letter-spacing:.07em;margin:1.5rem 0 .75rem}
.topics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px}
.topic-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:1rem 1.125rem;cursor:pointer;transition:box-shadow .15s,transform .1s;border-left:3px solid var(--color-border-secondary);box-shadow:var(--shadow-sm)}
.topic-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.tc-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
.tc-title{font-size:14px;font-weight:500;color:var(--color-text-primary);line-height:1.4}
.tc-count{font-size:11px;color:var(--color-text-tertiary);white-space:nowrap}
.tc-qs{font-size:11px;color:var(--color-text-tertiary);margin-bottom:8px}
.mini-prog{height:2px;background:var(--color-border-tertiary);border-radius:2px;overflow:hidden}
.mini-fill{height:100%;background:var(--color-accent);border-radius:2px;opacity:.7}
.study-layout{display:grid;grid-template-columns:200px 1fr;gap:20px}
@media(max-width:600px){.study-layout{grid-template-columns:1fr}}
.sidebar{border-right:0.5px solid var(--color-border-tertiary);padding-right:14px}
.sb-label{font-size:11px;color:var(--color-text-tertiary);letter-spacing:.07em;margin-bottom:8px}
.sb-item{padding:7px 9px;border-radius:var(--border-radius-md);cursor:pointer;font-size:12px;color:var(--color-text-secondary);display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;border:0.5px solid transparent}
.sb-item:hover{background:var(--color-background-secondary)}
.sb-item.active{background:rgba(79,110,247,.08);border-color:rgba(79,110,247,.3);color:var(--color-accent);font-weight:500}
.sb-icon{font-size:10px}
.q-num{font-size:11px;color:var(--color-text-tertiary);letter-spacing:.07em;margin-bottom:8px}
.q-text{font-size:16px;font-weight:500;color:var(--color-text-primary);line-height:1.5;margin-bottom:1.25rem}
.mode-tabs{display:flex;gap:4px;margin-bottom:1.25rem}
.mode-tab{padding:5px 13px;border-radius:var(--border-radius-md);font-size:12px;border:0.5px solid var(--color-border-tertiary);background:none;cursor:pointer;color:var(--color-text-secondary)}
.mode-tab.active{background:var(--color-accent);color:#fff;border-color:var(--color-accent)}
.lec-block{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:1.125rem;margin-bottom:.875rem;border:0.5px solid var(--color-border-tertiary)}
.lec-label{font-size:10px;color:var(--color-text-tertiary);letter-spacing:.08em;margin-bottom:8px}
.lec-text{font-size:13px;color:var(--color-text-primary);line-height:1.8}
.ex-block{border-left:2px solid var(--color-border-secondary);padding-left:12px;margin:10px 0 0}
.ex-label{font-size:10px;color:var(--color-text-tertiary);margin-bottom:3px;letter-spacing:.06em}
.ex-text{font-size:12px;color:var(--color-text-secondary);line-height:1.7}
.analogy-block{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:.875rem;margin-bottom:.875rem}
.analogy-label{font-size:10px;color:var(--color-text-tertiary);margin-bottom:6px;letter-spacing:.07em}
.analogy-pl{font-size:12px;color:var(--color-text-primary);line-height:1.7;font-style:italic;margin-bottom:7px}
.analogy-en{font-size:12px;color:var(--color-text-secondary);line-height:1.7;font-style:italic}
.kw-row{display:flex;flex-wrap:wrap;gap:5px;margin:.875rem 0}
.kw{font-size:10px;padding:3px 9px;border-radius:999px;border:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary);font-family:var(--font-mono)}
.ans-box{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.125rem;margin-bottom:.875rem;cursor:pointer}
.ans-box.revealed{border-color:var(--color-border-secondary)}
.ans-hint{font-size:13px;color:var(--color-text-tertiary);text-align:center;padding:1.5rem}
.ans-label{font-size:10px;color:var(--color-text-tertiary);letter-spacing:.08em;margin-bottom:8px}
.ans-text{font-size:13px;color:var(--color-text-primary);line-height:1.8}
.score-row{display:flex;gap:8px;margin-top:10px}
.btn-know{padding:7px 18px;border-radius:var(--border-radius-md);font-size:12px;border:0.5px solid var(--color-border-secondary);background:none;cursor:pointer;color:var(--color-text-success)}
.btn-know:hover{background:var(--color-background-success)}
.btn-dontknow{padding:7px 18px;border-radius:var(--border-radius-md);font-size:12px;border:0.5px solid var(--color-border-tertiary);background:none;cursor:pointer;color:var(--color-text-danger)}
.btn-dontknow:hover{background:var(--color-background-danger)}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem;padding-top:1.25rem;border-top:0.5px solid var(--color-border-tertiary)}
.nav-btn{padding:7px 16px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:none;cursor:pointer;font-size:12px;color:var(--color-text-secondary)}
.nav-btn:hover{background:var(--color-background-secondary)}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.sec-div{font-size:10px;color:var(--color-text-tertiary);margin:1.25rem 0 .625rem;letter-spacing:.08em}
.score-msg{font-size:11px;color:var(--color-text-tertiary);margin-top:6px}
</style>
<div class="wrap" id="app"></div>
<script>
const TOPICS=[

{id:"A",label:"A",color:"#5DCAA5",title:"AI & Machine Learning",questions:[

{num:"Q1",original:"How can AI agents be integrated with the AI methods, such as neural networks and expert systems?",
lecture:{intro:"AI agent to autonomiczny byt percypujący środowisko i podejmujący działania. Integruje dwie uzupełniające się metody: sieci neuronowe (elastyczne, uczące się) i systemy eksperckie (deterministyczne, regułowe).",
points:[
{title:"Neural Networks — percepcja i adaptacja",text:"NN doskonale przetwarzają niestrukturalne dane: obrazy, dźwięk, tekst. Agent z NN potrafi 'widzieć' środowisko i uczyć się z doświadczenia. CNN dla obrazów, Transformer dla tekstu, RNN dla sekwencji czasowych.",example:"Robot magazynowy: CNN identyfikuje obiekty na kamerze — agent 'widzi' kartony i wolną przestrzeń w czasie rzeczywistym. Accuracy >95% po treningu na 10k zdjęć."},
{title:"Expert Systems — logika i compliance",text:"Enkodują wiedzę domenową jako reguły IF-THEN. Działają deterministycznie, są audytowalne i wyjaśnialne. Idealne dla twardych reguł biznesowych, regulacyjnych i bezpieczeństwa.",example:"System finansowy: reguła 'IF transakcja > 50k PLN AND kraj = high-risk THEN blokuj i powiadom compliance' — zawsze egzekwowana, niezależnie od opinii sieci neuronowej."},
{title:"Integracja hybrydowa",text:"NN dostarcza elastycznej percepcji i rozpoznawania wzorców, expert system egzekwuje twarde ograniczenia i reguły biznesowe. Razem dają adaptację + niezawodność. Reinforcement learning może optymalizować strategię agenta w ramach reguł.",example:"Autonomiczny samochód: NN rozpoznaje obiekty i przewiduje ruch, expert system zawsze zatrzymuje na czerwonym świetle i wymusza limity prędkości — niezależnie od 'opinii' sieci neuronowej."}
]},
analogy:{pl:"AI agent to pracownik z dwoma doradcami: intuicyjny ekspert (NN) ocenia sytuacje na oko i uczy się z doświadczenia, prawnik z kodeksem (expert system) pilnuje zgodności z regułami. Razem są elastyczni i niezawodni.",en:"An AI agent has two advisors: an intuitive expert (NN) who reads situations and learns from experience, and a strict compliance officer with a rulebook (expert system). Together they are both adaptive and rule-compliant."},
answer:"AI agents integrate neural networks for perception and learning from unstructured data — enabling agents to see, hear, and adapt to new scenarios through CNNs for vision, Transformers for language, and RNNs for time series. Expert systems handle rule-based reasoning in structured domains, ensuring deterministic, auditable decisions compliant with business rules using IF-THEN logic. The hybrid architecture combines both: neural networks process raw sensory input into structured information, while expert systems enforce hard constraints that must never be violated. Reinforcement learning can further optimize agent strategy within the boundaries set by expert system rules. This gives us the best of both worlds — the pattern-recognition power of neural networks with the explainability and reliability of expert systems.",
keywords:["neural network","expert system","hybrid agent","CNN","Transformer","rule-based reasoning","reinforcement learning","perception","deterministic"]},

{num:"Q3",original:"What data pre-processing techniques can be applied to minimise data errors and data certainty?",
lecture:{intro:"Pre-processing to most między surowymi danymi a jakością modelu. Złe dane = złe wyniki (garbage in, garbage out). Techniki działają na 4 poziomach: czyszczenie, transformacja, walidacja, redukcja wymiarowości.",
points:[
{title:"Data Cleaning — usuwanie błędów i szumu",text:"Obsługa brakujących wartości (imputacja średnią/medianą/KNN, lub usunięcie wierszy), usuwanie duplikatów, korekta niespójności formatów (daty, jednostki, kodowania). Outlier detection metodami IQR lub Z-score eliminuje wartości odstające.",example:"Dataset szpitalny: brakujące pomiary ciśnienia uzupełniane medianą dla danej grupy wiekowej. Wartości ciśnienia >300 mmHg flagowane jako outlier i weryfikowane ręcznie."},
{title:"Transformacja i Feature Engineering",text:"Normalizacja (skalowanie 0-1) i standaryzacja (średnia=0, odchylenie=1) wyrównują skale cech. One-hot encoding dla zmiennych kategorycznych. Feature engineering tworzy nowe informacyjne cechy z istniejących danych.",example:"Model cen nieruchomości: normalizujesz metraż (0-1), one-hot encodujesz dzielnicę, i tworzysz nową cechę 'cena_za_m2' z istniejących kolumn — ta derived feature często jest najważniejsza."},
{title:"Walidacja i redukcja wymiarowości",text:"Schema validation sprawdza typy i zakresy. Cross-field validation weryfikuje spójność między polami. PCA redukuje wymiarowość zachowując maksimum wariancji — zmniejsza szum i curse of dimensionality.",example:"Pipeline ETL: waliduje że email matchuje regex, wiek jest 0-150, każdy customer_id istnieje w tabeli customers. PCA redukuje 50,000 cech tekstowych do 500 komponentów — 90% szybszy trening, 2% mniej accuracy."}
]},
analogy:{pl:"Pre-processing to jak przygotowanie składników przed gotowaniem: myjesz warzywa (czyszczenie), kroisz na równe kawałki (normalizacja), sprawdzasz świeżość (walidacja), wyrzucasz obierki (redukcja wymiarowości). Bez tego nawet najlepszy przepis (model) da niesmaczne danie.",en:"Pre-processing is like preparing ingredients before cooking: wash vegetables (cleaning), cut into equal pieces (normalization), check freshness (validation), discard peels (dimensionality reduction). Without this, even the best recipe (model) produces a bad dish."},
answer:"Key data pre-processing techniques include data cleaning — handling missing values through imputation with mean, median, or KNN methods, removing duplicates, and treating outliers using IQR or Z-score detection. Data transformation involves normalization to scale features to 0-1 range, standardization to zero mean and unit variance, and encoding categorical variables with one-hot encoding. Feature engineering creates informative derived features from existing data. Data validation implements schema checks, range constraints, and cross-field consistency verification to catch errors early in the pipeline. Dimensionality reduction through PCA compresses feature space while preserving maximum variance, reducing noise and training time. Together these techniques ensure the model receives clean, consistent, informative data.",
keywords:["data cleaning","imputation","normalization","one-hot encoding","PCA","outlier detection","feature engineering","schema validation","ETL","dimensionality reduction"]},

{num:"Q5",original:"What are the main threats to traditional encryption methods resulting from the development of generative AI?",
lecture:{intro:"Kluczowe rozróżnienie: GenAI zazwyczaj NIE łamie algorytmów kryptograficznych matematycznie (AES, RSA pozostają bezpieczne). Zagrożenia są pośrednie i dotyczą warstwy ludzkiej oraz implementacyjnej.",
points:[
{title:"Zaawansowany phishing i social engineering",text:"GenAI generuje wysoce spersonalizowane, przekonujące ataki phishingowe na masową skalę. Deepfake audio/video podszywa się pod osoby decyzyjne. Wcześniej ograniczeniem była jakość i skala — AI eliminuje oba.",example:"Klasyczny phishing: 'Dear Customer, your account suspended.' GenAI phishing: email w stylu komunikacji konkretnej firmy, nawiązujący do ostatnich eventów, z poprawną gramatyką i tonem CEO. Deepfake video call CEO zlecający przelew."},
{title:"Wykrywanie luk implementacyjnych",text:"Algorytmy mogą być bezpieczne matematycznie, ale ich implementacja — niekoniecznie. AI analizuje kod bibliotek kryptograficznych i systematycznie szuka side-channel attacks, timing vulnerabilities i buffer overflows.",example:"Heartbleed w OpenSSL — nie był błędem algorytmu, lecz implementacji (buffer over-read). GenAI może systematycznie skanować popularne biblioteki kryptograficzne szukając podobnych błędów."},
{title:"Optymalizacja łamania haseł i zagrożenie kwantowe",text:"AI trenowane na wyciekach haseł generuje prawdopodobne kombinacje zamiast brute-force. Dodatkowo konwergencja AI i quantum computing (algorytm Shora) zagraża RSA i ECC. Post-quantum cryptography (CRYSTALS-Kyber) jest odpowiedzią.",example:"Zamiast sprawdzać 200 mld kombinacji brute-force, AI skupia się na 10 mln najbardzej prawdopodobnych wzorców ludzkich (imię+rok, Qwerty1!, nazwa drużyny). Skuteczność: 60% haseł złamanych w minuty zamiast lat."}
]},
analogy:{pl:"Kłódka (algorytm) jest nadal nie do złamania siłą. Ale AI pomaga złodziejom: podszywa się pod właściciela kluczem phishingowym, szuka zardzewiałych miejsc na kłódce (luki implementacyjne), i próbuje najczęstszych kombinacji zamiast losowych.",en:"The padlock (algorithm) is still unbreakable by force. But AI helps thieves: it impersonates the owner with a phishing key, finds rusty spots on the lock (implementation bugs), and tries the most common combinations instead of random ones."},
answer:"Generative AI generally does not break encryption algorithms directly — AES and RSA remain mathematically secure. The threats are indirect. First, AI enables sophisticated, highly personalized phishing and deepfake attacks at massive scale, targeting the human layer to steal credentials rather than breaking encryption. Second, AI can systematically analyze cryptographic library source code to identify implementation vulnerabilities like side-channel attacks and buffer overflows — bugs like Heartbleed were in the implementation, not the algorithm. Third, AI trained on leaked password datasets optimizes cracking by targeting statistically likely human patterns, dramatically reducing attack time versus brute force. Fourth, the convergence of AI with quantum computing threatens RSA and ECC through Shor's algorithm, driving adoption of post-quantum standards like CRYSTALS-Kyber.",
keywords:["phishing","deepfake","social engineering","implementation vulnerability","password cracking","Heartbleed","side-channel","quantum computing","post-quantum","CRYSTALS-Kyber"]},

{num:"Q6",original:"What benefits can be brought to business processes by the application of generative AI?",
lecture:{intro:"GenAI to technologia ogólnego zastosowania — jak elektryczność. Transformuje wszystko, co wymaga tworzenia treści, analizy tekstu lub generowania kodu. Korzyści są horyzontalne, nie sektorowe.",
points:[
{title:"Automatyzacja tworzenia treści",text:"Raporty, opisy produktów, dokumentacja, emaile — GenAI generuje drafty w sekundy. Człowiek review'uje zamiast pisać od zera. Skala: od 1 do milionów unikalnych treści bez liniowego wzrostu kosztów.",example:"E-commerce z 50k produktami: ręczne pisanie opisów to lata pracy. GenAI generuje unikalny opis każdego produktu ze specyfikacji — copywriter review'uje tylko te poniżej standardu jakości."},
{title:"Inteligentni agenci i obsługa klienta",text:"LLM-powered chatboty rozumieją intencję (nie tylko słowa kluczowe), utrzymują kontekst konwersacji, eskalują gdy potrzeba. 24/7 bez limitów skalowania. Drastyczna redukcja kosztów obsługi.",example:"Bank z 1 mln klientów: 80% pytań to standardowe sprawy (saldo, historia, zmiana danych). AI agent obsługuje je bez konsultanta — który skupia się wyłącznie na złożonych, empatycznych przypadkach."},
{title:"Akceleracja kodowania i ekstrakcja wiedzy",text:"Copilot i podobne generują kod, piszą testy, dokumentują. Badania GitHub: 55% szybsze ukończenie zadań. GenAI przetwarza duże wolumeny dokumentów wydobywając kluczowe informacje w minuty zamiast tygodni.",example:"Kancelaria prawna analizuje 5000 kontraktów szukając klauzul o karach umownych — GenAI robi to w minuty, klasyfikując każdą klauzulę z 92% accuracy. Developer pisze komentarz 'walidacja PESEL' → Copilot generuje implementację."}
]},
analogy:{pl:"GenAI w biznesie to jak armia wysoko wykwalifikowanych stażystów: nigdy się nie nudzą, pracują 24/7, mogą robić wszystko naraz — ale zawsze potrzebują review od doświadczonego pracownika przed przekazaniem klientowi.",en:"GenAI in business is like hiring an army of skilled interns: never bored, work 24/7, can handle everything simultaneously — but always need review from an experienced employee before anything reaches the client."},
answer:"Generative AI brings transformative benefits across business domains. It automates content creation — product descriptions, reports, documentation, and marketing copy are generated in seconds at any scale, with humans reviewing rather than writing from scratch. Intelligent AI agents handle up to 80% of customer service queries autonomously at 24/7 scale, understanding intent and maintaining conversation context. In software development, AI coding assistants like GitHub Copilot accelerate task completion by over 50%, generating implementations, tests, and documentation. AI also dramatically accelerates knowledge extraction from large document collections — contracts, regulatory filings, research papers — processing in minutes what takes humans weeks.",
keywords:["content automation","intelligent agents","GitHub Copilot","knowledge extraction","operational efficiency","cost reduction","chatbot","LLM"]},

{num:"Q7",original:"What models and technologies enable implementation of AI in monitoring business processes?",
lecture:{intro:"Monitoring procesów z AI to przejście od reaktywnego do proaktywnego zarządzania. Trzy technologie tworzą kompletny obraz: co się stało (process mining), co się dzieje (anomaly detection), co się stanie (predictive analytics).",
points:[
{title:"Process Mining — odkrywanie jak procesy naprawdę działają",text:"Analizuje event logi z ERP/CRM i odkrywa rzeczywisty przebieg procesów — nie taki jak projektowany, ale faktyczny. Ujawnia ukryte pętle, bottlenecki i odchylenia od procedur. Narzędzia: Celonis, ProM.",example:"Firma zakłada: zamówienie → weryfikacja → wysyłka = 2 dni. Process Mining odkrywa że w 30% przypadków jest pętla 'czekanie na akceptację menedżera' wydłużająca do 8 dni — ukryty bottleneck."},
{title:"Anomaly Detection — wykrywanie nieprawidłowości w czasie rzeczywistym",text:"Isolation Forest, Autoencoder, LSTM — uczą się normalnego zachowania procesu i alarmują gdy coś odbiega od normy. Działają w real-time na strumieniach danych.",example:"Linia produkcyjna: temperatura pieca zazwyczaj 850°C ±20°C. Autoencoder uczy się normalnego rozkładu i alarmuje przy nietypowym wzorcu — 48h przed kosztowną awarią."},
{title:"Predictive Analytics — przewidywanie problemów",text:"Modele (gradient boosting, LSTM, Prophet) przewidują przyszłe zdarzenia na podstawie historycznych wzorców. Przejście od reaktywnego gaszenia pożarów do proaktywnego zarządzania.",example:"Predictive maintenance: model przewiduje awarię maszyny 48h wcześniej na podstawie wzorców wibracji, temperatury i dźwięku — planowy przestój zamiast nieplanowanej awarii na linii produkcyjnej."}
]},
analogy:{pl:"Monitoring z AI to lekarz z trzema narzędziami: EKG (process mining) pokazuje rzeczywisty rytm serca procesu, alarm (anomaly detection) dzwoni gdy coś jest nie tak, prognoza (predictive analytics) ostrzega o możliwym zawale 2 dni wcześniej.",en:"AI process monitoring is like a doctor with three tools: an EKG showing the real heartbeat of your processes (process mining), an alarm ringing when something is wrong (anomaly detection), and a prognosis warning of potential failure days ahead (predictive analytics)."},
answer:"Three technologies enable AI in business process monitoring. Process mining tools like Celonis analyze event logs from ERP and CRM systems to reveal the actual flow of processes, uncovering hidden bottlenecks and deviations invisible in designed process maps. Anomaly detection algorithms — Isolation Forest, LSTM-based models, Autoencoders — learn normal process behavior from historical data and flag real-time deviations, enabling early warning before failures occur. Predictive analytics models using gradient boosting, LSTM, or Prophet forecast future bottlenecks and failures based on historical patterns, shifting organizations from reactive incident response to proactive process management.",
keywords:["process mining","anomaly detection","predictive analytics","Isolation Forest","LSTM","Autoencoder","Celonis","event logs","predictive maintenance","Prophet"]},

{num:"Q15",original:"What roles do AI algorithms perform in the development of brain-computer interfaces?",
lecture:{intro:"BCI umożliwiają bezpośrednią komunikację mózg-maszyna. Sygnały EEG są bardzo zaszumione — AI jest niezbędne do wyciągnięcia z nich sensu. Trzy kluczowe role: oczyszczanie sygnału, dekodowanie intencji, adaptacja indywidualna.",
points:[
{title:"Signal Processing — filtrowanie szumu",text:"Surowy sygnał EEG to mix aktywności neuronalnej z artefaktami mięśniowymi i elektrycznymi. ICA (Independent Component Analysis) i filtry pasmowe wyodrębniają relevantne składowe. Deep learning automatycznie uczy się filtrów.",example:"Mrugnięcie oka generuje sygnał elektryczny 10x silniejszy niż aktywność mózgowa. ICA oddziela ten artefakt od rzeczywistych wzorców neuronalnych — bez tego BCI byłoby sterowane mruganiem, nie myślami."},
{title:"Pattern Recognition — dekodowanie intencji",text:"Po oczyszczeniu sygnału, ML klasyfikuje wzorce aktywności mózgowej na konkretne komendy. SVM, CNN i Transformery tłumaczą 'język mózgu' na dyskretne polecenia lub ciągłe sygnały sterujące.",example:"BCI dla sparaliżowanych: model rozpoznaje wzorzec 'myślenia o ruchu prawą ręką' w sygnale EEG i przekształca go w ruch kursora na ekranie — osoba pisze tekst bez ruchu jakiegokolwiek mięśnia."},
{title:"Adaptacja indywidualna — transfer learning",text:"Każdy mózg jest unikalny — wzorce neuronalne różnią się między osobami. Online learning i transfer learning adaptują model do konkretnego użytkownika, skracając kalibrację z 30 do 5 minut.",example:"Transfer learning: model pretrenowany na danych 50 osób, fine-tunowany na 5-minutowej sesji nowego użytkownika. Accuracy rośnie z 70% na start do 95% po tygodniu regularnego użytkowania — model uczy się 'akcentu' danego mózgu."}
]},
analogy:{pl:"BCI to jak odbiór słabego sygnału radiowego w mieście pełnym zakłóceń: najpierw filtrujesz szumy (signal processing), potem rozpoznajesz konkretną stację i jej język (pattern recognition), potem dostrajasz antenę pod swoje dokładne miejsce (adaptacja indywidualna).",en:"A BCI is like picking up a weak radio signal in a noisy city: first filter the interference (signal processing), then identify the specific station and its language (pattern recognition), then fine-tune the antenna for your exact location (individual adaptation)."},
answer:"AI algorithms serve three critical roles in brain-computer interfaces. First, signal processing: raw EEG signals contain massive noise from muscle movement and electrical interference — Independent Component Analysis and deep learning filters separate genuine neural patterns from artifacts. Second, pattern recognition: ML classifiers like SVMs, CNNs, and Transformers decode cleaned brain signals into specific commands, enabling paralyzed patients to control cursors or type by thought alone. Third, individual adaptation: because brain patterns are unique per person, transfer learning pre-trains on multi-subject data then fine-tunes on each new user in minutes rather than hours, with online learning continuously improving accuracy through use.",
keywords:["BCI","EEG","ICA","signal processing","pattern recognition","SVM","transfer learning","online learning","neural decoding","brain-computer interface"]},

{num:"Q27",original:"How can linear algebra be used in image processing and data analysis in IT systems?",
lecture:{intro:"Algebra liniowa to natywny język AI i przetwarzania obrazów. Gdy rozumiesz że obraz to macierz, a neural network to sekwencja mnożeń macierzowych — rozumiesz matematyczne fundamenty całego ML.",
points:[
{title:"Obraz jako macierz — transformacje geometryczne",text:"Obraz grayscale to 2D macierz pikseli (0-255). Obraz RGB to tensor [H×W×3]. Każda operacja na obrazie to operacja macierzowa: obrót, skalowanie, ścinanie to mnożenie przez macierz transformacji.",example:"Obrót obrazu o 45° = mnożenie każdego piksela [x,y] przez macierz rotacji [[cos45,-sin45],[sin45,cos45]]. Rozmycie = konwolucja z macierzą Gaussa. Edge detection = konwolucja z kernelem Sobela."},
{title:"PCA i SVD — redukcja wymiarowości",text:"PCA używa eigenvectors macierzy kowariancji do znalezienia kierunków maksymalnej wariancji. SVD dekomponuje macierz na 3 składowe — używane do kompresji obrazów i redukcji szumu w danych.",example:"Dataset z 1000 cechami: PCA odkrywa że 95% wariancji wyjaśnia 50 principal components. Redukcja wymiarowości 20x bez istotnej utraty informacji. SVD kompresuje obraz 1000x1000 zachowując top 50 wartości singularnych."},
{title:"Neural Networks = sekwencje mnożeń macierzowych",text:"Każda warstwa dense to mnożenie macierzy wag × wektor wejść + bias → aktywacja. GPU są kluczowe bo są zoptymalizowane do masowo-równoległych operacji macierzowych. Matrix factorization napędza systemy rekomendacyjne.",example:"Warstwa Dense 512→256: macierz wag W[512x256]. Forward pass jednego przykładu = jedno mnożenie macierzy. GPU wykonuje to równolegle dla batcha tysięcy przykładów. Netflix: faktoryzacja macierzy user×film odkrywa ukryte preferencje."}
]},
analogy:{pl:"Algebra liniowa w AI to jak alfabet dla pisarza — nie piszesz o alfabecie, ale bez niego nic nie napiszesz. Obraz to macierz, przetwarzanie to operacje macierzowe, neural network to maszyna do mnożenia macierzy, a GPU to drukarnia masowa.",en:"Linear algebra in AI is like the alphabet to a writer — you don't write about the alphabet, but nothing gets written without it. Images are matrices, processing is matrix operations, neural networks are matrix multiplication machines, and GPUs are the high-speed printing press."},
answer:"Linear algebra is fundamental to IT systems at multiple levels. Images are represented as matrices — grayscale as 2D pixel matrices, color as 3D tensors. Geometric transformations like rotation and scaling are matrix multiplications; convolution operations for edge detection and blurring slide kernel matrices across the image. PCA uses eigenvectors of the covariance matrix to identify directions of maximum variance, enabling dimensionality reduction that compresses thousands of features while retaining 95% of information. SVD decomposes matrices for image compression and noise reduction. Neural networks themselves are sequences of matrix multiplications — each dense layer computes W times x plus b — which is why GPU hardware optimized for parallel matrix operations is essential. Matrix factorization powers recommendation systems like Netflix by decomposing user-item matrices into latent factors.",
keywords:["matrix","eigenvector","PCA","SVD","convolution","tensor","GPU","matrix factorization","dimensionality reduction","linear transformation"]},

{num:"Q28",original:"How can differential and integral calculus contribute to the optimisation of algorithms and predictive models?",
lecture:{intro:"Rachunek różniczkowy i całkowy to matematyczne fundamenty optymalizacji w ML. Pochodne napędzają gradient descent — serce trenowania modeli. Całki definiują kluczowe metryki ewaluacyjne.",
points:[
{title:"Gradient Descent — pochodna jako busola optymalizacji",text:"Trenowanie modelu = minimalizowanie loss function. Pochodna cząstkowa dL/dw mówi w którą stronę i jak mocno zmieniać każdą wagę. Backpropagation stosuje chain rule przez całą sieć. PyTorch autograd automatyzuje to dla milionów parametrów.",example:"dL/dw = +2.5 oznacza że wzrost wagi w zwiększa stratę. Update: w = w - lr * 2.5. Przy lr=0.01: nowa waga = w - 0.025. PyTorch: loss.backward() liczy gradienty milionów parametrów jednym wywołaniem."},
{title:"Adaptacyjne optymalizatory",text:"Adam, RMSProp, Adagrad modyfikują learning rate na podstawie historii gradientów — pierwszy i drugi moment statystyczny. Efektywniejsze niż vanilla SGD, szczególnie dla sparse gradients i zaszumionych danych.",example:"Adam śledzi exponential moving average gradientu (moment 1) i kwadratu gradientu (moment 2). Adaptuje lr osobno dla każdego z milionów parametrów — parametry z rzadkimi gradientami dostają większe update'y."},
{title:"Całkowanie — metryki i probabilistyka",text:"AUC (Area Under ROC Curve) to dosłownie całka pod krzywą — kluczowa metryka klasyfikacji. Rozkłady prawdopodobieństwa opisane przez PDF wymagają całkowania. Bayesian inference używa całek do obliczania posterior distributions.",example:"AUC = 0.95 interpretacja: jeśli weźmiesz losowy pozytywny i negatywny przykład, model z prawdopodobieństwem 95% poprawnie wskaże który jest pozytywny. AUC = 0.5 to losowe zgadywanie. Obliczenie = numeryczna całka pod krzywą ROC."}
]},
analogy:{pl:"Gradient descent to schodzenie z góry w gęstej mgle: nie widzisz szczytu ani dna, ale czujesz nachylenie pod stopami (pochodna) i zawsze idziesz w dół. Adam to inteligentne buty — zapamiętują teren i dostosowują kroki. AUC to pole pod mapą — całka mierzy jakość.",en:"Gradient descent is descending a mountain in thick fog: you can't see peak or valley, but you feel the slope underfoot (derivative) and always step downhill. Adam is smart boots that remember the terrain and adjust steps. AUC is the area under the map — an integral measuring quality."},
answer:"Differential calculus powers optimization in machine learning through gradient descent. The gradient — partial derivatives of the loss function with respect to each parameter — tells the optimizer which direction to update weights to minimize error. Backpropagation applies the chain rule to efficiently compute gradients through entire deep networks, automated by frameworks like PyTorch's autograd. Adaptive optimizers like Adam track exponential moving averages of gradient moments to dynamically adjust learning rates per parameter, outperforming vanilla SGD on most tasks. Integral calculus contributes through evaluation metrics: AUC-ROC is literally the integral under the Receiver Operating Characteristic curve, and Bayesian inference requires integration over probability density functions to compute posterior distributions.",
keywords:["gradient descent","backpropagation","chain rule","loss function","Adam optimizer","AUC","ROC","partial derivative","autograd","learning rate"]},

{num:"Q29",original:"What are the key stages in the process of developing a machine learning model and how do they affect the quality and efficiency of an AI system?",
lecture:{intro:"Tworzenie modelu ML to ustrukturyzowany pipeline, gdzie każdy etap determinuje jakość kolejnego. Pominięcie lub zaniedbanie jednego kaskadowo degraduje cały system — zasada garbage in, garbage out.",
points:[
{title:"Zbieranie danych i pre-processing",text:"Model jest tak dobry jak jego dane. Dane muszą być reprezentatywne, zbalansowane i wystarczająco liczne. Pre-processing: normalizacja, imputacja, encoding, feature engineering — często ma największy wpływ na wyniki końcowe.",example:"Model wykrywania oszustw bankowych trenowany tylko na danych z jednego kraju ma słabą accuracy dla transakcji zagranicznych. Feature engineering: cecha 'czas od ostatniej transakcji' okazuje się najważniejsza — sama ta cecha podnosi F1 o 15%."},
{title:"Wybór modelu, trening i ewaluacja",text:"Architektura zależy od problemu: Random Forest dla tabelarycznych, CNN dla obrazów, Transformer dla tekstu. Cross-validation zapobiega overfitting. Hyperparameter tuning (Bayesian optimization) optymalizuje konfigurację.",example:"Porównanie: Random Forest vs XGBoost vs Neural Network na tym samym datasecie z 5-fold cross-validation. XGBoost wygrywa z F1=0.87 po Bayesian hyperparameter tuning (Optuna). Trening: 2h vs 20h dla neural network."},
{title:"Deployment, monitoring i MLOps",text:"Deployment przez REST API lub batch processing. MLOps monitoruje data drift (zmiana rozkładu danych) i concept drift (zmiana relacji wejście-wyjście). Automatyczny retraining gdy metryki spadają poniżej progu.",example:"Model rekomendacji filmów trenowany przed COVID-19 staje się nieużyteczny po pandemii — zmieniły się preferencje widzów. Monitoring Evidently AI wykrywa distribution drift i triggeruje automatyczny retraining pipeline."}
]},
analogy:{pl:"ML pipeline to projekt budowlany: zbierasz materiały i sprawdzasz ich jakość (dane + preprocessing), budujesz konstrukcję (training), przechodzisz inspekcję budowlaną (evaluation), a potem mieszkasz i regularnie konserw'ujesz (deployment + MLOps).",en:"An ML pipeline is like a construction project: gather and quality-check materials (data + preprocessing), build the structure (training), pass building inspection (evaluation), then live in it and maintain it regularly (deployment + MLOps)."},
answer:"The key stages of ML model development form a pipeline where each stage critically affects quality. Data collection and pre-processing — gathering representative data and engineering informative features — often has the biggest impact on final performance. Model selection, training, and evaluation involves comparing algorithms appropriate to the problem type, using cross-validation to prevent overfitting, and tuning hyperparameters with tools like Optuna. Rigorous evaluation on held-out test data using metrics like F1-score and AUC detects overfitting before deployment. Deployment and MLOps involves serving the model via APIs, monitoring for data drift and concept drift using tools like Evidently AI, and triggering automated retraining when performance degrades below thresholds.",
keywords:["ML pipeline","data collection","feature engineering","cross-validation","hyperparameter tuning","overfitting","data drift","concept drift","MLOps","deployment"]},

{num:"Q30",original:"How do techniques of supervised and unsupervised learning differ in terms of their application and implementation in AI systems?",
lecture:{intro:"Fundamentalny podział w ML determinujący jakie problemy możemy rozwiązać i jakich danych potrzebujemy. Wybór nie jest kwestią preferencji — wynika z dostępności labeled data i charakteru problemu.",
points:[
{title:"Supervised Learning — uczenie z etykietami",text:"Każdy przykład treningowy ma etykietę (prawidłową odpowiedź). Klasyfikacja: dyskretny output (spam/nie-spam). Regresja: ciągły output (cena domu). Wymaga kosztownego procesu labelowania danych przez ekspertów.",example:"Email spam filter: 10,000 maili oznaczonych ręcznie jako spam/nie-spam. Random Forest uczy się cech (częstość słów, reputacja nadawcy, ilość linków) i przewiduje nowe maile z 99.5% accuracy."},
{title:"Unsupervised Learning — odkrywanie struktury",text:"Brak etykiet — model samodzielnie odkrywa ukryte wzorce i strukturę w danych. Clustering (K-Means, DBSCAN), redukcja wymiarowości (PCA, t-SNE), anomaly detection. Ewaluacja trudniejsza — brak ground truth.",example:"Segmentacja klientów: 1 mln rekordów zakupowych bez etykiet. K-Means odkrywa 5 naturalnych grup: 'impulsywni', 'okazjonalni', 'lojalni', 'łowcy okazji', 'premium' — bez wcześniejszego definiowania tych kategorii."},
{title:"Podejścia hybrydowe: semi-supervised i self-supervised",text:"Semi-supervised: mała ilość labeled + duża ilość unlabeled data. Self-supervised: model sam tworzy etykiety z danych (np. GPT przewiduje następny token). Transfer learning: pretrain unsupervised, fine-tune supervised.",example:"GPT pre-training jest self-supervised: model przewiduje następne słowo w tekście — sam tekst jest etykietą. Potem fine-tuning z małą ilością labeled data daje state-of-the-art wyniki przy minimalnym koszcie labelowania."}
]},
analogy:{pl:"Supervised to nauka z podręcznikiem z odpowiedziami — masz zadania i rozwiązania. Unsupervised to sortowanie puzzli bez zdjęcia na pudełku: sam grupujesz elementy według odkrytych wzorców. Semi-supervised to mieć kilka ułożonych fragmentów jako wskazówkę.",en:"Supervised = studying with an answer key. Unsupervised = sorting puzzle pieces without seeing the box image — discovering categories from patterns alone. Semi-supervised = having a few completed sections as hints for the rest."},
answer:"Supervised learning uses labeled datasets where each example has a correct output, training models for classification of discrete labels or regression of continuous values. It requires expensive labeling effort but yields targeted, measurable predictions with clear evaluation metrics like accuracy and F1-score. Unsupervised learning works on unlabeled data to discover hidden structure — clustering with K-Means finds natural groupings, PCA reduces dimensionality, and autoencoders detect anomalies. Semi-supervised learning bridges both by combining small labeled sets with large unlabeled data. Self-supervised learning, as used in GPT pre-training, creates labels from the data itself — predicting next tokens — then fine-tunes on small labeled datasets for specific tasks.",
keywords:["supervised learning","unsupervised learning","classification","regression","clustering","K-Means","PCA","semi-supervised","self-supervised","transfer learning"]},

{num:"Q31",original:"What are the best practices in the field of training data management, including its collection, storage, processing and security, in the context of developing AI systems?",
lecture:{intro:"Zarządzanie danymi treningowymi to fundament niezawodnych systemów AI. Najlepszy algorytm ze złymi danymi da gorsze wyniki niż prosty algorytm z dobrymi danymi. Praktyki obejmują 4 wymiary.",
points:[
{title:"Zbieranie: różnorodność, reprezentatywność, etyka",text:"Dane muszą pokrywać cały zakres przypadków produkcyjnych. Bias w danych = bias w modelu. Inter-annotator agreement (zgodność między annotatorami) mierzy jakość labelowania. Informed consent wymagany przez GDPR.",example:"System rozpoznawania twarzy trenowany głównie na jasnych karnacjach miał dramatycznie niższą accuracy dla ciemnych — bias w danych stał się dyskryminacją algorytmiczną. Rozwiązanie: balanced sampling across demographics + 3 niezależnych annotatorów."},
{title:"Przechowywanie i wersjonowanie: DVC + Data Catalogs",text:"DVC (Data Version Control) działa jak Git dla danych — każda wersja datasetu jest śledzona i powiązana z eksperymentem. Parquet format dla danych tabelarycznych (10x mniejszy niż CSV). Data catalogs dla discoverability.",example:"Model nagle spadł o 5% accuracy po aktualizacji danych. Bez DVC: nie wiesz co się zmieniło. Z DVC: dvc diff pokazuje że usunięto 15% rekordów z kategorii 'fraud' — odwracasz do poprzedniej wersji w 1 komendzie."},
{title:"Przetwarzanie i bezpieczeństwo: pipelines + GDPR",text:"Reproducible pipelines (Airflow, Kubeflow) automatyzują ETL. Train/validation/test split zapobiega data leakage. Encryption at rest (AES-256), RBAC, anonimizacja PII, audit logging dla compliance.",example:"Pipeline Airflow: nightly ETL → schema validation → cleaning → feature engineering → split 70/15/15 → version w DVC → trigger retraining. Dane medyczne: AES-256 encryption, RBAC (tylko authorized ML engineers), pseudonimizacja PESEL przed trenowaniem."}
]},
analogy:{pl:"Zarządzanie danymi treningowymi to jak prowadzenie laboratorium naukowego: potrzebujesz czystych opisanych próbek (jakość + labeling), lodówki z kontrolą temperatury (DVC + wersjonowanie), powtarzalnych procedur eksperymentalnych (pipelines), i zamkniętej szafy na materiały wrażliwe (encryption + RBAC).",en:"Training data management is like running a science lab: you need clean labeled samples (quality + labeling), a temperature-controlled fridge (DVC + versioning), repeatable experimental procedures (pipelines), and a locked cabinet for sensitive materials (encryption + RBAC)."},
answer:"Best practices in training data management span four areas. Collection requires representative, diverse sampling to avoid algorithmic bias, with inter-annotator agreement measuring labeling quality and informed consent for GDPR compliance. Storage uses data versioning tools like DVC alongside Git for full experiment reproducibility, efficient formats like Parquet, and data catalogs for discoverability. Processing involves reproducible automated pipelines using Airflow or Kubeflow with proper train/validation/test splits preventing data leakage. Security encompasses encryption at rest with AES-256, role-based access control limiting access to authorized engineers, PII anonymization before model training, and audit logging for regulatory compliance with GDPR.",
keywords:["DVC","data versioning","bias","labeling","inter-annotator agreement","Airflow","data leakage","GDPR","RBAC","encryption","Parquet","reproducibility"]},

{num:"Q32",original:"How can large language models (LLMs) be integrated with already existing IT systems and applications to improve their functionality and efficiency?",
lecture:{intro:"Integracja LLM z istniejącymi systemami nie wymaga przebudowy od zera — istnieją 4 podejścia od najprostszego (API) do najbardziej zaawansowanego (agenty), każde z innymi trade-offami.",
points:[
{title:"API Integration + Prompt Engineering",text:"Najprostsze: wywołanie API (OpenAI, Anthropic) z istniejącej aplikacji. Prompt engineering optymalizuje jakość odpowiedzi. Caching zmniejsza koszty i latencję. Nie wymaga trenowania modelu.",example:"CRM dodaje przycisk 'Smart Reply': wysyła zapytanie klienta + kontekst do Claude API, otrzymuje draft odpowiedzi, konsultant edytuje przed wysłaniem. Wdrożenie: 2 dni. Koszt: $0.01 per zapytanie."},
{title:"RAG — Retrieval-Augmented Generation",text:"LLM + vector database z wiedzą firmową. System wyszukuje relevantne dokumenty i wstawia je do promptu, grounding odpowiedzi w faktycznych danych firmy. Eliminuje hallucinations dla domain-specific queries.",example:"Kancelaria prawna: prawnik pyta o precedens → system retrieves relevantne dokumenty z Pinecone (vector DB) → LLM generuje podsumowanie z cytatami do konkretnych paragrafów. Odpowiedź oparta na faktach, nie na 'pamięci' modelu."},
{title:"Fine-tuning i Agent Frameworks",text:"Fine-tuning: dostrajanie modelu na danych firmowych dla specjalistycznych zadań. Agenty (LangChain, CrewAI): LLM może wywoływać API, odpytywać bazy danych, wykonywać kod — wieloetapowe workflow'y autonomicznie.",example:"IT support agent: (1) rozumie problem użytkownika w natural language, (2) query'uje CMDB o dotknięte systemy, (3) sprawdza monitoring Grafana, (4) sugeruje rozwiązanie i może automatycznie zrestartować serwis przez API."}
]},
analogy:{pl:"Integracja LLM to jak zatrudnienie genialnego nowego pracownika: API = dajesz mu proste zadania mailowo, RAG = dajesz mu dostęp do firmowej dokumentacji, fine-tuning = wysyłasz na branżowe szkolenie, agent = dajesz pełny dostęp do firmowych narzędzi i pozwalasz działać samodzielnie.",en:"Integrating LLMs is like hiring a brilliant new employee: API = give them simple tasks by email, RAG = give them access to company docs, fine-tuning = send them to industry training, agent = give full access to company tools and let them work independently."},
answer:"LLMs can be integrated with existing systems through four approaches of increasing complexity. API integration with prompt engineering is simplest — calling LLM APIs from existing applications for tasks like smart replies or summarization, deployable in days. RAG combines LLMs with vector databases containing company-specific knowledge, grounding responses in actual data and reducing hallucinations — critical for domain-specific accuracy. Fine-tuning adapts base models on company data for specialized tasks requiring domain expertise. Agent frameworks like LangChain enable LLMs to autonomously call APIs, query databases, and execute multi-step workflows — automating complex processes like IT support triage. The choice depends on requirements: API for quick wins, RAG for knowledge-intensive tasks, fine-tuning for specialized accuracy, and agents for complex automation.",
keywords:["LLM integration","API","RAG","retrieval-augmented generation","vector database","Pinecone","fine-tuning","LangChain","agent framework","prompt engineering"]},

{num:"Q33",original:"How can large language models (LLMs) be used for automation of tasks related to natural language processing, such as translation, text summarizing and sentiment analysis?",
lecture:{intro:"LLM zrewolucjonizowały NLP: jeden model ogólnego przeznaczenia zastępuje dziesiątki wyspecjalizowanych pipeline'ów. Zero-shot i few-shot prompting eliminują potrzebę trenowania task-specific modeli.",
points:[
{title:"Tłumaczenie maszynowe",text:"LLM rozumieją kontekst, idiomy i rejestr językowy — często dorównując lub przewyższając wyspecjalizowane modele translacyjne. Zero-shot capability dla rzadkich par językowych. Zachowują ton i styl oryginału.",example:"GPT-4 tłumaczy kontrakt prawny z polskiego na angielski, poprawnie obsługując terminologię prawną i zachowując formalny rejestr — zadanie przy którym rule-based systemy i wcześniejsze NMT zawodzą."},
{title:"Streszczanie i ekstrakcja informacji",text:"LLM generują streszczenia abstraktywne (własnymi słowami, nie kopiując zdań). Konfigurowalny poziom szczegółowości i grupa docelowa. Ekstrakcja structured data z free text do JSON/tabel.",example:"Firma ubezpieczeniowa przetwarza emaile z roszczeniami: LLM wydobywa claim_type, date_of_incident, amount_claimed, policy_number do structured JSON — feed bezpośrednio do systemu obsługi roszczeń. 90% automation rate."},
{title:"Analiza sentymentu i klasyfikacja",text:"Zero-shot klasyfikacja sentymentu, emocji, tematów i intencji bez task-specific training data. Few-shot: kilka przykładów w prompcie dramatycznie podnosi accuracy dla domain-specific zadań.",example:"E-commerce analizuje 10,000 recenzji dziennie: klasyfikacja sentiment (pozytywny/negatywny/neutralny), ekstrakcja konkretnych skarg (dostawa, jakość, cena), routing krytycznych issues do product teamów — wszystko jednym promptem."}
]},
analogy:{pl:"LLM w NLP to jak poliglota-ekspert: jeden człowiek, który tłumaczy (translation), streszcza (summarization), ocenia nastrój rozmówcy (sentiment) i wyciąga kluczowe fakty z rozmowy (extraction) — wszystko naraz, bez zmiany narzędzia.",en:"An LLM in NLP is like a polyglot expert: one person who translates, summarizes, reads the mood (sentiment), and extracts key facts from conversation — all at once, without switching tools."},
answer:"LLMs automate NLP tasks through their general-purpose language understanding, replacing multiple specialized models with one. For translation, they handle context, idioms, and register — often matching specialized models even for rare language pairs while preserving tone and formality. For summarization, they generate abstractive summaries at configurable detail levels for different audiences, and extract structured data from free text into JSON format for direct system integration. For sentiment analysis, zero-shot prompting classifies sentiment, emotions, and topics without any task-specific training data, while few-shot prompting with a handful of examples dramatically improves domain-specific accuracy. The key advantage is versatility: a single LLM replaces an entire NLP pipeline, reducing development and maintenance overhead.",
keywords:["NLP","machine translation","summarization","sentiment analysis","zero-shot","few-shot","information extraction","structured output","abstractive summary","classification"]}

]},

{id:"B",label:"B",color:"#E24B4A",title:"Bezpieczeństwo IT",questions:[

{num:"Q4",original:"What Zero Trust mechanisms can be applied in order to protect data reliability in IT systems?",
lecture:{intro:"Zero Trust to model bezpieczeństwa oparty na zasadzie 'nigdy nie ufaj, zawsze weryfikuj'. W przeciwieństwie do bezpieczeństwa perymetrowego zakłada że naruszenia BĘDĄ się zdarzać i weryfikuje każde żądanie dostępu niezależnie od źródła.",
points:[
{title:"Identity Verification i MFA",text:"Każdy użytkownik i urządzenie musi być uwierzytelniony i autoryzowany przy KAŻDYM żądaniu dostępu. Multi-factor authentication, continuous authentication, i identity federation (SSO/SAML/OIDC) eliminują zaufanie oparte na lokalizacji sieciowej.",example:"Pracownik łączy się z bazą danych w chmurze: SSO + hardware security key (FIDO2) + weryfikacja stanu urządzenia (aktualne patche, antywirus). Zmiana IP lub urządzenia = ponowna pełna autentykacja."},
{title:"Mikrosegmentacja i Least Privilege",text:"Sieć dzielona na małe segmenty z własnymi politykami dostępu — kompromitacja jednego segmentu nie daje dostępu do innych. Least privilege: użytkownicy i serwisy otrzymują minimum uprawnień do bieżącego zadania, dynamicznie i kontekstowo.",example:"Szpital: urządzenia medyczne, dane pacjentów i systemy administracyjne w osobnych mikrosegmentach. Skompromitowany czujnik IoT nie może dotrzeć do bazy pacjentów. Developer ma read-only do produkcji, eskalacja wymaga approval i wygasa po 4h."},
{title:"Ciągły monitoring i analityka behawioralna",text:"Cały ruch sieciowy, zachowania użytkowników i zdarzenia systemowe logowane i analizowane w real-time. AI/ML wykrywają anomalie (nietypowe godziny, nietypowe wolumeny danych). Automated response może natychmiast cofnąć dostęp.",example:"SIEM wykrywa: użytkownik pobiera 10x więcej danych niż zwykle o 3:00 w nocy z nieznanego urządzenia. Automatycznie: blokada dostępu, powiadomienie security team, snapshot sesji do analizy forensic."}
]},
analogy:{pl:"Zero Trust to jak lotnisko: nie ufasz nikomu, nawet pracownikom. Każdy przechodzi kontrolę (weryfikacja tożsamości), ma dostęp tylko do swojej strefy (mikrosegmentacja), z minimalnym bagażem (least privilege), a kamery monitorują wszystko non-stop (ciągły monitoring).",en:"Zero Trust is like an airport: trust nobody, not even staff. Everyone goes through security (identity verification), accesses only their zone (micro-segmentation), carries minimal luggage (least privilege), and cameras monitor everything continuously (behavioral analytics)."},
answer:"Zero Trust mechanisms for data reliability include identity verification with multi-factor authentication at every access request — using SAML, OIDC, and FIDO2 hardware keys — ensuring verification regardless of network location. Micro-segmentation divides the network into isolated segments with individual access policies, preventing lateral movement after a breach. Least privilege access grants only minimum necessary permissions, dynamically adjusted based on context like time, location, and device health, with automatic expiration. Continuous monitoring through SIEM systems and AI-powered behavioral analytics detects anomalies in real-time — unusual data volumes, odd hours, unknown devices — enabling automated access revocation within seconds of detection.",
keywords:["Zero Trust","MFA","micro-segmentation","least privilege","SIEM","SAML","OIDC","FIDO2","behavioral analytics","lateral movement","continuous monitoring"]},

{num:"Q12",original:"What challenges related to data security can occur in hybrid environments?",
lecture:{intro:"Środowiska hybrydowe (on-premises + cloud) wprowadzają unikalne wyzwania bezpieczeństwa: dane przekraczają granice zaufania, modele governance się różnią, a powierzchnia ataku znacząco rośnie.",
points:[
{title:"Dane w tranzycie i niespójne polityki",text:"Dane między on-premises i cloud przechodzą przez sieci publiczne — wymagają szyfrowania TLS 1.3 i tuneli VPN/IPsec. Różne modele bezpieczeństwa (LDAP on-premises vs IAM cloud) tworzą luki — zwolniony pracownik może zachować dostęp w jednym środowisku.",example:"Firma wysyła dane klientów z on-premises SAP do AWS przez nieszyfrowany endpoint API — wykryte dopiero podczas pentest. Pracownik zwolniony z LDAP nadal ma aktywne konto AWS IAM bo skrypt deprovisioningu obsługuje tylko LDAP."},
{title:"Shared Responsibility i compliance",text:"W chmurze bezpieczeństwo jest dzielone między providera i klienta. Niezrozumienie tego modelu prowadzi do niezabezpieczonych zasobów. IaaS: klient odpowiada za OS i aplikacje. PaaS: provider za OS, klient za dane. Compliance (GDPR, data residency) komplikuje się gdy dane są w wielu jurysdykcjach.",example:"Zespół wdraża VM na Azure zakładając że Microsoft patchuje OS (błędne rozumienie IaaS). Niepatchowane VM skompromitowane przez znany exploit w 2 tygodnie. Dane EU replikowane do US-East przez błędną konfigurację — naruszenie GDPR."},
{title:"Unified governance i rozwiązania",text:"Rozwiązania: unified identity management (Azure AD/Entra ID łączące oba środowiska), consistent encryption policies, Cloud Security Posture Management (CSPM), i automated compliance monitoring.",example:"Azure Arc zarządza politykami bezpieczeństwa zarówno dla on-premises serwerów jak i zasobów cloud z jednej konsoli. CSPM (Prisma Cloud) automatycznie skanuje obie środowiska pod kątem misconfigurations i compliance violations."}
]},
analogy:{pl:"Hybrid cloud to jak dom z dwoma zamkami od różnych producentów: musisz pilnować obu, klucze nie pasują do siebie nawzajem, a złodziej szuka najsłabszego ogniwa. Potrzebujesz jednego zarządcy kluczami (unified identity) i jednego systemu alarmowego (CSPM).",en:"Hybrid cloud is like a house with two locks from different makers: you must manage both, keys don't cross-match, and a thief targets the weakest one. You need one key manager (unified identity) and one alarm system (CSPM)."},
answer:"Hybrid environments face several security challenges. Data in transit between on-premises and cloud traverses public networks, requiring TLS 1.3 encryption and VPN tunnels — misconfigurations can expose sensitive data. Inconsistent security policies between environments create gaps: different IAM systems mean employee deprovisioning scripts may not cover all platforms, leaving orphaned access. Shared responsibility model confusion leads to unprotected resources — teams assuming the cloud provider handles OS patching in IaaS scenarios. Compliance complexity increases as data crosses jurisdictions, risking GDPR violations through misconfigured replication. Solutions include unified identity management through Azure AD, consistent encryption policies, Cloud Security Posture Management tools like Prisma Cloud, and automated compliance monitoring across both environments.",
keywords:["hybrid cloud","data in transit","TLS","VPN","shared responsibility","GDPR","data residency","CSPM","unified identity","IAM","deprovisioning"]},

{num:"Q17",original:"What are the most frequent threats to the security of ICT networks?",
lecture:{intro:"Krajobraz zagrożeń ICT nieustannie ewoluuje, ale główne kategorie ataków pozostają stabilne. Zrozumienie ich jest fundamentem budowania skutecznych zabezpieczeń wielowarstwowych.",
points:[
{title:"Malware i Ransomware",text:"Złośliwe oprogramowanie: wirusy, wormy, trojany, ransomware. Nowoczesny ransomware stosuje double extortion — szyfruje ORAZ wykrada dane, grożąc ich publikacją. Ataki supply chain kompromitują zaufane oprogramowanie u źródła.",example:"WannaCry: exploit EternalBlue (SMB vulnerability) rozprzestrzeniał ransomware po sieciach automatycznie. 200,000+ komputerów w 150 krajach. SolarWinds supply chain attack: złośliwy kod w oficjalnej aktualizacji dotarł do 18,000 organizacji."},
{title:"Phishing i Social Engineering",text:"Manipulacja ludźmi: email phishing, spear phishing (targetowany), vishing (głosowy), smishing (SMS). Najsłabsze ogniwo to zawsze człowiek. AI-powered phishing podnosi jakość i skalę ataków dramatycznie.",example:"Spear phishing: email do CFO z fakturą od znanego dostawcy, PDF zawiera macro instalujące keylogger. Vishing: telefon 'z banku' z caller-ID spoofing, proszący o potwierdzenie 'podejrzanej transakcji' — w rzeczywistości autoryzujący przelew."},
{title:"DDoS, insider threats i misconfiguration",text:"DDoS: zalanie zasobów sieciowych ruchem (volumetric, protocol, application layer). Insider threats: pracownicy lub kontrahenci nadużywający dostępu — trudniejsze do wykrycia niż ataki zewnętrzne. Misconfiguration: ludzkie błędy w konfiguracji otwierające luki.",example:"AWS S3 bucket z danymi klientów publicznie dostępny przez błędną politykę IAM — odkryty przez security researchera miesiące później. Ex-pracownik z niecofniętym VPN dostępem kopiuje bazę klientów do konkurencji."}
]},
analogy:{pl:"Bezpieczeństwo sieci to jak obrona zamku: malware to armia atakująca mury (firewall), phishing to szpieg udający dostawcę żywności, DDoS to oblężenie blokujące bramy, insider threat to zdrajca wewnątrz murów, a misconfiguration to otwarta furtka z tyłu, o której zapomniano.",en:"Network security is like castle defense: malware is an army attacking walls (firewall), phishing is a spy posing as a food supplier, DDoS is a siege blocking gates, insider threat is a traitor inside, and misconfiguration is an unlocked back door everyone forgot about."},
answer:"The most frequent ICT network security threats include malware and ransomware — especially modern double-extortion ransomware that both encrypts and exfiltrates data, and supply chain attacks that compromise trusted software vendors. Phishing and social engineering manipulate humans through targeted emails, voice calls, and SMS to steal credentials or authorize fraudulent transactions, with AI dramatically increasing attack sophistication. DDoS attacks overwhelm network resources through volumetric, protocol, and application-layer floods. Insider threats from authorized users misusing access or making configuration errors are particularly dangerous because they bypass perimeter defenses. Misconfiguration — such as publicly accessible cloud storage buckets — remains a leading cause of data breaches. Defense requires layered security: firewalls, IDS/IPS, endpoint protection, email filtering, user awareness training, access controls, and SIEM monitoring.",
keywords:["malware","ransomware","phishing","social engineering","DDoS","insider threat","misconfiguration","supply chain attack","double extortion","SIEM","IDS/IPS"]},

{num:"Q34",original:"Explain the difference between symmetric and asymmetric encryption.",
lecture:{intro:"Dwa fundamentalne podejścia do szyfrowania różnią się sposobem zarządzania kluczami: symetryczne używa jednego wspólnego klucza, asymetryczne — pary klucz publiczny/prywatny. W praktyce systemy łączą oba (TLS).",
points:[
{title:"Szyfrowanie symetryczne — szybkość",text:"Jeden klucz do szyfrowania i deszyfrowania. Algorytmy: AES-128, AES-256, ChaCha20. Bardzo szybkie (~1 GB/s na nowoczesnym CPU). Wyzwanie: bezpieczna dystrybucja klucza — obie strony muszą go mieć bez przesyłania otwartym kanałem.",example:"AES-256 szyfruje bazę danych at rest. Ten sam 256-bitowy klucz szyfruje i deszyfruje. Wydajność: ~1 GB/s. Problem: jak bezpiecznie przekazać klucz drugiemu serwerowi bez narażenia go na przechwycenie?"},
{title:"Szyfrowanie asymetryczne — dystrybucja kluczy",text:"Para kluczy: publiczny (szyfruje) i prywatny (deszyfruje), lub odwrotnie dla podpisów cyfrowych. Rozwiązuje problem dystrybucji kluczy. Algorytmy: RSA-2048, ECDSA, Ed25519. 100-1000x wolniejsze od symetrycznego.",example:"RSA-2048: Alice szyfruje wiadomość kluczem publicznym Boba (dostępny dla każdego). Tylko klucz prywatny Boba może ją odszyfrować. Podpis cyfrowy: Alice podpisuje kluczem prywatnym — każdy weryfikuje kluczem publicznym."},
{title:"Podejście hybrydowe (TLS) i post-quantum",text:"TLS 1.3 łączy oba: asymetryczne (ECDHE) do bezpiecznej wymiany klucza sesyjnego, potem symetryczne (AES-256-GCM) do szybkiego szyfrowania danych. Post-quantum: algorytm Shora łamie RSA/ECC, ale AES-256 pozostaje bezpieczny.",example:"TLS 1.3 handshake: klient i serwer uzgadniają shared secret przez ECDHE (asymetryczne, ~10ms), potem generują klucze AES-256-GCM (symetryczne) dla danych. Best of both worlds: bezpieczna wymiana + szybki transfer."}
]},
analogy:{pl:"Symetryczne szyfrowanie to jak jedna kłódka z jednym kluczem — szybko otwierasz, ale musisz fizycznie przekazać klucz kopię. Asymetryczne to skrzynka pocztowa — każdy może wrzucić list (klucz publiczny), ale tylko ty masz klucz do otwarcia (klucz prywatny). TLS to kurier, który najpierw wymienia się hasłem przez skrzynkę, potem używa szybkiej kłódki.",en:"Symmetric encryption is like one padlock with one key — fast to open, but you must physically hand over a copy. Asymmetric is like a mailbox — anyone can drop in a letter (public key), but only you can open it (private key). TLS is a courier who first exchanges a password via the mailbox, then uses the fast padlock."},
answer:"Symmetric encryption uses one shared key for both encryption and decryption — algorithms like AES-256 encrypt at gigabytes per second, ideal for bulk data. The challenge is secure key distribution: both parties must possess the shared key. Asymmetric encryption uses a public-private key pair — the public key encrypts, the private key decrypts, solving key distribution since public keys can be shared openly. Algorithms like RSA-2048 and ECDSA are 100-1000x slower than symmetric. In practice, TLS 1.3 combines both in a hybrid approach: asymmetric encryption via ECDHE exchanges a session key securely during the handshake, then symmetric AES-256-GCM encrypts the actual data stream at high speed. Regarding quantum threats, Shor's algorithm breaks RSA and ECC but AES-256 remains quantum-safe, driving adoption of post-quantum algorithms like CRYSTALS-Kyber.",
keywords:["symmetric encryption","asymmetric encryption","AES-256","RSA","ECDHE","public key","private key","TLS 1.3","digital signature","post-quantum","CRYSTALS-Kyber","hybrid encryption"]},

{num:"Q35",original:"DoS (Denial of Service) attacks -- give examples of DoS attacks and how to avoid them.",
lecture:{intro:"Ataki DoS mają na celu uczynienie serwisów niedostępnymi przez wyczerpanie zasobów. DDoS (Distributed DoS) używa botnetów tysięcy skompromitowanych urządzeń do amplifikacji ataku.",
points:[
{title:"Ataki wolumetryczne i protokołowe",text:"Wolumetryczne: zalewanie pasma ogromnym ruchem. DNS/NTP amplification wysyła małe zapytania ze spoofowanym IP ofiary do open resolverów — odpowiedź 50-100x większa trafia do ofiary. Protokołowe: SYN flood wyczerpuje tablicę połączeń serwera milionami half-open connections.",example:"DNS amplification: atakujący wysyła 60-bajtowe zapytanie DNS ze spoofowanym IP ofiary. Open resolver odpowiada 4000-bajtową odpowiedzią bezpośrednio do ofiary — 66x amplification. SYN flood: miliony pakietów TCP SYN ze spoofowanymi IP, serwer alokuje pamięć na każde 'half-open' połączenie aż wyczerpie connection table."},
{title:"Ataki warstwy aplikacji",text:"Targetują konkretne słabości aplikacji (Layer 7). HTTP flood, Slowloris, resource-intensive query attacks. Trudniejsze do wykrycia bo ruch wygląda jak legitymiczne żądania — nie odróżnisz od normalnych użytkowników po samym wolumenie.",example:"Slowloris: atakujący otwiera tysiące połączeń HTTP i wysyła nagłówki bardzo wolno, utrzymując połączenia otwarte i wyczerpując pulę połączeń web serwera. Nie generuje dużego ruchu — omija alerting based na bandwidth."},
{title:"Obrona wielowarstwowa",text:"CDN (Cloudflare, Akamai) absorbuje ataki wolumetryczne. WAF filtruje złośliwe żądania aplikacyjne. SYN cookies zapobiegają wyczerpaniu tablicy połączeń. Rate limiting per IP. Anycast routing rozdziela ruch między data centers. Auto-scaling obsługuje legitimate traffic spikes.",example:"Firma wdraża: Cloudflare CDN (100+ Tbps capacity — absorbuje volumetric), WAF rules (blokuje Slowloris patterns), rate limiting (max 100 req/s per IP), SYN cookies na firewallu, auto-scaling EC2 instances, i DDoS response playbook z quarterly drills."}
]},
analogy:{pl:"Atak DoS to jak zablokowanie wejścia do sklepu przez tłum, który nic nie kupuje. Volumetric = ogromny tłum na ulicy, protocol = tłum blokujący drzwi obrotowe (SYN flood), application layer = każda osoba z tłumu zadaje kasjerowi skomplikowane pytanie (Slowloris). Obrona: ochrona (CDN), bramki (rate limiting), i drzwi automatyczne (SYN cookies).",en:"A DoS attack is like blocking a store entrance with a crowd buying nothing. Volumetric = a huge crowd on the street, protocol = crowd jamming revolving doors (SYN flood), application layer = each person asking the cashier a complex question (Slowloris). Defense: security guards (CDN), turnstiles (rate limiting), and automatic doors (SYN cookies)."},
answer:"DoS attacks come in three main categories. Volumetric attacks flood bandwidth — DNS amplification sends small queries to open resolvers with the victim's spoofed IP, generating 66x amplified responses directed at the target. Protocol attacks exploit Layer 3-4 weaknesses — SYN floods send millions of TCP SYN packets with spoofed IPs, exhausting the server's connection state table. Application layer attacks target Layer 7 — Slowloris keeps thousands of HTTP connections open with partial headers, draining server resources while looking like legitimate traffic. Defense requires multiple layers: CDNs like Cloudflare absorb volumetric attacks with 100+ Tbps capacity, WAFs filter malicious application requests, SYN cookies prevent connection table exhaustion, rate limiting caps requests per IP, anycast routing distributes traffic across data centers, and auto-scaling handles legitimate demand spikes.",
keywords:["DoS","DDoS","SYN flood","DNS amplification","Slowloris","volumetric attack","CDN","WAF","rate limiting","SYN cookies","anycast","Layer 7"]},

{num:"Q36",original:"What are the most common types of denial-of-service (DoS and DDoS) attacks, what technical, organizational, and legal factors affect system vulnerability to these attacks, and what methods can be used for effective prevention?",
lecture:{intro:"To pytanie rozszerza Q35 o wymiary organizacyjne i prawne obrony przed DDoS. Same zabezpieczenia techniczne nie wystarczą — potrzebna jest gotowość organizacyjna, prawna i kontraktowa.",
points:[
{title:"Czynniki techniczne podatności",text:"Niewystarczająca przepustowość, brak redundancji, single points of failure, niezaktualizowane usługi, brak filtrowania ruchu. Architektura monolityczna bardziej podatna niż rozproszona.",example:"Startup z jednym serwerem, bez CDN i bez rate limiting, offline po ataku 5 Gbps — banalny w skali DDoS. Ta sama aplikacja za Cloudflare + z auto-scaling i redundancją: atak 500 Gbps absorbowany bez wpływu na użytkowników."},
{title:"Czynniki organizacyjne",text:"Brak incident response playbook, brak przeszkolenia zespołu, brak symulacji DDoS, słaba komunikacja IT-biznes, brak DDoS-specific SLA z hosting providerem. Chaos organizacyjny podczas ataku pogarsza sytuację.",example:"Podczas ataku DDoS: dyżurny inżynier nie ma playbooka, nie może dodzwonić się do emergency support CDN (brak premium SLA), CEO dowiaduje się o awarii z Twittera — 4h downtime zamiast 15 minut."},
{title:"Czynniki prawne i kompleksowa strategia",text:"DDoS to przestępstwo w większości jurysdykcji (Computer Fraud and Abuse Act, Computer Misuse Act). GDPR wymaga zgłoszenia breach w 72h. Cyber insurance pokrywa straty finansowe. Kompleksowa obrona łączy technical + organizational + contractual.",example:"Dojrzały program obrony: quarterly DDoS drills z całym zespołem, CDN z 100Tbps capacity, auto-scaling, umowa z ISP na blackhole routing, incident response playbook z eskalation matrix, i polisa cyber insurance na $5M."}
]},
analogy:{pl:"Obrona przed DDoS to jak ochrona przeciwpowodziowa: potrzebujesz wałów (technika — CDN, WAF), planów ewakuacji (organizacja — playbook, szkolenia), ubezpieczenia (prawo — cyber insurance, SLA), i regularnych ćwiczeń (DDoS drills). Sam wał nie uratuje miasta.",en:"DDoS defense is like flood protection: you need levees (technical — CDN, WAF), evacuation plans (organizational — playbook, training), insurance (legal — cyber insurance, SLA), and regular drills. Levees alone won't save the city."},
answer:"DDoS attacks span volumetric, protocol, and application-layer types as covered in Q35. Technical vulnerability factors include insufficient bandwidth, single points of failure, and unpatched services — monolithic architectures are far more vulnerable than distributed ones. Organizational factors include absence of incident response playbooks, untrained staff, and lack of DDoS simulation testing — organizational chaos during an attack multiplies downtime. Legal factors include compliance obligations like GDPR requiring breach notification within 72 hours, and DDoS attacks being criminal offenses under laws like the Computer Fraud and Abuse Act. Effective prevention combines technical controls (CDN, WAF, auto-scaling, SYN cookies), organizational preparedness (documented playbooks, quarterly drills, trained teams), contractual measures (premium SLA with CDN providers, ISP blackhole routing agreements), and financial protection through cyber insurance policies.",
keywords:["DDoS prevention","incident response","playbook","SLA","GDPR","cyber insurance","blackhole routing","defense in depth","organizational readiness","compliance","simulation"]},

{num:"S2-6",original:"How does OAuth 2.0 work in securing web and mobile applications, and how can it be implemented in Java and .NET?",
lecture:{intro:"OAuth 2.0 to framework autoryzacji pozwalający aplikacjom trzecim na ograniczony dostęp do zasobów użytkownika bez udostępniania credentials. Standard przemysłowy dla 'Login with Google/Facebook' i zabezpieczania API.",
points:[
{title:"OAuth 2.0 Flow i komponenty",text:"4 grant types: Authorization Code (web apps), Authorization Code + PKCE (mobile/SPA), Client Credentials (server-to-server), Device Code (IoT/TV). Komponenty: Resource Owner (user), Client (app), Authorization Server (wydaje tokeny), Resource Server (API).",example:"Authorization Code + PKCE flow: user klika 'Login with Google' → redirect do Google → autentykacja → Google redirectuje z authorization code → serwer wymienia code na access token + refresh token → access token wywołuje Google API."},
{title:"Tokeny i bezpieczeństwo",text:"Access token: krótkotrwały (1h), JWT z claims, do wywołania API. Refresh token: długotrwały (30 dni), do odświeżenia access tokena bez ponownego logowania. PKCE zapobiega przechwyceniu authorization code w mobile apps.",example:"JWT access token zawiera: {sub: 'user123', scope: 'read:email', exp: 1h}. Po wygaśnięciu: refresh token wymienia się na nowy access token bez interakcji użytkownika. Rotation: przy każdym refresh stary refresh token jest unieważniany."},
{title:"Implementacja w Java i .NET",text:"Spring Security: @EnableOAuth2Login + application.yml z client-id/secret — auto-konfiguracja całego flow. ASP.NET Core: AddAuthentication().AddGoogle/AddOAuth() w middleware pipeline. Oba frameworki obsługują token validation, refresh i session management out of the box.",example:"Spring: @EnableOAuth2Login annotation + spring.security.oauth2.client.registration.google.client-id=xxx w application.yml — Spring auto-obsługuje redirect, token exchange, session. ASP.NET: builder.Services.AddAuthentication().AddGoogle(opt => { opt.ClientId = 'xxx'; }) — middleware obsługuje cały flow."}
]},
analogy:{pl:"OAuth 2.0 to jak system hotelowych kart dostępu: recepcja (authorization server) po okazaniu dokumentu (autentykacja) wydaje kartę (access token) z ograniczonym dostępem (scope: twój pokój, basen, siłownia) na określony czas (expiration). Nie dajesz nikomu klucza głównego (hasła).",en:"OAuth 2.0 is like a hotel key card system: the front desk (authorization server) checks your ID (authentication) and issues a card (access token) with limited access (scope: your room, pool, gym) for a set time (expiration). You never hand out the master key (password)."},
answer:"OAuth 2.0 is an authorization framework where users grant third-party applications limited access to their resources without sharing credentials. The flow involves four actors: resource owner, client app, authorization server, and resource server. The Authorization Code flow with PKCE — recommended for web and mobile — redirects users to the auth server, exchanges an authorization code for short-lived access tokens and long-lived refresh tokens, then uses tokens to call protected APIs. In Java, Spring Security provides @EnableOAuth2Login with auto-configured flows for Google, GitHub, and other providers, handling redirect, token exchange, and session management. In .NET, ASP.NET Core's AddAuthentication().AddOAuth() middleware similarly handles the complete flow. Both support JWT validation, refresh token rotation, and integration with identity providers via OIDC.",
keywords:["OAuth 2.0","authorization code","PKCE","access token","refresh token","JWT","Spring Security","ASP.NET Core","OIDC","scope","identity provider"]},

{num:"S2-25",original:"Discuss cybersecurity best practices in Java and .NET to protect web and mobile applications from common attacks like SQL Injection, XSS, CSRF.",
lecture:{intro:"Webowe aplikacje narażone są na powtarzalne kategorie ataków, które można systematycznie eliminować przez secure coding practices i wbudowane mechanizmy frameworków. OWASP Top 10 to kluczowy reference.",
points:[
{title:"SQL Injection — parameterized queries",text:"NIGDY nie konkatenuj user input z SQL. Parameterized queries/prepared statements automatycznie escapują input. ORMs (Hibernate, Entity Framework) parametryzują automatycznie. Dotyczy też NoSQL injection (MongoDB).",example:"Java: PreparedStatement ps = conn.prepareStatement('SELECT * FROM users WHERE id = ?'); ps.setInt(1, userId); — parametr jest escapowany. .NET: var user = context.Users.Where(u => u.Id == userId); — Entity Framework parametryzuje automatycznie. NIGDY: 'SELECT * FROM users WHERE id = ' + userId."},
{title:"XSS i CSRF — encoding i tokeny",text:"XSS: encode output, validate input, Content Security Policy headers. Frameworki auto-encodują: Razor (.NET), Thymeleaf (Java). CSRF: anti-forgery tokeny walidują że formularz pochodzi z naszej aplikacji. SameSite cookies blokują cross-origin requests.",example:"XSS: Razor auto-encoduje @Model.UserName w HTML. CSP header: script-src 'self' — blokuje inline scripts i zewnętrzne injection. CSRF: Spring @EnableWebSecurity auto-generuje tokeny. ASP.NET: @Html.AntiForgeryToken() w formularzu + [ValidateAntiForgeryToken] na kontrolerze."},
{title:"Dodatkowe warstwy bezpieczeństwa",text:"HTTPS everywhere z HSTS header. Security headers: X-Frame-Options (clickjacking), X-Content-Type-Options (MIME sniffing). Input validation na serwerze (client-side to UX, nie security). Rate limiting. Dependency scanning (Snyk, OWASP Dependency-Check).",example:"Security headers middleware: Strict-Transport-Security: max-age=31536000 (wymusza HTTPS), X-Frame-Options: DENY (blokuje iframe embedding), X-Content-Type-Options: nosniff. Snyk skanuje dependencies — wykrywa np. vulnerable log4j version."}
]},
analogy:{pl:"Bezpieczeństwo web to jak wielowarstwowa ochrona domu: zamek główny (HTTPS), alarm antywłamaniowy (WAF), weryfikacja gości (input validation), kamery z nagrywaniem (audit logging), i zasada 'nie wpuszczaj obcych bez sprawdzenia dokumentu' (authentication). Każda warstwa chroni przed innym typem włamania.",en:"Web security is like layered home protection: main lock (HTTPS), burglar alarm (WAF), guest verification (input validation), cameras with recording (audit logging), and a rule to never let strangers in without checking ID (authentication). Each layer protects against a different type of break-in."},
